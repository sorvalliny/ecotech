<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ОРБИТА — Каталог продуктов</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
/* Стиль как tracker — тёмная тема */
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#03080F;--card:#061525;--surface:#0d2a40;--border:rgba(79,195,247,.12);--text:#E8F4FD;--muted:#7A9DB8;--violet:#4FC3F7;--teal:#00D4B4;--amber:#FFB830;--green:#34D399;--pink:#FF2D8A;--red:#F87171}
body{font-family:'Exo 2',sans-serif;background:var(--bg);color:var(--text)}

.page{max-width:960px;margin:0 auto;padding:32px 24px 80px;position:relative;z-index:1}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.header h1{font-family:'Orbitron',sans-serif;font-size:20px;font-weight:900;color:#fff}
.header-sub{font-size:12px;color:var(--muted)}

/* Фильтры */
.filters{display:flex;gap:4px;margin-bottom:20px;flex-wrap:wrap}
.fbtn{padding:6px 14px;border:1px solid var(--border);border-radius:8px;background:transparent;color:var(--muted);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s}
.fbtn:hover{color:var(--text);border-color:rgba(79,195,247,.25)}
.fbtn.active{background:rgba(0,212,180,.1);color:var(--teal);border-color:rgba(0,212,180,.3)}

/* Карточки */
.catalog{display:flex;flex-direction:column;gap:10px}
.pcard{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;display:flex;gap:16px;align-items:flex-start;transition:border-color .15s,transform .15s;cursor:pointer;text-decoration:none}
.pcard:hover{border-color:rgba(79,195,247,.3);transform:translateY(-2px)}
.pcard-left{flex:1}
.pcard-name{font-family:'Orbitron',sans-serif;font-size:14px;font-weight:900;color:#fff;margin-bottom:4px}
.pcard-desc{font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:8px}
.pcard-meta{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.pcard-badge{font-size:9px;font-weight:700;padding:3px 8px;border-radius:5px;letter-spacing:.03em}
.pcard-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;min-width:140px}
.pcard-launch{font-size:11px;color:var(--text)}
.pcard-launch-label{font-size:9px;color:var(--muted)}
.pcard-team{font-size:10px;color:var(--muted)}
.pcard-status{font-size:10px;font-weight:700;padding:3px 8px;border-radius:5px}

.st-ontrack{background:rgba(52,211,153,.1);color:var(--green)}
.st-atrisk{background:rgba(255,184,48,.1);color:var(--amber)}
.st-blocked{background:rgba(248,113,113,.1);color:var(--red)}
.st-pending{background:rgba(79,195,247,.1);color:var(--violet)}

.empty{text-align:center;padding:60px;color:var(--muted);font-size:13px}

.cta-bar{margin-top:24px;text-align:center}
.cta-btn{display:inline-flex;align-items:center;gap:6px;padding:12px 28px;background:linear-gradient(135deg,var(--teal),var(--violet));border:none;border-radius:10px;color:#fff;font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;cursor:pointer;text-decoration:none;transition:opacity .15s}
.cta-btn:hover{opacity:.85}

.footer{border-top:1px solid var(--border);padding:20px 0;text-align:center;font-size:10px;color:rgba(255,255,255,.2);margin-top:40px}

@media(max-width:640px){.pcard{flex-direction:column}.pcard-right{align-items:flex-start;min-width:auto}}
</style>
<script src="icons.js"></script>
<script src="platform.js"></script>
<script src="stages.js"></script>
<script src="js/auth.js"></script>
<script src="nav.js"></script>
</head>
<body>

<div class="page">
  <div class="header">
    <div>
      <h1>Каталог продуктов</h1>
      <div class="header-sub">Продукты экосистемы WB — статус, стадия, сроки</div>
    </div>
    <a class="cta-btn" href="Продукту/brief.html" style="font-size:10px;padding:8px 16px">+ Подать заявку</a>
  </div>

  <div class="filters" id="filters"></div>
  <div class="catalog" id="catalog"></div>

  <div class="cta-bar">
    <a class="cta-btn" href="Продукту/brief.html">Подать заявку на новый продукт →</a>
  </div>
</div>

<div class="footer">ОРБИТА · Каталог продуктов · WB Экосистема · 2026</div>

<script>
(function(){
  var STAGES = window.STAGES_DB ? STAGES_DB.get() : [];
  var products = [];
  var filter = 'all'; // all, prod, dev, idea, pending

  function load() {
    if (window.PT && PT.ensureProducts) {
      PT.ensureProducts(function(p) { products = p || []; render(); });
    } else {
      products = []; render();
    }
    // Auto-refresh
    window.addEventListener('storage', function(e) {
      if (e.key === 'ECOTECH_PRODUCTS') { products = JSON.parse(e.newValue || '[]'); render(); }
    });
  }

  function getStageGroup(gate) {
    if (gate >= 3) return 'prod';     // В проде (О·3+)
    if (gate >= 1) return 'dev';      // В разработке (О·1–О·2)
    return 'idea';                     // Идеи (О·0)
  }

  function render() {
    renderFilters();
    renderCatalog();
  }

  function renderFilters() {
    var counts = { all:0, prod:0, dev:0, idea:0, pending:0 };
    products.forEach(function(p) {
      counts.all++;
      if (p.status === 'pending') { counts.pending++; return; }
      counts[getStageGroup(p.gate)]++;
    });
    var el = document.getElementById('filters');
    var tabs = [
      { id:'all', label:'Все ('+counts.all+')' },
      { id:'prod', label:'В проде ('+counts.prod+')' },
      { id:'dev', label:'В разработке ('+counts.dev+')' },
      { id:'idea', label:'Идеи ('+counts.idea+')' },
      { id:'pending', label:'На рассмотрении ('+counts.pending+')' }
    ];
    el.innerHTML = tabs.map(function(t) {
      return '<button class="fbtn'+(filter===t.id?' active':'')+'" onclick="setFilter(\''+t.id+'\')">'+t.label+'</button>';
    }).join('');
  }

  window.setFilter = function(f) { filter = f; render(); };

  function renderCatalog() {
    var el = document.getElementById('catalog');
    var filtered = products.filter(function(p) {
      if (filter === 'all') return true;
      if (filter === 'pending') return p.status === 'pending';
      return p.status !== 'pending' && getStageGroup(p.gate) === filter;
    });

    // Сортировка: at-risk первые, потом по gate desc
    filtered.sort(function(a,b) {
      if (a.status === 'at-risk' && b.status !== 'at-risk') return -1;
      if (b.status === 'at-risk' && a.status !== 'at-risk') return 1;
      return b.gate - a.gate;
    });

    if (!filtered.length) { el.innerHTML = '<div class="empty">Нет продуктов по фильтру</div>'; return; }

    el.innerHTML = filtered.map(function(p) {
      var s = STAGES[p.gate] || STAGES[0] || {name:'?',color:'#7A7A9D',colorDim:'rgba(122,122,157,.1)'};
      var statusCls = p.status === 'on-track' ? 'st-ontrack' : p.status === 'at-risk' ? 'st-atrisk' : p.status === 'blocked' ? 'st-blocked' : 'st-pending';
      var statusLabel = p.status === 'on-track' ? 'On Track' : p.status === 'at-risk' ? 'At Risk' : p.status === 'blocked' ? 'Blocked' : p.status === 'pending' ? 'На рассмотрении' : p.status;
      var launchText = p.launchDate ? p.launchDate : '—';
      var teamText = (p.teamSize||0) + '/' + (p.requiredSize||'?');
      var esc = function(t){ return String(t||'').replace(/</g,'&lt;'); };

      return '<a class="pcard" href="Проектный офис/tracker.html#product='+p.id+'">' +
        '<div class="pcard-left">' +
          '<div class="pcard-name">' + esc(p.name) + '</div>' +
          '<div class="pcard-desc">' + esc(p.desc) + '</div>' +
          '<div class="pcard-meta">' +
            '<span class="pcard-badge" style="background:'+s.colorDim+';color:'+s.color+'">О·'+p.gate+' '+s.name+'</span>' +
            '<span class="pcard-badge" style="background:rgba(79,195,247,.08);color:var(--violet)">'+(p.catLabel||p.cat||'')+'</span>' +
          '</div>' +
        '</div>' +
        '<div class="pcard-right">' +
          '<span class="pcard-status '+statusCls+'">'+statusLabel+'</span>' +
          '<div class="pcard-launch-label">Запуск</div>' +
          '<div class="pcard-launch">'+launchText+'</div>' +
          '<div class="pcard-team">Команда: '+teamText+'</div>' +
        '</div>' +
      '</a>';
    }).join('');
  }

  load();
})();
</script>

</body>
</html>
