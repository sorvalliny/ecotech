  <link rel="stylesheet" href="../design-system.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --rwb-dark:#150022;--rwb-plum:#7D256F;--rwb-berry:#BC3D96;
  --rwb-pink:#EC238D;--rwb-mid:#200030;--rwb-gray:#9B8FAF;
  --teal:#00D4B4;--white:#FFFFFF;
}
@import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Golos+Text:wght@400;500;600;700&display=swap');
body{font-family:'Golos Text',sans-serif;background:transparent;color:#fff;margin:0;padding:0}
.slide{background:var(--rwb-mid);border-radius:20px;overflow:hidden;
  min-height:540px;position:relative;border:1px solid rgba(188,61,150,.18);
  box-shadow:0 32px 80px rgba(0,0,0,.65);
  animation:sIn .35s cubic-bezier(.22,1,.36,1)}
@keyframes sIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

/* ── HELPERS ── */
.ut{font-family:'Unbounded',sans-serif}
.stag{display:inline-block;padding:3px 10px;border-radius:50px;font-size:11px;font-weight:700;letter-spacing:.05em}
.tb{background:rgba(188,61,150,.25);color:#E87FCC;border:1px solid rgba(188,61,150,.4)}
.tp{background:rgba(236,35,141,.2);color:#FF85C0;border:1px solid rgba(236,35,141,.35)}
.tt{background:rgba(0,212,180,.12);color:#00D4B4;border:1px solid rgba(0,212,180,.3)}
.tw{background:rgba(255,255,255,.08);color:rgba(255,255,255,.75);border:1px solid rgba(255,255,255,.12)}
.gb{height:3px;background:linear-gradient(90deg,#7D256F,#BC3D96,#EC238D,#FF6EC7);
  position:absolute;top:0;left:0;right:0;border-radius:20px 20px 0 0}
.scard{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);
  border-radius:14px;padding:18px;transition:background .2s}
.noise{position:absolute;inset:0;opacity:.025;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");pointer-events:none}
.pb{height:5px;border-radius:3px;background:rgba(255,255,255,.07);overflow:hidden}
.pf{height:100%;border-radius:3px;background:linear-gradient(90deg,#BC3D96,#EC238D)}
.ci{width:16px;height:16px;border-radius:50%;background:rgba(188,61,150,.2);
  border:1px solid rgba(188,61,150,.4);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.g2{display:grid;grid-template-columns:1fr 1fr;min-height:540px}
.g21{display:grid;grid-template-columns:1fr 1.6fr;min-height:540px}
.g12{display:grid;grid-template-columns:1.4fr 1fr;min-height:540px}
.hr{position:relative;overflow:hidden;background:linear-gradient(145deg,#0D001A 0%,#250040 40%,#400060 70%,#6A0050 100%)}
.bn{font-family:'Unbounded',sans-serif;font-size:110px;font-weight:900;line-height:1;
  background:linear-gradient(135deg,#BC3D96,#EC238D);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.blink{display:flex;align-items:center;justify-content:space-between;gap:12px;flex:1;
  padding:11px 14px;border-radius:14px;
  background:linear-gradient(135deg,rgba(141,41,127,.4),rgba(236,35,141,.25));
  border:1px solid rgba(188,61,150,.55);text-decoration:none;color:#fff;transition:all .2s;
  box-shadow:0 4px 20px rgba(188,61,150,.25)}
.blink:hover{background:linear-gradient(135deg,rgba(141,41,127,.65),rgba(236,35,141,.45));
  box-shadow:0 8px 32px rgba(188,61,150,.5);transform:translateY(-1px)}
.ctap{background:linear-gradient(160deg,#7D256F 0%,#BC3D96 55%,#EC238D 100%);
  padding:48px 40px;display:flex;flex-direction:column;justify-content:space-between;
  position:relative;z-index:1;overflow:hidden}
@keyframes f0{0%,100%{transform:translate(0,0) rotate(0deg)}25%{transform:translate(6px,-14px) rotate(3deg)}75%{transform:translate(-4px,8px) rotate(-2deg)}}
@keyframes f1{0%,100%{transform:translate(0,0) rotate(0deg)}33%{transform:translate(-10px,6px) rotate(-4deg)}66%{transform:translate(8px,-10px) rotate(2deg)}}
@keyframes f2{0%,100%{transform:translate(0,0) rotate(0deg)}20%{transform:translate(8px,12px) rotate(5deg)}70%{transform:translate(-6px,-8px) rotate(-3deg)}}
@keyframes f3{0%,100%{transform:translate(0,0) rotate(0deg)}40%{transform:translate(-12px,-6px) rotate(-6deg)}80%{transform:translate(6px,10px) rotate(4deg)}}
@keyframes f4{0%,100%{transform:translate(0,0) rotate(0deg)}30%{transform:translate(10px,-4px) rotate(3deg)}60%{transform:translate(-8px,14px) rotate(-5deg)}}
@keyframes f5{0%,100%{transform:translate(0,0) rotate(0deg)}50%{transform:translate(-14px,-12px) rotate(-4deg)}}
@keyframes f6{0%,100%{transform:translate(0,0) rotate(0deg)}45%{transform:translate(12px,6px) rotate(6deg)}85%{transform:translate(-6px,-10px) rotate(-3deg)}}
@keyframes f7{0%,100%{transform:translate(0,0) rotate(0deg)}35%{transform:translate(-8px,14px) rotate(-5deg)}75%{transform:translate(10px,-6px) rotate(3deg)}}
@media(max-width:700px){.g2,.g21,.g12{grid-template-columns:1fr}.hr{display:none}}
</style>
<style>
body{background:#0D0018;min-height:100vh;display:flex;flex-direction:column;}
body::before{display:none}
.slide-page-wrap{flex:1;max-width:880px;width:100%;margin:24px auto 0;padding:0 20px;}
.slide-progress{display:flex;align-items:center;gap:10px;padding:0 0 14px;}
.sp-dots{display:flex;gap:5px;flex:1;}
.sp-dot{height:3px;border-radius:2px;flex:1;background:rgba(255,255,255,.1);transition:background .3s;}
.sp-dot.done{background:rgba(188,61,150,.6);}
.sp-dot.current{background:linear-gradient(90deg,#BC3D96,#EC238D);}
.sp-label{font-size:10px;color:rgba(255,255,255,.3);white-space:nowrap;font-family:monospace;}
.slide-nav-row{display:flex;justify-content:space-between;align-items:center;padding:14px 0 28px;}
.snav-btn{display:flex;align-items:center;gap:6px;text-decoration:none;font-size:12px;font-weight:600;padding:8px 18px;border-radius:50px;transition:all .2s;cursor:pointer;border:none;font-family:inherit;}
.snav-prev{color:rgba(255,255,255,.5);background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);}
.snav-prev:hover{background:rgba(255,255,255,.12);color:#fff;}
.snav-next{color:#fff;background:linear-gradient(135deg,#BC3D96,#EC238D);box-shadow:0 4px 16px rgba(188,61,150,.35);}
.snav-next:hover{box-shadow:0 6px 24px rgba(188,61,150,.55);transform:translateY(-1px);}
.snav-end{color:rgba(255,255,255,.35);font-size:11px;font-family:monospace;}
</style>
