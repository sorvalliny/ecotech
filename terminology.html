<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ОРБИТА — Терминология</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --dark:#03080F;--surface:#040f1a;--card:#061525;
  --border:rgba(79,195,247,0.1);--border-hi:rgba(79,195,247,0.25);
  --primary:#4FC3F7;--primary-dim:rgba(79,195,247,0.1);--primary-border:rgba(79,195,247,0.3);
  --text:#E8F4FD;--muted:#9EC8E0;--dim:#4A7A9B;
  --white:#FFFFFF;
  --font-head:'Orbitron',sans-serif;--font-body:'Exo 2',sans-serif;
  --radius:14px;--radius-sm:8px;
}
html{scroll-behavior:smooth;}
body{font-family:var(--font-body);background:var(--dark);color:var(--text);line-height:1.65;min-height:100vh;overflow-x:hidden;}

/* ── LAYOUT ── */
.page-wrap{max-width:1120px;margin:0 auto;padding:0 28px;position:relative;z-index:1;}

/* ── HEADER ── */
.page-header{padding:64px 0 40px;text-align:center;}
.page-header h1{font-family:var(--font-head);font-size:36px;font-weight:900;color:var(--white);letter-spacing:-1px;margin-bottom:10px;}
.page-header .subtitle{font-size:15px;color:var(--muted);max-width:500px;margin:0 auto;}

/* ── SEARCH ── */
.search-wrap{max-width:480px;margin:0 auto 48px;position:relative;}
.search-input{width:100%;padding:14px 18px 14px 44px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:var(--font-body);font-size:15px;outline:none;transition:border-color .2s;}
.search-input::placeholder{color:var(--dim);}
.search-input:focus{border-color:var(--primary-border);}
.search-icon{position:absolute;left:15px;top:50%;transform:translateY(-50%);color:var(--dim);pointer-events:none;font-size:16px;}

/* ── CATEGORY ── */
.category-section{margin-bottom:48px;}
.category-header{display:flex;align-items:center;gap:10px;margin-bottom:18px;}
.category-name{font-family:var(--font-head);font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--primary);}
.category-count{font-size:11px;color:var(--dim);background:var(--primary-dim);border:1px solid var(--border);border-radius:20px;padding:2px 10px;font-weight:600;}
.category-line{flex:1;height:1px;background:var(--border);}

/* ── CARDS GRID ── */
.cards-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}

/* ── CARD ── */
.term-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:22px 20px;display:flex;flex-direction:column;gap:8px;transition:border-color .18s,transform .15s,box-shadow .18s;}
.term-card:hover{border-color:var(--primary-border);transform:translateY(-2px);box-shadow:0 8px 28px rgba(79,195,247,0.08);}
.term-display{font-family:var(--font-head);font-size:14px;font-weight:900;color:var(--white);line-height:1.3;}
.term-original{font-size:12px;color:var(--dim);font-style:italic;}
.term-short{font-size:13px;color:var(--muted);line-height:1.6;}
.term-full{font-size:13px;color:var(--muted);line-height:1.65;display:none;padding-top:6px;border-top:1px solid var(--border);margin-top:4px;}
.term-full.open{display:block;}
.term-toggle{background:none;border:none;color:var(--primary);font-family:var(--font-body);font-size:12px;font-weight:600;cursor:pointer;padding:4px 0;align-self:flex-start;transition:opacity .15s;}
.term-toggle:hover{opacity:0.7;}
.term-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px;}
.term-tag{font-size:11px;color:var(--primary);background:var(--primary-dim);border:1px solid rgba(79,195,247,0.15);border-radius:20px;padding:2px 10px;cursor:pointer;transition:background .15s,border-color .15s;text-decoration:none;}
.term-tag:hover{background:rgba(79,195,247,0.18);border-color:var(--primary-border);}

/* ── NO RESULTS ── */
.no-results{text-align:center;padding:60px 20px;color:var(--dim);font-size:15px;display:none;}

/* ── FOOTER ── */
.page-footer{border-top:1px solid var(--border);padding:20px 28px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;font-size:11px;color:var(--dim);max-width:1120px;margin:0 auto;}
.page-footer strong{color:rgba(255,255,255,0.3);}

/* ── RESPONSIVE ── */
@media(max-width:960px){
  .cards-grid{grid-template-columns:repeat(2,1fr);}
}
@media(max-width:560px){
  .cards-grid{grid-template-columns:1fr;}
  .page-header h1{font-size:26px;}
  .page-header{padding:48px 0 28px;}
}
</style>
<script src="nav.js"></script>
</head>
<body>

<div class="page-wrap">

  <!-- ── HEADER ── -->
  <header class="page-header">
    <h1>Терминология</h1>
    <p class="subtitle">Глоссарий продуктовых и технологических терминов</p>
  </header>

  <!-- ── SEARCH ── -->
  <div class="search-wrap">
    <span class="search-icon">&#128269;</span>
    <input type="text" class="search-input" id="searchInput" placeholder="Найти термин...">
  </div>

  <!-- ── CONTENT ── -->
  <div id="glossary"></div>
  <div class="no-results" id="noResults">Ничего не найдено</div>

</div>

<!-- ── FOOTER ── -->
<footer>
  <div class="page-footer">
    <div><strong>ОРБИТА</strong> · Проектный офис · Терминология</div>
    <div>Март 2026 · v1.0</div>
  </div>
</footer>

<script>
(function(){
  const CATEGORY_ORDER = ['методология','стадии','сущности','продукт','процесс','метрики','роли','инвестиции'];
  const CATEGORY_LABELS = {
    'методология':'Методология','стадии':'Стадии','сущности':'Сущности','продукт':'Продукт','процесс':'Процесс',
    'метрики':'Метрики','роли':'Роли','инвестиции':'Инвестиции'
  };

  let allTerms = [];

  function loadData(){
    const xhr = new XMLHttpRequest();
    xhr.open('GET','data/terminology.json',true);
    xhr.onload = function(){
      if(xhr.status === 200 || xhr.status === 0){
        allTerms = JSON.parse(xhr.responseText);
        render(allTerms);
      }
    };
    xhr.send();
  }

  function groupByCategory(terms){
    const groups = {};
    terms.forEach(function(t){
      const cat = t.category || 'другое';
      if(!groups[cat]) groups[cat] = [];
      groups[cat].push(t);
    });
    return groups;
  }

  function render(terms){
    const container = document.getElementById('glossary');
    const noResults = document.getElementById('noResults');
    container.innerHTML = '';

    if(terms.length === 0){
      noResults.style.display = 'block';
      return;
    }
    noResults.style.display = 'none';

    const groups = groupByCategory(terms);
    const order = CATEGORY_ORDER.filter(function(c){ return groups[c]; });
    // append any categories not in predefined order
    Object.keys(groups).forEach(function(c){
      if(order.indexOf(c) === -1) order.push(c);
    });

    order.forEach(function(cat){
      const items = groups[cat];
      const section = document.createElement('div');
      section.className = 'category-section';

      const header = document.createElement('div');
      header.className = 'category-header';
      header.innerHTML =
        '<span class="category-name">'+(CATEGORY_LABELS[cat]||cat)+'</span>'+
        '<span class="category-count">'+items.length+'</span>'+
        '<span class="category-line"></span>';
      section.appendChild(header);

      const grid = document.createElement('div');
      grid.className = 'cards-grid';

      items.forEach(function(term){
        var card = document.createElement('div');
        card.className = 'term-card';
        card.setAttribute('data-id', term.id);

        var tags = '';
        if(term.related && term.related.length){
          tags = '<div class="term-tags">' +
            term.related.map(function(r){
              return '<a class="term-tag" data-ref="'+r+'" href="#">'+r+'</a>';
            }).join('') + '</div>';
        }

        card.innerHTML =
          '<div class="term-display">'+term.display+'</div>'+
          (term.original && term.original !== term.display
            ? '<div class="term-original">'+term.original+'</div>' : '')+
          '<div class="term-short">'+term.short+'</div>'+
          '<div class="term-full" id="full-'+term.id+'">'+term.full+'</div>'+
          '<button class="term-toggle" data-target="full-'+term.id+'">Подробнее</button>'+
          tags;

        grid.appendChild(card);
      });

      section.appendChild(grid);
      container.appendChild(section);
    });

    // Toggle handlers
    container.querySelectorAll('.term-toggle').forEach(function(btn){
      btn.addEventListener('click', function(){
        var el = document.getElementById(btn.getAttribute('data-target'));
        if(el.classList.contains('open')){
          el.classList.remove('open');
          btn.textContent = 'Подробнее';
        } else {
          el.classList.add('open');
          btn.textContent = 'Свернуть';
        }
      });
    });

    // Tag click handlers
    container.querySelectorAll('.term-tag').forEach(function(tag){
      tag.addEventListener('click', function(e){
        e.preventDefault();
        var ref = tag.getAttribute('data-ref');
        var target = document.querySelector('.term-card[data-id="'+ref+'"]');
        if(target){
          target.scrollIntoView({behavior:'smooth',block:'center'});
          target.style.borderColor = 'var(--primary)';
          target.style.boxShadow = '0 0 20px rgba(79,195,247,0.2)';
          setTimeout(function(){
            target.style.borderColor = '';
            target.style.boxShadow = '';
          }, 1500);
        } else {
          // If referenced term exists in data, put it in search
          var input = document.getElementById('searchInput');
          input.value = ref;
          input.dispatchEvent(new Event('input'));
        }
      });
    });
  }

  // Search
  document.getElementById('searchInput').addEventListener('input', function(){
    var q = this.value.trim().toLowerCase();
    if(!q){
      render(allTerms);
      return;
    }
    var filtered = allTerms.filter(function(t){
      return t.display.toLowerCase().indexOf(q) !== -1 ||
             t.original.toLowerCase().indexOf(q) !== -1 ||
             t.short.toLowerCase().indexOf(q) !== -1 ||
             t.category.toLowerCase().indexOf(q) !== -1 ||
             t.id.toLowerCase().indexOf(q) !== -1;
    });
    render(filtered);
  });

  loadData();
})();
</script>
</body>
</html>
