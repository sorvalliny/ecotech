<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ОРБИТА — KPI Дашборд</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.8/dist/chart.umd.min.js"
        onerror="window.__chartjsFailed=true;document.querySelectorAll('.chart-wrap,.chart-wrap-scatter').forEach(function(el){el.innerHTML='<p style=&quot;text-align:center;padding:40px 16px;color:#7A7A9D;font-size:13px;&quot;>Не удалось загрузить библиотеку графиков. Проверьте подключение к сети и обновите страницу.</p>';})"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"
        onerror="window.__html2canvasFailed=true;var b=document.getElementById('pdfBtn');if(b){b.disabled=true;b.title='Экспорт недоступен: не удалось загрузить html2canvas';}"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js"
        onerror="window.__jspdfFailed=true;var b=document.getElementById('pdfBtn');if(b){b.disabled=true;b.title='Экспорт недоступен: не удалось загрузить jsPDF';}"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --dark:#FAF9FF;--mid:#F3F0FF;--card:#FFFFFF;--surface2:#EDE8FF;
  --border:rgba(79,195,247,0.10);--border-hi:rgba(79,195,247,0.20);
  --violet:#4FC3F7;--violet-dim:rgba(79,195,247,0.08);--violet-border:rgba(79,195,247,0.35);
  --pink:#FF2D8A;--pink-dim:rgba(255,45,138,0.07);
  --teal:#00D4B4;--teal-dim:rgba(0,212,180,0.08);
  --amber:#FFB830;--amber-dim:rgba(255,184,48,0.08);
  --green:#34D399;--green-dim:rgba(52,211,153,0.08);
  --blue:#3B82F6;--blue-dim:rgba(59,130,246,0.08);
  --red:#FF6B6B;--red-dim:rgba(255,107,107,0.08);
  --text:#1A1040;--muted:#7A7A9D;--gray2:#4A4A6A;--white:#FFFFFF;
  --font-head:'Orbitron',sans-serif;--font-body:'Exo 2',sans-serif;
  --radius:16px;--radius-sm:10px;
}
html{scroll-behavior:smooth;}
body{font-family:var(--font-body);background:var(--dark);color:var(--text);line-height:1.65;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");opacity:0.03;pointer-events:none;z-index:0;}

/* ── LAYOUT ── */
.page-wrap{max-width:1100px;margin:0 auto;padding:0 28px;position:relative;z-index:1;}
.page-header{padding:48px 0 32px;}
.page-eyebrow{font-family:var(--font-head);font-size:9px;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;color:var(--violet);margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.page-eyebrow::before{content:'';width:24px;height:2px;background:var(--violet);border-radius:2px;}
.page-title{font-family:var(--font-head);font-size:28px;font-weight:900;letter-spacing:-1px;margin-bottom:6px;}
.page-sub{font-size:14px;color:var(--muted);}

/* ── KPI ROW ── */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:32px;}
.kpi-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px 22px;position:relative;overflow:hidden;transition:transform .15s,box-shadow .15s;}
.kpi-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(79,195,247,0.10);}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--radius) var(--radius) 0 0;}
.kpi-card:nth-child(1)::before{background:var(--violet);}
.kpi-card:nth-child(2)::before{background:var(--teal);}
.kpi-card:nth-child(3)::before{background:var(--red);}
.kpi-card:nth-child(4)::before{background:var(--green);}
.kpi-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px;}
.kpi-value{font-family:var(--font-head);font-size:32px;font-weight:900;line-height:1;}
.kpi-card:nth-child(1) .kpi-value{color:var(--violet);}
.kpi-card:nth-child(2) .kpi-value{color:var(--teal);}
.kpi-card:nth-child(3) .kpi-value{color:var(--red);}
.kpi-card:nth-child(4) .kpi-value{color:var(--green);}
.kpi-delta{font-size:11px;color:var(--muted);margin-top:6px;}

/* ── SECTION GRID ── */
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:40px;}
.dash-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;position:relative;}
.dash-card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.dash-card-title{font-family:var(--font-head);font-size:13px;font-weight:700;letter-spacing:0.02em;}
.dash-filter{background:var(--mid);border:1px solid var(--border);border-radius:8px;padding:6px 12px;font-family:var(--font-body);font-size:12px;color:var(--text);cursor:pointer;}
.chart-wrap{position:relative;width:100%;aspect-ratio:1;max-height:320px;margin:0 auto;}
.chart-wrap-scatter{position:relative;width:100%;height:340px;}

/* ── DONUT LEGEND ── */
.donut-legend{display:flex;flex-wrap:wrap;gap:8px 16px;margin-top:14px;}
.donut-legend-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);cursor:pointer;}
.donut-legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}

/* ── HOVER TOOLTIP LIST ── */
.donut-tip{position:absolute;z-index:100;background:var(--card);border:1px solid var(--border-hi);border-radius:var(--radius-sm);padding:12px 16px;box-shadow:0 8px 24px rgba(0,0,0,0.12);pointer-events:none;opacity:0;transition:opacity .15s;min-width:180px;}
.donut-tip.visible{opacity:1;}
.donut-tip-title{font-family:var(--font-head);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--violet);margin-bottom:6px;}
.donut-tip-list{list-style:none;padding:0;}
.donut-tip-list li{font-size:12px;color:var(--text);padding:3px 0;border-bottom:1px solid var(--border);}
.donut-tip-list li:last-child{border-bottom:none;}

/* ── PRODUCT DRAWER ── */
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:9998;opacity:0;pointer-events:none;transition:opacity .2s;}
.drawer-overlay.open{opacity:1;pointer-events:auto;}
.drawer{position:fixed;top:0;right:0;bottom:0;width:380px;max-width:90vw;background:var(--card);border-left:1px solid var(--border-hi);z-index:9999;transform:translateX(100%);transition:transform .25s cubic-bezier(.4,0,.2,1);overflow-y:auto;padding:32px 24px;}
.drawer.open{transform:translateX(0);}
.drawer-close{position:absolute;top:16px;right:16px;width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:var(--mid);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--muted);transition:background .15s;}
.drawer-close:hover{background:var(--surface2);}
.drawer-name{font-family:var(--font-head);font-size:18px;font-weight:900;margin-bottom:4px;padding-right:40px;}
.drawer-desc{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:18px;}
.drawer-meta{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px;}
.drawer-meta-item{background:var(--mid);border-radius:8px;padding:10px 14px;}
.drawer-meta-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;font-weight:600;}
.drawer-meta-val{font-family:var(--font-head);font-size:16px;font-weight:700;margin-top:2px;}
.drawer-section-title{font-family:var(--font-head);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--violet);margin:16px 0 8px;}
.drawer-kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.drawer-kpi{background:var(--mid);border-radius:8px;padding:10px;text-align:center;}
.drawer-kpi-val{font-family:var(--font-head);font-size:14px;font-weight:700;}
.drawer-kpi-label{font-size:10px;color:var(--muted);margin-top:2px;}
.drawer-initiatives{list-style:none;padding:0;}
.drawer-initiatives li{font-size:12px;padding:6px 0;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;}
.drawer-initiatives li::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--violet);flex-shrink:0;}
.drawer-initiatives li:last-child{border-bottom:none;}

/* ── GATE BAR (mini) ── */
.drawer-gate-bar{display:flex;gap:3px;margin-bottom:16px;}
.drawer-gate-step{flex:1;height:6px;border-radius:3px;background:var(--mid);}
.drawer-gate-step.done{background:var(--teal);}
.drawer-gate-step.active{background:var(--violet);}

/* ── STATUS BADGE ── */
.status{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;}
.status--on-track{background:var(--teal-dim);color:var(--teal);}
.status--at-risk{background:var(--red-dim);color:var(--red);}
.status--done{background:var(--green-dim);color:var(--green);}
.status--paused{background:var(--amber-dim);color:var(--amber);}
.status-dot{width:6px;height:6px;border-radius:50%;background:currentColor;}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  .kpi-row{grid-template-columns:repeat(2,1fr);}
  .dash-grid{grid-template-columns:1fr;}
  .drawer{width:100%;max-width:100%;}
}
@media(max-width:480px){
  .kpi-row{grid-template-columns:1fr;}
  .page-title{font-size:22px;}
}

/* ── LOADING ── */
.dash-loading{text-align:center;padding:60px 0;color:var(--muted);font-size:14px;}
.dash-loading::after{content:'';display:block;width:32px;height:32px;margin:16px auto 0;border:3px solid var(--border);border-top-color:var(--violet);border-radius:50%;animation:spin .6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── PDF EXPORT BUTTON ── */
.pdf-btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;background:linear-gradient(135deg,var(--violet),var(--blue));border:none;border-radius:10px;color:#fff;font-family:var(--font-head);font-size:11px;font-weight:700;letter-spacing:0.02em;cursor:pointer;transition:opacity .15s,transform .15s;white-space:nowrap;}
.pdf-btn:hover{opacity:0.88;transform:translateY(-1px);}
.pdf-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
.pdf-btn svg{width:16px;height:16px;flex-shrink:0;}
.pdf-btn .pdf-spinner{display:none;width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;}
.pdf-btn:disabled .pdf-spinner{display:block;}
.pdf-btn:disabled .pdf-icon{display:none;}
.page-header{display:flex;flex-wrap:wrap;align-items:flex-start;justify-content:space-between;gap:16px;}
.page-header-left{flex:1;min-width:0;}

/* ── PDF CAPTURE HELPERS (hidden in screen, visible during capture) ── */
.pdf-header,.pdf-footer{display:none;}
.capturing .pdf-header,.capturing .pdf-footer{display:flex;}
.pdf-header{align-items:center;gap:12px;padding:0 0 18px;margin-bottom:18px;border-bottom:2px solid var(--violet);}
.pdf-logo{font-family:var(--font-head);font-size:22px;font-weight:900;background:linear-gradient(135deg,var(--violet),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.pdf-date{font-size:12px;color:var(--muted);margin-left:auto;font-family:var(--font-body);}
.pdf-footer{align-items:center;justify-content:space-between;padding:16px 0 0;margin-top:24px;border-top:1px solid var(--border);font-size:11px;color:var(--muted);font-family:var(--font-body);}

/* hide export button during capture */
.capturing .pdf-btn{display:none!important;}

/* ── FOOTER ── */
.page-footer{border-top:1px solid var(--border);padding:20px 28px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;font-size:11px;color:var(--muted);max-width:1060px;margin:0 auto;}
.page-footer strong{color:rgba(26,16,64,0.35);}
</style>
<script src="../nav.js"></script>
</head>
<body>

<div class="page-wrap" id="main-content">

  <!-- ── PDF header/footer (visible only during capture) ── -->
  <div class="pdf-header" id="pdfHeader">
    <span class="pdf-logo">ОРБИТА</span>
    <span class="pdf-date" id="pdfDate"></span>
  </div>

  <!-- ── HEADER ── -->
  <header class="page-header">
    <div class="page-header-left">
      <div class="page-eyebrow">Бизнесу</div>
      <h1 class="page-title">KPI Дашборд</h1>
      <p class="page-sub">Сводные метрики портфеля продуктов ОРБИТА</p>
    </div>
    <button class="pdf-btn" id="pdfBtn" type="button">
      <svg class="pdf-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      <span class="pdf-spinner"></span>
      Скачать отчёт PDF
    </button>
  </header>

  <!-- ── KPI ROW ── -->
  <section class="kpi-row" id="kpiRow" aria-label="Ключевые метрики">
    <div class="dash-loading" id="kpiLoading">Загрузка данных...</div>
  </section>

  <!-- ── CHARTS ── -->
  <section class="dash-grid">

    <!-- Donut: Gate Distribution -->
    <div class="dash-card">
      <div class="dash-card-head">
        <h2 class="dash-card-title">Распределение по Gate</h2>
        <select class="dash-filter" id="quarterFilter" aria-label="Фильтр по кварталу">
          <option value="all">Все кварталы</option>
        </select>
      </div>
      <div class="chart-wrap">
        <canvas id="gateDonut"></canvas>
      </div>
      <div class="donut-legend" id="donutLegend"></div>
      <div class="donut-tip" id="donutTip">
        <div class="donut-tip-title"></div>
        <ul class="donut-tip-list"></ul>
      </div>
    </div>

    <!-- Scatter: Risk Matrix -->
    <div class="dash-card">
      <div class="dash-card-head">
        <h2 class="dash-card-title">Risk Matrix</h2>
      </div>
      <div class="chart-wrap-scatter">
        <canvas id="riskScatter"></canvas>
      </div>
    </div>

  </section>

  <!-- ── PDF footer (visible only during capture) ── -->
  <div class="pdf-footer" id="pdfFooter">
    <span>Платформа инноваций | PMO</span>
    <span id="pdfFooterDate"></span>
  </div>

</div>

<!-- ── DRAWER ── -->
<div class="drawer-overlay" id="drawerOverlay"></div>
<div class="drawer" id="drawer" role="dialog" aria-label="Карточка продукта">
  <button class="drawer-close" id="drawerClose" aria-label="Закрыть">&times;</button>
  <div id="drawerContent"></div>
</div>

<script>
(function () {
  'use strict';

  /* ── DATA ── */
  var DATA = [];
  var gateChart = null;
  var riskChart = null;

  var GATE_COLORS = ['#7A7A9D','#FFB830','#3B82F6','#4FC3F7','#00D4B4','#34D399'];
  var GATE_LABELS = ['Gate 0','Gate 1','Gate 2','Gate 3','Gate 4','Gate 5'];
  var STATUS_LABELS = {'on-track':'On Track','at-risk':'At Risk','done':'Завершён','paused':'На паузе'};

  fetch('../data/portfolio.json')
    .then(function (r) { return r.json(); })
    .then(function (d) { DATA = d; init(); })
    .catch(function () {
      document.getElementById('kpiLoading').textContent = 'Ошибка загрузки данных';
    });

  function init() {
    renderKPI(DATA);
    populateQuarters(DATA);
    if (!window.__chartjsFailed && typeof Chart !== 'undefined') {
      renderDonut(DATA);
      renderRisk(DATA);
    }
    bindEvents();
  }

  /* ── KPI CARDS ── */
  function renderKPI(items) {
    var active = items.filter(function (p) { return p.status !== 'done' && p.status !== 'paused'; }).length;
    var g45    = items.filter(function (p) { return p.gate >= 4; }).length;
    var risk   = items.filter(function (p) { return p.status === 'at-risk'; }).length;
    var done   = items.filter(function (p) { return p.status === 'done'; }).length;

    var cards = [
      { label: 'Активных продуктов', value: active, delta: 'из ' + items.length + ' всего' },
      { label: 'В Gate 4\u20135',        value: g45,    delta: 'масштабирование и бизнес' },
      { label: 'At Risk',              value: risk,   delta: risk === 0 ? 'нет блокеров' : 'требуют внимания' },
      { label: 'Завершено в квартале', value: done,   delta: 'Gate 5 пройден' }
    ];

    var html = '';
    cards.forEach(function (c) {
      html += '<div class="kpi-card">'
        + '<div class="kpi-label">' + c.label + '</div>'
        + '<div class="kpi-value">' + c.value + '</div>'
        + '<div class="kpi-delta">' + c.delta + '</div>'
        + '</div>';
    });

    var row = document.getElementById('kpiRow');
    row.innerHTML = html;
  }

  /* ── QUARTER FILTER ── */
  function populateQuarters(items) {
    var qs = {};
    items.forEach(function (p) { if (p.quarter) qs[p.quarter] = true; });
    var sel = document.getElementById('quarterFilter');
    Object.keys(qs).sort().forEach(function (q) {
      var o = document.createElement('option');
      o.value = q; o.textContent = q;
      sel.appendChild(o);
    });
  }

  /* ── DONUT CHART ── */
  function renderDonut(items) {
    var counts = [0,0,0,0,0,0];
    var buckets = [[],[],[],[],[],[]];
    items.forEach(function (p) {
      if (p.gate >= 0 && p.gate <= 5) {
        counts[p.gate]++;
        buckets[p.gate].push(p.name);
      }
    });

    var ctx = document.getElementById('gateDonut').getContext('2d');
    if (gateChart) gateChart.destroy();

    gateChart = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: GATE_LABELS,
        datasets: [{
          data: counts,
          backgroundColor: GATE_COLORS,
          borderWidth: 0,
          hoverOffset: 8
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: true,
        cutout: '62%',
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: 'rgba(3,8,15,0.92)',
            titleFont: { family: "'Orbitron', sans-serif", size: 11, weight: 700 },
            bodyFont: { family: "'Exo 2', sans-serif", size: 12 },
            cornerRadius: 10,
            padding: 12,
            callbacks: {
              afterBody: function (ctx) {
                var idx = ctx[0].dataIndex;
                return buckets[idx].map(function (n) { return '  \u2022 ' + n; });
              }
            }
          }
        },
        onHover: function (e, els) {
          var tip = document.getElementById('donutTip');
          if (!els.length) { tip.classList.remove('visible'); return; }
          var idx = els[0].index;
          tip.querySelector('.donut-tip-title').textContent = GATE_LABELS[idx] + ' (' + counts[idx] + ')';
          var ul = tip.querySelector('.donut-tip-list');
          ul.innerHTML = buckets[idx].map(function (n) { return '<li>' + esc(n) + '</li>'; }).join('');
          var rect = e.native.target.getBoundingClientRect();
          tip.style.left = (e.native.offsetX + 16) + 'px';
          tip.style.top  = (e.native.offsetY - 20) + 'px';
          tip.classList.add('visible');
        }
      }
    });

    // legend
    var legend = document.getElementById('donutLegend');
    legend.innerHTML = GATE_LABELS.map(function (l, i) {
      return '<span class="donut-legend-item" data-gate="' + i + '">'
        + '<span class="donut-legend-dot" style="background:' + GATE_COLORS[i] + '"></span>'
        + l + ' (' + counts[i] + ')'
        + '</span>';
    }).join('');
  }

  /* ── RISK MATRIX (Scatter) ── */
  function renderRisk(items) {
    var points = items.filter(function (p) { return p.impact && p.probability; }).map(function (p) {
      return {
        x: p.impact,
        y: p.probability,
        label: p.name,
        id: p.id,
        status: p.status,
        r: p.status === 'at-risk' ? 10 : 7
      };
    });

    var ctx = document.getElementById('riskScatter').getContext('2d');
    if (riskChart) riskChart.destroy();

    // At-risk zone plugin
    var riskZonePlugin = {
      id: 'riskZone',
      beforeDraw: function (chart) {
        var ca = chart.chartArea;
        var xScale = chart.scales.x;
        var yScale = chart.scales.y;
        var cx = chart.ctx;
        // Zone: impact >= 3 AND probability >= 3
        var x1 = xScale.getPixelForValue(3);
        var y1 = yScale.getPixelForValue(5);
        var x2 = xScale.getPixelForValue(5);
        var y2 = yScale.getPixelForValue(3);
        cx.save();
        cx.fillStyle = 'rgba(255,107,107,0.08)';
        cx.fillRect(x1, y1, x2 - x1, y2 - y1);
        cx.strokeStyle = 'rgba(255,107,107,0.25)';
        cx.lineWidth = 1;
        cx.setLineDash([4, 4]);
        cx.strokeRect(x1, y1, x2 - x1, y2 - y1);
        cx.restore();

        // Label
        cx.save();
        cx.font = "bold 10px 'Orbitron', sans-serif";
        cx.fillStyle = 'rgba(255,107,107,0.5)';
        cx.textAlign = 'right';
        cx.fillText('AT RISK ZONE', x2 - 6, y1 + 14);
        cx.restore();
      }
    };

    riskChart = new Chart(ctx, {
      type: 'bubble',
      data: {
        datasets: [{
          data: points,
          backgroundColor: points.map(function (p) {
            if (p.status === 'at-risk') return 'rgba(255,107,107,0.7)';
            if (p.status === 'done')    return 'rgba(52,211,153,0.7)';
            if (p.status === 'paused')  return 'rgba(255,184,48,0.7)';
            return 'rgba(79,195,247,0.7)';
          }),
          borderColor: points.map(function (p) {
            if (p.status === 'at-risk') return '#FF6B6B';
            if (p.status === 'done')    return '#34D399';
            if (p.status === 'paused')  return '#FFB830';
            return '#4FC3F7';
          }),
          borderWidth: 2,
          hoverBorderWidth: 3
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        scales: {
          x: {
            title: { display: true, text: 'Impact', font: { family: "'Orbitron', sans-serif", size: 11, weight: 'bold' }, color: '#7A7A9D' },
            min: 0.5, max: 5.5,
            ticks: { stepSize: 1, callback: function (v) { return v >= 1 && v <= 5 ? v : ''; }, font: { family: "'Exo 2', sans-serif" }, color: '#7A7A9D' },
            grid: { color: 'rgba(79,195,247,0.06)' }
          },
          y: {
            title: { display: true, text: 'Probability', font: { family: "'Orbitron', sans-serif", size: 11, weight: 'bold' }, color: '#7A7A9D' },
            min: 0.5, max: 5.5,
            ticks: { stepSize: 1, callback: function (v) { return v >= 1 && v <= 5 ? v : ''; }, font: { family: "'Exo 2', sans-serif" }, color: '#7A7A9D' },
            grid: { color: 'rgba(79,195,247,0.06)' }
          }
        },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: 'rgba(3,8,15,0.92)',
            titleFont: { family: "'Orbitron', sans-serif", size: 11, weight: 700 },
            bodyFont: { family: "'Exo 2', sans-serif", size: 12 },
            cornerRadius: 10,
            padding: 12,
            callbacks: {
              title: function (ctx) { return ctx[0].raw.label; },
              label: function (ctx) {
                var d = ctx.raw;
                return 'Impact: ' + d.x + ' | Probability: ' + d.y;
              },
              afterLabel: function (ctx) {
                return 'Status: ' + (STATUS_LABELS[ctx.raw.status] || ctx.raw.status);
              }
            }
          }
        },
        onClick: function (e, els) {
          if (!els.length) return;
          var idx = els[0].index;
          var pid = points[idx].id;
          var product = DATA.find(function (p) { return p.id === pid; });
          if (product) openDrawer(product);
        }
      },
      plugins: [riskZonePlugin]
    });
  }

  /* ── DRAWER ── */
  function openDrawer(p) {
    var gateSteps = '';
    for (var g = 0; g <= 5; g++) {
      var cls = 'drawer-gate-step';
      if (g < p.gate) cls += ' done';
      else if (g === p.gate) cls += ' active';
      gateSteps += '<div class="' + cls + '"></div>';
    }

    var kpiHtml = (p.kpi || []).map(function (k) {
      return '<div class="drawer-kpi"><div class="drawer-kpi-val">' + esc(k.value) + '</div><div class="drawer-kpi-label">' + esc(k.label) + '</div></div>';
    }).join('');

    var initHtml = (p.initiatives || []).map(function (i) {
      return '<li>' + esc(i) + '</li>';
    }).join('');

    var statusCls = 'status status--' + p.status;

    document.getElementById('drawerContent').innerHTML =
      '<h2 class="drawer-name">' + esc(p.name) + '</h2>'
      + '<p class="drawer-desc">' + esc(p.desc) + '</p>'
      + '<div class="drawer-gate-bar">' + gateSteps + '</div>'
      + '<div class="drawer-meta">'
      +   '<div class="drawer-meta-item"><div class="drawer-meta-label">Gate</div><div class="drawer-meta-val">' + p.gate + '</div></div>'
      +   '<div class="drawer-meta-item"><div class="drawer-meta-label">Статус</div><div class="drawer-meta-val"><span class="' + statusCls + '"><span class="status-dot"></span>' + (STATUS_LABELS[p.status] || p.status) + '</span></div></div>'
      +   '<div class="drawer-meta-item"><div class="drawer-meta-label">Владелец</div><div class="drawer-meta-val" style="font-size:13px">' + esc(p.owner) + '</div></div>'
      +   '<div class="drawer-meta-item"><div class="drawer-meta-label">Категория</div><div class="drawer-meta-val">' + esc(p.catLabel) + '</div></div>'
      + '</div>'
      + '<div class="drawer-section-title">KPI</div>'
      + '<div class="drawer-kpi-grid">' + kpiHtml + '</div>'
      + '<div class="drawer-section-title">Инициативы</div>'
      + '<ul class="drawer-initiatives">' + initHtml + '</ul>';

    document.getElementById('drawer').classList.add('open');
    document.getElementById('drawerOverlay').classList.add('open');
    document.getElementById('drawerClose').focus();
  }

  function closeDrawer() {
    document.getElementById('drawer').classList.remove('open');
    document.getElementById('drawerOverlay').classList.remove('open');
  }

  /* ── EVENTS ── */
  function bindEvents() {
    document.getElementById('drawerClose').addEventListener('click', closeDrawer);
    document.getElementById('drawerOverlay').addEventListener('click', closeDrawer);
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') closeDrawer();
    });

    // Quarter filter
    document.getElementById('quarterFilter').addEventListener('change', function () {
      var q = this.value;
      var filtered = q === 'all' ? DATA : DATA.filter(function (p) { return p.quarter === q; });
      renderKPI(filtered);
      if (!window.__chartjsFailed && typeof Chart !== 'undefined') {
        renderDonut(filtered);
        renderRisk(filtered);
      }
    });
  }

  function esc(s) {
    if (!s) return '';
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

})();
</script>

<!-- ── PDF EXPORT ── -->
<script>
(function () {
  'use strict';

  var btn = document.getElementById('pdfBtn');
  btn.addEventListener('click', exportPDF);

  function pad(n) { return n < 10 ? '0' + n : '' + n; }

  function dateStr() {
    var d = new Date();
    return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate());
  }

  function dateFull() {
    var d = new Date();
    return pad(d.getDate()) + '.' + pad(d.getMonth() + 1) + '.' + d.getFullYear()
      + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
  }

  function exportPDF() {
    if (btn.disabled) return;
    if (typeof html2canvas === 'undefined' || !window.jspdf) {
      btn.disabled = true;
      btn.title = 'Экспорт недоступен: необходимые библиотеки не загружены';
      return;
    }
    btn.disabled = true;
    btn.setAttribute('aria-busy', 'true');

    var wrap = document.getElementById('main-content');
    var stamp = dateFull();

    // Fill date fields
    document.getElementById('pdfDate').textContent = 'Сгенерировано: ' + stamp;
    document.getElementById('pdfFooterDate').textContent = stamp;

    // Enter capture mode
    wrap.classList.add('capturing');

    // Small delay for reflow
    setTimeout(function () {
      html2canvas(wrap, {
        scale: 2,
        useCORS: true,
        backgroundColor: '#FFFFFF',
        logging: false,
        windowWidth: 1200
      }).then(function (canvas) {
        var jsPDF = window.jspdf.jsPDF;
        var pdf = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });

        var pageW = pdf.internal.pageSize.getWidth();
        var pageH = pdf.internal.pageSize.getHeight();
        var margin = 8;
        var usableW = pageW - margin * 2;
        var usableH = pageH - margin * 2;

        var imgW = canvas.width;
        var imgH = canvas.height;
        var ratio = Math.min(usableW / imgW, usableH / imgH);
        var finalW = imgW * ratio;
        var finalH = imgH * ratio;

        var x = (pageW - finalW) / 2;
        var y = margin;

        var imgData = canvas.toDataURL('image/png');
        pdf.addImage(imgData, 'PNG', x, y, finalW, finalH);

        pdf.save('portfolio-report-' + dateStr() + '.pdf');
      }).catch(function (err) {
        console.error('PDF export failed:', err);
      }).finally(function () {
        wrap.classList.remove('capturing');
        btn.disabled = false;
        btn.removeAttribute('aria-busy');
      });
    }, 100);
  }
})();
</script>
