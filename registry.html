<!DOCTYPE html>
<html lang="ru"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ОРБИТА · Реестр инициатив</title>
<link rel="stylesheet" href="design-system.css">
<style>
/* ── PAGE LAYOUT ── */
body { background:var(--bg); color:var(--text); font-family:'Inter',system-ui,sans-serif; min-height:100vh; font-size:14px; line-height:1.5; overflow-x:hidden; }
.reg-page { max-width:1400px; margin:0 auto; padding:20px 24px 60px; }

/* ── HEADER ── */
.reg-header { margin-bottom:20px; }
.reg-header h1 { font-size:22px; font-weight:800; color:var(--text); margin-bottom:2px; }
.reg-header p { font-size:13px; color:var(--muted); }

/* ── TABS ── */
.reg-tabs { display:flex; gap:2px; background:var(--surface2); border-radius:10px; padding:3px; margin-bottom:16px; width:fit-content; }
.reg-tab { padding:7px 20px; border:none; border-radius:8px; font-family:inherit; font-size:12px; font-weight:700; cursor:pointer; color:var(--muted); background:transparent; letter-spacing:.02em; transition:all .15s; white-space:nowrap; }
.reg-tab.active { background:var(--violet); color:#fff; box-shadow:0 1px 4px rgba(87,157,255,0.25); }
.reg-tab:hover:not(.active) { color:var(--text); background:var(--surface); }

/* ── TOOLBAR ── */
.reg-toolbar { display:flex; align-items:center; gap:10px; margin-bottom:16px; flex-wrap:wrap; }
.reg-btn-create { display:flex; align-items:center; gap:5px; padding:7px 18px; background:linear-gradient(135deg,var(--teal),var(--violet)); border:none; border-radius:9px; color:#fff; font-family:inherit; font-size:11px; font-weight:700; cursor:pointer; transition:opacity .15s; box-shadow:0 2px 8px rgba(75,206,151,0.2); }
.reg-btn-create:hover { opacity:.85; }

/* ── FILTER BAR ── */
.reg-filters { display:flex; align-items:center; gap:10px; padding:10px 16px; background:var(--surface); border:1px solid var(--border); border-radius:10px; margin-bottom:16px; flex-wrap:wrap; }
.reg-filters select, .reg-filters input[type="text"] {
  background:var(--bg); border:1px solid var(--border); border-radius:8px; color:var(--text);
  font-family:inherit; font-size:12px; padding:7px 10px; outline:none; cursor:pointer; min-width:120px;
}
.reg-filters select:focus, .reg-filters input:focus { border-color:var(--violet-border); }
.reg-filters input::placeholder { color:var(--muted); }
.rf-count { font-size:11px; color:var(--muted); font-weight:600; white-space:nowrap; margin-left:auto; }
.rf-reset { padding:6px 12px; background:transparent; border:1px solid var(--border); border-radius:7px; color:var(--muted); font-family:inherit; font-size:11px; font-weight:600; cursor:pointer; transition:all .15s; }
.rf-reset:hover { color:var(--text); border-color:var(--border-hi); }

/* ── INLINE CREATE FORM ── */
.reg-create-form { display:none; background:var(--surface); border:1px solid var(--violet-border); border-radius:12px; padding:16px 18px; margin-bottom:16px; }
.reg-create-form.open { display:block; }
.rcf-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:12px; }
.rcf-field { display:flex; flex-direction:column; gap:4px; }
.rcf-field.full { grid-column:1/-1; }
.rcf-label { font-size:9px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; }
.rcf-input, .rcf-select, .rcf-textarea {
  background:var(--bg); border:1px solid var(--border); border-radius:8px; color:var(--text);
  font-family:inherit; font-size:12px; padding:8px 10px; outline:none;
}
.rcf-input:focus, .rcf-select:focus, .rcf-textarea:focus { border-color:var(--violet-border); }
.rcf-textarea { resize:vertical; min-height:50px; }
.rcf-rice { display:flex; gap:16px; align-items:center; flex-wrap:wrap; }
.rcf-rice-item { display:flex; align-items:center; gap:6px; }
.rcf-rice-key { font-family:'SF Mono',Consolas,monospace; font-size:11px; color:var(--muted); width:12px; }
.rcf-rice-slider { width:100px; accent-color:var(--violet); }
.rcf-rice-val { font-family:'SF Mono',Consolas,monospace; font-size:12px; color:var(--text); width:18px; text-align:right; }
.rcf-rice-score { font-family:'SF Mono',Consolas,monospace; font-size:18px; font-weight:700; margin-left:auto; }
.rcf-actions { display:flex; gap:8px; justify-content:flex-end; }
.rcf-btn { padding:8px 18px; border-radius:8px; font-family:inherit; font-size:12px; font-weight:700; cursor:pointer; transition:all .15s; border:none; }
.rcf-btn-save { background:var(--violet); color:#fff; }
.rcf-btn-save:hover { opacity:.85; }
.rcf-btn-cancel { background:transparent; border:1px solid var(--border); color:var(--muted); }
.rcf-btn-cancel:hover { color:var(--text); border-color:var(--border-hi); }

/* ── TABLE ── */
.reg-table { width:100%; border-collapse:separate; border-spacing:0; }
.reg-table th { font-size:9px; font-weight:700; color:var(--muted); letter-spacing:.1em; text-transform:uppercase; padding:8px 10px; text-align:left; border-bottom:1px solid var(--border); cursor:pointer; user-select:none; white-space:nowrap; transition:color .15s; }
.reg-table th:hover { color:var(--text); }
.reg-table th.sorted { color:var(--violet); }
.reg-table th .sort-arrow { font-size:8px; margin-left:3px; }
.reg-table td { padding:10px; border-bottom:1px solid var(--border); vertical-align:middle; }
.reg-table tr { transition:background .12s; cursor:pointer; }
.reg-table tbody tr:hover { background:var(--surface2); }
.reg-table tbody tr.selected { background:var(--violet-dim); }
.rt-rank { font-family:'SF Mono',Consolas,monospace; font-size:10px; color:var(--muted); text-align:center; width:30px; }
.rt-name { font-size:13px; font-weight:700; color:var(--text); }
.rt-desc { font-size:11px; color:var(--muted); margin-top:1px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:300px; }
.rt-product { font-family:'SF Mono',Consolas,monospace; font-size:10px; color:var(--muted); font-weight:700; }
.rt-product a { color:var(--violet); text-decoration:none; }
.rt-product a:hover { text-decoration:underline; }

/* ── BADGES ── */
.badge { font-size:9px; font-weight:700; padding:2px 7px; border-radius:5px; white-space:nowrap; display:inline-block; }
.badge-business { color:var(--amber); background:var(--amber-dim); }
.badge-product { color:var(--violet); background:var(--violet-dim); }
.badge-technical { color:var(--teal); background:var(--teal-dim); }
.badge-backlog { color:var(--muted); background:rgba(136,153,170,.15); }
.badge-planned { color:var(--violet); background:var(--violet-dim); }
.badge-wip { color:var(--teal); background:var(--teal-dim); }
.badge-done { color:var(--teal); background:var(--teal-dim); }

/* ── RICE SCORE ── */
.rice-score { font-family:'SF Mono',Consolas,monospace; font-size:14px; font-weight:700; }
.rice-hi { color:var(--teal); }
.rice-mi { color:var(--amber); }
.rice-lo { color:#FCA5A5; }

/* ── TRACKER LINK ── */
.tracker-link { display:inline-flex; align-items:center; gap:3px; font-size:10px; color:#93C5FD; text-decoration:none; padding:2px 7px; border-radius:4px; border:1px solid rgba(59,130,246,.25); background:rgba(59,130,246,.06); transition:all .15s; white-space:nowrap; }
.tracker-link:hover { background:rgba(59,130,246,.15); border-color:rgba(59,130,246,.5); }

/* ── EMPTY STATE ── */
.reg-empty { text-align:center; padding:48px 24px; color:var(--muted); font-size:13px; }

/* ── PLANNING TAB ── */
.plan-toggle { display:flex; gap:2px; background:var(--surface2); border-radius:8px; padding:2px; margin-bottom:16px; width:fit-content; }
.plan-toggle-btn { padding:5px 14px; border:none; border-radius:6px; font-family:inherit; font-size:11px; font-weight:700; cursor:pointer; color:var(--muted); background:transparent; transition:all .15s; }
.plan-toggle-btn.active { background:var(--violet); color:#fff; }
.plan-grid { display:grid; gap:12px; }
.plan-grid-q { grid-template-columns:repeat(4,1fr); }
.plan-grid-h { grid-template-columns:repeat(2,1fr); }
.plan-col { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:14px; min-height:120px; }
.plan-col-head { font-size:11px; font-weight:700; color:var(--text); margin-bottom:10px; padding-bottom:8px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.plan-col-count { font-size:10px; color:var(--muted); font-family:'SF Mono',Consolas,monospace; }
.plan-card { background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:8px 10px; margin-bottom:6px; cursor:pointer; transition:border-color .15s; }
.plan-card:hover { border-color:var(--border-hi); }
.plan-card-name { font-size:12px; font-weight:700; color:var(--text); margin-bottom:2px; }
.plan-card-meta { font-size:10px; color:var(--muted); display:flex; gap:6px; align-items:center; }

/* ── KANBAN ── */
.kanban-board { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }
.kanban-col { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:10px; min-height:200px; transition:border-color .15s, background .15s; }
.kanban-col.drag-over { border:2px dashed var(--violet); background:rgba(87,157,255,0.06); }
.kanban-col-head { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); padding:6px 8px 10px; display:flex; align-items:center; justify-content:space-between; }
.kanban-col-count { font-size:9px; color:var(--muted); font-family:'SF Mono',Consolas,monospace; background:var(--bg); padding:1px 6px; border-radius:4px; }
.kanban-col-body { display:flex; flex-direction:column; gap:6px; min-height:60px; }
.kanban-card { background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:10px; cursor:grab; transition:border-color .15s, opacity .15s; }
.kanban-card:hover { border-color:var(--border-hi); }
.kanban-card.dragging { opacity:0.4; }
.kanban-card:active { cursor:grabbing; }
.kanban-card-name { font-size:12px; font-weight:700; color:var(--text); margin-bottom:4px; }
.kanban-card-meta { display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
.kanban-empty { font-size:11px; color:var(--muted); text-align:center; padding:20px 8px; }

/* ── EDIT PANEL (right drawer) ── */
.reg-drawer-overlay { position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:200; display:none; }
.reg-drawer-overlay.open { display:block; }
.reg-drawer { position:fixed; top:0; right:0; width:420px; max-width:96vw; height:100vh; background:var(--surface); border-left:1px solid var(--border); z-index:210; transform:translateX(100%); transition:transform .25s cubic-bezier(.4,.8,.6,1); display:flex; flex-direction:column; overflow:hidden; }
.reg-drawer.open { transform:translateX(0); box-shadow:-8px 0 32px rgba(0,0,0,.5); }
.rd-head { padding:16px 18px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; flex-shrink:0; }
.rd-head-id { font-family:'SF Mono',Consolas,monospace; font-size:10px; color:var(--muted); font-weight:700; background:var(--surface2); padding:2px 7px; border-radius:5px; border:1px solid var(--border); }
.rd-head-title { font-size:14px; font-weight:800; color:var(--text); flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.rd-close { width:30px; height:30px; border-radius:8px; border:1px solid var(--border); background:transparent; color:var(--muted); cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .15s; flex-shrink:0; font-size:16px; }
.rd-close:hover { border-color:var(--border-hi); color:var(--text); background:var(--surface2); }
.rd-body { flex:1; overflow-y:auto; padding:16px 18px; display:flex; flex-direction:column; gap:14px; }
.rd-group { display:flex; flex-direction:column; gap:6px; }
.rd-label { font-size:9px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; }
.rd-input, .rd-select, .rd-textarea {
  width:100%; background:var(--bg); border:1px solid var(--border); border-radius:8px;
  color:var(--text); font-family:inherit; font-size:12px; padding:8px 10px; outline:none;
}
.rd-input:focus, .rd-select:focus, .rd-textarea:focus { border-color:var(--violet-border); }
.rd-textarea { resize:vertical; min-height:60px; }
.rd-rice-row { display:flex; align-items:center; gap:8px; }
.rd-rice-key { font-family:'SF Mono',Consolas,monospace; font-size:11px; color:var(--muted); width:12px; }
.rd-rice-slider { flex:1; accent-color:var(--violet); }
.rd-rice-val { font-family:'SF Mono',Consolas,monospace; font-size:12px; color:var(--text); width:20px; text-align:right; }
.rd-score-preview { display:flex; flex-direction:column; align-items:center; gap:3px; padding:12px; background:var(--surface2); border-radius:10px; border:1px solid var(--border); }
.rd-score-val { font-family:'SF Mono',Consolas,monospace; font-size:26px; font-weight:700; }
.rd-score-lbl { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; }
.rd-foot { padding:14px 18px; border-top:1px solid var(--border); display:flex; gap:8px; flex-shrink:0; }
.rd-btn { flex:1; padding:10px; border-radius:8px; font-family:inherit; font-size:12px; font-weight:700; cursor:pointer; transition:all .15s; border:none; text-align:center; }
.rd-btn-save { background:var(--violet); color:#fff; }
.rd-btn-save:hover { opacity:.85; }
.rd-btn-delete { background:transparent; border:1px solid rgba(248,113,113,.3); color:#FCA5A5; flex:0 0 auto; padding:10px 14px; }
.rd-btn-delete:hover { background:rgba(248,113,113,.12); }

/* ── TOAST ── */
.reg-toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--card); border:1px solid var(--teal-border); border-radius:10px; padding:10px 20px; font-size:12px; font-weight:700; color:var(--teal); z-index:9999; opacity:0; transition:opacity .2s,transform .2s; white-space:nowrap; pointer-events:none; box-shadow:var(--shadow-lg); }
.reg-toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* ── RESPONSIVE ── */
@media (max-width:900px) {
  .kanban-board { grid-template-columns:1fr 1fr; }
  .plan-grid-q { grid-template-columns:1fr 1fr; }
  .reg-drawer { width:100vw; }
}
@media (max-width:600px) {
  .kanban-board { grid-template-columns:1fr; }
  .plan-grid-q, .plan-grid-h { grid-template-columns:1fr; }
  .rcf-grid { grid-template-columns:1fr; }
}

/* ── LIGHT THEME OVERRIDES ── */
[data-theme="light"] .reg-filters { background:var(--surface); }
[data-theme="light"] .plan-col, [data-theme="light"] .kanban-col { background:var(--surface); }
[data-theme="light"] .kanban-card, [data-theme="light"] .plan-card { background:var(--card); }
[data-theme="light"] .reg-drawer { background:var(--card); }
</style>
<script src="icons.js"></script>
<script src="platform.js"></script>
<script src="js/auth.js"></script>
<script src="js/auth-ui.js"></script>
<script src="stages.js"></script>
<script src="nav.js"></script>
</head>
<body>

<div class="reg-page">
  <!-- HEADER -->
  <div class="reg-header">
    <h1>Реестр инициатив</h1>
    <p>Планирование и управление бэклогом</p>
  </div>

  <!-- TABS -->
  <div class="reg-tabs">
    <button class="reg-tab active" onclick="switchTab('backlog',this)">Бэклог</button>
    <button class="reg-tab" onclick="switchTab('planning',this)">Планирование</button>
    <button class="reg-tab" onclick="switchTab('kanban',this)">Канбан</button>
  </div>

  <!-- TOOLBAR -->
  <div class="reg-toolbar">
    <button class="reg-btn-create" onclick="toggleCreateForm()">+ Новая инициатива</button>
  </div>

  <!-- INLINE CREATE FORM -->
  <div class="reg-create-form" id="create-form">
    <div class="rcf-grid">
      <div class="rcf-field full">
        <label class="rcf-label">Название</label>
        <input class="rcf-input" id="cf-name" placeholder="Название инициативы">
      </div>
      <div class="rcf-field full">
        <label class="rcf-label">Описание</label>
        <textarea class="rcf-textarea" id="cf-desc" placeholder="Краткое описание"></textarea>
      </div>
      <div class="rcf-field">
        <label class="rcf-label">Продукт</label>
        <select class="rcf-select" id="cf-product"></select>
      </div>
      <div class="rcf-field">
        <label class="rcf-label">Тип</label>
        <select class="rcf-select" id="cf-type">
          <option value="product">Продукт</option>
          <option value="business">Бизнес</option>
          <option value="technical">Тех</option>
        </select>
      </div>
      <div class="rcf-field">
        <label class="rcf-label">Квартал</label>
        <select class="rcf-select" id="cf-quarter">
          <option value="Q1 2026">Q1 2026</option>
          <option value="Q2 2026">Q2 2026</option>
          <option value="Q3 2026">Q3 2026</option>
          <option value="Q4 2026">Q4 2026</option>
        </select>
      </div>
      <div class="rcf-field">
        <label class="rcf-label">Ссылка на трекер</label>
        <input class="rcf-input" id="cf-tracker" placeholder="https://...">
      </div>
      <div class="rcf-field full">
        <label class="rcf-label">RICE</label>
        <div class="rcf-rice">
          <div class="rcf-rice-item"><span class="rcf-rice-key">R</span><input type="range" class="rcf-rice-slider" id="cf-r" min="1" max="10" value="5" oninput="updateCreateRICE()"><span class="rcf-rice-val" id="cf-r-v">5</span></div>
          <div class="rcf-rice-item"><span class="rcf-rice-key">I</span><input type="range" class="rcf-rice-slider" id="cf-i" min="1" max="10" value="5" oninput="updateCreateRICE()"><span class="rcf-rice-val" id="cf-i-v">5</span></div>
          <div class="rcf-rice-item"><span class="rcf-rice-key">C</span><input type="range" class="rcf-rice-slider" id="cf-c" min="1" max="10" value="5" oninput="updateCreateRICE()"><span class="rcf-rice-val" id="cf-c-v">5</span></div>
          <div class="rcf-rice-item"><span class="rcf-rice-key">E</span><input type="range" class="rcf-rice-slider" id="cf-e" min="1" max="10" value="5" oninput="updateCreateRICE()"><span class="rcf-rice-val" id="cf-e-v">5</span></div>
          <span class="rcf-rice-score rice-hi" id="cf-score">25.0</span>
        </div>
      </div>
    </div>
    <div class="rcf-actions">
      <button class="rcf-btn rcf-btn-cancel" onclick="toggleCreateForm()">Отмена</button>
      <button class="rcf-btn rcf-btn-save" onclick="createInitiative()">Создать</button>
    </div>
  </div>

  <!-- FILTER BAR -->
  <div class="reg-filters">
    <select id="rf-product" onchange="applyAllFilters()"></select>
    <select id="rf-type" onchange="applyAllFilters()">
      <option value="">Все типы</option>
      <option value="business">Бизнес</option>
      <option value="product">Продукт</option>
      <option value="technical">Тех</option>
    </select>
    <select id="rf-status" onchange="applyAllFilters()">
      <option value="">Все статусы</option>
      <option value="backlog">Бэклог</option>
      <option value="planned">Запланировано</option>
      <option value="wip">В работе</option>
      <option value="done">Готово</option>
    </select>
    <select id="rf-quarter" onchange="applyAllFilters()">
      <option value="">Все кварталы</option>
      <option value="Q1 2026">Q1 2026</option>
      <option value="Q2 2026">Q2 2026</option>
      <option value="Q3 2026">Q3 2026</option>
      <option value="Q4 2026">Q4 2026</option>
    </select>
    <input type="text" id="rf-search" placeholder="Поиск..." oninput="applyAllFilters()">
    <span class="rf-count" id="rf-count">0</span>
    <button class="rf-reset" onclick="resetFilters()">Сбросить</button>
  </div>

  <!-- TAB PANELS -->
  <div id="pg-backlog"></div>
  <div id="pg-planning" style="display:none"></div>
  <div id="pg-kanban" style="display:none"></div>
</div>

<!-- EDIT DRAWER -->
<div class="reg-drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
<div class="reg-drawer" id="drawer">
  <div class="rd-head">
    <span class="rd-head-id" id="rd-id"></span>
    <span class="rd-head-title" id="rd-title"></span>
    <button class="rd-close" onclick="closeDrawer()">&times;</button>
  </div>
  <div class="rd-body">
    <div class="rd-group">
      <label class="rd-label">Название</label>
      <input class="rd-input" id="rd-name">
    </div>
    <div class="rd-group">
      <label class="rd-label">Описание</label>
      <textarea class="rd-textarea" id="rd-desc"></textarea>
    </div>
    <div class="rd-group">
      <label class="rd-label">Продукт</label>
      <select class="rd-select" id="rd-product"></select>
    </div>
    <div class="rd-group" style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
      <div>
        <label class="rd-label">Тип</label>
        <select class="rd-select" id="rd-type">
          <option value="product">Продукт</option>
          <option value="business">Бизнес</option>
          <option value="technical">Тех</option>
        </select>
      </div>
      <div>
        <label class="rd-label">Статус</label>
        <select class="rd-select" id="rd-status">
          <option value="backlog">Бэклог</option>
          <option value="planned">Запланировано</option>
          <option value="wip">В работе</option>

<div class="reg-toast" id="toast"></div>

<script>
// ════════════════════════════════════════════
// DATA
// ════════════════════════════════════════════

const BACKLOG_DEFAULT = [
  { id:'D001', productId:'ECO-00', name:'Онбординг-флоу для новых юзеров', desc:'Пошаговый wizard при первом входе — рост Retention D7', type:'product', r:9, i:8, c:7, e:4, status:'wip', quarter:'Q1 2026', trackerUrl:'', created:'2026-03-01', updated:'2026-03-17' },
  { id:'D002', productId:'ECO-00', name:'NPS-опрос + action plan', desc:'Ежемесячный NPS-замер, анализ детракторов, план улучшений', type:'product', r:10, i:6, c:8, e:2, status:'wip', quarter:'Q1 2026', trackerUrl:'', created:'2026-03-01', updated:'2026-03-17' },
  { id:'D003', productId:'ECO-00', name:'A/B тест лендинга', desc:'3 варианта лендинга, замер конверсии в регистрацию', type:'product', r:8, i:7, c:6, e:3, status:'planned', quarter:'Q1 2026', trackerUrl:'', created:'2026-03-05', updated:'2026-03-17' },
  { id:'D004', productId:'ECO-00', name:'Push-уведомления', desc:'Триггерные пуши для возврата неактивных юзеров', type:'technical', r:7, i:6, c:5, e:5, status:'backlog', quarter:'Q2 2026', trackerUrl:'', created:'2026-03-10', updated:'2026-03-17' },
  { id:'D005', productId:'ECO-00', name:'P&L модель 3 сценария', desc:'Финансовая модель: базовый, оптимистичный, пессимистичный', type:'business', r:8, i:9, c:7, e:3, status:'planned', quarter:'Q2 2026', trackerUrl:'', created:'2026-03-10', updated:'2026-03-17' },
  { id:'D006', productId:'ECO-00', name:'Unit economics: CAC и LTV', desc:'Расчёт стоимости привлечения и жизненной ценности клиента', type:'business', r:7, i:8, c:5, e:4, status:'backlog', quarter:'Q2 2026', trackerUrl:'', created:'2026-03-12', updated:'2026-03-17' },
  { id:'I001', productId:'ECO-01', name:'Геймификация покупок', desc:'Игровые механики для увеличения retention', type:'product', r:8, i:7, c:7, e:4, status:'wip', quarter:'Q1 2026', trackerUrl:'', created:'2026-03-17', updated:'2026-03-17' },
  { id:'I002', productId:'ECO-01', name:'NPS-опрос и анализ', desc:'Ежемесячный NPS-замер + action plan по детракторам', type:'product', r:10, i:6, c:8, e:2, status:'planned', quarter:'Q1 2026', trackerUrl:'', created:'2026-03-17', updated:'2026-03-17' },
  { id:'I003', productId:'ECO-01', name:'Unit economics модель', desc:'P&L модель + CAC/LTV расчёт для Gate 4', type:'business', r:8, i:9, c:6, e:3, status:'planned', quarter:'Q2 2026', trackerUrl:'', created:'2026-03-17', updated:'2026-03-17' },
  { id:'I004', productId:'ECO-02', name:'CustDev образовательных учреждений', desc:'7-10 интервью с учителями и методистами', type:'product', r:9, i:8, c:5, e:3, status:'wip', quarter:'Q1 2026', trackerUrl:'', created:'2026-03-17', updated:'2026-03-17' },
  { id:'I005', productId:'ECO-02', name:'MVP генератора контента', desc:'Прототип AI-генератора учебных материалов', type:'technical', r:8, i:9, c:4, e:7, status:'backlog', quarter:'Q2 2026', trackerUrl:'', created:'2026-03-17', updated:'2026-03-17' },
  { id:'I006', productId:'ECO-03', name:'Product Brief Сервис З', desc:'Заполнить бриф: проблема, ЦА, RICE, OKR', type:'product', r:7, i:7, c:8, e:1, status:'backlog', quarter:'Q1 2026', trackerUrl:'', created:'2026-03-17', updated:'2026-03-17' },
  { id:'I007', productId:'ECO-03', name:'Анализ рынка знакомств', desc:'Конкуренты, TAM/SAM, позиционирование', type:'business', r:6, i:6, c:5, e:2, status:'backlog', quarter:'Q1 2026', trackerUrl:'', created:'2026-03-17', updated:'2026-03-17' }
];

// ════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════

var products = [];
var backlog = [];
var curTab = 'backlog';
var editId = null;
var sortCol = 'rice';
var sortDir = 'desc';
var planView = 'quarter';

// Status labels & classes
var ST = {
  backlog:  { label:'Бэклог',       cls:'badge-backlog' },
  planned:  { label:'Запланировано', cls:'badge-planned' },
  wip:      { label:'В работе',     cls:'badge-wip' },
  done:     { label:'Готово',       cls:'badge-done' }
};

// Type labels & classes
var TP = {
  business:  { label:'Бизнес', cls:'badge-business' },
  product:   { label:'Продукт', cls:'badge-product' },
  technical: { label:'Тех',    cls:'badge-technical' }
};

// ════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════

function init() {
  // Load products
  products = (window.PT ? PT.load(PT.KEY_PRODUCTS) : null) || [];
  if (!products.length) products = [];

  // Load backlog — validate and fallback
  var raw = window.PT ? PT.load(PT.KEY_BACKLOG) : null;
  if (raw && Array.isArray(raw) && raw.length) {
    backlog = raw;
    // Migrate old fields
    backlog.forEach(function(item) {
      if (item.project && !item.productId) item.productId = item.project;
      if (!item.type) item.type = (window.PT ? PT.getInitType(item) : 'product');
      if (!item.quarter) item.quarter = item.release || '';
      if (!item.trackerUrl) item.trackerUrl = '';
    });
  } else {
    backlog = BACKLOG_DEFAULT.map(function(d) { return Object.assign({}, d); });
    saveBacklog();
  }

  // Auto-apply department filter based on user role
  if (window.OrbAuth) {
    var user = OrbAuth.getCurrentUser();
    if (user && user.department) {
      // Could auto-filter here if needed
    }
  }

  populateProductSelects();
  applyAllFilters();
}

function populateProductSelects() {
  var opts = '<option value="">Все продукты</option>';
  var createOpts = '';
  products.forEach(function(p) {
    var name = (window.OrbAuth ? OrbAuth.getDisplayName(p, 'product') : p.name) || p.id;
    opts += '<option value="' + p.id + '">' + p.id + ' — ' + name + '</option>';
    createOpts += '<option value="' + p.id + '">' + p.id + ' — ' + name + '</option>';
  });

  var rfp = document.getElementById('rf-product');
  if (rfp) rfp.innerHTML = opts;

  // Create form product select
  var cfp = document.getElementById('cf-product');
  if (cfp) cfp.innerHTML = createOpts || '<option value="">Нет продуктов</option>';

  // Drawer product select
  var rdp = document.getElementById('rd-product');
  if (rdp) rdp.innerHTML = createOpts || '<option value="">Нет продуктов</option>';
}

function saveBacklog() {
  if (window.PT) PT.save(PT.KEY_BACKLOG, backlog);
}

// ════════════════════════════════════════════
// RICE
// ════════════════════════════════════════════

function rice(item) { return (item.r * item.i * item.c) / item.e; }
function riceClass(s) { return s > 20 ? 'rice-hi' : s >= 10 ? 'rice-mi' : 'rice-lo'; }

// ════════════════════════════════════════════
// FILTERING
// ════════════════════════════════════════════

function getFilteredInitiatives() {
  var fProduct = document.getElementById('rf-product').value;
  var fType    = document.getElementById('rf-type').value;
  var fStatus  = document.getElementById('rf-status').value;
  var fQuarter = document.getElementById('rf-quarter').value;
  var fSearch  = (document.getElementById('rf-search').value || '').toLowerCase().trim();

  return backlog.filter(function(item) {
    if (fProduct && item.productId !== fProduct) return false;
    var t = window.PT ? PT.getInitType(item) : (item.type || 'product');
    if (fType && t !== fType) return false;
    if (fStatus && item.status !== fStatus) return false;
    if (fQuarter && (item.quarter || '') !== fQuarter) return false;
    if (fSearch) {
      var hay = ((item.name || '') + ' ' + (item.desc || '') + ' ' + (item.id || '') + ' ' + (item.productId || '')).toLowerCase();
      if (hay.indexOf(fSearch) === -1) return false;
    }
    // Department filter from OrbAuth
    if (window.OrbAuth) {
      var user = OrbAuth.getCurrentUser();
      if (user && user.department && user.role !== 'admin' && user.role !== 'pmo') {
        var prod = products.find(function(p) { return p.id === item.productId; });
        if (prod && prod.department && prod.department !== user.department) return false;
      }
    }
    return true;
  });
}

function applyAllFilters() {
  var items = getFilteredInitiatives();
  document.getElementById('rf-count').textContent = items.length + ' из ' + backlog.length;
  renderCurrentTab(items);
}

function resetFilters() {
  document.getElementById('rf-product').value = '';
  document.getElementById('rf-type').value = '';
  document.getElementById('rf-status').value = '';
  document.getElementById('rf-quarter').value = '';
  document.getElementById('rf-search').value = '';
  applyAllFilters();
}

// ════════════════════════════════════════════
// SORTING
// ════════════════════════════════════════════

function sortItems(items, col, dir) {
  var sorted = items.slice();
  sorted.sort(function(a, b) {
    var va, vb;
    switch (col) {
      case 'rice':    va = rice(a); vb = rice(b); break;
      case 'name':    va = (a.name||'').toLowerCase(); vb = (b.name||'').toLowerCase(); break;
      case 'product': va = a.productId||''; vb = b.productId||''; break;
      case 'type':    va = a.type||''; vb = b.type||''; break;
      case 'status':  va = a.status||''; vb = b.status||''; break;
      case 'quarter': va = a.quarter||''; vb = b.quarter||''; break;
      default:        va = rice(a); vb = rice(b);
    }
    if (typeof va === 'string') {
      var cmp = va.localeCompare(vb);
      return dir === 'asc' ? cmp : -cmp;
    }
    return dir === 'asc' ? va - vb : vb - va;
  });
  return sorted;
}

function toggleSort(col) {
  if (sortCol === col) {
    sortDir = sortDir === 'desc' ? 'asc' : 'desc';
  } else {
    sortCol = col;
    sortDir = col === 'name' ? 'asc' : 'desc';
  }
  applyAllFilters();
}

// ════════════════════════════════════════════
// TABS
// ════════════════════════════════════════════

function switchTab(tab, btn) {
  curTab = tab;
  if (window.PT) PT.setUIState({ registry_tab: tab });
  document.querySelectorAll('.reg-tab').forEach(function(b) { b.classList.remove('active'); });
  if (btn) btn.classList.add('active');

  document.getElementById('pg-backlog').style.display = tab === 'backlog' ? '' : 'none';
  document.getElementById('pg-planning').style.display = tab === 'planning' ? '' : 'none';
  document.getElementById('pg-kanban').style.display = tab === 'kanban' ? '' : 'none';

  applyAllFilters();
}

function renderCurrentTab(items) {
  switch (curTab) {
    case 'backlog':  renderBacklog(items); break;
    case 'planning': renderPlanning(items); break;
    case 'kanban':   renderKanban(items); break;
  }
}

// ════════════════════════════════════════════
// TAB 1: BACKLOG TABLE
// ════════════════════════════════════════════

function thSorted(col, label) {
  var arrow = sortCol === col ? (sortDir === 'asc' ? ' &#9650;' : ' &#9660;') : '';
  var cls = sortCol === col ? ' class="sorted"' : '';
  return '<th' + cls + ' onclick="toggleSort(\'' + col + '\')">' + label + '<span class="sort-arrow">' + arrow + '</span></th>';
}

function renderBacklog(items) {
  var sorted = sortItems(items, sortCol, sortDir);
  var el = document.getElementById('pg-backlog');

  if (!sorted.length) {
    el.innerHTML = '<div class="reg-empty">Нет инициатив по заданным фильтрам</div>';
    return;
  }

  var html = '<table class="reg-table"><thead><tr>';
  html += '<th>#</th>';
  html += thSorted('name', 'Инициатива');
  html += thSorted('product', 'Продукт');
  html += thSorted('type', 'Тип');
  html += thSorted('rice', 'RICE');
  html += thSorted('status', 'Статус');
  html += thSorted('quarter', 'Q');
  html += '<th>Трекер</th>';
  html += '</tr></thead><tbody>';

  sorted.forEach(function(item, idx) {
    var s = rice(item);
    var t = window.PT ? PT.getInitType(item) : (item.type || 'product');
    var tp = TP[t] || TP.product;
    var st = ST[item.status] || ST.backlog;
    var prodName = item.productId || '—';
    var prod = products.find(function(p) { return p.id === item.productId; });
    if (prod) prodName = prod.id;
    var trackerHtml = item.trackerUrl
      ? '<a class="tracker-link" href="' + escHtml(item.trackerUrl) + '" target="_blank" onclick="event.stopPropagation()">YT &rarr;</a>'
      : '<span style="color:var(--muted);font-size:10px">—</span>';
    var selected = editId === item.id ? ' selected' : '';

    html += '<tr class="' + selected + '" onclick="openDrawer(\'' + item.id + '\')">';
    html += '<td class="rt-rank">' + (idx + 1) + '</td>';
    html += '<td><div class="rt-name">' + escHtml(item.name) + '</div><div class="rt-desc">' + escHtml(item.desc || '') + '</div></td>';
    html += '<td class="rt-product"><a href="workspace.html#product=' + prodName + '" onclick="event.stopPropagation()">' + prodName + '</a></td>';
    html += '<td><span class="badge ' + tp.cls + '">' + tp.label + '</span></td>';
    html += '<td><span class="rice-score ' + riceClass(s) + '">' + s.toFixed(1) + '</span></td>';
    html += '<td><span class="badge ' + st.cls + '">' + st.label + '</span></td>';
    html += '<td style="font-size:11px;color:var(--muted)">' + escHtml(item.quarter || '—') + '</td>';
    html += '<td>' + trackerHtml + '</td>';
    html += '</tr>';
  });

  html += '</tbody></table>';
  el.innerHTML = html;
}

// ════════════════════════════════════════════
// TAB 2: PLANNING
// ════════════════════════════════════════════

function renderPlanning(items) {
  var el = document.getElementById('pg-planning');
  var html = '<div class="plan-toggle">';
  html += '<button class="plan-toggle-btn' + (planView === 'quarter' ? ' active' : '') + '" onclick="setPlanView(\'quarter\')">Q-вид</button>';
  html += '<button class="plan-toggle-btn' + (planView === 'half' ? ' active' : '') + '" onclick="setPlanView(\'half\')">H-вид</button>';
  html += '</div>';

  if (planView === 'quarter') {
    html += renderPlanQuarter(items);
  } else {
    html += renderPlanHalf(items);
  }

  el.innerHTML = html;
}

function setPlanView(v) {
  planView = v;
  applyAllFilters();
}

function renderPlanQuarter(items) {
  var quarters = ['Q1 2026', 'Q2 2026', 'Q3 2026', 'Q4 2026'];
  var html = '<div class="plan-grid plan-grid-q">';
  quarters.forEach(function(q) {
    var qItems = items.filter(function(i) { return (i.quarter || '') === q; });
    html += '<div class="plan-col">';
    html += '<div class="plan-col-head"><span>' + q + '</span><span class="plan-col-count">' + qItems.length + '</span></div>';
    if (qItems.length) {
      qItems.sort(function(a, b) { return rice(b) - rice(a); });
      qItems.forEach(function(item) {
        var s = rice(item);
        var t = window.PT ? PT.getInitType(item) : (item.type || 'product');
        var tp = TP[t] || TP.product;
        html += '<div class="plan-card" onclick="openDrawer(\'' + item.id + '\')">';
        html += '<div class="plan-card-name">' + escHtml(item.name) + '</div>';
        html += '<div class="plan-card-meta">';
        html += '<span class="badge ' + tp.cls + '">' + tp.label + '</span>';
        html += '<span class="rice-score ' + riceClass(s) + '" style="font-size:11px">' + s.toFixed(0) + '</span>';
        html += '<span style="font-size:10px;color:var(--muted)">' + (item.productId || '') + '</span>';
        html += '</div></div>';
      });
    } else {
      html += '<div class="kanban-empty">Пусто</div>';
    }
    html += '</div>';
  });
  html += '</div>';
  return html;
}

function renderPlanHalf(items) {
  var halves = [
    { label: 'H1 2026', qs: ['Q1 2026', 'Q2 2026'] },
    { label: 'H2 2026', qs: ['Q3 2026', 'Q4 2026'] }
  ];

  // Load goals for linking
  var goals = (window.PT ? PT.load(PT.KEY_GOALS) : null) || [];

  var html = '<div class="plan-grid plan-grid-h">';
  halves.forEach(function(h) {
    var hItems = items.filter(function(i) { return h.qs.indexOf(i.quarter || '') !== -1; });
    // Find goals for this half
    var hGoals = goals.filter(function(g) {
      return h.qs.some(function(q) { return (g.period || '').indexOf(q.split(' ')[0]) !== -1; }) ||
             (g.period || '').indexOf(h.label.split(' ')[0]) !== -1;
    });

    html += '<div class="plan-col">';
    html += '<div class="plan-col-head"><span>' + h.label + '</span><span class="plan-col-count">' + hItems.length + ' иниц.</span></div>';

    if (hGoals.length) {
      hGoals.forEach(function(g) {
        html += '<div style="margin-bottom:10px;padding:8px 10px;background:var(--amber-dim);border:1px solid var(--amber-border);border-radius:8px;">';
        html += '<div style="font-size:11px;font-weight:700;color:var(--amber);margin-bottom:4px;">' + escHtml(g.title) + '</div>';
        html += '<div style="font-size:10px;color:var(--muted)">' + (g.period || '') + ' · ' + (g.owner || '') + '</div>';
        html += '</div>';
      });
    }

    if (hItems.length) {
      hItems.sort(function(a, b) { return rice(b) - rice(a); });
      hItems.forEach(function(item) {
        var s = rice(item);
        var t = window.PT ? PT.getInitType(item) : (item.type || 'product');
        var tp = TP[t] || TP.product;
        var st = ST[item.status] || ST.backlog;
        html += '<div class="plan-card" onclick="openDrawer(\'' + item.id + '\')">';
        html += '<div class="plan-card-name">' + escHtml(item.name) + '</div>';
        html += '<div class="plan-card-meta">';
        html += '<span class="badge ' + tp.cls + '">' + tp.label + '</span>';
        html += '<span class="badge ' + st.cls + '">' + st.label + '</span>';
        html += '<span class="rice-score ' + riceClass(s) + '" style="font-size:11px">' + s.toFixed(0) + '</span>';
        html += '</div></div>';
      });
    } else {
      html += '<div class="kanban-empty">Пусто</div>';
    }
    html += '</div>';
  });
  html += '</div>';
  return html;
}

// ════════════════════════════════════════════
// TAB 3: KANBAN
// ════════════════════════════════════════════

var dragItemId = null;

function renderKanban(items) {
  var el = document.getElementById('pg-kanban');
  var cols = [
    { key:'backlog',  label:'Бэклог' },
    { key:'planned',  label:'Запланировано' },
    { key:'wip',      label:'В работе' },
    { key:'done',     label:'Готово' }
  ];

  var html = '<div class="kanban-board">';
  cols.forEach(function(col) {
    var colItems = items.filter(function(i) { return i.status === col.key; });
    colItems.sort(function(a, b) { return rice(b) - rice(a); });

    html += '<div class="kanban-col" data-status="' + col.key + '" ondragover="onDragOver(event)" ondrop="onDrop(event,\'' + col.key + '\')" ondragleave="onDragLeave(event)">';
    html += '<div class="kanban-col-head"><span>' + col.label + '</span><span class="kanban-col-count">' + colItems.length + '</span></div>';
    html += '<div class="kanban-col-body">';

    if (colItems.length) {
      colItems.forEach(function(item) {
        var s = rice(item);
        var t = window.PT ? PT.getInitType(item) : (item.type || 'product');
        var tp = TP[t] || TP.product;
        html += '<div class="kanban-card" draggable="true" data-id="' + item.id + '" ondragstart="onDragStart(event,\'' + item.id + '\')" ondragend="onDragEnd(event)" onclick="openDrawer(\'' + item.id + '\')">';
        html += '<div class="kanban-card-name">' + escHtml(item.name) + '</div>';
        html += '<div class="kanban-card-meta">';
        html += '<span class="badge ' + tp.cls + '">' + tp.label + '</span>';
        html += '<span class="rice-score ' + riceClass(s) + '" style="font-size:11px">' + s.toFixed(0) + '</span>';
        html += '<span style="font-size:10px;color:var(--muted)">' + (item.productId || '') + '</span>';
        html += '</div></div>';
      });
    } else {
      html += '<div class="kanban-empty">Перетащите сюда</div>';
    }

    html += '</div></div>';
  });
  html += '</div>';
  el.innerHTML = html;
}

// Drag-n-drop handlers (HTML5 native)
function onDragStart(e, id) {
  dragItemId = id;
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', id);
  setTimeout(function() {
    var card = document.querySelector('.kanban-card[data-id="' + id + '"]');
    if (card) card.classList.add('dragging');
  }, 0);
}

function onDragEnd(e) {
  document.querySelectorAll('.kanban-card.dragging').forEach(function(c) { c.classList.remove('dragging'); });
  document.querySelectorAll('.kanban-col.drag-over').forEach(function(c) { c.classList.remove('drag-over'); });
  dragItemId = null;
}

function onDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  e.currentTarget.classList.add('drag-over');
}

function onDragLeave(e) {
  e.currentTarget.classList.remove('drag-over');
}

function onDrop(e, newStatus) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  var id = e.dataTransfer.getData('text/plain') || dragItemId;
  if (!id) return;

  // Auth check
  if (window.OrbAuth && !OrbAuth.can('canEdit')) { showToast('Недостаточно прав'); return; }

  var item = backlog.find(function(i) { return i.id === id; });
  if (!item) return;
  if (window.OrbAuth && !OrbAuth.canEditProduct(item.productId)) { showToast('Нет прав на этот продукт'); return; }

  var oldStatus = item.status;
  if (oldStatus === newStatus) return;
  item.status = newStatus;
  item.updated = new Date().toISOString().slice(0, 10);
  saveBacklog();
  showToast(item.name + ': ' + (ST[oldStatus]||{}).label + ' -> ' + (ST[newStatus]||{}).label);
  applyAllFilters();
}

// ════════════════════════════════════════════
// CREATE INITIATIVE
// ════════════════════════════════════════════

function toggleCreateForm() {
  var form = document.getElementById('create-form');
  form.classList.toggle('open');
  if (form.classList.contains('open')) {
    document.getElementById('cf-name').focus();
  }
}

function updateCreateRICE() {
  var r = +document.getElementById('cf-r').value;
  var i = +document.getElementById('cf-i').value;
  var c = +document.getElementById('cf-c').value;
  var e = +document.getElementById('cf-e').value;
  document.getElementById('cf-r-v').textContent = r;
  document.getElementById('cf-i-v').textContent = i;
  document.getElementById('cf-c-v').textContent = c;
  document.getElementById('cf-e-v').textContent = e;
  var s = (r * i * c) / e;
  var el = document.getElementById('cf-score');
  el.textContent = s.toFixed(1);
  el.className = 'rcf-rice-score ' + riceClass(s);
}

function createInitiative() {
  if (window.OrbAuth && !OrbAuth.can('canCreate')) { showToast('Недостаточно прав'); return; }

  var name = document.getElementById('cf-name').value.trim();
  if (!name) { showToast('Введите название'); return; }

  var productId = document.getElementById('cf-product').value;
  if (window.OrbAuth && !OrbAuth.canEditProduct(productId)) { showToast('Нет прав на этот продукт'); return; }

  // Generate unique ID
  var existing = {};
  backlog.forEach(function(i) { existing[i.id] = true; });
  var newId = 'N01';
  for (var n = 1; n <= 99; n++) {
    var candidate = 'N' + String(n).padStart(2, '0');
    if (!existing[candidate]) { newId = candidate; break; }
  }

  var item = {
    id: newId,
    productId: productId,
    name: name,
    desc: document.getElementById('cf-desc').value.trim(),
    type: document.getElementById('cf-type').value,
    r: +document.getElementById('cf-r').value,
    i: +document.getElementById('cf-i').value,
    c: +document.getElementById('cf-c').value,
    e: +document.getElementById('cf-e').value,
    status: 'backlog',
    quarter: document.getElementById('cf-quarter').value,
    trackerUrl: document.getElementById('cf-tracker').value.trim(),
    created: new Date().toISOString().slice(0, 10),
    updated: new Date().toISOString().slice(0, 10)
  };

  backlog.push(item);
  saveBacklog();
  showToast('Создана: ' + item.name);

  // Reset form
  document.getElementById('cf-name').value = '';
  document.getElementById('cf-desc').value = '';
  document.getElementById('cf-tracker').value = '';
  ['cf-r','cf-i','cf-c','cf-e'].forEach(function(id) { document.getElementById(id).value = 5; });
  updateCreateRICE();
  toggleCreateForm();

  applyAllFilters();
}

// ════════════════════════════════════════════
// EDIT DRAWER
// ════════════════════════════════════════════

function openDrawer(id) {
  var item = backlog.find(function(i) { return i.id === id; });
  if (!item) return;
  editId = id;

  document.getElementById('rd-id').textContent = item.id;
  document.getElementById('rd-title').textContent = window.OrbAuth ? OrbAuth.getDisplayName(item, 'initiative') : item.name;
  document.getElementById('rd-name').value = item.name || '';
  document.getElementById('rd-desc').value = item.desc || '';
  document.getElementById('rd-product').value = item.productId || '';
  document.getElementById('rd-type').value = (window.PT ? PT.getInitType(item) : item.type) || 'product';
  document.getElementById('rd-status').value = item.status || 'backlog';
  document.getElementById('rd-quarter').value = item.quarter || 'Q1 2026';
  document.getElementById('rd-tracker').value = item.trackerUrl || '';
  document.getElementById('rd-r').value = item.r;
  document.getElementById('rd-i').value = item.i;
  document.getElementById('rd-c').value = item.c;
  document.getElementById('rd-e').value = item.e;
  updateDrawerRICE();

  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawer-overlay').classList.add('open');

  // Highlight row in table if on backlog tab
  if (curTab === 'backlog') {
    document.querySelectorAll('.reg-table tbody tr').forEach(function(tr) { tr.classList.remove('selected'); });
    // Re-render to show selected state (simpler approach)
  }
}

function closeDrawer() {
  editId = null;
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawer-overlay').classList.remove('open');
  applyAllFilters();
}

function updateDrawerRICE() {
  var r = +document.getElementById('rd-r').value;
  var i = +document.getElementById('rd-i').value;
  var c = +document.getElementById('rd-c').value;
  var e = +document.getElementById('rd-e').value;
  document.getElementById('rd-r-v').textContent = r;
  document.getElementById('rd-i-v').textContent = i;
  document.getElementById('rd-c-v').textContent = c;
  document.getElementById('rd-e-v').textContent = e;
  var s = (r * i * c) / e;
  var el = document.getElementById('rd-score');
  el.textContent = s.toFixed(1);
  el.className = 'rd-score-val ' + riceClass(s);
}

function saveDrawer() {
  if (!editId) return;
  if (window.OrbAuth && !OrbAuth.can('canEdit')) { showToast('Недостаточно прав для редактирования'); return; }

  var item = backlog.find(function(i) { return i.id === editId; });
  if (!item) return;
  if (window.OrbAuth && !OrbAuth.canEditProduct(item.productId)) { showToast('Нет прав на этот продукт'); return; }

  item.name = document.getElementById('rd-name').value.trim() || item.name;
  item.desc = document.getElementById('rd-desc').value.trim();
  item.productId = document.getElementById('rd-product').value;
  item.project = item.productId; // backward compat
  item.type = document.getElementById('rd-type').value;
  item.status = document.getElementById('rd-status').value;
  item.quarter = document.getElementById('rd-quarter').value;
  item.release = item.quarter; // backward compat
  item.trackerUrl = document.getElementById('rd-tracker').value.trim();
  item.r = +document.getElementById('rd-r').value;
  item.i = +document.getElementById('rd-i').value;
  item.c = +document.getElementById('rd-c').value;
  item.e = +document.getElementById('rd-e').value;
  item.updated = new Date().toISOString().slice(0, 10);

  saveBacklog();
  showToast('Сохранено: ' + item.name);
  closeDrawer();
}

function deleteInitiative() {
  if (!editId) return;
  if (window.OrbAuth && !OrbAuth.can('canEdit')) { showToast('Недостаточно прав'); return; }

  var item = backlog.find(function(i) { return i.id === editId; });
  if (!item) return;
  if (!confirm('Удалить инициативу "' + item.name + '"?')) return;

  backlog = backlog.filter(function(i) { return i.id !== editId; });
  saveBacklog();
  showToast('Удалена: ' + item.name);
  closeDrawer();
}

// ════════════════════════════════════════════
// UTILS
// ════════════════════════════════════════════

function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(function() { t.classList.remove('show'); }, 3000);
}

// ════════════════════════════════════════════
// BOOT
// ════════════════════════════════════════════

document.addEventListener('DOMContentLoaded', function() {
  // Restore tab from UI state
  if (window.PT) {
    var ui = PT.getUIState();
    if (ui.registry_tab) {
      curTab = ui.registry_tab;
      var tabs = document.querySelectorAll('.reg-tab');
      tabs.forEach(function(t) {
        t.classList.remove('active');
        if (t.textContent.trim() === 'Бэклог' && curTab === 'backlog') t.classList.add('active');
        if (t.textContent.trim() === 'Планирование' && curTab === 'planning') t.classList.add('active');
        if (t.textContent.trim() === 'Канбан' && curTab === 'kanban') t.classList.add('active');
      });
      document.getElementById('pg-backlog').style.display = curTab === 'backlog' ? '' : 'none';
      document.getElementById('pg-planning').style.display = curTab === 'planning' ? '' : 'none';
      document.getElementById('pg-kanban').style.display = curTab === 'kanban' ? '' : 'none';
    }
  }

  init();
});
</script>
