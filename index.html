<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ОРБИТА</title>
<link rel="stylesheet" href="design-system.css">
<style>
body { background:var(--bg); color:var(--text); font-family:var(--font-body); margin:0; }
.dash { max-width:720px; margin:0 auto; padding:32px 24px 80px; }

/* Hero */
.hero { text-align:center; padding:48px 0 20px; }
.hero h1 { font-size:36px; font-weight:800; color:var(--text); margin:0; letter-spacing:-.5px; }
.hero-sub { font-size:14px; color:var(--muted); margin-top:8px; line-height:1.5; }

/* CTA block */
.cta-block { text-align:center; margin:24px 0 32px; }
.cta-main {
  display:inline-flex; align-items:center; gap:8px;
  padding:14px 32px; border-radius:10px; font-family:var(--font-body);
  font-size:14px; font-weight:700; cursor:pointer; border:none;
  background:linear-gradient(135deg,var(--teal),var(--violet)); color:#fff;
  text-decoration:none; transition:opacity .15s;
}
.cta-main:hover { opacity:.85; }
.cta-sub { font-size:12px; color:var(--muted); margin-top:8px; }

/* Auth row */
.auth-row { display:flex; gap:10px; justify-content:center; margin-bottom:28px; }
.btn-primary {
  padding:10px 24px; border-radius:8px; font-family:var(--font-body);
  font-size:12px; font-weight:700; cursor:pointer; border:none;
  background:linear-gradient(135deg,var(--teal),var(--violet)); color:#fff;
  text-decoration:none; display:inline-flex; align-items:center; gap:6px;
  transition:opacity .15s;
}
.btn-primary:hover { opacity:.85; }
.btn-ghost {
  padding:10px 24px; border-radius:8px; font-family:var(--font-body);
  font-size:12px; font-weight:700; cursor:pointer;
  background:transparent; border:1px solid var(--border); color:var(--muted);
  text-decoration:none; display:inline-flex; align-items:center; gap:6px;
  transition:all .15s;
}
.btn-ghost:hover { border-color:var(--violet-border); color:var(--text); }

/* Section title */
.sec-title {
  font-size:11px; font-weight:700; text-transform:uppercase;
  letter-spacing:.1em; color:var(--violet); margin:24px 0 10px;
}

/* Entry cards */
.entry-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:24px; }
.entry-card {
  padding:18px; background:var(--card); border:1px solid var(--border);
  border-radius:10px; text-decoration:none; transition:border-color .15s;
}
.entry-card:hover { border-color:var(--violet-border); }
.entry-name { font-size:14px; font-weight:700; color:var(--text); margin-bottom:4px; }
.entry-desc { font-size:12px; color:var(--muted); line-height:1.4; }

/* Notification cards */
.notif-card {
  display:flex; align-items:flex-start; gap:12px;
  padding:10px 14px; background:var(--card); border-radius:8px;
  margin-bottom:6px; border-left:3px solid var(--muted); cursor:pointer;
  text-decoration:none; transition:border-color .15s;
}
.notif-card:hover { border-color:var(--violet-border); }
.notif-card.n-high { border-left-color:var(--red); background:var(--red-dim); }
.notif-card.n-medium { border-left-color:var(--amber); background:var(--amber-dim); }
.notif-title { font-size:12px; font-weight:600; color:var(--text); }
.notif-text { font-size:11px; color:var(--muted); margin-top:2px; }
.notif-empty { font-size:12px; color:var(--muted); font-style:italic; }

/* Product cards */
.prod-card {
  display:flex; align-items:center; gap:10px; padding:10px 14px;
  background:var(--card); border:1px solid var(--border); border-radius:8px;
  margin-bottom:6px; text-decoration:none; transition:border-color .15s;
}
.prod-card:hover { border-color:var(--violet-border); }
.prod-light { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.pl-green { background:var(--teal); }
.pl-amber { background:var(--amber); }
.pl-red { background:var(--red); }
.prod-name { font-size:13px; font-weight:600; color:var(--text); flex:1; }
.prod-stage { font-size:10px; color:var(--muted); }

/* Quick links */
.quick-links { display:flex; gap:8px; flex-wrap:wrap; }
.ql-btn {
  padding:8px 16px; border-radius:8px; font-family:var(--font-body);
  font-size:12px; font-weight:600; cursor:pointer;
  border:1px solid var(--border); background:var(--card); color:var(--text);
  text-decoration:none; transition:all .15s;
}
.ql-btn:hover { border-color:var(--violet-border); background:var(--violet-dim); }

/* Footer */
.footer { font-size:10px; color:var(--muted); opacity:.4; text-align:center; padding:20px 24px; }

@media (max-width:480px) {
  .entry-grid { grid-template-columns:1fr; }
}
</style>
</head>
<body>
<div class="dash" id="dashboard"></div>
<div class="footer">ORBITA . Проектный офис . WB Экосистема . 2026</div>
<script src="platform.js"></script>
<script src="js/auth.js"></script>
<script src="js/auth-ui.js"></script>
<script>
function esc(s) { var d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }
var GATE_NAMES = ['Gate 0 Скрининг','Gate 1 Концепция','Gate 2 MVP','Gate 3 Масштабирование','Gate 4 Рост','Gate 5 Зрелость'];

/* ── Guest / Unauthorized ─────────────────────── */
function renderWelcome(c) {
  var h = '';
  h += '<div class="hero"><h1>ОРБИТА</h1>';
  h += '<p class="hero-sub">Платформа управления портфелем цифровых решений экосистемы</p></div>';

  /* Big CTA */
  h += '<div class="cta-block">';
  h += '<a class="cta-main" href="tools/brief.html">+ Подать заявку на новый продукт</a>';
  h += '<div class="cta-sub">PMO рассмотрит за 5 рабочих дней</div>';
  h += '</div>';

  /* Entry cards */
  h += '<div class="entry-grid">';
  h += '<a class="entry-card" href="catalog.html"><div class="entry-name">Портфель</div><div class="entry-desc">Продукты экосистемы, статусы, Gate-прогресс</div></a>';
  h += '<a class="entry-card" href="framework.html"><div class="entry-name">Методология</div><div class="entry-desc">Как мы работаем, роли, планирование</div></a>';
  h += '</div>';

  /* Auth */
  h += '<div class="auth-row">';
  h += '<button class="btn-primary" onclick="if(window.showAuthModal){showAuthModal()}else{location.href=\'catalog.html\'}">Войти</button>';
  h += '<button class="btn-ghost" onclick="if(window.authGuestLogin){authGuestLogin()}else{location.href=\'catalog.html\'}">Гостевой доступ</button>';
  h += '</div>';

  c.innerHTML = h;
}

/* ── Authorized (any role) ────────────────────── */
function renderAuthorized(c, user) {
  var products = PT.load(PT.KEY_PRODUCTS) || [];
  products.forEach(function(p) { PT.migrateProductFields(p); });
  var h = '';

  /* CTA block — context-aware */
  h += '<div class="cta-block">';
  if (user.role === 'pmo_lead' || user.role === 'pmo' || user.role === 'admin') {
    var ideas = PT.load(PT.KEY_IDEAS) || [];
    var newIdeas = ideas.filter(function(i) { return i.status === 'new'; });
    if (newIdeas.length) {
      h += '<a class="cta-main" href="admin.html">Новые заявки: ' + newIdeas.length + '</a>';
      h += '<div class="cta-sub">Требуется скрининг</div>';
    } else {
      h += '<a class="cta-main" href="tools/brief.html">+ Подать заявку</a>';
      h += '<div class="cta-sub">Все заявки рассмотрены</div>';
    }
  } else {
    h += '<a class="cta-main" href="tools/brief.html">+ Подать заявку</a>';
    h += '<div class="cta-sub">PMO рассмотрит за 5 рабочих дней</div>';
  }
  h += '</div>';

  /* Portfolio summary stats */
  var onTrack = products.filter(function(p) { return p.status === 'on-track'; }).length;
  var atRisk = products.filter(function(p) { return p.status === 'at-risk'; }).length;
  var blocked = products.filter(function(p) { return p.status === 'blocked'; }).length;
  var screening = products.filter(function(p) { return p.status === 'screening'; }).length;

  if (user.role === 'admin' || user.role === 'pmo_lead' || user.role === 'lead') {
    h += '<div style="display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;">';
    h += '<div style="flex:1;min-width:100px;padding:14px;background:var(--card);border:1px solid var(--border);border-radius:8px;text-align:center;border-top:3px solid var(--teal)"><div style="font-size:24px;font-weight:800;color:var(--teal)">' + onTrack + '</div><div style="font-size:11px;color:var(--muted)">на треке</div></div>';
    h += '<div style="flex:1;min-width:100px;padding:14px;background:var(--card);border:1px solid var(--border);border-radius:8px;text-align:center;border-top:3px solid var(--amber)"><div style="font-size:24px;font-weight:800;color:var(--amber)">' + atRisk + '</div><div style="font-size:11px;color:var(--muted)">с рисками</div></div>';
    h += '<div style="flex:1;min-width:100px;padding:14px;background:var(--card);border:1px solid var(--border);border-radius:8px;text-align:center;border-top:3px solid var(--red)"><div style="font-size:24px;font-weight:800;color:var(--red)">' + blocked + '</div><div style="font-size:11px;color:var(--muted)">заблокировано</div></div>';
    h += '<div style="flex:1;min-width:100px;padding:14px;background:var(--card);border:1px solid var(--border);border-radius:8px;text-align:center;border-top:3px solid var(--violet)"><div style="font-size:24px;font-weight:800;color:var(--violet)">' + screening + '</div><div style="font-size:11px;color:var(--muted)">на скрининге</div></div>';
    h += '</div>';
  }

  /* Notifications — Требует внимания */
  var notifs = window.PT ? PT.getMyNotifications() : [];
  if (notifs.length) {
    h += '<div class="sec-title">Требует внимания (' + notifs.length + ')</div>';
    notifs.slice(0, 5).forEach(function(n) {
      var cls = n.level === 'high' ? 'n-high' : n.level === 'medium' ? 'n-medium' : '';
      var url = n.action && n.action.url ? n.action.url : '#';
      h += '<a class="notif-card ' + cls + '" href="' + url + '" onclick="if(window.PT){PT.markRead(\'' + n.id + '\')}">';
      h += '<div style="flex:1"><div class="notif-title">' + esc(n.title) + '</div>';
      h += '<div class="notif-text">' + esc(n.text) + '</div></div>';
      if (n.action) h += '<span style="font-size:11px;color:var(--violet);font-weight:600;white-space:nowrap">' + esc(n.action.label) + ' &rarr;</span>';
      h += '</a>';
    });
    if (notifs.length > 5) h += '<div style="font-size:11px;color:var(--muted);margin-top:4px">+ ещё ' + (notifs.length - 5) + '</div>';
  }

  /* My products (for PM) */
  if (user.role === 'pm') {
    var myProducts = [];
    if (user.assignments && user.assignments.length) {
      user.assignments.forEach(function(a) {
        var p = products.find(function(pr) { return pr.id === a.productId; });
        if (p) myProducts.push(p);
      });
    }
    if (myProducts.length) {
      h += '<div class="sec-title">Мои продукты</div>';
      myProducts.forEach(function(p) {
        var lc = 'pl-' + (p.statusLight || 'green');
        h += '<a class="prod-card" href="workspace.html?id=' + esc(p.id) + '">';
        h += '<span class="prod-light ' + lc + '"></span>';
        h += '<span class="prod-name">' + esc(p.name) + '</span>';
        h += '<span class="prod-stage">' + (GATE_NAMES[p.gate] || 'Gate ' + p.gate) + '</span>';
        h += '</a>';
      });
    }
  }

  /* Quick links */
  h += '<div class="sec-title">Быстрый доступ</div>';
  h += '<div class="quick-links">';
  h += '<a class="ql-btn" href="catalog.html">Портфель</a>';
  h += '<a class="ql-btn" href="framework.html">Методология</a>';
  h += '<a class="ql-btn" href="registry.html">Реестр</a>';
  h += '<a class="ql-btn" href="tools/brief.html">Бриф</a>';
  if (user.role === 'admin' || user.role === 'pmo_lead') {
    h += '<a class="ql-btn" href="admin.html">Admin</a>';
  }
  h += '</div>';

  c.innerHTML = h;
}

/* ── Route ──────────────────────────────────────── */
document.addEventListener('DOMContentLoaded', function() {
  var container = document.getElementById('dashboard');
  var user = window.OrbAuth ? OrbAuth.getCurrentUser() : null;

  PT.ensureProducts(function() {
    if (!user || user.role === 'guest') {
      renderWelcome(container);
    } else {
      // Generate auto-alerts before rendering
      if (window.PT) PT.generateAutoAlerts();
      renderAuthorized(container, user);
    }
  });
});
</script>
<script src="nav.js"></script>
</body>
</html>
