<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"><meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Реестр проектов под защиту · ОРБИТА</title>
<link rel="stylesheet" href="design-system.css">
<style>
.rp-page{max-width:none;margin:0;padding:24px 20px 80px}

.rp-header{margin-bottom:18px}
.rp-header h1{font-family:var(--font-head);font-size:24px;font-weight:900;color:var(--text);margin-bottom:6px}
.rp-header .sub{font-size:13px;color:var(--muted);max-width:820px;line-height:1.55}
.rp-pills{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
.rp-pill{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;padding:5px 11px;border-radius:999px;background:var(--surface2);border:1px solid var(--border);color:var(--muted)}
.rp-pill b{color:var(--text);font-weight:800}

/* ── Toolbar ── */
.rp-toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin:18px 0 20px;padding:12px 14px;background:var(--surface);border:1px solid var(--border);border-radius:10px}
.rp-toolbar select,
.rp-toolbar input{font-family:var(--font);font-size:12px;padding:7px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--card);color:var(--text);outline:none;transition:border-color .15s}
.rp-toolbar select{cursor:pointer;min-width:140px}
.rp-toolbar input{flex:1;min-width:200px;max-width:320px}
.rp-toolbar select:focus,
.rp-toolbar input:focus{border-color:var(--violet-border)}

.rp-view-toggle{display:inline-flex;border:1px solid var(--border);border-radius:8px;overflow:hidden;background:var(--card)}
.rp-view-toggle button{font-family:var(--font);font-size:11px;font-weight:700;padding:7px 14px;background:transparent;color:var(--muted);border:none;cursor:pointer;transition:background .15s,color .15s}
.rp-view-toggle button.active{background:var(--violet-dim);color:var(--violet)}

.rp-spacer{flex:1}
.rp-count{font-size:11px;color:var(--muted);font-weight:600}
.rp-count b{color:var(--text);font-weight:800}

/* ── Stage badge (used in both views) ── */
.rp-st-badge{font-family:'SF Mono','Consolas',monospace;font-size:11px;font-weight:800;padding:3px 8px;border-radius:5px;border:1.5px solid;white-space:nowrap;display:inline-flex;align-items:center;gap:6px}
.rp-st-badge .nm{font-family:var(--font);font-weight:700;font-size:10px;letter-spacing:.02em}

/* ── Table view ── */
.rp-table-wrap{overflow-x:auto;background:var(--surface);border:1px solid var(--border);border-radius:12px}
.rp-table{width:100%;border-collapse:collapse;font-size:11.5px;table-layout:fixed}
.rp-table th{position:sticky;top:0;background:var(--surface2);text-align:left;padding:9px 10px;font-family:var(--font-head);font-size:9.5px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none}
.rp-table th:hover{color:var(--text)}
.rp-table th .sort{font-size:9px;margin-left:3px;opacity:.5}
.rp-table th.sorted .sort{opacity:1;color:var(--violet)}
.rp-table td{padding:10px;border-bottom:1px solid var(--border);vertical-align:top;color:var(--text);overflow:hidden;text-overflow:ellipsis}
.rp-table tr:last-child td{border-bottom:none}
.rp-table tr:hover td{background:var(--surface2)}
.rp-table .cell-name .name{font-weight:700;font-size:12.5px;color:var(--text);line-height:1.25}
.rp-table .cell-name .desc{font-size:10.5px;color:var(--muted);margin-top:3px;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
/* Column widths via colgroup */
.rp-table col.c-stage{width:120px}
.rp-table col.c-name{width:auto}
.rp-table col.c-cust{width:160px}
.rp-table col.c-mkt{width:200px}
.rp-table col.c-share{width:140px}
.rp-table col.c-team{width:160px}
.rp-table col.c-pipe{width:140px}
.rp-table col.c-gmv{width:170px}
.rp-table col.c-cp{width:90px}
.rp-table col.c-act{width:100px}
.rp-table td .clip{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.35}
.rp-table .muted{color:var(--muted)}
.rp-table .empty{color:var(--muted);font-style:italic;font-size:11px}
.rp-pipeline{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:2px 8px;border-radius:5px}
.rp-pipeline.yes{background:rgba(0,212,180,.12);color:#00B89C;border:1px solid rgba(0,212,180,.3)}
.rp-pipeline.no{background:var(--surface2);color:var(--muted);border:1px solid var(--border)}

.rp-row-action{font-size:11px;font-weight:700;padding:5px 10px;border-radius:5px;text-decoration:none;background:var(--violet-dim);color:var(--violet);border:1px solid var(--violet-border);white-space:nowrap;transition:transform .15s}
.rp-row-action:hover{transform:translateX(2px)}

/* ── Cards view ── */
.rp-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:14px}
.rp-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;display:flex;flex-direction:column;gap:12px;transition:border-color .15s,transform .15s}
.rp-card:hover{border-color:var(--violet-border);transform:translateY(-1px)}
.rp-card-hdr{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.rp-card-name{font-family:var(--font-head);font-size:14px;font-weight:800;color:var(--text);line-height:1.3}
.rp-card-customer{font-size:11px;color:var(--muted);margin-top:2px}
.rp-card-customer b{color:var(--text);font-weight:700}
.rp-card-fields{display:grid;grid-template-columns:1fr 1fr;gap:8px 12px;font-size:11px}
.rp-card-fields .full{grid-column:1/-1}
.rp-card-fields .lbl{font-family:var(--font-head);font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:2px}
.rp-card-fields .val{font-size:12px;color:var(--text);line-height:1.4;font-weight:600}
.rp-card-fields .empty{color:var(--muted);font-style:italic;font-weight:400}
.rp-card-actions{display:flex;gap:8px;margin-top:auto;padding-top:6px;border-top:1px solid var(--border)}

.rp-empty{padding:60px 24px;text-align:center;color:var(--muted);background:var(--surface);border:1px dashed var(--border);border-radius:12px;font-size:13px}

@media(max-width:720px){
  .rp-card-fields{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div id="nav-mount"></div>

<div class="rp-page">

  <div class="rp-header">
    <h1>Реестр проектов под защиту</h1>
    <div class="sub">
      Единый реестр проектов и инициатив департамента развития экосистемы. Защита 10 минут на проект.
      Стадия — одно из полей карточки. Полная информация — в карточке проекта (workspace).
    </div>
    <div class="rp-pills">
      <span class="rp-pill">Всего: <b id="rp-total">—</b></span>
      <span class="rp-pill">Заявок (О·0): <b id="rp-cnt-0">—</b></span>
      <span class="rp-pill">Проектов (О·1+): <b id="rp-cnt-rest">—</b></span>
      <span class="rp-pill">Источник: <b>portfolio.json</b></span>
    </div>
  </div>

  <div class="rp-toolbar">
    <select id="rp-f-stage">
      <option value="">Все стадии</option>
    </select>
    <select id="rp-f-type">
      <option value="">Все типы</option>
      <option value="INI">Инициативы (заявки)</option>
      <option value="PRD">Запущенные продукты</option>
    </select>
    <input id="rp-f-search" type="text" placeholder="Поиск по названию, заказчику, описанию..."/>
    <span class="rp-spacer"></span>
    <span class="rp-count">Найдено: <b id="rp-found">—</b></span>
    <div class="rp-view-toggle" id="rp-view-toggle">
      <button data-v="table" class="active">Таблица</button>
      <button data-v="cards">Карточки</button>
    </div>
  </div>

  <div id="rp-content"></div>

</div>

<script src="stages.js"></script>
<script src="nav.js"></script>
<script>
(function(){
  'use strict';

  var STAGES = (window.STAGES_DEFAULT || []);
  var STAGE_BY_NUM = {};
  STAGES.forEach(function(s){ STAGE_BY_NUM[s.num] = s; });

  function esc(s){ return String(s == null ? '' : s).replace(/[&<>"]/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]; }); }

  function stageLabel(g){
    var s = STAGE_BY_NUM[g];
    if (!s) return 'О·' + g;
    if (g === 0) return 'О·0 Заявка';
    return 'О·' + g + ' ' + s.name;
  }

  function stageBadge(g){
    var s = STAGE_BY_NUM[g] || { color:'#8B8BAE', colorDim:'var(--surface2)', name:'?' };
    var label = (g === 0) ? 'Заявка' : s.name;
    return '<span class="rp-st-badge" style="color:' + s.color + ';border-color:' + s.color + ';background:' + s.colorDim + '">'
      + 'О·' + g + '<span class="nm">' + esc(label) + '</span></span>';
  }

  function pipelineBadge(p){
    if (p && typeof p === 'object') {
      var has = !!p.exists;
      var nums = p.numbers || p.metrics || '';
      var html = '<span class="rp-pipeline ' + (has ? 'yes' : 'no') + '">' + (has ? '✓ Есть' : '— Нет') + '</span>';
      if (has && nums) html += '<div style="font-size:10px;color:var(--muted);margin-top:3px;line-height:1.35">' + esc(nums) + '</div>';
      return html;
    }
    if (p) return '<span class="rp-pipeline yes">' + esc(p) + '</span>';
    return '<span class="empty">—</span>';
  }

  function valOrEmpty(v) {
    if (v == null || v === '') return '<span class="empty">—</span>';
    if (Array.isArray(v)) return v.length ? esc(v.join(', ')) : '<span class="empty">—</span>';
    return esc(v);
  }

  function teamShort(p){
    if (Array.isArray(p.team) && p.team.length) {
      return esc(p.team[0]) + (p.team.length > 1 ? ' <span class="muted">+' + (p.team.length - 1) + '</span>' : '');
    }
    if (p.owner || p.pm) return esc(p.owner || p.pm);
    return '<span class="empty">—</span>';
  }

  function checkpointsCount(p) {
    if (Array.isArray(p.checkpoints)) {
      var done = p.checkpoints.filter(function(c){ return /done|✓|готов/i.test(c); }).length;
      return done + ' / ' + p.checkpoints.length;
    }
    return null;
  }

  // ── State ──
  var state = { view:'table', stage:'', type:'', q:'', sortBy:'gate', sortDir:1, items:[] };

  function load() {
    return fetch('data/portfolio.json', { cache:'no-store' })
      .then(function(r){ return r.json(); })
      .catch(function(){ return []; });
  }

  function applyFilters() {
    var q = state.q.toLowerCase().trim();
    return state.items.filter(function(p){
      if (state.stage !== '' && (p.gate || 0) !== Number(state.stage)) return false;
      if (state.type) {
        var prefix = (p.id || '').split('-')[0];
        if (prefix !== state.type) return false;
      }
      if (q) {
        var hay = [p.id, p.name, p.desc, p.customer, p.owner, p.strategicAlignment].filter(Boolean).join(' ').toLowerCase();
        if (hay.indexOf(q) === -1) return false;
      }
      return true;
    }).sort(function(a,b){
      var av = a[state.sortBy], bv = b[state.sortBy];
      if (av == null) av = '';
      if (bv == null) bv = '';
      if (av < bv) return -1 * state.sortDir;
      if (av > bv) return 1 * state.sortDir;
      return 0;
    });
  }

  // ── Renderers ──
  function clip(v){
    if (v == null || v === '') return '<span class="empty">—</span>';
    return '<div class="clip" title="' + esc(v) + '">' + esc(v) + '</div>';
  }

  var COLUMNS = [
    { key:'gate',               label:'Стадия',          col:'c-stage', render:function(p){ return stageBadge(p.gate || 0); } },
    { key:'name',               label:'Название',        col:'c-name', render:function(p){
      var html = '<div class="cell-name">';
      html += '<div class="name">' + esc(p.name || p.id) + '</div>';
      if (p.desc) html += '<div class="desc">' + esc(p.desc) + '</div>';
      html += '</div>';
      return html;
    }},
    { key:'customer',           label:'Заказчик',        col:'c-cust',  render:function(p){ return clip(p.customer); } },
    { key:'marketSize',         label:'Размер ниши',     col:'c-mkt',   render:function(p){ return clip(p.marketSize); } },
    { key:'targetShare',        label:'Целевая доля',    col:'c-share', render:function(p){ return clip(p.targetShare); } },
    { key:'team',               label:'Команда',         col:'c-team',  render:function(p){ return '<div class="clip">' + teamShort(p) + '</div>'; } },
    { key:'pipeline',           label:'Пайплайн',        col:'c-pipe',  render:function(p){ return pipelineBadge(p.pipeline); } },
    { key:'gmvGrowth',          label:'Рост GMV',        col:'c-gmv',   render:function(p){ return clip(p.gmvGrowth); } },
    { key:'checkpoints',        label:'Чекпоинт',        col:'c-cp',    render:function(p){
      var c = checkpointsCount(p);
      return c ? esc(c) : '<span class="empty">—</span>';
    }},
    { key:'_action',            label:'',                col:'c-act',   sortable:false, render:function(p){
      return '<a class="rp-row-action" href="workspace.html?id=' + encodeURIComponent(p.id) + '">Открыть →</a>';
    }}
  ];

  function renderTable(rows) {
    var cols = COLUMNS.map(function(c){ return '<col class="' + esc(c.col || '') + '">'; }).join('');
    var head = '<tr>' + COLUMNS.map(function(c){
      var isSortable = c.sortable !== false;
      var sortedCls = (isSortable && c.key === state.sortBy) ? ' sorted' : '';
      var arrow = (c.key === state.sortBy) ? (state.sortDir === 1 ? '▲' : '▼') : '↕';
      return '<th class="' + sortedCls + '" data-k="' + esc(c.key) + '" data-sort="' + (isSortable ? '1' : '0') + '">'
        + esc(c.label) + (isSortable ? '<span class="sort">' + arrow + '</span>' : '') + '</th>';
    }).join('') + '</tr>';
    var body = rows.map(function(p){
      return '<tr>' + COLUMNS.map(function(c){ return '<td>' + c.render(p) + '</td>'; }).join('') + '</tr>';
    }).join('');
    return '<div class="rp-table-wrap"><table class="rp-table"><colgroup>' + cols + '</colgroup><thead>' + head + '</thead><tbody>' + body + '</tbody></table></div>';
  }

  function renderCards(rows) {
    return '<div class="rp-cards">' + rows.map(function(p){
      var html = '<div class="rp-card">';
      html += '<div class="rp-card-hdr">';
      html += '<div style="min-width:0;flex:1">';
      html += '<div class="rp-card-name">' + esc(p.name || p.id) + '</div>';
      html += '<div class="rp-card-customer">Заказчик: <b>' + esc(p.customer || p.owner || '—') + '</b></div>';
      html += '</div>';
      html += stageBadge(p.gate || 0);
      html += '</div>';

      html += '<div class="rp-card-fields">';
      html += '<div class="full"><div class="lbl">Стратегический фит</div><div class="val ' + (p.strategicAlignment ? '' : 'empty') + '">' + esc(p.strategicAlignment || '—') + '</div></div>';
      html += '<div><div class="lbl">Размер ниши</div><div class="val ' + (p.marketSize ? '' : 'empty') + '">' + esc(p.marketSize || '—') + '</div></div>';
      html += '<div><div class="lbl">Целевая доля</div><div class="val ' + (p.targetShare ? '' : 'empty') + '">' + esc(p.targetShare || '—') + '</div></div>';
      html += '<div><div class="lbl">Команда</div><div class="val">' + teamShort(p) + '</div></div>';
      html += '<div><div class="lbl">Пайплайн</div><div class="val">' + pipelineBadge(p.pipeline) + '</div></div>';
      html += '<div class="full"><div class="lbl">Рост GMV</div><div class="val ' + (p.gmvGrowth ? '' : 'empty') + '">' + esc(p.gmvGrowth || '—') + '</div></div>';
      html += '</div>';

      html += '<div class="rp-card-actions">';
      html += '<a class="rp-row-action" href="workspace.html?id=' + encodeURIComponent(p.id) + '">Карточка →</a>';
      html += '</div>';
      html += '</div>';
      return html;
    }).join('') + '</div>';
  }

  function render() {
    var rows = applyFilters();
    document.getElementById('rp-found').textContent = rows.length;
    var box = document.getElementById('rp-content');
    if (!rows.length) {
      box.innerHTML = '<div class="rp-empty">По фильтрам ничего не найдено. Сбрось фильтры или поиск.</div>';
      return;
    }
    box.innerHTML = (state.view === 'table') ? renderTable(rows) : renderCards(rows);
    if (state.view === 'table') {
      box.querySelectorAll('th[data-sort="1"]').forEach(function(th){
        th.addEventListener('click', function(){
          var k = th.dataset.k;
          if (state.sortBy === k) state.sortDir = -state.sortDir;
          else { state.sortBy = k; state.sortDir = 1; }
          render();
        });
      });
    }
  }

  function buildToolbar(items) {
    // Stage filter — populate from used stages
    var sel = document.getElementById('rp-f-stage');
    var used = {};
    items.forEach(function(p){ used[p.gate || 0] = true; });
    STAGES.forEach(function(s){
      var opt = document.createElement('option');
      opt.value = s.num;
      opt.textContent = 'О·' + s.num + ' ' + s.name + (used[s.num] ? '' : ' (нет)');
      sel.appendChild(opt);
    });
    sel.addEventListener('change', function(){ state.stage = sel.value; render(); });
    document.getElementById('rp-f-type').addEventListener('change', function(e){ state.type = e.target.value; render(); });
    document.getElementById('rp-f-search').addEventListener('input', function(e){ state.q = e.target.value; render(); });
    document.querySelectorAll('#rp-view-toggle button').forEach(function(b){
      b.addEventListener('click', function(){
        document.querySelectorAll('#rp-view-toggle button').forEach(function(x){ x.classList.remove('active'); });
        b.classList.add('active');
        state.view = b.dataset.v;
        render();
      });
    });
  }

  load().then(function(items){
    state.items = items || [];
    var byG = {};
    items.forEach(function(p){ var g = p.gate || 0; byG[g] = (byG[g] || 0) + 1; });
    document.getElementById('rp-total').textContent = items.length;
    document.getElementById('rp-cnt-0').textContent = byG[0] || 0;
    document.getElementById('rp-cnt-rest').textContent = items.length - (byG[0] || 0);
    buildToolbar(items);
    render();
  });
})();
</script>
</body>
</html>
