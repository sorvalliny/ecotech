<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"><meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ОРБИТА — Портфель проектов</title>
<link rel="stylesheet" href="design-system.css">
<style>
/* ================================================================ PAGE */
.cat-page{max-width:var(--content-max);margin:0 auto;padding:32px 24px 80px}

/* ================================================================ HEADER */
.cat-header{margin-bottom:28px}
.cat-header h1{font-family:var(--font-head);font-size:22px;font-weight:900;color:var(--text);margin-bottom:4px}
.cat-header-sub{font-size:13px;color:var(--muted)}

/* ================================================================ FILTERS */
.catalog-filters{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap;align-items:center}
.catalog-filters select,
.catalog-filters input{
  font-family:var(--font);font-size:12px;
  padding:7px 12px;border-radius:var(--radius-sm);
  border:1px solid var(--border);background:var(--surface);color:var(--text);
  outline:none;transition:border-color .15s;
  min-width:0;
}
.catalog-filters select{cursor:pointer;min-width:140px}
.catalog-filters select:focus,
.catalog-filters input:focus{border-color:var(--violet-border)}
.catalog-filters input{flex:1;min-width:160px;max-width:260px}
.catalog-filters select option{background:var(--surface);color:var(--text)}

/* ================================================================ GRID */
.cat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:14px;margin-bottom:32px}

/* ================================================================ CARD */
.cat-card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:18px 20px;cursor:pointer;transition:border-color .15s,transform .15s;
  text-decoration:none;display:block;position:relative;
}
.cat-card:hover{border-color:var(--violet-border);transform:translateY(-2px)}
.cat-card.is-transferring{opacity:.45;border-style:dashed}

/* ── Header: name + health dot ── */
.cat-card-head{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.cat-name{font-family:var(--font-head);font-size:15px;font-weight:800;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cat-health{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.cat-health.h-green{background:#00D4B4;box-shadow:0 0 6px rgba(0,212,180,.4)}
.cat-health.h-amber{background:#FFB830;box-shadow:0 0 6px rgba(255,184,48,.4)}
.cat-health.h-red{background:#FF4D6A;box-shadow:0 0 6px rgba(255,77,106,.4)}
.cat-health.h-gray{background:#6B778C}

/* ── Stage progress ── */
.cat-orbit{display:flex;align-items:center;gap:0;margin-bottom:10px}
.cat-orbit-step{flex:1;height:4px;border-radius:2px;background:var(--surface2);position:relative;margin-right:2px}
.cat-orbit-step:last-child{margin-right:0}
.cat-orbit-step.filled{background:var(--stage-color,var(--violet))}
.cat-orbit-step.current{background:var(--stage-color,var(--violet));box-shadow:0 0 6px var(--stage-color,var(--violet))}
.cat-orbit-label{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.cat-orbit-tag{font-family:var(--mono);font-size:10px;font-weight:700;padding:2px 7px;border-radius:var(--radius-xs);letter-spacing:.03em;white-space:nowrap}
.cat-orbit-name{font-size:10px;color:var(--muted);font-weight:600}

/* ── Status line (reason) ── */
.cat-status-line{font-size:11px;color:var(--muted);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.cat-status-line .reason{font-style:italic;color:var(--amber)}
.cat-status-line .reason-red{color:var(--red)}

/* ── Description ── */
.cat-desc{font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

/* ── Data row: KPI + metrics ── */
.cat-data{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.cat-data-chip{font-size:10px;font-weight:600;padding:3px 8px;border-radius:var(--radius-xs);background:var(--surface2);color:var(--text);display:flex;align-items:center;gap:4px}
.cat-data-chip .chip-label{color:var(--muted);font-weight:400}

/* ── Meta row ── */
.cat-meta{display:flex;gap:12px;flex-wrap:wrap;font-size:11px;color:var(--muted);margin-bottom:10px}
.cat-meta span{white-space:nowrap}

/* ── Initiatives block ── */
.cat-initiatives{border-top:1px solid var(--border);padding-top:8px}
.cat-init-title{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px}
.cat-init{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--gray2);padding:2px 0;line-height:1.4}
.cat-init-id{font-family:var(--mono);font-size:10px;color:var(--muted);flex-shrink:0}
.cat-init-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ci-rice{font-family:var(--mono);font-size:10px;font-weight:700;padding:1px 6px;border-radius:var(--radius-xs);flex-shrink:0}
.ci-rice-hi{background:var(--teal-dim);color:var(--teal)}
.ci-rice-mi{background:var(--amber-dim);color:var(--amber)}
.ci-rice-lo{background:var(--red-dim);color:var(--red)}
.cat-no-init{font-size:11px;color:var(--muted);font-style:italic}

/* ── OKR block ── */
.cat-okr{border-top:1px solid var(--border);padding-top:8px;margin-bottom:8px}
.cat-okr-title{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px}
.cat-okr-row{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);padding:1px 0;line-height:1.4}
.cat-okr-prefix{flex-shrink:0;font-family:var(--mono);font-size:10px;color:var(--border);user-select:none}
.cat-okr-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.cat-okr-bar{width:48px;height:5px;border-radius:3px;background:var(--surface2);flex-shrink:0;position:relative;overflow:hidden}
.cat-okr-bar-fill{height:100%;border-radius:3px;background:var(--teal);transition:width .3s}
.cat-okr-pct{font-family:var(--mono);font-size:10px;font-weight:700;color:var(--teal);flex-shrink:0;min-width:28px;text-align:right}
.cat-okr-kr{font-family:var(--mono);font-size:10px;color:var(--muted);flex-shrink:0;white-space:nowrap}

/* ================================================================ EMPTY */
.cat-empty{text-align:center;padding:60px 20px;color:var(--muted);font-size:13px;grid-column:1/-1}

/* ================================================================ SUMMARY BAR */
.cat-summary{display:flex;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.cat-summary-item{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:4px}
.cat-summary-item strong{font-family:var(--mono);font-size:14px;font-weight:800;color:var(--text)}

/* ================================================================ CHANGELOG */
.cat-changelog{border-top:1px solid var(--border);padding-top:20px;margin-top:8px}
.cat-cl-title{
  font-family:var(--font-head);font-size:14px;font-weight:700;color:var(--text);
  cursor:pointer;display:flex;align-items:center;gap:8px;
  padding:8px 0;user-select:none;
}
.cat-cl-title:hover{color:var(--violet)}
.cl-count{font-family:var(--mono);font-size:11px;font-weight:600;padding:2px 8px;border-radius:var(--radius-pill);background:var(--violet-dim);color:var(--violet)}
.cl-arrow{font-size:10px;color:var(--muted);transition:transform .2s;margin-left:auto}
.cl-arrow.open{transform:rotate(90deg)}

.cat-cl-list{max-height:0;overflow:hidden;transition:max-height .3s ease}
.cat-cl-list.open{max-height:2000px}

.cl-entry{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:12px}
.cl-entry:last-child{border-bottom:none}
.cl-date{font-family:var(--mono);font-size:11px;color:var(--muted);flex-shrink:0;min-width:44px}
.cl-badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:var(--radius-xs);white-space:nowrap;flex-shrink:0}
.cl-gate{background:var(--teal-dim);color:var(--teal)}
.cl-edit{background:var(--violet-dim);color:var(--violet)}
.cl-create{background:var(--amber-dim);color:var(--amber)}
.cl-delete{background:var(--red-dim);color:var(--red)}
.cl-text{color:var(--gray2);flex:1}
.cl-product{font-weight:600;color:var(--text)}
.cl-user{color:var(--muted);font-size:11px;margin-left:4px}

/* ================================================================ FOOTER */
.cat-footer{border-top:1px solid var(--border);padding:20px 0;text-align:center;font-size:10px;color:var(--muted);margin-top:40px}

/* ================================================================ RESPONSIVE */
@media(max-width:640px){
  .cat-grid{grid-template-columns:1fr}
  .catalog-filters{flex-direction:column}
  .catalog-filters select,.catalog-filters input{width:100%;max-width:none}
  .cat-summary{flex-direction:column;gap:8px}
}
</style>
</head>
<body>

<div class="cat-page">

  <!-- ── Header ── -->
  <div class="cat-header">
    <h1>Портфель проектов</h1>
    <div class="cat-header-sub">Проекты и заявки на создание новых центров прибыли</div>
  </div>

  <!-- ── Summary ── -->
  <div class="cat-summary" id="cat-summary"></div>

  <!-- ── Filters ── -->
  <div class="catalog-filters">
    <select id="cf-dept">
      <option value="">Все департаменты</option>
      <option value="ecosystem">Экосистема</option>
      <option value="innovation">Инновации (архив)</option>
      <option value="education">Обучение</option>
    </select>
    <select id="cf-type">
      <option value="">Все типы</option>
      <option value="product">Продукт</option>
      <option value="tech_solution">Тех.решение</option>
      <option value="edu_product">Образовательный</option>
      <option value="project">Проект</option>
    </select>
    <select id="cf-stage">
      <option value="">Все стадии</option>
      <option value="0">Заявка</option>
      <option value="1">Разведка</option>
      <option value="2">Прототип</option>
      <option value="3">MVP</option>
      <option value="4">Рост</option>
      <option value="5">Масштаб</option>
    </select>
    <input type="text" id="cf-search" placeholder="Поиск по названию...">
  </div>

  <!-- ── Product Grid ── -->
  <div class="cat-grid" id="cat-grid"></div>

  <!-- ── Changelog ── -->
  <div class="cat-changelog">
    <h3 class="cat-cl-title" id="cl-toggle">
      Лог изменений <span class="cl-count" id="cl-count">0</span>
      <span class="cl-arrow" id="cl-arrow">&#9654;</span>
    </h3>
    <div class="cat-cl-list" id="changelog-list"></div>
  </div>

</div>

<div class="cat-footer">ОРБИТА · Портфель проектов · WB Экосистема · 2026</div>

<script src="platform.js"></script>
<script src="stages.js"></script>
<script src="js/auth.js"></script>
<script src="nav.js"></script>
<script>
(function() {
  'use strict';

  // ── Data ──
  var products = [];
  var backlog = [];
  var goals = [];
  var changelog = [];
  var STAGES = [];

  // ── DOM refs ──
  var elGrid    = document.getElementById('cat-grid');
  var elSummary = document.getElementById('cat-summary');
  var elCLList  = document.getElementById('changelog-list');
  var elCLCount = document.getElementById('cl-count');
  var elCLArrow = document.getElementById('cl-arrow');
  var elCFDept  = document.getElementById('cf-dept');
  var elCFType  = document.getElementById('cf-type');
  var elCFStage = document.getElementById('cf-stage');
  var elCFSearch= document.getElementById('cf-search');

  // ── Helpers ──
  function esc(t) { return String(t || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  function displayName(p) {
    if (window.OrbAuth && OrbAuth.getDisplayName) return OrbAuth.getDisplayName(p, 'product');
    return p.name || p.id;
  }

  function riceScore(item) {
    if (!item.e || item.e === 0) return 0;
    return Math.round((item.r * item.i * item.c) / item.e);
  }

  function riceClass(score) {
    if (score >= 60) return 'ci-rice-hi';
    if (score >= 30) return 'ci-rice-mi';
    return 'ci-rice-lo';
  }

  function statusLabel(s) {
    if (s === 'on-track') return 'Активен';
    if (s === 'at-risk')  return 'Риск';
    if (s === 'blocked')  return 'Заблокирован';
    if (s === 'transferring') return 'Переходит';
    if (s === 'pending')  return 'Заявка (O·0)';
    if (s === 'screening') return 'Заявка (O·0)';
    return s || 'N/A';
  }

  function currentQuarterLabel() {
    var now = new Date();
    var q = Math.ceil((now.getMonth() + 1) / 3);
    return 'Q' + q + ' ' + now.getFullYear();
  }

  function getProductInitiatives(productId) {
    var result = [];
    for (var i = 0; i < backlog.length; i++) {
      var item = backlog[i];
      if (item.productId === productId || item.project === productId) {
        result.push(item);
      }
    }
    // Sort by RICE desc
    result.sort(function(a, b) { return riceScore(b) - riceScore(a); });
    return result;
  }

  function getProductGoals(productId) {
    var result = [];
    for (var i = 0; i < goals.length; i++) {
      if (goals[i].productId === productId) result.push(goals[i]);
    }
    return result;
  }

  function calcGoalProgress(goal) {
    var krs = goal.keyResults || goal.krs || [];
    if (!krs.length) return { pct: 0, done: 0, total: 0 };
    var total = krs.length;
    var done = 0;
    var sumPct = 0;
    for (var i = 0; i < krs.length; i++) {
      var kr = krs[i];
      var target = kr.target || 100;
      var current = kr.current || 0;
      var p = target > 0 ? Math.min(Math.round((current / target) * 100), 100) : 0;
      sumPct += p;
      if (p >= 100) done++;
    }
    return { pct: Math.round(sumPct / total), done: done, total: total };
  }

  function formatLogDate(iso) {
    if (!iso) return '—';
    var d = new Date(iso);
    var day = String(d.getDate()).padStart(2, '0');
    var mon = String(d.getMonth() + 1).padStart(2, '0');
    return day + '.' + mon;
  }

  function logBadgeClass(action) {
    var a = (action || '').toLowerCase();
    if (a.indexOf('gate') !== -1) return 'cl-gate';
    if (a.indexOf('creat') !== -1 || a.indexOf('add') !== -1) return 'cl-create';
    if (a.indexOf('delet') !== -1 || a.indexOf('remov') !== -1 || a.indexOf('archiv') !== -1) return 'cl-delete';
    return 'cl-edit';
  }

  function logBadgeLabel(action) {
    var a = (action || '').toLowerCase();
    if (a.indexOf('gate') !== -1) return 'Gate';
    if (a.indexOf('creat') !== -1) return 'Create';
    if (a.indexOf('add') !== -1) return 'Add';
    if (a.indexOf('delet') !== -1 || a.indexOf('remov') !== -1) return 'Delete';
    if (a.indexOf('archiv') !== -1) return 'Archive';
    return 'Edit';
  }

  // ── Filters ──
  function getFilters() {
    return {
      dept:   elCFDept.value,
      type:   elCFType.value,
      stage:  elCFStage.value,
      search: (elCFSearch.value || '').trim().toLowerCase()
    };
  }

  function filterProducts() {
    var f = getFilters();
    return products.filter(function(p) {
      if (f.dept && (p.department || 'ecosystem') !== f.dept) return false;
      if (f.type) {
        var pType = p.cat || p.type || '';
        if (f.type === 'product' && pType !== 'b2c' && pType !== 'b2b' && pType !== 'internal') return false;
        if (f.type === 'tech_solution' && pType !== 'tech') return false;
        if (f.type === 'edu_product' && pType !== 'edu' && pType !== 'edtech') return false;
        if (f.type === 'project' && pType !== 'project') return false;
      }
      if (f.stage !== '') {
        var gate = parseInt(f.stage, 10);
        if ((p.gate || 0) !== gate) return false;
      }
      if (f.search) {
        var hay = ((p.name || '') + ' ' + (p.id || '') + ' ' + (p.desc || '') + ' ' + (p.owner || '')).toLowerCase();
        if (hay.indexOf(f.search) === -1) return false;
      }
      return true;
    });
  }

  // ── Render Summary (reacts to filters) ──
  function renderSummary(filtered) {
    if (!filtered) filtered = filterProducts();
    var active = filtered.filter(function(p) { return p.status !== 'transferring'; });
    var archived = filtered.filter(function(p) { return p.status === 'transferring'; });
    // Count by stage
    var stageCounts = {};
    active.forEach(function(p) {
      var g = p.gate || 0;
      stageCounts[g] = (stageCounts[g] || 0) + 1;
    });
    var stageHtml = '';
    for (var g = 0; g <= 5; g++) {
      if (stageCounts[g]) {
        var s = STAGES[g];
        var label = s ? s.name : 'Стадия ' + g;
        stageHtml += '<div class="cat-summary-item"><strong style="color:' + (s ? s.color : 'var(--text)') + '">' + stageCounts[g] + '</strong> ' + label + '</div>';
      }
    }
    elSummary.innerHTML =
      '<div class="cat-summary-item"><strong>' + active.length + '</strong> продуктов</div>' +
      stageHtml +
      (archived.length ? '<div class="cat-summary-item"><strong style="color:var(--muted)">' + archived.length + '</strong> в архиве</div>' : '');
  }

  // ── Render Grid ──
  function renderGrid() {
    var filtered = filterProducts();
    renderSummary(filtered);

    // Sort: at-risk first, blocked second, transferring last, then by gate desc
    filtered.sort(function(a, b) {
      var pri = function(s) { return s === 'at-risk' ? 0 : s === 'blocked' ? 1 : s === 'transferring' ? 9 : 2; };
      var d = pri(a.status) - pri(b.status);
      if (d !== 0) return d;
      return (b.gate || 0) - (a.gate || 0);
    });

    if (!filtered.length) {
      elGrid.innerHTML = '<div class="cat-empty">Нет продуктов по выбранным фильтрам</div>';
      return;
    }

    var qLabel = currentQuarterLabel();

    // Separate active and transferring
    var active = filtered.filter(function(p) { return p.status !== 'transferring'; });
    var transferring = filtered.filter(function(p) { return p.status === 'transferring'; });

    var html = '';
    active.forEach(function(p) {
      try { html += renderCard(p); }
      catch(err) { html += '<div style="padding:12px;color:var(--red,red);font-size:11px;border:1px solid red;border-radius:8px;">Ошибка: ' + esc(p.id || '?') + ' — ' + esc(err.message || err) + '</div>'; }
    });
    if (transferring.length) {
      html += '<div style="grid-column:1/-1;padding:12px 0;border-top:1px solid var(--border);margin-top:8px;">';
      html += '<div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;">Архив (' + transferring.length + ')</div>';
      html += '</div>';
      transferring.forEach(function(p) {
        try { html += renderCard(p); }
        catch(err) { html += '<div style="padding:12px;color:var(--red,red);font-size:11px;border:1px solid red;border-radius:8px;">Ошибка: ' + esc(p.id || '?') + ' — ' + esc(err.message || err) + '</div>'; }
      });
    }
    if (!html) html = '<div class="cat-empty">Грид пуст: active=' + active.length + ', transferring=' + transferring.length + ', filtered=' + filtered.length + '</div>';
    elGrid.innerHTML = html;
  }

  function healthClass(p) {
    if (p.status === 'transferring') return 'h-gray';
    if (p.status === 'blocked') return 'h-red';
    if (p.status === 'at-risk') return 'h-amber';
    return 'h-green';
  }

  function daysSinceUpdate(p) {
    if (!p.updated) return null;
    var diff = Date.now() - new Date(p.updated).getTime();
    return Math.floor(diff / 86400000);
  }

  function renderCard(p) {
      var gate = p.gate || 0;
      var stage = STAGES[gate] || STAGES[0];
      var sColor = stage ? stage.color : '#94A3B8';
      var sColorDim = stage ? stage.colorDim : 'rgba(148,163,184,.1)';
      var sOrbita = stage ? stage.orbita : 'O·?';
      var sName = stage ? stage.name : '?';
      var pName = '';
      try { pName = displayName(p); } catch(e) { pName = p.name || p.id || '?'; }

      var isT = p.status === 'transferring';
      var hCls = healthClass(p);
      var maxGate = 5;

      // ── Stage progress bar ──
      var orbitSteps = '';
      for (var gi = 0; gi <= maxGate; gi++) {
        var cls = gi < gate ? 'filled' : gi === gate ? 'current' : '';
        orbitSteps += '<div class="cat-orbit-step ' + cls + '" style="--stage-color:' + sColor + '"></div>';
      }

      // ── Status reason line ──
      var reasonHtml = '';
      if (p.statusText) {
        var rCls = p.status === 'blocked' ? 'reason reason-red' : 'reason';
        reasonHtml = '<div class="cat-status-line"><span class="' + rCls + '">' + esc(p.statusText) + '</span></div>';
      }

      // ── KPI chips + metrics ──
      var dataHtml = '';
      var chips = [];
      if (p.kpi && p.kpi.length) {
        for (var ki = 0; ki < p.kpi.length; ki++) {
          var k = p.kpi[ki];
          chips.push('<span class="cat-data-chip">' + esc(k.value) + ' <span class="chip-label">' + esc(k.label) + '</span></span>');
        }
      }
      var inits = getProductInitiatives(p.id);
      var initCount = inits.length;
      chips.push('<span class="cat-data-chip">' + initCount + ' <span class="chip-label">инициатив</span></span>');
      var days = daysSinceUpdate(p);
      if (days !== null) {
        var freshLabel = days === 0 ? 'сегодня' : days + ' дн. назад';
        chips.push('<span class="cat-data-chip">' + freshLabel + ' <span class="chip-label">обновлён</span></span>');
      }
      if (chips.length) dataHtml = '<div class="cat-data">' + chips.join('') + '</div>';

      // ── OKR block ──
      var okrHtml = '';
      var pGoals = getProductGoals(p.id);
      if (pGoals.length) {
        var okrItems = '';
        for (var oi = 0; oi < pGoals.length; oi++) {
          var g = pGoals[oi];
          var gp = calcGoalProgress(g);
          var prefix = oi < pGoals.length - 1 ? '├' : '└';
          okrItems += '<div class="cat-okr-row">' +
            '<span class="cat-okr-prefix">' + prefix + '</span>' +
            '<span class="cat-okr-name">' + esc(g.title || g.name || '—') + '</span>' +
            '<span class="cat-okr-bar"><span class="cat-okr-bar-fill" style="width:' + gp.pct + '%"></span></span>' +
            '<span class="cat-okr-pct">' + gp.pct + '%</span>' +
            '<span class="cat-okr-kr">(' + gp.done + '/' + gp.total + ' KR)</span>' +
          '</div>';
        }
        var halfLabel = 'OKR H' + (new Date().getMonth() < 6 ? '1' : '2') + ' ' + new Date().getFullYear();
        okrHtml = '<div class="cat-okr">' +
          '<div class="cat-okr-title">' + esc(halfLabel) + '</div>' +
          okrItems +
        '</div>';
      }

      // ── Initiatives ──
      var topInits = inits.slice(0, 3);
      var ql = currentQuarterLabel();
      var initHtml = '';
      if (topInits.length) {
        var initItems = '';
        for (var ii = 0; ii < topInits.length; ii++) {
          var it = topInits[ii];
          var score = riceScore(it);
          var cls = riceClass(score);
          initItems += '<div class="cat-init">' +
            '<span class="cat-init-id">' + esc(it.id) + '</span>' +
            '<span class="cat-init-name">' + esc(it.title || it.name || it.id) + '</span>' +
            (score > 0 ? '<span class="ci-rice ' + cls + '">RICE ' + score + '</span>' : '') +
          '</div>';
        }
        initHtml = '<div class="cat-initiatives">' +
          '<div class="cat-init-title">Инициативы ' + esc(ql) + ' (' + initCount + ')</div>' +
          initItems +
          (initCount > 3 ? '<div class="cat-no-init">+ ещё ' + (initCount - 3) + '</div>' : '') +
        '</div>';
      }

      // ── INITIATIVE PASSPORT (for screening/new) ──
      if (p.status === 'screening') {
        var nextStep = p.statusText || 'Следующий шаг не определён';
        var ownerTag = (p.owner && p.owner !== 'Вакансия' && p.owner.indexOf('наём') < 0)
          ? '<span style="font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;background:rgba(0,212,180,.12);color:#00D4B4">есть</span> ' + esc(p.owner)
          : '<span style="font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;background:rgba(255,184,48,.12);color:#FFB830">вакансия</span>';

        return '<div class="cat-card" data-pid="' + esc(p.id) + '" style="border-left:3px solid ' + sColor + '">' +
          '<a href="workspace.html?id=' + encodeURIComponent(p.id) + '" style="text-decoration:none;color:inherit;display:block;">' +

          // Header: type tag + name
          '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">' +
            '<span style="font-size:9px;font-weight:700;padding:3px 8px;border-radius:4px;background:' + sColorDim + ';color:' + sColor + ';letter-spacing:.03em;white-space:nowrap">' + esc(p.catLabel || 'Заявка') + '</span>' +
            '<span class="cat-name" style="font-size:15px">' + esc(pName) + '</span>' +
          '</div>' +

          // Status: next step
          '<div style="font-size:11px;color:#FFB830;margin-bottom:10px;display:flex;align-items:center;gap:6px">' +
            '<span style="width:6px;height:6px;border-radius:50%;background:#FFB830;flex-shrink:0"></span>' +
            esc(nextStep) +
          '</div>' +

          // Passport fields
          '<div style="display:flex;flex-direction:column;gap:6px;margin-bottom:10px">' +
            // UTP
            (p.utp && p.utp !== '--' ? '<div style="font-size:11px"><span style="font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em">УТП</span><div style="color:var(--gray2);margin-top:2px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">' + esc(p.utp) + '</div></div>' : '') +
            // Audience
            (p.audience && p.audience !== '--' ? '<div style="font-size:11px"><span style="font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em">Аудитория</span><div style="color:var(--gray2);margin-top:2px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">' + esc(p.audience) + '</div></div>' : '') +
            // Business model
            (p.businessModel && p.businessModel !== '--' ? '<div style="font-size:11px"><span style="font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em">Бизнес-модель</span><div style="color:var(--gray2);margin-top:2px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">' + esc(p.businessModel) + '</div></div>' : '') +
          '</div>' +

          // Owner
          '<div style="font-size:11px;margin-bottom:8px"><span style="font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em">Руководитель: </span>' + ownerTag + '</div>' +

          // Initiatives count
          (initCount > 0 ? '<div style="font-size:10px;color:var(--muted);border-top:1px solid var(--border);padding-top:6px">' + initCount + ' задач в очереди</div>' : '') +

          '</a></div>';
      }

      // ── PRODUCT CARD (launched) ──
      return '<div class="cat-card' + (isT ? ' is-transferring' : '') + '" data-pid="' + esc(p.id) + '">' +
        '<a href="workspace.html?id=' + encodeURIComponent(p.id) + '" style="text-decoration:none;color:inherit;display:block;">' +

        // Row 1: Name + health dot
        '<div class="cat-card-head">' +
          '<span class="cat-name">' + esc(pName) + '</span>' +
          '<span class="cat-health ' + hCls + '" title="' + esc(statusLabel(p.status)) + '"></span>' +
        '</div>' +

        // Row 2: Stage label + progress
        '<div class="cat-orbit-label">' +
          '<span class="cat-orbit-tag" style="background:' + sColorDim + ';color:' + sColor + '">' + esc(sName) + '</span>' +
          '<span class="cat-orbit-name">' + esc(p.owner || '') + '</span>' +
        '</div>' +
        '<div class="cat-orbit">' + orbitSteps + '</div>' +

        // Row 3: Status reason (if any)
        reasonHtml +

        // Row 4: Description
        '<div class="cat-desc">' + esc(p.desc) + '</div>' +

        // Row 5: KPI + metrics chips
        dataHtml +

        // Row 6: OKR
        okrHtml +

        // Row 7: Initiatives
        initHtml +

        '</a></div>';
  }

  // ── Render Changelog ──
  function renderChangelog() {
    var MAX_ENTRIES = 50;
    var entries = changelog.slice(0, MAX_ENTRIES);
    elCLCount.textContent = String(changelog.length);

    if (!entries.length) {
      elCLList.innerHTML = '<div style="padding:12px 0;font-size:12px;color:var(--muted)">Нет записей</div>';
      return;
    }

    elCLList.innerHTML = entries.map(function(e) {
      var badgeCls = logBadgeClass(e.action);
      var badgeLbl = logBadgeLabel(e.action);
      return '<div class="cl-entry">' +
        '<span class="cl-date">' + formatLogDate(e.timestamp) + '</span>' +
        '<span class="cl-badge ' + badgeCls + '">' + esc(badgeLbl) + '</span>' +
        '<span class="cl-text">' +
          '<span class="cl-product">' + esc(e.productId || '') + '</span> — ' +
          esc(e.action || '') +
          (e.details ? ': ' + esc(e.details) : '') +
          '<span class="cl-user">' + esc(e.userName || '') + '</span>' +
        '</span>' +
      '</div>';
    }).join('');
  }

  // ── Toggle changelog ──
  function toggleChangelog() {
    elCLList.classList.toggle('open');
    elCLArrow.classList.toggle('open');
  }

  document.getElementById('cl-toggle').addEventListener('click', toggleChangelog);

  // ── Filter events ──
  elCFDept.addEventListener('change', renderGrid);
  elCFType.addEventListener('change', renderGrid);
  elCFStage.addEventListener('change', renderGrid);
  elCFSearch.addEventListener('input', renderGrid);

  // ── Auto-select department for PM/PMO ──
  function autoSelectDepartment() {
    if (!window.OrbAuth) return;
    var user = OrbAuth.getCurrentUser();
    if (!user) return;
    var role = (user.role || '').toLowerCase();
    if ((role === 'pm' || role === 'pmo' || role === 'lead' || role === 'stakeholder') && user.department) {
      elCFDept.value = user.department;
    }
  }

  // ── Full render ──
  function render() {
    try {
      renderSummary();
      renderGrid();
      renderChangelog();
    } catch(err) {
      /* noop */
      if (elGrid) elGrid.innerHTML = '<div style="padding:24px;color:var(--red,red);font-size:13px;">Ошибка отрисовки: ' + esc(err.message || err) + '</div>';
    }
  }

  // ── Load data ──
  function init() {
    STAGES = window.STAGES_DB ? STAGES_DB.get() : [];
    backlog = (window.PT && PT.load) ? PT.load(PT.KEY_BACKLOG) || [] : [];
    goals = (window.PT && PT.load) ? PT.load('ECOTECH_GOALS') || [] : [];
    changelog = (window.PT && PT.load) ? PT.load(PT.KEY_CHANGELOG) || [] : [];

    if (window.PT && PT.ensureProducts) {
      PT.ensureProducts(function(p) {
        products = p || [];
        autoSelectDepartment();
        render();
      });
    } else {
      render();
    }

    // Live refresh from other tabs
    window.addEventListener('storage', function(e) {
      if (e.key === 'ECOTECH_PRODUCTS') {
        try { products = JSON.parse(e.newValue || '[]'); } catch(x) { products = []; }
        render();
      }
      if (e.key === 'ECOTECH_BACKLOG') {
        try { backlog = JSON.parse(e.newValue || '[]'); } catch(x) { backlog = []; }
        render();
      }
      if (e.key === 'ECOTECH_GOALS') {
        try { goals = JSON.parse(e.newValue || '[]'); } catch(x) { goals = []; }
        render();
      }
      if (e.key === 'ECOTECH_CHANGELOG') {
        try { changelog = JSON.parse(e.newValue || '[]'); } catch(x) { changelog = []; }
        renderChangelog();
      }
      if (e.key === 'ECOTECH_STAGES') {
        STAGES = window.STAGES_DB ? STAGES_DB.get() : [];
        renderGrid();
      }
    });
  }

  init();
})();
</script>

</body>
</html>
