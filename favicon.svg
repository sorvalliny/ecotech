<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <rect width="32" height="32" rx="6" fill="#03080F"/>
  <!-- Orbital ring -->
  <ellipse cx="16" cy="16" rx="11" ry="11" fill="none" stroke="#4FC3F7" stroke-width="1.5" opacity="0.5"/>
  <!-- Letter O -->
  <circle cx="16" cy="16" r="6.5" fill="none" stroke="#4FC3F7" stroke-width="2.5"/>
  <!-- Satellite dot -->
  <circle cx="26" cy="10" r="2.2" fill="#4FC3F7">
    <animateTransform attributeName="transform" type="rotate" from="0 16 16" to="360 16 16" dur="8s" repeatCount="indefinite"/>
  </circle>
</svg>
