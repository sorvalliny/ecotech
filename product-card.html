<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Карточка продукта — ОРБИТА</title>
<link rel="stylesheet" href="./design-system.css">
<style>
/* ── TOKENS ── */
:root {
  --bg:#03080F; --card:#040f1a; --card2:#061525; --border:rgba(255,255,255,0.07);
  --bhi:rgba(255,255,255,0.14); --muted:#7A7A9D;
  --violet:#4FC3F7; --vdim:rgba(79,195,247,0.14); --vborder:rgba(79,195,247,0.4);
  --teal:#00D4B4; --tdim:rgba(0,212,180,0.12);
  --amber:#FFB830; --adim:rgba(255,184,48,0.12);
  --green:#34D399; --gdim:rgba(52,211,153,0.12);
  --red:#EF4444; --rdim:rgba(239,68,68,0.12);
  --blue:#3B82F6; --bdim:rgba(59,130,246,0.12);
  --pink:#FF2D8A; --pdim:rgba(255,45,138,0.12);
  --r:12px; --font:'Inter',system-ui,sans-serif; --mono:var(--mono), 'SF Mono', 'Consolas', monospace,monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;font-size:14px;line-height:1.5;overflow-x:hidden}


/* ── PAGE WRAP ── */
.page-wrap{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:32px 24px 120px}

/* ── HEADER ── */
.pc-header{display:flex;align-items:flex-start;gap:16px;flex-wrap:wrap;margin-bottom:24px}
.pc-header-left{flex:1;min-width:0}
.pc-title{font-size:28px;font-weight:800;color:var(--text);line-height:1.2;margin-bottom:6px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.pc-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:4px}
.pc-team{font-size:12px;color:var(--muted);font-weight:600;margin-top:4px}
.pc-team span{color:var(--text)}
.pc-header-actions{display:flex;gap:8px;flex-shrink:0;align-items:center}

/* ── BADGES ── */
.orbit-badge{font-family:var(--mono);font-size:11px;font-weight:700;padding:3px 10px;border-radius:6px;white-space:nowrap}
.status-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:6px;white-space:nowrap}
.status-badge::before{content:'';display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:5px;vertical-align:middle}
.sb-active,.sb-on-track{color:var(--green);background:var(--gdim);border:1px solid rgba(52,211,153,.3)}
.sb-active::before,.sb-on-track::before{background:var(--green)}
.sb-at-risk,.sb-pending{color:var(--amber);background:var(--adim);border:1px solid rgba(255,184,48,.3)}
.sb-at-risk::before,.sb-pending::before{background:var(--amber)}
.sb-blocked{color:var(--red);background:var(--rdim);border:1px solid rgba(239,68,68,.3)}
.sb-blocked::before{background:var(--red)}
.sb-paused,.sb-archived{color:var(--muted);background:rgba(255,255,255,.04);border:1px solid var(--bhi)}
.sb-paused::before,.sb-archived::before{background:var(--muted)}
.sb-done{color:var(--violet);background:var(--vdim);border:1px solid var(--vborder)}
.sb-done::before{background:var(--violet)}

.approval-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:5px;white-space:nowrap}
.ab-approved{color:var(--green);background:var(--gdim);border:1px solid rgba(52,211,153,.3)}
.ab-pending{color:var(--amber);background:var(--adim);border:1px solid rgba(255,184,48,.3)}
.ab-rejected{color:var(--red);background:var(--rdim);border:1px solid rgba(239,68,68,.3)}

/* ── BUTTONS ── */
.btn-back{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;border:1px solid var(--bhi);background:rgba(255,255,255,.04);color:var(--muted);font-family:var(--font);font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;text-decoration:none}
.btn-back:hover{color:var(--violet);border-color:var(--violet);background:var(--vdim)}
.btn-share{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;border:1px solid rgba(0,212,180,.3);background:var(--tdim);color:var(--teal);font-family:var(--font);font-size:12px;font-weight:700;cursor:pointer;transition:all .15s}
.btn-share:hover{background:rgba(0,212,180,.18)}
.btn-action{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;border:1px solid var(--vborder);background:var(--vdim);color:var(--violet);font-family:var(--font);font-size:12px;font-weight:700;cursor:pointer;transition:all .15s}
.btn-action:hover{background:rgba(79,195,247,.22)}
.btn-save-sm{padding:6px 14px;border-radius:7px;border:none;background:var(--teal);color:#fff;font-family:var(--font);font-size:11px;font-weight:700;cursor:pointer;transition:all .15s}
.btn-save-sm:hover{background:#00b89a}
.btn-cancel-sm{padding:6px 14px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:var(--font);font-size:11px;font-weight:700;cursor:pointer;transition:all .15s}
.btn-cancel-sm:hover{color:var(--text);border-color:var(--bhi)}
.btn-danger{padding:6px 14px;border-radius:7px;border:1px solid rgba(239,68,68,.3);background:var(--rdim);color:var(--red);font-family:var(--font);font-size:11px;font-weight:700;cursor:pointer;transition:all .15s}
.btn-danger:hover{background:rgba(239,68,68,.2)}
.btn-approve{padding:6px 14px;border-radius:7px;border:1px solid rgba(52,211,153,.3);background:var(--gdim);color:var(--green);font-family:var(--font);font-size:11px;font-weight:700;cursor:pointer;transition:all .15s}
.btn-approve:hover{background:rgba(52,211,153,.2)}

/* ── TABS ── */
.pc-tabs{display:flex;gap:4px;margin-bottom:24px;border-bottom:1px solid var(--border);padding-bottom:0;flex-wrap:wrap}
.tab{padding:8px 18px;border:none;border-radius:8px 8px 0 0;font-family:var(--font);font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;color:var(--muted);background:transparent;letter-spacing:.02em;white-space:nowrap;border-bottom:2px solid transparent}
.tab.active{color:#fff;background:var(--violet);border-bottom-color:var(--violet)}
.tab:hover:not(.active){color:var(--text);background:rgba(255,255,255,.06)}
.tab-count{font-family:var(--mono);font-size:9px;margin-left:4px;background:rgba(255,255,255,.1);padding:1px 5px;border-radius:8px}

/* ── TAB PANELS ── */
.tab-panel{display:none}
.tab-panel.active{display:block}

/* ── GATE TIMELINE ── */
.gate-timeline{display:flex;align-items:center;gap:0;margin:24px 0;position:relative}
.gate-point{display:flex;flex-direction:column;align-items:center;gap:6px;flex:1;position:relative;z-index:2}
.gate-dot{width:32px;height:32px;border-radius:50%;border:2px solid rgba(255,255,255,.12);background:var(--card2);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:10px;font-weight:700;color:var(--muted);transition:all .2s}
.gate-dot.done{background:var(--green);border-color:var(--green);color:#fff}
.gate-dot.current{background:var(--teal);border-color:var(--teal);color:#fff;box-shadow:0 0 16px rgba(0,212,180,.4)}
.gate-label{font-size:9px;color:var(--muted);font-weight:600;text-align:center;white-space:nowrap}
.gate-dot.done+.gate-label,.gate-dot.current+.gate-label{color:var(--text)}
.gate-line{position:absolute;top:16px;left:0;right:0;height:2px;background:rgba(255,255,255,.07);z-index:1}
.gate-line-fill{position:absolute;top:16px;left:0;height:2px;background:var(--green);z-index:1;transition:width .3s}

/* ── OVERVIEW CARDS ── */
.ov-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
.ov-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:20px}
.ov-card-title{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.ov-card-value{font-size:14px;font-weight:600;color:var(--text);line-height:1.6}
.ov-card-value[contenteditable="true"]{outline:none;border:1px dashed rgba(79,195,247,.3);border-radius:6px;padding:4px 8px;min-height:40px;transition:border-color .15s}
.ov-card-value[contenteditable="true"]:focus{border-color:var(--vborder);background:rgba(79,195,247,.04)}
.ov-kpi-grid{display:flex;gap:16px;flex-wrap:wrap}
.ov-kpi{display:flex;flex-direction:column;gap:2px;min-width:80px}
.ov-kpi-val{font-family:var(--mono);font-size:20px;font-weight:700;color:var(--text)}
.ov-kpi-lbl{font-size:10px;color:var(--muted);font-weight:600}

/* ── APPROVAL STATUS ── */
.approval-summary{display:flex;gap:12px;flex-wrap:wrap}
.approval-item{display:flex;align-items:center;gap:6px}
.approval-dot{width:8px;height:8px;border-radius:50%}

/* ── FILTERS ── */
.filter-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.filter-sel{background:var(--card2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--font);font-size:12px;padding:7px 12px;outline:none;cursor:pointer;min-width:130px}
.filter-sel:focus{border-color:rgba(0,212,180,.4)}

/* ── INITIATIVE LIST ── */
.init-list{display:flex;flex-direction:column;gap:8px}
.init-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;transition:border-color .15s}
.init-card:hover{border-color:var(--bhi)}
.init-card.expanded{border-color:var(--vborder)}
.init-card-head{display:grid;grid-template-columns:52px 1fr 70px 60px 80px 80px;align-items:center;gap:12px;padding:14px 18px;cursor:pointer}
.init-id{font-family:var(--mono);font-size:10px;color:var(--muted);font-weight:700}
.init-name{font-size:13px;font-weight:700;color:var(--text)}
.init-sub{font-size:11px;color:var(--muted);margin-top:2px}
.init-seg{font-size:9px;font-weight:700;padding:2px 8px;border-radius:5px;white-space:nowrap}
.seg-business{color:var(--amber);background:var(--adim);border:1px solid rgba(255,184,48,.3)}
.seg-product{color:var(--teal);background:var(--tdim);border:1px solid rgba(0,212,180,.3)}
.seg-tech{color:var(--blue);background:var(--bdim);border:1px solid rgba(59,130,246,.3)}
.init-rice{font-family:var(--mono);font-size:14px;font-weight:700;text-align:right}
.init-status{font-size:10px;font-weight:700;padding:3px 8px;border-radius:5px;text-align:center;white-space:nowrap}
.is-wip{color:var(--amber);background:var(--adim)}
.is-planned{color:var(--blue);background:var(--bdim)}
.is-backlog{color:var(--muted);background:rgba(255,255,255,.04)}
.is-done{color:var(--green);background:var(--gdim)}

/* ── INITIATIVE INLINE EDIT ── */
.init-edit{display:none;padding:16px 18px;border-top:1px solid var(--border);background:rgba(0,0,0,.12)}
.init-card.expanded .init-edit{display:block}
.ie-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.ie-group{display:flex;flex-direction:column;gap:4px}
.ie-group.full{grid-column:1/-1}
.ie-lbl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.ie-input{background:var(--card2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--font);font-size:12px;padding:8px 10px;outline:none;width:100%}
.ie-input:focus{border-color:var(--vborder)}
.ie-textarea{background:var(--card2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--font);font-size:12px;padding:8px 10px;outline:none;width:100%;resize:vertical;min-height:60px}
.ie-textarea:focus{border-color:var(--vborder)}
.ie-select{background:var(--card2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--font);font-size:12px;padding:8px 10px;outline:none;width:100%;cursor:pointer}
.ie-select:focus{border-color:var(--vborder)}
.ie-rice-row{display:flex;align-items:center;gap:8px}
.ie-rice-lbl{font-family:var(--mono);font-size:12px;color:var(--muted);width:14px}
.ie-rice-slider{flex:1;accent-color:var(--violet)}
.ie-rice-val{font-family:var(--mono);font-size:12px;color:var(--text);width:24px;text-align:right}
.ie-score-preview{font-family:var(--mono);font-size:18px;font-weight:700;text-align:center;padding:8px;background:rgba(0,0,0,.2);border-radius:8px;border:1px solid var(--border);transition:color .2s}
.ie-score-preview.rice-hi{color:var(--green)}
.ie-score-preview.rice-mi{color:var(--amber)}
.ie-score-preview.rice-lo{color:var(--red)}
.ie-rice-legend{font-size:11px;color:var(--muted);line-height:1.6;margin-bottom:8px}
.init-collapse-bar{display:flex;gap:8px;margin-bottom:10px}
.init-collapse-btn{padding:4px 12px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:var(--font);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s}
.init-collapse-btn:hover{color:var(--text);border-color:var(--bhi)}
.btn-create-init-top{background:var(--vdim);color:var(--violet);border:1px dashed var(--vborder);border-radius:var(--r);padding:12px;text-align:center;cursor:pointer;font-weight:600;font-family:var(--font);font-size:14px;margin-bottom:16px;transition:all .15s;width:100%}
.btn-create-init-top:hover{background:rgba(79,195,247,.22)}
.ie-footer{display:flex;gap:8px;align-items:center;padding-top:12px;border-top:1px solid var(--border)}

/* ── INLINE FORM (create initiative/goal/event) ── */
.inline-form{background:var(--card);border:1px solid var(--vborder);border-radius:var(--r);padding:20px;margin-bottom:16px;display:none}
.inline-form.visible{display:block}
.if-title{font-size:14px;font-weight:800;color:var(--text);margin-bottom:14px}

/* ── GOALS ── */
.goal-period-group{margin-bottom:24px}
.goal-period-label{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;padding:12px 0 8px;display:flex;align-items:center;gap:10px}
.goal-period-label::after{content:'';flex:1;height:1px;background:var(--border)}
.goal-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:12px;transition:border-color .15s}
.goal-card:hover{border-color:var(--bhi)}
.goal-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:8px;display:flex;align-items:center;gap:8px;justify-content:space-between}
.goal-meta{display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.goal-tag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:5px}
.gt-product{color:var(--teal);background:var(--tdim)}
.gt-strategic{color:var(--amber);background:var(--adim)}
.gt-growth{color:var(--pink);background:var(--pdim)}
.kr-list{display:flex;flex-direction:column;gap:10px;margin-top:12px}
.kr-item{display:flex;flex-direction:column;gap:4px}
.kr-top{display:flex;align-items:center;gap:12px}
.kr-text{font-size:12px;color:var(--text);flex:1;font-weight:600}
.kr-progress{width:120px;height:6px;border-radius:3px;background:rgba(255,255,255,.07);overflow:hidden;flex-shrink:0}
.kr-progress-fill{height:100%;border-radius:3px;background:var(--teal);transition:width .3s}
.kr-pct{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--muted);width:40px;text-align:right;flex-shrink:0}
.kr-linked{font-size:10px;color:var(--muted);margin-top:4px;padding-left:4px}
.kr-linked-item{display:inline-flex;align-items:center;gap:3px;font-size:10px;padding:1px 6px;border-radius:4px;background:rgba(255,255,255,.04);border:1px solid var(--border);margin-right:4px;margin-top:2px}
.kr-influence{font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px}
.inf-high{color:var(--green);background:var(--gdim)}
.inf-medium{color:var(--amber);background:var(--adim)}
.inf-low{color:var(--muted);background:rgba(255,255,255,.04)}

/* ── GOAL CARD EXPAND ── */
.goal-card{cursor:pointer}
.goal-card-toggle{font-size:10px;font-weight:700;color:var(--violet);cursor:pointer;background:none;border:none;font-family:var(--font);padding:0;margin-top:8px;transition:color .15s}
.goal-card-toggle:hover{color:var(--text)}
.goal-expand{display:none;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.goal-expand.open{display:block}
.goal-expand-section{margin-bottom:12px}
.goal-expand-title{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px}
.ge-init-item{display:flex;align-items:center;gap:8px;padding:8px 10px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:6px;margin-bottom:4px;cursor:pointer;transition:border-color .15s;font-size:11px}
.ge-init-item:hover{border-color:var(--bhi)}
.ge-init-name{font-weight:700;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ge-init-rice{font-family:var(--mono);font-size:10px;font-weight:700;padding:1px 6px;border-radius:4px;flex-shrink:0}
.ge-init-inf{font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;text-transform:uppercase;flex-shrink:0}
.ge-influence-summary{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.ge-influence-chip{font-size:10px;font-weight:700;padding:2px 8px;border-radius:5px;display:flex;align-items:center;gap:4px}
.ge-influence-chip b{font-family:var(--mono)}
.ge-desc{font-size:11px;color:var(--muted);line-height:1.5}
.ge-empty{font-size:11px;color:var(--muted);font-style:italic}
.s-hi{color:var(--green)}.s-mi{color:var(--amber)}.s-lo{color:var(--red)}

/* ── CALENDAR / TIMELINE ── */
.cal-timeline-wrap{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:20px;overflow-x:auto;margin-bottom:16px}
.cal-timeline{position:relative;min-height:120px;padding-top:32px}
.cal-axis{position:absolute;top:32px;left:0;right:0;height:2px;background:rgba(255,255,255,.07)}
.cal-month{position:absolute;top:0;font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.cal-marker{position:absolute;top:22px;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:4px;cursor:default;z-index:2}
.cal-marker-dot{width:14px;height:14px;border-radius:50%;border:2px solid}
.cal-marker-dot.type-gate_review{background:rgba(79,195,247,.3);border-color:var(--violet)}
.cal-marker-dot.type-deadline{background:var(--adim);border-color:var(--amber)}
.cal-marker-dot.type-release{background:var(--gdim);border-color:var(--green)}
.cal-marker-dot.type-planning{background:var(--bdim);border-color:var(--blue)}
.cal-marker-label{font-size:9px;font-weight:600;color:var(--text);white-space:nowrap;max-width:90px;overflow:hidden;text-overflow:ellipsis}
.cal-marker-date{font-family:var(--mono);font-size:8px;color:var(--muted)}
.cal-legend{display:flex;gap:16px;margin-top:20px;flex-wrap:wrap}
.cal-legend-item{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--muted);font-weight:600}
.cal-legend-dot{width:8px;height:8px;border-radius:50%}
.cal-events-list{display:flex;flex-direction:column;gap:6px;margin-top:16px}
.cal-event-row{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:8px}
.cal-event-type{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.cal-event-title{font-size:12px;font-weight:700;color:var(--text);flex:1}
.cal-event-date{font-family:var(--mono);font-size:11px;color:var(--muted);flex-shrink:0}
.cal-event-actions{display:flex;gap:4px}

/* ── DOCUMENTS ── */
.doc-checklist{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:16px}
.doc-checklist-title{font-size:12px;font-weight:700;color:var(--text);margin-bottom:10px}
.doc-checklist-bar{height:8px;background:rgba(255,255,255,.07);border-radius:4px;overflow:hidden;margin-bottom:6px}
.doc-checklist-fill{height:100%;border-radius:4px;background:var(--green);transition:width .3s}
.doc-checklist-text{font-size:11px;color:var(--muted)}
.doc-list{display:flex;flex-direction:column;gap:6px}
.doc-row{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--card);border:1px solid var(--border);border-radius:8px;transition:border-color .15s}
.doc-row:hover{border-color:var(--bhi)}
.doc-gate{font-family:var(--mono);font-size:10px;color:var(--muted);font-weight:700;width:36px;flex-shrink:0}
.doc-status-icon{width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.doc-name{font-size:13px;font-weight:600;color:var(--text);flex:1}
.doc-url-input{background:var(--card2);border:1px solid var(--border);border-radius:6px;color:var(--violet);font-family:var(--font);font-size:11px;padding:5px 8px;outline:none;width:200px;flex-shrink:0}
.doc-url-input:focus{border-color:var(--vborder)}
.doc-url-link{font-size:11px;color:var(--violet);text-decoration:none;flex-shrink:0}
.doc-url-link:hover{text-decoration:underline}

/* ── CHANGELOG ── */
.log-list{display:flex;flex-direction:column;gap:4px}
.log-date-group{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;padding:12px 0 6px;display:flex;align-items:center;gap:10px}
.log-date-group::after{content:'';flex:1;height:1px;background:var(--border)}
.log-entry{display:flex;align-items:flex-start;gap:12px;padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:8px}
.log-time{font-family:var(--mono);font-size:10px;color:var(--muted);flex-shrink:0;padding-top:2px;width:50px}
.log-user{font-size:11px;font-weight:700;color:var(--violet);flex-shrink:0;width:100px}
.log-action{font-size:10px;font-weight:700;color:var(--amber);flex-shrink:0;width:140px;text-transform:uppercase;letter-spacing:.04em}
.log-details{font-size:12px;color:var(--text);flex:1;line-height:1.4}

/* ── NOT FOUND ── */
.not-found{text-align:center;padding:80px 20px}
.not-found h2{font-size:24px;font-weight:800;color:var(--text);margin-bottom:12px}
.not-found p{font-size:14px;color:var(--muted);margin-bottom:24px}

/* ── PLACEHOLDER ── */
.placeholder-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:40px;text-align:center;color:var(--muted)}
.placeholder-card h3{font-size:16px;font-weight:700;color:var(--text);margin-bottom:8px}

/* ── REVIEW PANEL ── */
.review-panel{border-top:1px solid var(--border);padding:14px 18px;background:rgba(0,0,0,.08)}
.review-panel-title{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.review-actions{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.review-btn{padding:7px 16px;border-radius:7px;font-family:var(--font);font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:5px}
.review-btn-go{border:1px solid rgba(52,211,153,.4);background:var(--gdim);color:var(--green)}
.review-btn-go:hover{background:rgba(52,211,153,.22)}
.review-btn-nogo{border:1px solid rgba(239,68,68,.4);background:var(--rdim);color:var(--red)}
.review-btn-nogo:hover{background:rgba(239,68,68,.22)}
.review-btn-revise{border:1px solid rgba(255,184,48,.4);background:var(--adim);color:var(--amber)}
.review-btn-revise:hover{background:rgba(255,184,48,.22)}
.review-comment-input{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--font);font-size:12px;padding:8px 10px;outline:none;resize:vertical;min-height:48px;margin-bottom:10px}
.review-comment-input:focus{border-color:var(--vborder)}
.review-history{margin-top:14px;display:flex;flex-direction:column;gap:6px}
.review-history-title{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.review-entry{display:flex;align-items:flex-start;gap:10px;padding:8px 12px;background:var(--card2);border:1px solid var(--border);border-radius:8px}
.review-entry-date{font-family:var(--mono);font-size:10px;color:var(--muted);flex-shrink:0;width:80px;padding-top:1px}
.review-entry-user{font-size:11px;font-weight:700;color:var(--violet);flex-shrink:0;width:100px}
.review-entry-action{font-size:10px;font-weight:700;padding:2px 8px;border-radius:5px;white-space:nowrap;flex-shrink:0}
.ra-go{color:var(--green);background:var(--gdim);border:1px solid rgba(52,211,153,.3)}
.ra-no-go{color:var(--red);background:var(--rdim);border:1px solid rgba(239,68,68,.3)}
.ra-revise{color:var(--amber);background:var(--adim);border:1px solid rgba(255,184,48,.3)}
.review-entry-comment{font-size:12px;color:var(--text);flex:1;line-height:1.4}

/* ── TOAST ── */
.pc-toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--teal);color:#fff;padding:10px 20px;border-radius:50px;font-size:12px;font-weight:600;z-index:9999;transition:transform .3s cubic-bezier(.22,1,.36,1);pointer-events:none}
.pc-toast.show{transform:translateX(-50%) translateY(0)}

/* ── BREADCRUMB ── */
.pc-breadcrumb{display:flex;align-items:center;gap:6px;margin-bottom:16px;font-size:11px;font-weight:600}
.pc-breadcrumb a{color:var(--muted);text-decoration:none;transition:color .15s}
.pc-breadcrumb a:hover{color:var(--violet)}
.pc-breadcrumb .bc-sep{color:rgba(255,255,255,.15)}
.pc-breadcrumb .bc-current{color:var(--text)}

/* ── PRODUCT PASSPORT GRID ── */
.passport-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
.passport-grid .ov-card{display:flex;flex-direction:column}
.passport-field{display:flex;flex-direction:column;gap:2px;margin-bottom:10px}
.passport-field:last-child{margin-bottom:0}
.passport-field-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.passport-field-value{font-size:13px;font-weight:600;color:var(--text);line-height:1.5}
.passport-field-value.editable{cursor:text;border:1px dashed rgba(79,195,247,.2);border-radius:6px;padding:4px 8px;min-height:28px;outline:none;transition:border-color .15s}
.passport-field-value.editable:focus{border-color:var(--vborder);background:rgba(79,195,247,.04)}
.passport-field-value.placeholder{color:var(--muted);font-style:italic;font-weight:400}
.team-member{display:flex;flex-direction:column;gap:1px;padding:8px 10px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:8px;margin-bottom:6px}
.team-member-role{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.team-member-name{font-size:13px;font-weight:700;color:var(--text)}
.team-member-scope{font-size:11px;color:var(--muted)}
.doc-links-list{display:flex;flex-direction:column;gap:6px}
.doc-link-item{display:flex;align-items:center;gap:8px;padding:8px 12px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:8px;text-decoration:none;transition:border-color .15s}
.doc-link-item:hover{border-color:var(--vborder)}
.doc-link-icon{font-size:14px;flex-shrink:0}
.doc-link-text{font-size:12px;font-weight:600;color:var(--violet)}
.doc-link-sub{font-size:10px;color:var(--muted)}
.nsm-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;display:flex;align-items:center;gap:16px;margin-bottom:10px}
.nsm-value{font-family:var(--mono);font-size:24px;font-weight:800;color:var(--teal)}
.nsm-label{font-size:11px;color:var(--muted);font-weight:600}
.nsm-name{font-size:13px;font-weight:700;color:var(--text)}

/* ── INITIATIVE GROUP BY TYPE ── */
.init-type-group{margin-bottom:20px}
.init-type-header{display:flex;align-items:center;gap:10px;padding:10px 0 8px;cursor:pointer;user-select:none}
.init-type-header:hover .init-type-label{color:var(--text)}
.init-type-icon{font-size:12px;color:var(--muted);transition:transform .2s;width:16px}
.init-type-header.collapsed .init-type-icon{transform:rotate(-90deg)}
.init-type-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;transition:color .15s}
.init-type-count{font-family:var(--mono);font-size:9px;background:rgba(255,255,255,.08);padding:1px 6px;border-radius:8px;color:var(--muted)}
.init-type-header::after{content:'';flex:1;height:1px;background:var(--border)}
.init-type-body{overflow:hidden;transition:max-height .3s ease}
.init-type-header.collapsed+.init-type-body{max-height:0 !important;overflow:hidden}

/* ── RICE VIEW TOGGLE ── */
.rice-view-bar{display:flex;align-items:center;gap:6px;margin-top:4px}
.rice-view-fill{height:6px;border-radius:3px;background:var(--teal);transition:width .3s}
.rice-view-track{flex:1;height:6px;border-radius:3px;background:rgba(255,255,255,.07)}

/* ── VIEW TOGGLE BTN ── */
.view-toggle{display:inline-flex;gap:0;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.view-toggle-btn{padding:6px 14px;font-family:var(--font);font-size:11px;font-weight:700;border:none;cursor:pointer;background:transparent;color:var(--muted);transition:all .15s}
.view-toggle-btn.active{background:var(--vdim);color:var(--violet)}
.view-toggle-btn:hover:not(.active){color:var(--text);background:rgba(255,255,255,.04)}

/* ── CREATE DROPDOWN ── */
.create-dropdown-wrap{position:relative;display:inline-block}
.create-dropdown{position:absolute;top:100%;right:0;margin-top:4px;background:var(--card2);border:1px solid var(--bhi);border-radius:8px;min-width:180px;z-index:100;display:none;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,.4)}
.create-dropdown.open{display:block}
.create-dropdown-item{display:flex;align-items:center;gap:8px;padding:10px 14px;font-size:12px;font-weight:600;color:var(--text);cursor:pointer;transition:background .12s;border:none;background:none;width:100%;font-family:var(--font);text-align:left}
.create-dropdown-item:hover{background:var(--vdim);color:var(--violet)}
.create-dropdown-item .cdi-icon{font-size:14px}

/* ── Q-PLAN TABLE ── */
.qplan-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:12px}
.qplan-col{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px;min-height:80px}
.qplan-col-title{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;text-align:center}
.qplan-item{font-size:11px;padding:6px 8px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:6px;margin-bottom:4px;color:var(--text);font-weight:600}

/* ── PLANNING PROCESS ── */
.plan-steps{display:flex;flex-direction:column;gap:6px;margin-top:12px}
.plan-step{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:8px}
.plan-step-num{font-family:var(--mono);font-size:18px;font-weight:800;color:var(--violet);flex-shrink:0;width:28px;text-align:center}
.plan-step-text{font-size:12px;color:var(--text);font-weight:600;line-height:1.4}

/* ── RESPONSIVE ── */
@media(max-width:900px){
  .ov-grid{grid-template-columns:1fr}
  .passport-grid{grid-template-columns:1fr}
  .qplan-grid{grid-template-columns:1fr 1fr}
  .init-card-head{grid-template-columns:1fr;gap:6px}
  .init-rice,.init-status{justify-self:start}
  .pc-header{flex-direction:column}
  .ie-grid{grid-template-columns:1fr}
}
@media(max-width:560px){
  .page-wrap{padding:20px 16px 80px}
  .pc-title{font-size:22px}
  .gate-label{font-size:8px}
}

/* ═══════════════════════════════════════════════════════════
   LIGHT THEME OVERRIDES  (lean — uses theme-vars.css tokens)
   ═══════════════════════════════════════════════════════════ */
[data-theme="light"] .btn-back { background:var(--violet-dimmer); color:var(--muted); }
[data-theme="light"] .btn-back:hover { color:var(--violet); border-color:var(--violet-border); background:var(--violet-dim); }
[data-theme="light"] .tab.active { color:#fff !important; }
[data-theme="light"] .tab:hover:not(.active) { color:var(--text); background:var(--violet-dimmer); }
[data-theme="light"] .tab-count { background:var(--violet-dim); color:var(--muted); }
[data-theme="light"] .ov-card-value[contenteditable="true"] { border-color:var(--violet-border); }
[data-theme="light"] .ov-card-value[contenteditable="true"]:focus { border-color:var(--violet); background:var(--violet-dimmer); }
[data-theme="light"] .ie-input,
[data-theme="light"] .ie-textarea,
[data-theme="light"] .ie-select { background:var(--card) !important; color:var(--text) !important; border-color:var(--violet-border) !important; }
[data-theme="light"] .init-edit { background:var(--violet-dimmer); }
[data-theme="light"] .ie-score-preview { background:var(--violet-dimmer); }
[data-theme="light"] .inline-form { border-color:var(--violet-border); }
[data-theme="light"] .kr-linked-item { background:var(--violet-dimmer); }
[data-theme="light"] .doc-url-input { background:var(--card); border-color:var(--violet-border); color:var(--violet); }
[data-theme="light"] .btn-save-sm { color:#fff !important; }
[data-theme="light"] .review-comment-input { background:var(--card); color:var(--text); border-color:var(--violet-border); }
[data-theme="light"] .passport-field-value.editable { border-color:var(--violet-border); }
[data-theme="light"] .passport-field-value.editable:focus { border-color:var(--violet); background:var(--violet-dimmer); }
[data-theme="light"] .team-member { background:var(--violet-dimmer); }
[data-theme="light"] .doc-link-item { background:var(--violet-dimmer); }
[data-theme="light"] .doc-link-item:hover { border-color:var(--violet); }
[data-theme="light"] .qplan-item { background:var(--violet-dimmer); }
[data-theme="light"] .plan-step { background:var(--card); }
[data-theme="light"] .create-dropdown { background:var(--card); border-color:var(--violet-border); }
[data-theme="light"] .create-dropdown-item:hover { background:var(--violet-dimmer); }
</style>
</head>
<body>

<div class="page-wrap" id="main-content">
  <div id="pc-app"></div>
</div>

<div class="pc-toast" id="pc-toast">Ссылка скопирована</div>

<!-- Modal: Assign Member -->
<div id="modal-assign-member" style="position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:10000;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px)">
  <div style="background:var(--card,#040f1a);border:1px solid rgba(79,195,247,.4);border-radius:16px;padding:24px;width:90%;max-width:480px">
    <div style="font-size:13px;font-weight:900;color:var(--text);margin-bottom:16px">\u041D\u0430\u0437\u043D\u0430\u0447\u0438\u0442\u044C \u0443\u0447\u0430\u0441\u0442\u043D\u0438\u043A\u0430</div>
    <div style="display:flex;flex-direction:column;gap:12px">
      <div>
        <label style="font-size:11px;font-weight:600;color:var(--muted,#7A7A9D);display:block;margin-bottom:4px">\u041F\u043E\u043B\u044C\u0437\u043E\u0432\u0430\u0442\u0435\u043B\u044C</label>
        <select id="member-user-select" style="background:var(--card2,#061525);border:1px solid rgba(255,255,255,.07);border-radius:8px;color:var(--text);font-family:var(--font);font-size:12px;padding:8px 10px;outline:none;width:100%"></select>
      </div>
      <div>
        <label style="font-size:11px;font-weight:600;color:var(--muted,#7A7A9D);display:block;margin-bottom:4px">\u041E\u0431\u043B\u0430\u0441\u0442\u044C \u0434\u043E\u0441\u0442\u0443\u043F\u0430</label>
        <select id="member-scope-select" style="background:var(--card2,#061525);border:1px solid rgba(255,255,255,.07);border-radius:8px;color:var(--text);font-family:var(--font);font-size:12px;padding:8px 10px;outline:none;width:100%">
          <option value="all">\u0412\u0435\u0441\u044C \u043F\u0440\u043E\u0434\u0443\u043A\u0442</option>
        </select>
      </div>
    </div>
    <div style="display:flex;gap:8px;margin-top:16px">
      <button id="btn-confirm-member" style="padding:8px 16px;border-radius:8px;border:none;background:var(--teal,#00D4B4);color:#fff;font-family:var(--font);font-size:12px;font-weight:700;cursor:pointer">\u041D\u0430\u0437\u043D\u0430\u0447\u0438\u0442\u044C</button>
      <button id="btn-cancel-member" style="padding:8px 16px;border-radius:8px;border:1px solid rgba(255,255,255,.14);background:transparent;color:var(--muted,#7A7A9D);font-family:var(--font);font-size:12px;font-weight:700;cursor:pointer">\u041E\u0442\u043C\u0435\u043D\u0430</button>
    </div>
  </div>
</div>

<script src="./platform.js"></script>
<script src="./js/auth.js"></script>
<script>
(function() {
  'use strict';

  // ── Helpers ──
  var GATE_NAMES = ['O\xB70 Заявка','O\xB71 Разведка','O\xB72 Прототип','O\xB73 Разгон','O\xB74 Экосистема','O\xB75 Плато'];
  var TECH_GATE_NAMES = ['T\xB70 Заявка','T\xB71 Проектирование','T\xB72 Реализация','T\xB73 Приёмка'];
  function isTechSolution() { return _product && _product.type === 'tech_solution'; }
  function getActiveGateNames() { return isTechSolution() ? TECH_GATE_NAMES : GATE_NAMES; }
  var STATUS_LABELS = {'on-track':'Активен','at-risk':'Риск','blocked':'Заблокирован','paused':'Paused','done':'Done','active':'Активен','pending':'Ожидает','archived':'Archived','draft':'Draft','wip':'В работе','planned':'Запланировано','backlog':'Бэклог','screening':'На скрининге'};
  var STATUS_CLS = {'on-track':'sb-on-track','at-risk':'sb-at-risk','blocked':'sb-blocked','paused':'sb-paused','done':'sb-done','active':'sb-active','pending':'sb-pending','archived':'sb-archived','draft':'sb-paused','screening':'sb-pending'};
  var SEGMENT_LABELS = {'business':'Бизнес','product':'Продукт','tech':'Техника'};
  var SEGMENT_CLS = {'business':'seg-business','product':'seg-product','tech':'seg-tech'};
  var INIT_STATUS_CLS = {'wip':'is-wip','planned':'is-planned','backlog':'is-backlog','done':'is-done'};
  var GOAL_TYPE_LABELS = {'product':'Продуктовая','strategic':'Стратегическая','growth':'Рост'};
  var GOAL_TYPE_CLS = {'product':'gt-product','strategic':'gt-strategic','growth':'gt-growth'};
  var APPROVAL_LABELS = {'approved':'Согласовано','pending':'На согласовании','rejected':'Отклонено'};
  var APPROVAL_CLS = {'approved':'ab-approved','pending':'ab-pending','rejected':'ab-rejected'};
  var EVENT_TYPE_LABELS = {'gate_review':'Gate Review','deadline':'Дедлайн','release':'Релиз','planning':'Планирование'};
  var EVENT_TYPE_COLORS = {'gate_review':'var(--violet)','deadline':'var(--amber)','release':'var(--green)','planning':'var(--blue)'};
  var DOC_STATUS_ICONS = {'done':'\u2705','wip':'\u23F3','none':'\u274C'};
  var DOC_STATUS_LABELS = {'done':'Готов','wip':'В работе','none':'Отсутствует'};

  var DEFAULT_ARTIFACTS = [
    {gate:0, name:'Product Brief', url:'', status:'none'},
    {gate:1, name:'CustDev Report', url:'', status:'none'},
    {gate:1, name:'PSF (Problem-Solution Fit)', url:'', status:'none'},
    {gate:2, name:'MVP Spec', url:'', status:'none'},
    {gate:2, name:'Unit Economics v1', url:'', status:'none'},
    {gate:3, name:'Growth Plan', url:'', status:'none'},
    {gate:3, name:'P&L Model', url:'', status:'none'},
    {gate:4, name:'Ecosystem Integration Plan', url:'', status:'none'},
    {gate:5, name:'Maturity Assessment', url:'', status:'none'}
  ];

  // State
  var _product = null;
  var _backlog = [];
  var _goals = [];
  var _allProducts = [];
  var _expandedInit = null;
  var _activeTab = getParam('tab') || 'overview';

  function esc(t) { return String(t || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  function getParam(name) {
    var url = window.location.search;
    var regex = new RegExp('[?&]' + name + '=([^&#]*)');
    var results = regex.exec(url);
    return results ? decodeURIComponent(results[1]) : null;
  }

  function isGuest() {
    if (!window.OrbAuth) return true;
    var user = OrbAuth.getCurrentUser();
    if (!user) return true;
    return user.role === 'guest';
  }

  function getRole() {
    if (!window.OrbAuth) return 'guest';
    var user = OrbAuth.getCurrentUser();
    return user ? user.role : 'guest';
  }

  function canEdit() {
    if (!window.OrbAuth) return false;
    return OrbAuth.canEditProduct(productId);
  }

  function canApprove() {
    var r = getRole();
    return r === 'admin' || r === 'pmo_lead' || r === 'pmo';
  }

  function canDelete() {
    var r = getRole();
    return r === 'admin' || r === 'pmo_lead';
  }

  function isPM() {
    var r = getRole();
    return r === 'pm' || r === 'pmo' || r === 'pmo_lead' || r === 'admin';
  }

  function isLead() {
    return getRole() === 'lead';
  }

  function canReview() {
    var user = window.OrbAuth ? OrbAuth.getCurrentUser() : null;
    if (!user) return false;
    var r = user.role;
    return r === 'admin' || r === 'pmo_lead' || r === 'pmo' || r === 'lead';
  }

  function displayName(product) {
    if (isGuest()) return product.id;
    return product.name || product.id;
  }

  function riceScore(item) {
    if (!item.e || item.e === 0) return 0;
    return Math.round((item.r * item.i * item.c) / item.e);
  }

  function orbitColor(gate) {
    var colors = ['var(--muted)','var(--blue)','var(--amber)','var(--teal)','var(--green)','var(--violet)'];
    return colors[gate] || colors[0];
  }

  function genId(prefix) {
    return prefix + '-' + Date.now().toString(36) + Math.random().toString(36).substr(2,4);
  }

  function showToast(msg) {
    var t = document.getElementById('pc-toast');
    if (!t) return;
    t.textContent = msg || 'Готово';
    t.classList.add('show');
    setTimeout(function() { t.classList.remove('show'); }, 2200);
  }

  function formatDate(d) {
    if (!d) return '--';
    var parts = d.split('T');
    return parts[0];
  }

  function formatTime(d) {
    if (!d) return '';
    var parts = d.split('T');
    if (parts.length < 2) return '';
    return parts[1].substr(0, 5);
  }

  function saveProducts() {
    PT.save(PT.KEY_PRODUCTS, _allProducts);
  }

  function saveBacklog() {
    PT.save(PT.KEY_BACKLOG, _backlog);
  }

  function saveGoals() {
    PT.save(PT.KEY_GOALS, _goals);
  }

  function addLog(action, details, entityType, entityId) {
    PT.addLog(productId, action, details, entityType, entityId);
  }

  function getProductInitiatives() {
    var result = [];
    for (var i = 0; i < _backlog.length; i++) {
      if (_backlog[i].productId === productId || _backlog[i].project === productId) {
        result.push(_backlog[i]);
      }
    }
    return result;
  }

  function getProductGoals() {
    var result = [];
    for (var i = 0; i < _goals.length; i++) {
      if (_goals[i].productId === productId) {
        result.push(_goals[i]);
      }
    }
    return result;
  }

  function getProductLogs() {
    var all = PT.load(PT.KEY_CHANGELOG) || [];
    var result = [];
    for (var i = 0; i < all.length; i++) {
      if (all[i].productId === productId) {
        result.push(all[i]);
      }
    }
    return result;
  }

  // ── Product ID from URL ──
  var productId = getParam('id');
  var app = document.getElementById('pc-app');

  if (!productId) {
    app.innerHTML = renderNotFound();
    return;
  }

  // ── Load data ──
  PT.ensureProducts(function(products) {
    _allProducts = products;
    _product = null;
    for (var i = 0; i < products.length; i++) {
      if (products[i].id === productId) { _product = products[i]; break; }
    }

    if (!_product) {
      app.innerHTML = renderNotFound();
      return;
    }

    document.title = displayName(_product) + ' \u2014 \u041E\u0420\u0411\u0418\u0422\u0410';

    _backlog = PT.load(PT.KEY_BACKLOG) || [];
    _goals = PT.load(PT.KEY_GOALS) || [];

    // Ensure product has events and artifacts arrays
    if (!_product.events) _product.events = [];
    if (!_product.artifacts) _product.artifacts = copyDefaults();

    renderApp();
  });

  function copyDefaults() {
    var result = [];
    for (var i = 0; i < DEFAULT_ARTIFACTS.length; i++) {
      var a = DEFAULT_ARTIFACTS[i];
      result.push({gate: a.gate, name: a.name, url: '', status: 'none'});
    }
    return result;
  }

      var _pmParts = [];

    html += '</div>';

    html += '<div class="pc-header-actions">';

    // ── TABS ──
    html += '<div class="pc-tabs" id="pc-tabs">';

    app.innerHTML = html;

      initCalendar(editable);
      initDocs(editable);
    }
    initGoals(goals, initiatives, editable);
    initOverviewEditable(editable);
    initAssignMember();
  }

      html += '<div class="team-member-name passport-field-value editable" contenteditable="true" data-field="stakeholders" id="ov-stakeholders">' + esc(_product.stakeholders || '\u0423\u043A\u0430\u0436\u0438\u0442\u0435 \u0441\u0442\u0435\u0439\u043A\u0445\u043E\u043B\u0434\u0435\u0440\u043E\u0432') + '</div>';

      html += '<div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap">';

    html += '</div>'; // end passport-grid

    // ═══ METRICS CARD ═══
    html += '<div class="ov-card" style="margin-bottom:24px">';
    html += '<div class="ov-card-title">\u041C\u0435\u0442\u0440\u0438\u043A\u0438</div>';

    // North Star Metric
    html += '<div class="nsm-card">';
    html += '<div>';
    html += '<div class="nsm-label">North Star Metric</div>';
    if (isEdit) {
      html += '<div class="nsm-name passport-field-value editable" contenteditable="true" data-field="northStar" id="ov-northStar" style="font-size:14px;font-weight:700;color:var(--teal)">' + esc(_product.northStar || '\u0423\u043A\u0430\u0436\u0438\u0442\u0435 NSM') + '</div>';

      html += '<div class="nsm-name" style="color:var(--teal)">' + esc(_product.northStar || '--') + '</div>';
    }
    html += '</div>';
    if (_product.northStarValue) {
      html += '<div class="nsm-value">' + esc(_product.northStarValue) + '</div>';
    }
    html += '</div>';

    // KPI grid
    if (_product.kpi && _product.kpi.length) {
      html += '<div style="margin-top:12px;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">KPI</div>';
      html += '<div class="ov-kpi-grid">';
      for (var k = 0; k < _product.kpi.length; k++) {
        var kpi = _product.kpi[k];
        html += '<div class="ov-kpi">';
        html += '<div class="ov-kpi-val">' + esc(kpi.value) + '</div>';
        html += '<div class="ov-kpi-lbl">' + esc(kpi.label) + '</div>';
        html += '</div>';
      }
      html += '</div>';
    } else if (isEdit) {
      html += '<div style="margin-top:8px;font-size:11px;color:var(--muted);font-style:italic">KPI \u043D\u0435 \u0443\u043A\u0430\u0437\u0430\u043D\u044B. \u0414\u043E\u0431\u0430\u0432\u044C\u0442\u0435 \u0432 \u043D\u0430\u0441\u0442\u0440\u043E\u0439\u043A\u0430\u0445 \u043F\u0440\u043E\u0434\u0443\u043A\u0442\u0430.</div>';
    }

    // Goals connection
    var goalsApproved = 0, goalsPending = 0;
    for (var gi = 0; gi < goals.length; gi++) {
      if (goals[gi].approvalStatus === 'approved') goalsApproved++;
      else goalsPending++;
    }
    if (goals.length) {
      html += '<div style="margin-top:14px;padding-top:12px;border-top:1px solid var(--border)">';
      html += '<div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px">\u0421\u0432\u044F\u0437\u044C \u0441 \u0446\u0435\u043B\u044F\u043C\u0438</div>';
      html += '<div style="font-size:12px;color:var(--text)">' + goals.length + ' \u0446\u0435\u043B\u0435\u0439 (' + goalsApproved + ' \u0443\u0442\u0432\u0435\u0440\u0436\u0434\u0435\u043D\u043E, ' + goalsPending + ' \u043D\u0430 \u0441\u043E\u0433\u043B\u0430\u0441\u043E\u0432\u0430\u043D\u0438\u0438)</div>';
      html += '</div>';
    }

    html += '</div>'; // end metrics card

    // ═══ BOTTOM ROW: Documentation Links + Status ═══
    html += '<div class="ov-grid">';

    // Documentation links
    html += '<div class="ov-card">';
    html += '<div class="ov-card-title">\u0414\u043E\u043A\u0443\u043C\u0435\u043D\u0442\u0430\u0446\u0438\u044F</div>';
    html += '<div class="doc-links-list">';
    html += '<a class="doc-link-item" href="./brief.html?product=' + esc(_product.id) + '">';
    html += '<span class="doc-link-icon">\u{1F4DD}</span>';
    html += '<div><div class="doc-link-text">\u0411\u0440\u0438\u0444 \u043F\u0440\u043E\u0434\u0443\u043A\u0442\u0430</div><div class="doc-link-sub">Product Brief</div></div>';
    html += '</a>';
    html += '<a class="doc-link-item" href="./gate-checklist.html?product=' + esc(_product.id) + '">';
    html += '<span class="doc-link-icon">\u2705</span>';
    html += '<div><div class="doc-link-text">Gate-\u0447\u0435\u043A\u043B\u0438\u0441\u0442</div><div class="doc-link-sub">\u0413\u043E\u0442\u043E\u0432\u043D\u043E\u0441\u0442\u044C \u043A \u041E\xB7' + gateNum + '</div></div>';
    html += '</a>';
    if (_product.trackerUrl) {
      html += '<a class="doc-link-item" href="' + esc(_product.trackerUrl) + '" target="_blank">';
      html += '<span class="doc-link-icon">\u{1F517}</span>';
      html += '<div><div class="doc-link-text">\u0422\u0440\u0435\u043A\u0435\u0440</div><div class="doc-link-sub">YouTrack / Shiva</div></div>';
      html += '</a>';
    } else if (isEdit) {
      html += '<div class="passport-field" style="margin-top:8px">';
      html += '<div class="passport-field-label">\u0421\u0441\u044B\u043B\u043A\u0430 \u043D\u0430 \u0442\u0440\u0435\u043A\u0435\u0440</div>';
      html += '<div class="passport-field-value editable" contenteditable="true" data-field="trackerUrl" id="ov-trackerUrl" style="font-size:11px;color:var(--violet)">' + esc(_product.trackerUrl || '\u0414\u043E\u0431\u0430\u0432\u044C\u0442\u0435 URL') + '</div>';
      html += '</div>';
    }
    html += '</div>';
    html += '</div>';

    // Status / Planning summary
    html += '<div class="ov-card">';
    html += '<div class="ov-card-title">\u0421\u0442\u0430\u0442\u0443\u0441 \u0438 \u043F\u043B\u0430\u043D\u0438\u0440\u043E\u0432\u0430\u043D\u0438\u0435</div>';

    var approved = 0, pending = 0, rejected = 0;
    for (var ai = 0; ai < initiatives.length; ai++) {
      var appr = initiatives[ai].approval || 'pending';
      if (appr === 'approved') approved++;
      else if (appr === 'rejected') rejected++;
      else pending++;
    }

    html += '<div class="ov-kpi-grid" style="margin-bottom:14px">';
    html += '<div class="ov-kpi"><div class="ov-kpi-val" style="color:var(--amber)">' + initiatives.length + '</div><div class="ov-kpi-lbl">\u0418\u043D\u0438\u0446\u0438\u0430\u0442\u0438\u0432</div></div>';
    var wip = 0, done = 0;
    for (var si = 0; si < initiatives.length; si++) {
      if (initiatives[si].status === 'wip') wip++;
      if (initiatives[si].status === 'done') done++;
    }
    html += '<div class="ov-kpi"><div class="ov-kpi-val" style="color:var(--teal)">' + wip + '</div><div class="ov-kpi-lbl">\u0412 \u0440\u0430\u0431\u043E\u0442\u0435</div></div>';
    html += '<div class="ov-kpi"><div class="ov-kpi-val" style="color:var(--green)">' + done + '</div><div class="ov-kpi-lbl">\u0413\u043E\u0442\u043E\u0432\u043E</div></div>';
    html += '</div>';

    // Approval summary
    html += '<div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px">\u0421\u043E\u0433\u043B\u0430\u0441\u043E\u0432\u0430\u043D\u0438\u0435</div>';
    html += '<div class="approval-summary" style="margin-bottom:10px">';
    html += '<div class="approval-item"><div class="approval-dot" style="background:var(--green)"></div><span style="font-size:11px;color:var(--text);font-weight:600">' + approved + ' approved</span></div>';
    html += '<div class="approval-item"><div class="approval-dot" style="background:var(--amber)"></div><span style="font-size:11px;color:var(--text);font-weight:600">' + pending + ' pending</span></div>';
    if (rejected > 0) {
      html += '<div class="approval-item"><div class="approval-dot" style="background:var(--red)"></div><span style="font-size:11px;color:var(--text);font-weight:600">' + rejected + ' rejected</span></div>';
    }
    html += '</div>';

    if (_product.quarter) {
      html += '<div style="font-size:12px;color:var(--muted);font-weight:600">\u0417\u0430\u043F\u043B\u0430\u043D\u0438\u0440\u043E\u0432\u0430\u043D \u043D\u0430: <span style="color:var(--violet)">' + esc(_product.quarter) + '</span></div>';
    }
    html += '</div>';
    html += '</div>';

    return html;
  }

  // ── Gate Timeline ──
  function renderGateTimeline(currentGate) {
    var html = '';
    var _isTech = isTechSolution();
    var _names = _isTech ? TECH_GATE_NAMES : GATE_NAMES;
    var total = _isTech ? 4 : 6;
    var fillPct = currentGate > 0 ? (currentGate / (total - 1)) * 100 : 0;

    html += '<div class="gate-timeline" style="position:relative;padding:0 10px">';
    html += '<div class="gate-line"></div>';
    html += '<div class="gate-line-fill" style="width:' + fillPct + '%"></div>';

    for (var g = 0; g < total; g++) {
      var dotCls = 'gate-dot';
      if (g < currentGate) dotCls += ' done';
      else if (g === currentGate) dotCls += ' current';

      html += '<div class="gate-point">';
      html += '<div class="' + dotCls + '">' + g + '</div>';
      html += '<div class="gate-label">' + (_names[g] || (_isTech ? 'T\xB7' : '\u041E\xB7') + g) + '</div>';
      html += '</div>';
    }

    html += '</div>';
    return html;
  }

  // ── TAB: INITIATIVES ──
  var _initView = 'grouped'; // 'grouped' or 'rice'

  function renderInitiatives(initiatives, editable) {

      html += '<button class="btn-action" id="btn-create-init" style="display:none">+ \u0421\u043E\u0437\u0434\u0430\u0442\u044C \u0438\u043D\u0438\u0446\u0438\u0430\u0442\u0438\u0432\u0443</button>';
