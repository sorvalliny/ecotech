      html += '<div class="ie-grid">';
      html += '<div class="ie-group full"><div class="ie-lbl">\u041D\u0430\u0437\u0432\u0430\u043D\u0438\u0435</div><input class="ie-input" id="new-init-name" placeholder="\u041D\u0430\u0437\u0432\u0430\u043D\u0438\u0435 \u0438\u043D\u0438\u0446\u0438\u0430\u0442\u0438\u0432\u044B"></div>';
      html += '<div class="ie-group full"><div class="ie-lbl">\u041E\u043F\u0438\u0441\u0430\u043D\u0438\u0435</div><textarea class="ie-textarea" id="new-init-desc" placeholder="\u041E\u043F\u0438\u0441\u0430\u043D\u0438\u0435"></textarea></div>';
      html += '<div class="ie-group"><div class="ie-lbl">\u0421\u0435\u0433\u043C\u0435\u043D\u0442</div><select class="ie-select" id="new-init-seg"><option value="business">\u0411\u0438\u0437\u043D\u0435\u0441</option><option value="product">\u041F\u0440\u043E\u0434\u0443\u043A\u0442</option><option value="tech">\u0422\u0435\u0445\u043D\u0438\u043A\u0430</option></select></div>';
      html += '<div class="ie-group"><div class="ie-lbl">\u0422\u0438\u043F \u0438\u043D\u0438\u0446\u0438\u0430\u0442\u0438\u0432\u044B</div><select class="ie-select" id="new-init-type"><option value="product">\u041F\u0440\u043E\u0434\u0443\u043A\u0442\u043E\u0432\u044B\u0435</option><option value="business">\u0411\u0438\u0437\u043D\u0435\u0441</option><option value="technical">\u0422\u0435\u0445\u043D\u0438\u0447\u0435\u0441\u043A\u0438\u0435</option></select></div>';
      html += '<div class="ie-group"><div class="ie-lbl">\u041A\u0432\u0430\u0440\u0442\u0430\u043B</div><select class="ie-select" id="new-init-quarter"><option value="Q1 2026">Q1 2026</option><option value="Q2 2026" selected>Q2 2026</option><option value="Q3 2026">Q3 2026</option><option value="Q4 2026">Q4 2026</option><option value="H1 2026">H1 2026</option><option value="H2 2026">H2 2026</option></select></div>';
      html += '<div class="ie-group"><div class="ie-lbl">\u0421\u0442\u0430\u0442\u0443\u0441</div><select class="ie-select" id="new-init-status"><option value="backlog">\u0411\u044D\u043A\u043B\u043E\u0433</option><option value="planned">\u0417\u0430\u043F\u043B\u0430\u043D\u0438\u0440\u043E\u0432\u0430\u043D\u043E</option><option value="wip">\u0412 \u0440\u0430\u0431\u043E\u0442\u0435</option></select></div>';
      html += '<div class="ie-group"><div class="ie-lbl">PM</div><input class="ie-input" id="new-init-pm" placeholder="\u041E\u0442\u0432\u0435\u0442\u0441\u0442\u0432\u0435\u043D\u043D\u044B\u0439"></div>';
      html += '<div class="ie-group full"><div class="ie-lbl">\u0412\u043D\u0435\u0448\u043D\u0438\u0439 \u0442\u0440\u0435\u043A\u0435\u0440</div><input class="ie-input" type="url" id="new-init-tracker" placeholder="https://youtrack.rwb.ru/issue/..."></div>';
      html += '</div>';
      html += '<div style="display:flex;gap:8px;margin-top:12px">';
      html += '<button class="btn-save-sm" id="btn-save-new-init">\u0421\u043E\u0437\u0434\u0430\u0442\u044C</button>';
      html += '<button class="btn-cancel-sm" id="btn-cancel-new-init">\u041E\u0442\u043C\u0435\u043D\u0430</button>';
      html += '</div>';
      html += '</div>';
    }

    // Filters + View toggle
    html += '<div class="filter-row">';
    html += '<select class="filter-sel" id="filter-init-seg"><option value="">\u0412\u0441\u0435 \u0441\u0435\u0433\u043C\u0435\u043D\u0442\u044B</option><option value="business">\u0411\u0438\u0437\u043D\u0435\u0441</option><option value="product">\u041F\u0440\u043E\u0434\u0443\u043A\u0442</option><option value="tech">\u0422\u0435\u0445\u043D\u0438\u043A\u0430</option></select>';
    html += '<select class="filter-sel" id="filter-init-type"><option value="">\u0412\u0441\u0435 \u0442\u0438\u043F\u044B</option><option value="business">\u0411\u0438\u0437\u043D\u0435\u0441</option><option value="product">\u041F\u0440\u043E\u0434\u0443\u043A\u0442\u043E\u0432\u044B\u0435</option><option value="technical">\u0422\u0435\u0445\u043D\u0438\u0447\u0435\u0441\u043A\u0438\u0435</option></select>';
    html += '<select class="filter-sel" id="filter-init-status"><option value="">\u0412\u0441\u0435 \u0441\u0442\u0430\u0442\u0443\u0441\u044B</option><option value="backlog">\u0411\u044D\u043A\u043B\u043E\u0433</option><option value="planned">\u0417\u0430\u043F\u043B\u0430\u043D\u0438\u0440\u043E\u0432\u0430\u043D\u043E</option><option value="wip">\u0412 \u0440\u0430\u0431\u043E\u0442\u0435</option><option value="done">\u0413\u043E\u0442\u043E\u0432\u043E</option></select>';
    html += '<select class="filter-sel" id="filter-init-quarter"><option value="">\u0412\u0441\u0435 \u043A\u0432\u0430\u0440\u0442\u0430\u043B\u044B</option><option value="Q1 2026">Q1 2026</option><option value="Q2 2026">Q2 2026</option><option value="Q3 2026">Q3 2026</option><option value="Q4 2026">Q4 2026</option></select>';
    html += '<div style="margin-left:auto" class="view-toggle" id="init-view-toggle">';
    html += '<button class="view-toggle-btn' + (_initView === 'grouped' ? ' active' : '') + '" data-view="grouped">\u041F\u043E \u0442\u0438\u043F\u0443</button>';
    html += '<button class="view-toggle-btn' + (_initView === 'rice' ? ' active' : '') + '" data-view="rice">RICE</button>';
    html += '</div>';
    html += '</div>';

    if (!initiatives.length) {
      html += '<div class="placeholder-card">';
      html += '<h3>\u041D\u0435\u0442 \u0438\u043D\u0438\u0446\u0438\u0430\u0442\u0438\u0432</h3>';
      html += '<p>\u0414\u043B\u044F \u044D\u0442\u043E\u0433\u043E \u043F\u0440\u043E\u0434\u0443\u043A\u0442\u0430 \u043F\u043E\u043A\u0430 \u043D\u0435\u0442 \u0438\u043D\u0438\u0446\u0438\u0430\u0442\u0438\u0432. \u0421\u043E\u0437\u0434\u0430\u0439\u0442\u0435 \u043F\u0435\u0440\u0432\u0443\u044E!</p>';
      html += '</div>';
      return html;
    }

    // Expand/Collapse all bar (only for grouped view)
    if (_initView === 'grouped') {
      html += '<div class="init-collapse-bar" id="init-collapse-bar">';
      html += '<button class="init-collapse-btn" id="btn-expand-all">\u0420\u0430\u0437\u0432\u0435\u0440\u043D\u0443\u0442\u044C \u0432\u0441\u0435</button>';
      html += '<button class="init-collapse-btn" id="btn-collapse-all">\u0421\u0432\u0435\u0440\u043D\u0443\u0442\u044C \u0432\u0441\u0435</button>';
      html += '</div>';
    }

    html += '<div class="init-list" id="init-list">';

    if (_initView === 'rice') {
      // ── RICE Prioritization View ──
      var sorted = initiatives.slice().sort(function(a, b) {
        return riceScore(b) - riceScore(a);
      });
      var maxRice = sorted.length ? riceScore(sorted[0]) : 1;
      if (maxRice < 1) maxRice = 1;

      for (var ri = 0; ri < sorted.length; ri++) {
        var it = sorted[ri];
        var rice = riceScore(it);
        var pct = Math.round((rice / maxRice) * 100);
        var riceColor = rice > 20 ? 'var(--green)' : rice >= 10 ? 'var(--amber)' : 'var(--red)';

        html += renderInitCard(it, editable);
      }
    } else {
      // ── Grouped by type view ──
      var TYPE_ORDER = ['business', 'product', 'technical'];
      var TYPE_LABELS = {
        'business': '\u{1F4BC} \u0411\u0438\u0437\u043D\u0435\u0441-\u0438\u043D\u0438\u0446\u0438\u0430\u0442\u0438\u0432\u044B',
        'product': '\u{1F4E6} \u041F\u0440\u043E\u0434\u0443\u043A\u0442\u043E\u0432\u044B\u0435 \u0438\u043D\u0438\u0446\u0438\u0430\u0442\u0438\u0432\u044B',
        'technical': '\u2699\uFE0F \u0422\u0435\u0445\u043D\u0438\u0447\u0435\u0441\u043A\u0438\u0435 \u0438\u043D\u0438\u0446\u0438\u0430\u0442\u0438\u0432\u044B'
      };
      var TYPE_COLORS = {
        'business': 'var(--amber)',
        'product': 'var(--teal)',
        'technical': 'var(--blue)'
      };

      // Group initiatives by type
      var groups = {};
      for (var gi = 0; gi < initiatives.length; gi++) {
        var initType = window.PT ? PT.getInitType(initiatives[gi]) : (initiatives[gi].type || 'product');
        if (!groups[initType]) groups[initType] = [];
        groups[initType].push(initiatives[gi]);
      }

      // Sort each group by RICE desc
      for (var gk in groups) {
        if (groups.hasOwnProperty(gk)) {
          groups[gk].sort(function(a, b) { return riceScore(b) - riceScore(a); });
        }
      }

      // Load collapse state from localStorage per product
      var _collapseState = {};
      try {
        var _csRaw = localStorage.getItem('orbita_init_collapse_' + productId);
        if (_csRaw) _collapseState = JSON.parse(_csRaw);
      } catch(e) {}

      for (var ti = 0; ti < TYPE_ORDER.length; ti++) {
        var typeKey = TYPE_ORDER[ti];
        var typeItems = groups[typeKey];
        if (!typeItems || !typeItems.length) continue;

        // Collapsed by default unless explicitly expanded in stored state
        var isGroupCollapsed = _collapseState.hasOwnProperty(typeKey) ? _collapseState[typeKey] : true;
        var typeColor = TYPE_COLORS[typeKey] || 'var(--muted)';
        html += '<div class="init-type-group">';
        html += '<div class="init-type-header' + (isGroupCollapsed ? ' collapsed' : '') + '" data-type-toggle="' + typeKey + '">';
        html += '<span class="init-type-icon">\u25BC</span>';
        html += '<span class="init-type-label" style="color:' + typeColor + '">' + (TYPE_LABELS[typeKey] || typeKey) + '</span>';
        html += '<span class="init-type-count">' + typeItems.length + '</span>';
        html += '</div>';
        html += '<div class="init-type-body">';
        for (var ii = 0; ii < typeItems.length; ii++) {
          html += renderInitCard(typeItems[ii], editable);
        }
        html += '</div>';
        html += '</div>';
      }

      // Any items with unknown type
      var otherItems = [];
      for (var ok in groups) {
        if (groups.hasOwnProperty(ok) && TYPE_ORDER.indexOf(ok) === -1) {
          for (var oi = 0; oi < groups[ok].length; oi++) {
            otherItems.push(groups[ok][oi]);
          }
        }
      }
      if (otherItems.length) {
        otherItems.sort(function(a, b) { return riceScore(b) - riceScore(a); });
        var isOtherCollapsed = _collapseState.hasOwnProperty('other') ? _collapseState['other'] : true;
        html += '<div class="init-type-group">';
        html += '<div class="init-type-header' + (isOtherCollapsed ? ' collapsed' : '') + '" data-type-toggle="other">';
        html += '<span class="init-type-icon">\u25BC</span>';
        html += '<span class="init-type-label">\u041F\u0440\u043E\u0447\u0435\u0435</span>';
        html += '<span class="init-type-count">' + otherItems.length + '</span>';
        html += '</div>';
        html += '<div class="init-type-body">';
        for (var oti = 0; oti < otherItems.length; oti++) {
          html += renderInitCard(otherItems[oti], editable);
        }
        html += '</div>';
        html += '</div>';
      }
    }

    html += '</div>';

    return html;
  }

  function renderInitCard(it, editable) {
    var rice = riceScore(it);
    var segLabel = SEGMENT_LABELS[it.segment] || it.segment || '--';
    var segCls = SEGMENT_CLS[it.segment] || 'seg-product';
    var stLabel = STATUS_LABELS[it.status] || it.status || '--';
    var stCls = INIT_STATUS_CLS[it.status] || 'is-backlog';
    var apprLabel = APPROVAL_LABELS[it.approval || 'pending'] || 'pending';
    var apprCls = APPROVAL_CLS[it.approval || 'pending'] || 'ab-pending';
    var isExpanded = _expandedInit === it.id;
    var canEditThis = editable && window.OrbAuth && OrbAuth.canEditInitiative(productId, it.id);

    var html = '<div class="init-card' + (isExpanded ? ' expanded' : '') + '" data-init-id="' + esc(it.id) + '">';

    // Head row
    var typeBadgeHtml = window.PT ? PT.initTypeBadge(it) : '';
    html += '<div class="init-card-head">';
    html += '<div class="init-id">' + esc(it.id) + '</div>';
    html += '<div>';
    html += '<div class="init-name">' + esc(it.name) + ' ' + typeBadgeHtml + '</div>';
    if (it.pm) html += '<div class="init-sub">' + esc(it.pm) + '</div>';
    if (it.trackerUrl) html += '<div class="init-sub"><a href="' + esc(it.trackerUrl) + '" target="_blank" onclick="event.stopPropagation()" style="color:var(--violet);text-decoration:none;font-size:10px">\u2197 ' + esc(it.trackerUrl.replace(/^https?:\/\//, '').substring(0, 40)) + (it.trackerUrl.length > 47 ? '...' : '') + '</a></div>';
    html += '</div>';
    html += '<div><span class="init-seg ' + segCls + '">' + esc(segLabel) + '</span></div>';
    html += '<div class="init-rice" title="RICE">' + rice + '</div>';
    html += '<div><span class="init-status ' + stCls + '">' + esc(stLabel) + '</span></div>';
    html += '<div><span class="approval-badge ' + apprCls + '">' + esc(apprLabel) + '</span></div>';
    html += '</div>';

    // Inline edit block
    if (canEditThis || canApprove()) {
      html += '<div class="init-edit">';
      html += '<div class="ie-grid">';
      html += '<div class="ie-group full"><div class="ie-lbl">\u041D\u0430\u0437\u0432\u0430\u043D\u0438\u0435</div><input class="ie-input" data-ie="name" value="' + esc(it.name) + '"></div>';
      html += '<div class="ie-group full"><div class="ie-lbl">\u041E\u043F\u0438\u0441\u0430\u043D\u0438\u0435</div><textarea class="ie-textarea" data-ie="desc">' + esc(it.desc || '') + '</textarea></div>';
      html += '<div class="ie-group"><div class="ie-lbl">\u0421\u0435\u0433\u043C\u0435\u043D\u0442</div><select class="ie-select" data-ie="segment"><option value="business"' + (it.segment === 'business' ? ' selected' : '') + '>\u0411\u0438\u0437\u043D\u0435\u0441</option><option value="product"' + (it.segment === 'product' ? ' selected' : '') + '>\u041F\u0440\u043E\u0434\u0443\u043A\u0442</option><option value="tech"' + (it.segment === 'tech' ? ' selected' : '') + '>\u0422\u0435\u0445\u043D\u0438\u043A\u0430</option></select></div>';
      var _itType = window.PT ? PT.getInitType(it) : (it.type || 'product');
      html += '<div class="ie-group"><div class="ie-lbl">\u0422\u0438\u043F \u0438\u043D\u0438\u0446\u0438\u0430\u0442\u0438\u0432\u044B</div><select class="ie-select" data-ie="type"><option value="product"' + (_itType === 'product' ? ' selected' : '') + '>\u041F\u0440\u043E\u0434\u0443\u043A\u0442\u043E\u0432\u044B\u0435</option><option value="business"' + (_itType === 'business' ? ' selected' : '') + '>\u0411\u0438\u0437\u043D\u0435\u0441</option><option value="technical"' + (_itType === 'technical' ? ' selected' : '') + '>\u0422\u0435\u0445\u043D\u0438\u0447\u0435\u0441\u043A\u0438\u0435</option></select></div>';
      html += '<div class="ie-group"><div class="ie-lbl">\u0421\u0442\u0430\u0442\u0443\u0441</div><select class="ie-select" data-ie="status"><option value="backlog"' + (it.status === 'backlog' ? ' selected' : '') + '>\u0411\u044D\u043A\u043B\u043E\u0433</option><option value="planned"' + (it.status === 'planned' ? ' selected' : '') + '>\u0417\u0430\u043F\u043B\u0430\u043D\u0438\u0440\u043E\u0432\u0430\u043D\u043E</option><option value="wip"' + (it.status === 'wip' ? ' selected' : '') + '>\u0412 \u0440\u0430\u0431\u043E\u0442\u0435</option><option value="done"' + (it.status === 'done' ? ' selected' : '') + '>\u0413\u043E\u0442\u043E\u0432\u043E</option></select></div>';
      html += '<div class="ie-group"><div class="ie-lbl">\u041A\u0432\u0430\u0440\u0442\u0430\u043B</div><select class="ie-select" data-ie="quarter"><option value="Q1 2026"' + (it.quarter === 'Q1 2026' ? ' selected' : '') + '>Q1 2026</option><option value="Q2 2026"' + (it.quarter === 'Q2 2026' ? ' selected' : '') + '>Q2 2026</option><option value="Q3 2026"' + (it.quarter === 'Q3 2026' ? ' selected' : '') + '>Q3 2026</option><option value="Q4 2026"' + (it.quarter === 'Q4 2026' ? ' selected' : '') + '>Q4 2026</option></select></div>';
      html += '<div class="ie-group"><div class="ie-lbl">PM</div><input class="ie-input" data-ie="pm" value="' + esc(it.pm || '') + '"></div>';
      html += '<div class="ie-group full"><div class="ie-lbl">\u0412\u043D\u0435\u0448\u043D\u0438\u0439 \u0442\u0440\u0435\u043A\u0435\u0440</div><input class="ie-input" type="url" data-ie="trackerUrl" value="' + esc(it.trackerUrl || '') + '" placeholder="https://youtrack.rwb.ru/issue/..."></div>';

      // RICE parameters
      html += '<div class="ie-group full"><div class="ie-lbl">RICE-\u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u044B</div>';
      html += '<div class="ie-rice-legend">R \u2014 Reach (\u043E\u0445\u0432\u0430\u0442) \u00B7 I \u2014 Impact (\u0432\u043B\u0438\u044F\u043D\u0438\u0435) \u00B7 C \u2014 Confidence (\u0443\u0432\u0435\u0440\u0435\u043D\u043D\u043E\u0441\u0442\u044C) \u00B7 E \u2014 Effort (\u0443\u0441\u0438\u043B\u0438\u0435)</div>';
      var riceParams = [
        {key:'R', field:'r', val: it.r || 5},
        {key:'I', field:'i', val: it.i || 5},
        {key:'C', field:'c', val: it.c || 5},
        {key:'E', field:'e', val: it.e || 5}
      ];
      for (var ri = 0; ri < riceParams.length; ri++) {
        var rp = riceParams[ri];
        html += '<div class="ie-rice-row"><span class="ie-rice-lbl">' + rp.key + '</span><input type="range" class="ie-rice-slider" data-ie="' + rp.field + '" min="1" max="10" value="' + rp.val + '"><span class="ie-rice-val">' + rp.val + '</span></div>';
      }
      var riceColorCls = rice > 20 ? 'rice-hi' : rice >= 10 ? 'rice-mi' : 'rice-lo';
      html += '<div class="ie-score-preview ' + riceColorCls + '" data-ie-score>Score = (R \u00D7 I \u00D7 C) / E = ' + rice + '</div>';
      html += '</div>';

      // Goal link
      var productGoals = getProductGoals();
      html += '<div class="ie-group"><div class="ie-lbl">\u0412\u043A\u043B\u0430\u0434 \u0432 \u0446\u0435\u043B\u044C</div><select class="ie-select" data-ie="goalId"><option value="">-- \u043D\u0435 \u0432\u044B\u0431\u0440\u0430\u043D\u043E --</option>';
      for (var ggi = 0; ggi < productGoals.length; ggi++) {
        html += '<option value="' + esc(productGoals[ggi].id) + '"' + (it.goalId === productGoals[ggi].id ? ' selected' : '') + '>' + esc(productGoals[ggi].title) + '</option>';
      }
      html += '</select></div>';
      html += '<div class="ie-group"><div class="ie-lbl">\u0412\u043B\u0438\u044F\u043D\u0438\u0435</div><select class="ie-select" data-ie="influence"><option value="high"' + (it.influence === 'high' ? ' selected' : '') + '>High</option><option value="medium"' + ((it.influence === 'medium' || !it.influence) ? ' selected' : '') + '>Medium</option><option value="low"' + (it.influence === 'low' ? ' selected' : '') + '>Low</option></select></div>';
      html += '</div>';

      // Footer with actions
      html += '<div class="ie-footer">';
      html += '<button class="btn-save-sm" data-action="save-init">\u0421\u043E\u0445\u0440\u0430\u043D\u0438\u0442\u044C</button>';
      html += '<button class="btn-cancel-sm" data-action="cancel-init">\u041E\u0442\u043C\u0435\u043D\u0430</button>';
      if (canApprove()) {
        html += '<button class="btn-approve" data-action="approve-init" style="margin-left:auto">\u0421\u043E\u0433\u043B\u0430\u0441\u043E\u0432\u0430\u0442\u044C</button>';
        html += '<button class="btn-danger" data-action="reject-init">\u041E\u0442\u043A\u043B\u043E\u043D\u0438\u0442\u044C</button>';
      }
      if (canDelete()) {
        html += '<button class="btn-danger" data-action="delete-init" style="margin-left:8px">\u0423\u0434\u0430\u043B\u0438\u0442\u044C</button>';
      }
      html += '</div>';
      html += '</div>';
    }

    // Review panel (for leads and approvers, shown when expanded)
    if (isExpanded && canReview()) {
      html += '<div class="review-panel">';
      html += '<div class="review-panel-title">Ревью инициативы</div>';
      html += '<textarea class="review-comment-input" data-review-comment="' + esc(it.id) + '" placeholder="Комментарий к ревью..."></textarea>';
      html += '<div class="review-actions">';
      html += '<button class="review-btn review-btn-go" data-review-action="go" data-review-init="' + esc(it.id) + '">&#10003; Go</button>';
      html += '<button class="review-btn review-btn-nogo" data-review-action="no-go" data-review-init="' + esc(it.id) + '">&#10007; No-Go</button>';
      html += '<button class="review-btn review-btn-revise" data-review-action="revise" data-review-init="' + esc(it.id) + '">&#8634; Revise</button>';
      html += '</div>';

      // Review history
      var reviews = it.reviews || [];
      if (reviews.length) {
        html += '<div class="review-history">';
        html += '<div class="review-history-title">История ревью</div>';
        for (var rv = reviews.length - 1; rv >= 0; rv--) {
          var rev = reviews[rv];
          var actionCls = rev.action === 'go' ? 'ra-go' : (rev.action === 'no-go' ? 'ra-no-go' : 'ra-revise');
          var actionLabel = rev.action === 'go' ? 'Go' : (rev.action === 'no-go' ? 'No-Go' : 'Revise');
          html += '<div class="review-entry">';
          html += '<div class="review-entry-date">' + esc(formatDate(rev.date)) + '</div>';
          html += '<div class="review-entry-user">' + esc(rev.userName || '--') + '</div>';
          html += '<div class="review-entry-action ' + actionCls + '">' + esc(actionLabel) + '</div>';
          html += '<div class="review-entry-comment">' + esc(rev.comment || '') + '</div>';
          html += '</div>';
        }
        html += '</div>';
      }
      html += '</div>';
    }

    html += '</div>';
    return html;
  }

  // ── TAB: GOALS & PLANNING ──
  function renderGoals(goals, initiatives, editable) {
    var html = '';

    // Create button
    if (editable && isPM()) {
      html += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">';
      html += '<div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em">\u0426\u0435\u043B\u0438 \u043F\u0440\u043E\u0434\u0443\u043A\u0442\u0430</div>';
      html += '<button class="btn-action" id="btn-create-goal">+ \u0414\u043E\u0431\u0430\u0432\u0438\u0442\u044C \u0446\u0435\u043B\u044C</button>';
      html += '</div>';

      // Inline create form
      html += '<div class="inline-form" id="form-create-goal">';
      html += '<div class="if-title">\u041D\u043E\u0432\u0430\u044F \u0446\u0435\u043B\u044C</div>';
      html += '<div class="ie-grid">';
      html += '<div class="ie-group full"><div class="ie-lbl">\u041D\u0430\u0437\u0432\u0430\u043D\u0438\u0435</div><input class="ie-input" id="new-goal-title" placeholder="\u041D\u0430\u0437\u0432\u0430\u043D\u0438\u0435 \u0446\u0435\u043B\u0438"></div>';
      html += '<div class="ie-group"><div class="ie-lbl">\u0422\u0438\u043F</div><select class="ie-select" id="new-goal-type"><option value="product">\u041F\u0440\u043E\u0434\u0443\u043A\u0442\u043E\u0432\u0430\u044F</option><option value="strategic">\u0421\u0442\u0440\u0430\u0442\u0435\u0433\u0438\u0447\u0435\u0441\u043A\u0430\u044F</option><option value="growth">\u0420\u043E\u0441\u0442</option></select></div>';
      html += '<div class="ie-group"><div class="ie-lbl">\u041F\u0435\u0440\u0438\u043E\u0434</div><select class="ie-select" id="new-goal-period"><option value="H1 2026">H1 2026</option><option value="H2 2026">H2 2026</option><option value="H1 2027">H1 2027</option></select></div>';
      html += '</div>';
      html += '<div style="display:flex;gap:8px;margin-top:12px">';
      html += '<button class="btn-save-sm" id="btn-save-new-goal">\u0421\u043E\u0437\u0434\u0430\u0442\u044C</button>';
      html += '<button class="btn-cancel-sm" id="btn-cancel-new-goal">\u041E\u0442\u043C\u0435\u043D\u0430</button>';
      html += '</div>';
      html += '</div>';
    }

    // ═══ SECTION 1: Goals H1/H2 ═══
    if (!goals.length) {
      html += '<div class="placeholder-card" style="margin-bottom:24px">';
      html += '<h3>\u041D\u0435\u0442 \u0446\u0435\u043B\u0435\u0439</h3>';
      html += '<p>\u0414\u043B\u044F \u044D\u0442\u043E\u0433\u043E \u043F\u0440\u043E\u0434\u0443\u043A\u0442\u0430 \u043F\u043E\u043A\u0430 \u043D\u0435\u0442 \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D\u043D\u044B\u0445 \u0446\u0435\u043B\u0435\u0439.</p>';
      html += '</div>';
    }

    if (goals.length) {
    // Group by period
    var periods = {};
    var periodOrder = [];
    for (var i = 0; i < goals.length; i++) {
      var p = goals[i].period || 'Без периода';
      if (!periods[p]) { periods[p] = []; periodOrder.push(p); }
      periods[p].push(goals[i]);
    }

    for (var pi = 0; pi < periodOrder.length; pi++) {
      var period = periodOrder[pi];
      var pGoals = periods[period];

      html += '<div class="goal-period-group">';
      html += '<div class="goal-period-label">' + esc(period) + '</div>';

      for (var gi = 0; gi < pGoals.length; gi++) {
        var g = pGoals[gi];
        var typeCls = GOAL_TYPE_CLS[g.type] || 'gt-product';
        var typeLabel = GOAL_TYPE_LABELS[g.type] || g.type || '--';
        var apprSt = g.approvalStatus || 'pending';
        var apprStCls = APPROVAL_CLS[apprSt] || 'ab-pending';
        var apprStLabel = APPROVAL_LABELS[apprSt] || 'pending';

        var linked = findLinkedInitiatives(g.id, initiatives);
        var infHigh = 0, infMedium = 0, infLow = 0;
        for (var infI = 0; infI < linked.length; infI++) {
          var infLvl = linked[infI].influence || 'medium';
          if (infLvl === 'high') infHigh++;
          else if (infLvl === 'low') infLow++;
          else infMedium++;
        }

        html += '<div class="goal-card" data-goal-id="' + esc(g.id) + '" onclick="toggleGoalExpand(\'' + esc(g.id) + '\')">';
        html += '<div class="goal-title"><span>' + esc(g.title) + '</span>';
        html += '<span class="approval-badge ' + apprStCls + '">' + esc(apprStLabel) + '</span>';
        html += '</div>';
        html += '<div class="goal-meta">';
        html += '<span class="goal-tag ' + typeCls + '">' + esc(typeLabel) + '</span>';
        if (g.owner) html += '<span style="font-size:11px;color:var(--muted)">' + esc(g.owner) + '</span>';
        if (g.period) html += '<span style="font-size:11px;color:var(--muted)">' + esc(g.period) + '</span>';
        html += '<span style="font-size:10px;color:var(--muted)">' + linked.length + ' иниц.</span>';
        if (canApprove() && apprSt !== 'approved') {
          html += '<button class="btn-approve btn-sm" data-goal-approve="' + esc(g.id) + '" style="padding:3px 10px;font-size:10px" onclick="event.stopPropagation()">\u0423\u0442\u0432\u0435\u0440\u0434\u0438\u0442\u044C</button>';
        }
        html += '</div>';

        // Key Results
        if (g.keyResults && g.keyResults.length) {
          html += '<div class="kr-list">';
          for (var ki = 0; ki < g.keyResults.length; ki++) {
            var kr = g.keyResults[ki];
            var pct = kr.target > 0 ? Math.min(100, Math.round((kr.current / kr.target) * 100)) : 0;

            html += '<div class="kr-item">';
            html += '<div class="kr-top">';
            html += '<div class="kr-text">' + esc(kr.text) + '</div>';
            html += '<div class="kr-progress"><div class="kr-progress-fill" style="width:' + pct + '%"></div></div>';
            html += '<div class="kr-pct">' + pct + '%</div>';
            html += '</div>';
            html += '</div>';
          }
          html += '</div>';
        }

        // Expandable detail section
        html += '<div class="goal-expand" id="goal-expand-' + esc(g.id) + '">';

        // Description
        if (g.description) {
          html += '<div class="goal-expand-section"><div class="goal-expand-title">\u041E\u043F\u0438\u0441\u0430\u043D\u0438\u0435</div>';
          html += '<div class="ge-desc">' + esc(g.description) + '</div></div>';
        }

        // Linked initiatives

        // Influence summary
        if (linked.length) {

        html += '</div>'; // goal-card

    } // end if (goals.length)

    // ═══ SECTION 2: Q-plan (initiatives mapped to quarters) ═══
    html += '<div class="ov-card" style="margin-bottom:24px;margin-top:24px">';

    html += '</div>';

    // ═══ SECTION 3: Planning process ═══
    html += '<div class="ov-card">';

    html += '<div class="plan-steps">';

      '\u0414\u0435\u043A\u043E\u043C\u043F\u043E\u0437\u0438\u0440\u043E\u0432\u0430\u0442\u044C \u0432 \u0438\u043D\u0438\u0446\u0438\u0430\u0442\u0438\u0432\u044B \u043D\u0430 \u043A\u0432\u0430\u0440\u0442\u0430\u043B \u2014 \u043A\u043E\u043D\u043A\u0440\u0435\u0442\u043D\u044B\u0435 \u0434\u0435\u0439\u0441\u0442\u0432\u0438\u044F \u0438 \u0433\u0438\u043F\u043E\u0442\u0435\u0437\u044B',
      '\u041E\u0446\u0435\u043D\u0438\u0442\u044C RICE \u2014 \u043F\u0440\u0438\u043E\u0440\u0438\u0442\u0438\u0437\u0438\u0440\u043E\u0432\u0430\u0442\u044C \u043F\u043E Reach, Impact, Confidence, Effort',
      '\u0421\u043E\u0433\u043B\u0430\u0441\u043E\u0432\u0430\u0442\u044C \u0441 PMO \u2014 \u043F\u043E\u043B\u0443\u0447\u0438\u0442\u044C Go / No-Go / Revise \u043D\u0430 \u043A\u0430\u0436\u0434\u0443\u044E \u0438\u043D\u0438\u0446\u0438\u0430\u0442\u0438\u0432\u0443',
      '\u041E\u0442\u043F\u0440\u0430\u0432\u0438\u0442\u044C \u0432 \u043E\u043F\u0435\u0440\u0430\u0446\u0438\u043E\u043D\u043D\u044B\u0439 \u0441\u043B\u043E\u0439 \u2014 \u043F\u0435\u0440\u0435\u0434\u0430\u0442\u044C \u0432 YouTrack / Shiva \u0434\u043B\u044F \u0438\u0441\u043F\u043E\u043B\u043D\u0435\u043D\u0438\u044F'
    ];
    for (var psi = 0; psi < steps.length; psi++) {
      html += '<div class="plan-step">';
      html += '<div class="plan-step-num">' + (psi + 1) + '</div>';

  function findLinkedInitiatives(goalId, initiatives) {
    var result = [];
    for (var i = 0; i < initiatives.length; i++) {
      if (initiatives[i].goalId === goalId) {
        result.push(initiatives[i]);
      }
    }
    return result;
  }

  // ── TAB: CALENDAR ──
  function renderCalendar(editable) {
    var html = '';
    var events = _product.events || [];

    if (editable && isPM()) {
      html += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">';

      html += '</div>';

      // Inline create form
      html += '<div class="inline-form" id="form-create-event">';

      html += '<div class="ie-grid">';
      html += '<div class="ie-group full"><div class="ie-lbl">\u041D\u0430\u0437\u0432\u0430\u043D\u0438\u0435</div><input class="ie-input" id="new-evt-title" placeholder="\u041D\u0430\u0437\u0432\u0430\u043D\u0438\u0435"></div>';
      html += '<div class="ie-group"><div class="ie-lbl">\u0422\u0438\u043F</div><select class="ie-select" id="new-evt-type"><option value="gate_review">Gate Review</option><option value="deadline">\u0414\u0435\u0434\u043B\u0430\u0439\u043D</option><option value="release">\u0420\u0435\u043B\u0438\u0437</option><option value="planning">\u041F\u043B\u0430\u043D\u0438\u0440\u043E\u0432\u0430\u043D\u0438\u0435</option></select></div>';
      html += '<div class="ie-group"><div class="ie-lbl">\u0414\u0430\u0442\u0430</div><input class="ie-input" type="date" id="new-evt-date" value="2026-04-15"></div>';
      html += '</div>';
      html += '<div style="display:flex;gap:8px;margin-top:12px">';
      html += '<button class="btn-save-sm" id="btn-save-new-event">\u0414\u043E\u0431\u0430\u0432\u0438\u0442\u044C</button>';
      html += '<button class="btn-cancel-sm" id="btn-cancel-new-event">\u041E\u0442\u043C\u0435\u043D\u0430</button>';
      html += '</div>';
      html += '</div>';
    }

    // Timeline visualization
    html += '<div class="cal-timeline-wrap">';
    html += '<div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:16px">Timeline</div>';

    if (events.length === 0) {
      html += '<div style="text-align:center;padding:30px;color:var(--muted);font-size:13px">\u041D\u0435\u0442 \u0441\u043E\u0431\u044B\u0442\u0438\u0439</div>';
    } else {
      // Sort events by date
      var sorted = events.slice().sort(function(a, b) {
        return (a.date || '').localeCompare(b.date || '');
      });

      // Find date range
      var minDate = sorted[0].date || '2026-01-01';
      var maxDate = sorted[sorted.length - 1].date || '2026-12-31';
      var minTs = new Date(minDate).getTime();
      var maxTs = new Date(maxDate).getTime();
      var range = maxTs - minTs;
      if (range < 86400000 * 30) range = 86400000 * 90; // min 3 months

      var timelineWidth = Math.max(600, events.length * 100);
      html += '<div class="cal-timeline" style="min-width:' + timelineWidth + 'px;height:100px">';
      html += '<div class="cal-axis"></div>';

      // Month markers
      var startMonth = new Date(minDate);
      startMonth.setDate(1);
      var endMonth = new Date(maxDate);
      endMonth.setMonth(endMonth.getMonth() + 1);
      var monthNames = ['Янв','Фев','Мар','Апр','Май','Июн','Июл','Авг','Сен','Окт','Ноя','Дек'];

      var cursor = new Date(startMonth);
      while (cursor <= endMonth) {
        var monthTs = cursor.getTime();
        var leftPct = range > 0 ? Math.max(0, Math.min(100, ((monthTs - minTs) / range) * 100)) : 0;
        html += '<div class="cal-month" style="left:' + leftPct + '%">' + monthNames[cursor.getMonth()] + ' ' + cursor.getFullYear() + '</div>';
        cursor.setMonth(cursor.getMonth() + 1);
      }

      // Event markers
      for (var ei = 0; ei < sorted.length; ei++) {
        var evt = sorted[ei];
        var evtTs = new Date(evt.date).getTime();
        var leftPctE = range > 0 ? Math.max(2, Math.min(98, ((evtTs - minTs) / range) * 100)) : (ei / sorted.length) * 100;

        html += '<div class="cal-marker" style="left:' + leftPctE + '%">';
        html += '<div class="cal-marker-dot type-' + (evt.type || 'deadline') + '"></div>';
        html += '<div class="cal-marker-label" title="' + esc(evt.title) + '">' + esc(evt.title) + '</div>';
        html += '<div class="cal-marker-date">' + esc(evt.date) + '</div>';
        html += '</div>';
      }

      html += '</div>';
    }

    // Legend
    html += '<div class="cal-legend">';
    html += '<div class="cal-legend-item"><div class="cal-legend-dot" style="background:var(--violet)"></div>Gate Review</div>';
    html += '<div class="cal-legend-item"><div class="cal-legend-dot" style="background:var(--amber)"></div>\u0414\u0435\u0434\u043B\u0430\u0439\u043D</div>';
    html += '<div class="cal-legend-item"><div class="cal-legend-dot" style="background:var(--green)"></div>\u0420\u0435\u043B\u0438\u0437</div>';
    html += '<div class="cal-legend-item"><div class="cal-legend-dot" style="background:var(--blue)"></div>\u041F\u043B\u0430\u043D\u0438\u0440\u043E\u0432\u0430\u043D\u0438\u0435</div>';
    html += '</div>';
    html += '</div>';

    // Events list
    if (events.length) {
      html += '<div class="cal-events-list" id="cal-events-list">';
      var sortedList = events.slice().sort(function(a, b) {
        return (a.date || '').localeCompare(b.date || '');
      });
      for (var eli = 0; eli < sortedList.length; eli++) {
        var ev = sortedList[eli];
        var typeColor = EVENT_TYPE_COLORS[ev.type] || 'var(--muted)';
        html += '<div class="cal-event-row" data-evt-id="' + esc(ev.id) + '">';
        html += '<div class="cal-event-type" style="background:' + typeColor + '"></div>';
        html += '<div class="cal-event-title">' + esc(ev.title) + '</div>';
        html += '<div style="font-size:10px;color:var(--muted);font-weight:600">' + esc(EVENT_TYPE_LABELS[ev.type] || ev.type) + '</div>';
        html += '<div class="cal-event-date">' + esc(ev.date) + '</div>';
        if (editable && isPM()) {
          html += '<div class="cal-event-actions"><button class="btn-danger" data-action="delete-event" data-evt-id="' + esc(ev.id) + '" style="padding:3px 8px;font-size:9px">\u00D7</button></div>';
        }
        html += '</div>';
      }
      html += '</div>';
    }

    return html;
  }

  // ── TAB: DOCUMENTS ──
  function renderDocs(editable) {
    var html = '';
    var artifacts = _product.artifacts || [];
    if (!artifacts.length) artifacts = copyDefaults();
    var gateNum = _product.gate || 0;

    // Checklist for current gate
    var required = 0, ready = 0;
    for (var ci = 0; ci < artifacts.length; ci++) {
      if (artifacts[ci].gate <= gateNum) {
        required++;
        if (artifacts[ci].status === 'done') ready++;
      }
    }
    var checkPct = required > 0 ? Math.round((ready / required) * 100) : 0;

    html += '<div class="doc-checklist">';
    html += '<div class="doc-checklist-title">\u0413\u043E\u0442\u043E\u0432\u043D\u043E\u0441\u0442\u044C \u043A Gate Review \u041E\xB7' + gateNum + '</div>';
    html += '<div class="doc-checklist-bar"><div class="doc-checklist-fill" style="width:' + checkPct + '%"></div></div>';
    html += '<div class="doc-checklist-text">' + ready + ' \u0438\u0437 ' + required + ' \u043E\u0431\u044F\u0437\u0430\u0442\u0435\u043B\u044C\u043D\u044B\u0445 \u0430\u0440\u0442\u0435\u0444\u0430\u043A\u0442\u043E\u0432 \u0433\u043E\u0442\u043E\u0432\u043E (' + checkPct + '%)</div>';
    html += '</div>';

    // Artifacts list
    html += '<div class="doc-list" id="doc-list">';
    for (var di = 0; di < artifacts.length; di++) {
      var art = artifacts[di];
      var statusIcon = DOC_STATUS_ICONS[art.status] || DOC_STATUS_ICONS.none;
      var statusColor = art.status === 'done' ? 'var(--green)' : art.status === 'wip' ? 'var(--amber)' : 'var(--muted)';

      if (editable && isPM()) {
        html += '<select class="ie-select" data-doc-status="' + di + '" style="width:120px;font-size:11px;padding:5px 8px"><option value="none"' + (art.status === 'none' ? ' selected' : '') + '>\u041D\u0435\u0442</option><option value="wip"' + (art.status === 'wip' ? ' selected' : '') + '>\u0412 \u0440\u0430\u0431\u043E\u0442\u0435</option><option value="done"' + (art.status === 'done' ? ' selected' : '') + '>\u0413\u043E\u0442\u043E\u0432</option></select>';
        html += '<input class="doc-url-input" data-doc-url="' + di + '" value="' + esc(art.url || '') + '" placeholder="URL \u0434\u043E\u043A\u0443\u043C\u0435\u043D\u0442\u0430">';
      } else {
        html += '<span style="font-size:10px;font-weight:700;color:' + statusColor + '">' + esc(DOC_STATUS_LABELS[art.status] || '--') + '</span>';
        if (art.url) {
          html += '<a class="doc-url-link" href="' + esc(art.url) + '" target="_blank">\u041E\u0442\u043A\u0440\u044B\u0442\u044C</a>';
        }
      }
      html += '</div>';
    }
    html += '</div>';

    return html;
  }

      html += '<div class="placeholder-card">';

      html += '<p>\u0418\u0441\u0442\u043E\u0440\u0438\u044F \u0438\u0437\u043C\u0435\u043D\u0435\u043D\u0438\u0439 \u043F\u043E\u044F\u0432\u0438\u0442\u0441\u044F \u043F\u043E\u0441\u043B\u0435 \u043F\u0435\u0440\u0432\u043E\u0433\u043E \u0440\u0435\u0434\u0430\u043A\u0442\u0438\u0440\u043E\u0432\u0430\u043D\u0438\u044F.</p>';
      html += '</div>';
      return html;
    }

    // Group by date
    var groups = {};
    var groupOrder = [];
    for (var i = 0; i < logs.length; i++) {
      var dateKey = formatDate(logs[i].timestamp);
      if (!groups[dateKey]) { groups[dateKey] = []; groupOrder.push(dateKey); }
      groups[dateKey].push(logs[i]);
    }

    html += '<div class="log-list">';
    for (var di = 0; di < groupOrder.length; di++) {
      var dk = groupOrder[di];
      html += '<div class="log-date-group">' + esc(dk) + '</div>';
      var entries = groups[dk];
      for (var ei = 0; ei < entries.length; ei++) {
        var entry = entries[ei];
        html += '<div class="log-entry">';
        html += '<div class="log-time">' + formatTime(entry.timestamp) + '</div>';
        html += '<div class="log-user">' + esc(entry.userName) + '</div>';
        html += '<div class="log-action">' + esc(entry.action) + '</div>';
        html += '<div class="log-details">' + esc(entry.details) + '</div>';
        html += '</div>';
      }
    }
    html += '</div>';

    return html;
  }

  // ── INIT: Tabs ──
  function initTabs() {
    var tabsContainer = document.getElementById('pc-tabs');
    if (!tabsContainer) return;

    tabsContainer.addEventListener('click', function(e) {
      var btn = e.target;
      if (btn.classList.contains('tab-count')) btn = btn.parentNode;
      if (!btn.classList.contains('tab')) return;

      var tabName = btn.getAttribute('data-tab');
      if (!tabName) return;
      _activeTab = tabName;

      var allTabs = tabsContainer.querySelectorAll('.tab');
      for (var t = 0; t < allTabs.length; t++) {
        allTabs[t].classList.remove('active');
      }
      btn.classList.add('active');

      var allPanels = document.querySelectorAll('.tab-panel');
      for (var p = 0; p < allPanels.length; p++) {
        allPanels[p].classList.remove('active');
      }

      var target = document.getElementById('panel-' + tabName);
      if (target) target.classList.add('active');

      // Update URL with tab for deep linking
      _activeTab = tabName;
      var newUrl = window.location.pathname + '?id=' + encodeURIComponent(productId) + (tabName !== 'overview' ? '&tab=' + tabName : '');
      history.replaceState(null, '', newUrl);
    });
  }

  // ── INIT: Share ──
  function initShareButton() {
    var btn = document.getElementById('btn-share');
    if (!btn) return;
    btn.addEventListener('click', function() {
      var url = window.location.origin + window.location.pathname + '?id=' + encodeURIComponent(productId) + (_activeTab !== 'overview' ? '&tab=' + _activeTab : '');
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(url).then(function() { showToast('\u0421\u0441\u044B\u043B\u043A\u0430 \u0441\u043A\u043E\u043F\u0438\u0440\u043E\u0432\u0430\u043D\u0430'); });
      } else {
        var inp = document.createElement('input');
        inp.value = url;
        document.body.appendChild(inp);
        inp.select();
        try { document.execCommand('copy'); showToast('\u0421\u0441\u044B\u043B\u043A\u0430 \u0441\u043A\u043E\u043F\u0438\u0440\u043E\u0432\u0430\u043D\u0430'); } catch(ex) {}
        document.body.removeChild(inp);
      }
    });
  }

          });

  }

  // ── INIT: Initiatives ──
  function initInitiatives(initiatives, editable) {
    // Create button
    var btnCreate = document.getElementById('btn-create-init');
    var formCreate = document.getElementById('form-create-init');
    if (btnCreate && formCreate) {
      btnCreate.addEventListener('click', function() {
        formCreate.classList.toggle('visible');
      });

      var btnCancel = document.getElementById('btn-cancel-new-init');
      if (btnCancel) {
        btnCancel.addEventListener('click', function() {
          formCreate.classList.remove('visible');
        });
      }

      var btnSave = document.getElementById('btn-save-new-init');
      if (btnSave) {
        btnSave.addEventListener('click', function() {
          var name = document.getElementById('new-init-name').value.trim();
          if (!name) { showToast('\u0423\u043A\u0430\u0436\u0438\u0442\u0435 \u043D\u0430\u0437\u0432\u0430\u043D\u0438\u0435'); return; }

          var typeEl = document.getElementById('new-init-type');
          var trackerEl = document.getElementById('new-init-tracker');
          var newInit = {
            id: genId('I'),
            name: name,
            desc: document.getElementById('new-init-desc').value.trim(),
            segment: document.getElementById('new-init-seg').value,
            type: typeEl ? typeEl.value : 'product',
            status: document.getElementById('new-init-status').value,
            quarter: document.getElementById('new-init-quarter').value,
            pm: document.getElementById('new-init-pm').value.trim(),
            trackerUrl: trackerEl ? trackerEl.value.trim() : '',
            productId: productId,
            project: productId,
            r: 5, i: 5, c: 5, e: 5,
            approval: 'pending',
            goalId: '',
            influence: 'medium'
          };

          _backlog.push(newInit);
          saveBacklog();
          addLog('initiative_create', '\u0421\u043E\u0437\u0434\u0430\u043D\u0430: ' + name, 'initiative', newInit.id);
          showToast('\u0418\u043D\u0438\u0446\u0438\u0430\u0442\u0438\u0432\u0430 \u0441\u043E\u0437\u0434\u0430\u043D\u0430');
          renderApp();
        });
      }
    }

    // Filters
    var filterSeg = document.getElementById('filter-init-seg');
    var filterType = document.getElementById('filter-init-type');
    var filterStatus = document.getElementById('filter-init-status');
    var filterQuarter = document.getElementById('filter-init-quarter');

    function applyFilters() {
      var seg = filterSeg ? filterSeg.value : '';
      var tp = filterType ? filterType.value : '';
      var st = filterStatus ? filterStatus.value : '';
      var q = filterQuarter ? filterQuarter.value : '';

      var cards = document.querySelectorAll('.init-card');
      for (var ci = 0; ci < cards.length; ci++) {
        var card = cards[ci];
        var initId = card.getAttribute('data-init-id');
        var init = null;
        for (var bi = 0; bi < _backlog.length; bi++) {
          if (_backlog[bi].id === initId) { init = _backlog[bi]; break; }
        }
        if (!init) { card.style.display = 'none'; continue; }

        var show = true;
        if (seg && init.segment !== seg) show = false;
        if (tp) {
          var initType = window.PT ? PT.getInitType(init) : (init.type || 'product');
          if (initType !== tp) show = false;
        }
        if (st && init.status !== st) show = false;
        if (q && init.quarter !== q) show = false;
        card.style.display = show ? '' : 'none';
      }
    }

    if (filterSeg) filterSeg.addEventListener('change', applyFilters);
    if (filterType) filterType.addEventListener('change', applyFilters);
    if (filterStatus) filterStatus.addEventListener('change', applyFilters);
    if (filterQuarter) filterQuarter.addEventListener('change', applyFilters);

    // View toggle (grouped vs RICE)
    var viewToggle = document.getElementById('init-view-toggle');
    if (viewToggle) {
      viewToggle.addEventListener('click', function(e) {
        var btn = e.target.closest('.view-toggle-btn');
        if (!btn) return;
        var view = btn.getAttribute('data-view');
        if (view && view !== _initView) {
          _initView = view;
          renderApp();
        }
      });
    }

    // Prominent top create button
    var btnCreateTop = document.getElementById('btn-create-init-top');
    if (btnCreateTop && formCreate) {
      btnCreateTop.addEventListener('click', function() {
        formCreate.classList.add('visible');
        formCreate.scrollIntoView({behavior:'smooth', block:'center'});
      });
    }

    // Type group collapse/expand with localStorage persistence
    function _saveCollapseState() {
      var state = {};
      var headers = document.querySelectorAll('[data-type-toggle]');
      for (var h = 0; h < headers.length; h++) {
        var key = headers[h].getAttribute('data-type-toggle');
        state[key] = headers[h].classList.contains('collapsed');
      }
      try { localStorage.setItem('orbita_init_collapse_' + productId, JSON.stringify(state)); } catch(e) {}
    }

    var typeHeaders = document.querySelectorAll('[data-type-toggle]');
    for (var thi = 0; thi < typeHeaders.length; thi++) {
      typeHeaders[thi].addEventListener('click', function(e) {
        var header = e.currentTarget;
        header.classList.toggle('collapsed');
        _saveCollapseState();
      });
    }

    // Expand all / Collapse all
    var btnExpandAll = document.getElementById('btn-expand-all');
    var btnCollapseAll = document.getElementById('btn-collapse-all');
    if (btnExpandAll) {
      btnExpandAll.addEventListener('click', function() {
        var headers = document.querySelectorAll('[data-type-toggle]');
        for (var h = 0; h < headers.length; h++) headers[h].classList.remove('collapsed');
        _saveCollapseState();
      });
    }
    if (btnCollapseAll) {
      btnCollapseAll.addEventListener('click', function() {
        var headers = document.querySelectorAll('[data-type-toggle]');
        for (var h = 0; h < headers.length; h++) headers[h].classList.add('collapsed');
        _saveCollapseState();
      });
    }

    // Click to expand/collapse
    var initList = document.getElementById('init-list');
    if (initList) {
      initList.addEventListener('click', function(e) {
        var target = e.target;

        // Handle action buttons
        var actionBtn = target.closest('[data-action]');
        if (actionBtn) {
          var action = actionBtn.getAttribute('data-action');
          var card = actionBtn.closest('.init-card');
          var initId = card ? card.getAttribute('data-init-id') : null;
          if (!initId) return;

          if (action === 'save-init') {
            saveInitiative(card, initId);
            return;
          }
          if (action === 'cancel-init') {
            _expandedInit = null;
            renderApp();
            return;
          }
          if (action === 'approve-init') {
            setInitApproval(initId, 'approved');
            return;
          }
          if (action === 'reject-init') {
            setInitApproval(initId, 'rejected');
            return;
          }
          if (action === 'delete-init') {
            deleteInitiative(initId);
            return;
          }
          return;
        }

        // Handle review buttons
        var reviewBtn = target.closest('[data-review-action]');
        if (reviewBtn) {
          var reviewAction = reviewBtn.getAttribute('data-review-action');
          var reviewInitId = reviewBtn.getAttribute('data-review-init');
          if (reviewAction && reviewInitId) {
            submitReview(reviewInitId, reviewAction);
          }
          return;
        }

        // Handle RICE slider updates
        if (target.classList && target.classList.contains('ie-rice-slider')) {
          var valEl = target.nextElementSibling;
          if (valEl) valEl.textContent = target.value;
          // Update RICE score preview
          var cardEl = target.closest('.init-card');
          if (cardEl) updateRicePreview(cardEl);
          return;
        }

        // Toggle expand
        var head = target.closest('.init-card-head');
        if (head) {
          var parentCard = head.closest('.init-card');
          var iid = parentCard ? parentCard.getAttribute('data-init-id') : null;
          if (iid) {
            _expandedInit = (_expandedInit === iid) ? null : iid;
            renderApp();
          }
        }
      });

      // Also listen for input events on RICE sliders
      initList.addEventListener('input', function(e) {
        if (e.target.classList && e.target.classList.contains('ie-rice-slider')) {
          var valEl = e.target.nextElementSibling;
          if (valEl) valEl.textContent = e.target.value;
          var cardEl = e.target.closest('.init-card');
          if (cardEl) updateRicePreview(cardEl);
        }
      });
    }
  }

  function updateRicePreview(card) {
    var sliders = card.querySelectorAll('.ie-rice-slider');
    var vals = {};
    for (var si = 0; si < sliders.length; si++) {
      vals[sliders[si].getAttribute('data-ie')] = parseInt(sliders[si].value, 10);
    }
    var score = (vals.e && vals.e > 0) ? Math.round((vals.r * vals.i * vals.c) / vals.e) : 0;
    var preview = card.querySelector('[data-ie-score]');
    if (preview) {
      preview.textContent = 'Score = (R \u00D7 I \u00D7 C) / E = ' + score;
      preview.classList.remove('rice-hi', 'rice-mi', 'rice-lo');
      preview.classList.add(score > 20 ? 'rice-hi' : score >= 10 ? 'rice-mi' : 'rice-lo');
    }
  }

  function saveInitiative(card, initId) {
    var init = null;
    var idx = -1;
    for (var i = 0; i < _backlog.length; i++) {
      if (_backlog[i].id === initId) { init = _backlog[i]; idx = i; break; }
    }
    if (!init) return;

    var changes = [];
    var fields = card.querySelectorAll('[data-ie]');
    for (var fi = 0; fi < fields.length; fi++) {
      var field = fields[fi].getAttribute('data-ie');
      var val;
      if (fields[fi].tagName === 'SELECT') val = fields[fi].value;
      else if (fields[fi].tagName === 'TEXTAREA') val = fields[fi].value.trim();
      else if (fields[fi].type === 'range') val = parseInt(fields[fi].value, 10);
      else val = fields[fi].value.trim();

      var oldVal = init[field];
      if (field === 'r' || field === 'i' || field === 'c' || field === 'e') {
        val = parseInt(val, 10) || 5;
      }
      if (String(oldVal) !== String(val)) {
        changes.push(field + ': ' + oldVal + ' \u2192 ' + val);
      }
      init[field] = val;
    }

    _backlog[idx] = init;
    saveBacklog();

    if (changes.length) {
      addLog('initiative_edit', initId + ': ' + changes.join(', '), 'initiative', initId);
    }

    _expandedInit = null;
    showToast('\u0418\u043D\u0438\u0446\u0438\u0430\u0442\u0438\u0432\u0430 \u0441\u043E\u0445\u0440\u0430\u043D\u0435\u043D\u0430');
    renderApp();
  }

  function setInitApproval(initId, status) {
    for (var i = 0; i < _backlog.length; i++) {
      if (_backlog[i].id === initId) {
        var old = _backlog[i].approval || 'pending';
        _backlog[i].approval = status;
        saveBacklog();
        addLog('initiative_approval', initId + ': ' + old + ' \u2192 ' + status, 'initiative', initId);
        showToast(status === 'approved' ? '\u0421\u043E\u0433\u043B\u0430\u0441\u043E\u0432\u0430\u043D\u043E' : '\u041E\u0442\u043A\u043B\u043E\u043D\u0435\u043D\u043E');
        renderApp();
        return;
      }
    }
  }

  function deleteInitiative(initId) {
    var newBacklog = [];
    var deleted = null;
    for (var i = 0; i < _backlog.length; i++) {
      if (_backlog[i].id === initId) {
        deleted = _backlog[i];
      } else {
        newBacklog.push(_backlog[i]);
      }
    }
    if (deleted) {
      _backlog = newBacklog;
      saveBacklog();
      addLog('initiative_delete', '\u0423\u0434\u0430\u043B\u0435\u043D\u0430: ' + (deleted.name || initId), 'initiative', initId);
      showToast('\u0418\u043D\u0438\u0446\u0438\u0430\u0442\u0438\u0432\u0430 \u0443\u0434\u0430\u043B\u0435\u043D\u0430');
      _expandedInit = null;
      renderApp();
    }
  }

  function submitReview(initId, action) {
    var user = window.OrbAuth ? OrbAuth.getCurrentUser() : null;
    if (!user) return;

    var commentEl = document.querySelector('[data-review-comment="' + initId + '"]');
    var comment = commentEl ? commentEl.value.trim() : '';

    // Comment required for no-go and revise
    if ((action === 'no-go' || action === 'revise') && !comment) {
      showToast('Укажите комментарий для ' + (action === 'no-go' ? 'No-Go' : 'Revise'));
      if (commentEl) commentEl.focus();
      return;
    }

    for (var i = 0; i < _backlog.length; i++) {
      if (_backlog[i].id === initId) {
        var init = _backlog[i];
        var approvalMap = {'go':'approved', 'no-go':'rejected', 'revise':'pending'};
        var oldApproval = init.approval || 'pending';
        init.approval = approvalMap[action] || 'pending';

        if (!init.reviews) init.reviews = [];
        init.reviews.push({
          userId: user.id || user.login || '',
          userName: user.name || user.login || '--',
          action: action,
          comment: comment,
          date: new Date().toISOString()
        });

        _backlog[i] = init;
        saveBacklog();

        var logMsg = initId + ': ' + action.toUpperCase() + (comment ? ' — ' + comment : '');
        addLog('review', logMsg, 'initiative', initId);

        var toastMap = {'go':'Go — Согласовано', 'no-go':'No-Go — Отклонено', 'revise':'Revise — На доработку'};
        showToast(toastMap[action] || 'Ревью сохранено');
        renderApp();
        return;
      }
    }
  }

      var btnCancel = document.getElementById('btn-cancel-new-event');
      if (btnCancel) {
        btnCancel.addEventListener('click', function() {
          formCreate.classList.remove('visible');
        });
      }

      var btnSave = document.getElementById('btn-save-new-event');
      if (btnSave) {
        btnSave.addEventListener('click', function() {
          var title = document.getElementById('new-evt-title').value.trim();
          var date = document.getElementById('new-evt-date').value;
          if (!title) { showToast('\u0423\u043A\u0430\u0436\u0438\u0442\u0435 \u043D\u0430\u0437\u0432\u0430\u043D\u0438\u0435'); return; }
          if (!date) { showToast('\u0423\u043A\u0430\u0436\u0438\u0442\u0435 \u0434\u0430\u0442\u0443'); return; }

          var newEvent = {
            id: genId('evt'),
            type: document.getElementById('new-evt-type').value,
            title: title,
            date: date,
            initiativeId: null
          };

          if (!_product.events) _product.events = [];
          _product.events.push(newEvent);
          saveProducts();
          addLog('event_create', '\u0421\u043E\u0431\u044B\u0442\u0438\u0435: ' + title + ' (' + date + ')', 'event', newEvent.id);
          showToast('\u0421\u043E\u0431\u044B\u0442\u0438\u0435 \u0434\u043E\u0431\u0430\u0432\u043B\u0435\u043D\u043E');
          renderApp();
        });
      }
    }

    // Delete events
    var eventsList = document.getElementById('cal-events-list');
    if (eventsList) {
      eventsList.addEventListener('click', function(e) {
        var btn = e.target.closest('[data-action="delete-event"]');
        if (!btn) return;
        var evtId = btn.getAttribute('data-evt-id');
        if (!evtId || !_product.events) return;

        var newEvents = [];
        for (var i = 0; i < _product.events.length; i++) {
          if (_product.events[i].id !== evtId) {
            newEvents.push(_product.events[i]);
          }
        }
        _product.events = newEvents;
        saveProducts();
        addLog('event_delete', '\u0423\u0434\u0430\u043B\u0435\u043D\u043E \u0441\u043E\u0431\u044B\u0442\u0438\u0435: ' + evtId, 'event', evtId);
        showToast('\u0421\u043E\u0431\u044B\u0442\u0438\u0435 \u0443\u0434\u0430\u043B\u0435\u043D\u043E');
        renderApp();
      });
    }
  }

  // ── INIT: Documents ──
  function initDocs(editable) {
    if (!editable || !isPM()) return;
    var docList = document.getElementById('doc-list');
    if (!docList) return;

    // Status selects
    var statusSelects = docList.querySelectorAll('[data-doc-status]');
    for (var si = 0; si < statusSelects.length; si++) {
      (function(sel) {
        sel.addEventListener('change', function() {
          var idx = parseInt(sel.getAttribute('data-doc-status'), 10);
          if (!_product.artifacts || !_product.artifacts[idx]) return;
          var old = _product.artifacts[idx].status;
          _product.artifacts[idx].status = sel.value;
          saveProducts();
          addLog('artifact_status', _product.artifacts[idx].name + ': ' + old + ' \u2192 ' + sel.value, 'artifact', _product.artifacts[idx].name);
          showToast('\u0421\u0442\u0430\u0442\u0443\u0441 \u043E\u0431\u043D\u043E\u0432\u043B\u0451\u043D');
          renderApp();
        });
      })(statusSelects[si]);
    }

    // URL inputs
    var urlInputs = docList.querySelectorAll('[data-doc-url]');
    for (var ui = 0; ui < urlInputs.length; ui++) {
      (function(inp) {
        inp.addEventListener('blur', function() {
          var idx = parseInt(inp.getAttribute('data-doc-url'), 10);
          if (!_product.artifacts || !_product.artifacts[idx]) return;
          var old = _product.artifacts[idx].url || '';
          var newUrl = inp.value.trim();
          if (old !== newUrl) {
            _product.artifacts[idx].url = newUrl;
            saveProducts();
            addLog('artifact_url', _product.artifacts[idx].name + ': URL \u043E\u0431\u043D\u043E\u0432\u043B\u0451\u043D', 'artifact', _product.artifacts[idx].name);
            showToast('\u0421\u0441\u044B\u043B\u043A\u0430 \u0441\u043E\u0445\u0440\u0430\u043D\u0435\u043D\u0430');
          }
        });
      })(urlInputs[ui]);
    }
  }

})();
</script>
