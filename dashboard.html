<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ОРБИТА -- Статус портфеля</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --dark:#03080F;--mid:#040f1a;--card:#061525;--surface2:#0d2a40;
  --border:rgba(255,255,255,.07);--border-hi:rgba(255,255,255,.14);
  --violet:#4FC3F7;--vdim:rgba(79,195,247,.12);--vborder:rgba(79,195,247,.35);
  --pink:#FF2D8A;--teal:#00D4B4;--tdim:rgba(0,212,180,.10);
  --amber:#FFB830;--adim:rgba(255,184,48,.10);--aborder:rgba(255,184,48,.3);
  --green:#34D399;--gdim:rgba(52,211,153,.10);--gborder:rgba(52,211,153,.3);
  --red:#F87171;--rdim:rgba(248,113,113,.10);--rborder:rgba(248,113,113,.3);
  --text:#E8E6FF;--muted:#7A7A9D;--white:#fff;
  --font:'Inter',sans-serif;--head:'Inter',sans-serif;--mono:monospace;
  --nav-h:48px;
}
html,body{height:100%}
body{font-family:var(--font);background:var(--dark);color:var(--text);display:flex;flex-direction:column;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");opacity:.02;pointer-events:none;z-index:0}

/* ── Layout ─────────────────────────────── */
.page{position:relative;z-index:1;max-width:1440px;margin:0 auto;padding:24px 32px 64px;width:100%}
.dash-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:12px}
.dash-title{font-family:var(--head);font-size:16px;font-weight:700;letter-spacing:.04em;color:var(--white)}
.dash-title span{color:var(--violet);margin-right:6px}
.dash-meta{font-size:12px;color:var(--muted);font-weight:400}

/* ── Access denied ──────────────────────── */
.access-denied{text-align:center;padding:120px 20px;color:var(--muted)}
.access-denied h2{font-family:var(--head);font-size:18px;color:var(--red);margin-bottom:12px}

/* ── KPI Strip ──────────────────────────── */
.kpi-strip{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:28px}
.kpi-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px 20px;display:flex;flex-direction:column;gap:6px;transition:border-color .2s}
.kpi-card:hover{border-color:var(--border-hi)}
.kpi-value{font-family:var(--head);font-size:26px;font-weight:900;color:var(--white)}
.kpi-label{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.04em;text-transform:uppercase}
.kpi-card.kpi-violet .kpi-value{color:var(--violet)}
.kpi-card.kpi-teal .kpi-value{color:var(--teal)}
.kpi-card.kpi-amber .kpi-value{color:var(--amber)}
.kpi-card.kpi-green .kpi-value{color:var(--green)}
.kpi-card.kpi-red .kpi-value{color:var(--red)}
.kpi-sub{font-size:10px;color:var(--muted)}

/* ── Section ────────────────────────────── */
.section{margin-bottom:28px}
.section-head{font-family:var(--head);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--violet);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.section-head .ei{opacity:.6}

/* ── Portfolio Table ────────────────────── */
.ptable{width:100%;border-collapse:collapse}
.ptable th{font-family:var(--head);font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);text-align:left;padding:10px 12px;border-bottom:1px solid var(--border);white-space:nowrap}
.ptable td{font-size:12px;padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
.ptable tr.row-product{transition:background .15s}
.ptable tr.row-product:hover{background:rgba(79,195,247,.04)}

/* status pills */
.st{display:inline-block;padding:2px 10px;border-radius:6px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.st-on-track{background:var(--gdim);color:var(--green);border:1px solid var(--gborder)}
.st-at-risk{background:var(--rdim);color:var(--red);border:1px solid var(--rborder)}
.st-blocked{background:rgba(248,113,113,.06);color:var(--red);border:1px solid rgba(248,113,113,.2)}
.st-paused{background:var(--adim);color:var(--amber);border:1px solid var(--aborder)}
.st-done{background:var(--vdim);color:var(--violet);border:1px solid var(--vborder)}
.st-draft{background:rgba(122,122,157,.1);color:var(--muted);border:1px solid rgba(122,122,157,.2)}
.orbit-badge{font-family:var(--head);font-size:10px;font-weight:700;color:var(--violet);background:var(--vdim);padding:2px 8px;border-radius:5px;border:1px solid var(--vborder);white-space:nowrap}

/* ── Alert cards ────────────────────────── */
.alert-list{display:flex;flex-direction:column;gap:8px}
.alert-card{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:12px;cursor:pointer;transition:border-color .15s}
.alert-card:hover{border-color:var(--border-hi)}
.alert-card.alert-red{border-left:3px solid var(--red)}
.alert-card.alert-yellow{border-left:3px solid var(--amber)}
.alert-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.alert-dot.dot-red{background:var(--red)}
.alert-dot.dot-yellow{background:var(--amber)}
.alert-product{font-weight:600;color:var(--violet);white-space:nowrap;min-width:80px}
.alert-msg{color:var(--text);flex:1}
.alert-empty{font-size:11px;color:var(--muted);padding:12px 0}

/* ── PMO table ──────────────────────────── */
.pmo-table{width:100%;border-collapse:collapse}
.pmo-table th{font-family:var(--head);font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);text-align:left;padding:10px 12px;border-bottom:1px solid var(--border)}
.pmo-table td{font-size:12px;padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
.pmo-verified{color:var(--green);font-weight:600}
.pmo-issues{color:var(--amber);font-weight:600}
.pmo-pending{color:var(--red);font-weight:600}
.btn-verify{font-size:10px;font-weight:600;padding:4px 12px;border-radius:6px;border:1px solid var(--vborder);background:var(--vdim);color:var(--violet);cursor:pointer;font-family:var(--font);transition:all .15s}
.btn-verify:hover{background:var(--violet);color:var(--dark)}

/* ── Compliance bar ─────────────────────── */
.compliance-wrap{display:flex;align-items:center;gap:8px}
.compliance-bar{flex:1;height:8px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden;max-width:120px}
.compliance-fill{height:100%;border-radius:4px;transition:width .3s}
.compliance-fill.cmp-green{background:var(--green)}
.compliance-fill.cmp-amber{background:var(--amber)}
.compliance-fill.cmp-red{background:var(--red)}
.compliance-pct{font-family:var(--mono);font-size:11px;font-weight:700;min-width:36px}
.compliance-pct.cmp-green{color:var(--green)}
.compliance-pct.cmp-amber{color:var(--amber)}
.compliance-pct.cmp-red{color:var(--red)}

/* ── Date helpers ───────────────────────── */
.date-overdue{color:var(--red);font-weight:600}
.date-ok{color:var(--text)}
.team-deficit{color:var(--amber);font-weight:600}
.team-ok{color:var(--text)}

/* ── Responsive ─────────────────────────── */
@media(max-width:1100px){
  .kpi-strip{grid-template-columns:repeat(3,1fr)}
}
@media(max-width:768px){
  .page{padding:16px}
  .kpi-strip{grid-template-columns:1fr 1fr}
  .ptable,.pmo-table{font-size:11px}
  .ptable th,.ptable td,.pmo-table th,.pmo-table td{padding:8px 6px}
  .dash-header{flex-direction:column;align-items:flex-start}
}
</style>
</head>
<body>

<div class="page" id="dashPage">
  <!-- Rendered by JS -->
</div>

<script src="icons.js"></script>
<script src="platform.js"></script>
<script src="stages.js"></script>
<script src="js/auth.js"></script>
<script src="js/auth-ui.js"></script>
<script src="nav.js"></script>
<script>
(function(){
  'use strict';

  // ── Access check ────────────────────────────
  var role = window.OrbAuth ? OrbAuth.getRole() : null;
  var user = window.OrbAuth ? OrbAuth.getCurrentUser() : null;
  var page = document.getElementById('dashPage');

  if (role !== 'admin') {
    page.innerHTML = '<div class="access-denied">'
      + '<h2>Доступ ограничен</h2>'
      + '<p>Эта страница доступна только для роли Администратор.</p>'
      + '<p style="margin-top:12px"><a href="index.html" style="color:var(--violet)">На главную</a></p>'
      + '</div>';
    return;
  }

  // ── Data loading ────────────────────────────
  var products  = PT.load(PT.KEY_PRODUCTS) || [];
  var goals     = PT.load(PT.KEY_GOALS) || [];
  var backlog   = PT.load(PT.KEY_BACKLOG) || [];
  var changelog = PT.load('ECOTECH_CHANGELOG') || [];
  var gateChecklist = {};
  try { gateChecklist = PT.load('ECOTECH_GATE_CHECKLIST') || {}; } catch(e) {}

  // Legacy compat
  backlog.forEach(function(item){
    if (item.project && !item.productId) item.productId = item.project;
  });

  // Migrate CEO fields
  products.forEach(function(p) {
    if (!p.teamSize) p.teamSize = 0;
    if (!p.requiredSize) p.requiredSize = 0;
    if (!p.launchDate) p.launchDate = '';
    if (!p.nextGateDate) p.nextGateDate = '';
    if (!p.blockers) p.blockers = '';
    if (!p.pmoVerified) p.pmoVerified = { date:'', by:'', status:'pending' };
  });

  // ── Helpers ─────────────────────────────────
  var EIS = window.EI ? EI.svg : function(){ return ''; };

  var GATE_NAMES = ['О·0 Заявка','О·1 Разведка','О·2 Прототип','О·3 Разгон','О·4 Экосистема','О·5 Плато','О·6 Архив'];

  function statusPill(s){
    var cls = 'st st-' + (s||'draft');
    var labels = {'on-track':'On Track','at-risk':'At Risk','blocked':'Blocked','paused':'Paused','done':'Done','draft':'Draft'};
    return '<span class="' + cls + '">' + (labels[s] || s || '--') + '</span>';
  }

  function formatDate(str){
    if(!str) return '--';
    var d = new Date(str);
    return d.toLocaleDateString('ru-RU',{day:'numeric',month:'short',year:'numeric'});
  }

  function daysDiff(dateStr){
    if(!dateStr) return null;
    var d = new Date(dateStr);
    var now = new Date();
    now.setHours(0,0,0,0);
    d.setHours(0,0,0,0);
    return Math.floor((d.getTime() - now.getTime()) / 86400000);
  }

  function escHtml(s){
    if(!s) return '';
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Compliance Score ────────────────────────
  function calcCompliance(p) {
    var checks = 0, total = 0;
    total++; if (p.desc) checks++;
    total++; if (goals.some(function(g){ return g.productId === p.id; })) checks++;
    total++; if (backlog.some(function(i){ return (i.productId||i.project) === p.id; })) checks++;
    total++; if (backlog.filter(function(i){ return (i.productId||i.project) === p.id; }).every(function(i){ return i.r && i.i && i.c && i.e; })) checks++;
    total++; if (p.launchDate) checks++;
    total++; if (p.teamSize > 0) checks++;
    total++; if (p.pmoVerified && p.pmoVerified.status === 'verified') checks++;
    var gc = gateChecklist[p.id] || {};
    var gateChecks = gc['gate'+p.gate] || [];
    total++; if (gateChecks.length && gateChecks.filter(Boolean).length === gateChecks.length) checks++;
    return Math.round(checks / total * 100);
  }

  function complianceClass(pct){
    if(pct >= 80) return 'cmp-green';
    if(pct >= 50) return 'cmp-amber';
    return 'cmp-red';
  }

  // ── Risk Alerts ─────────────────────────────
  function getAlerts() {
    var alerts = [];
    products.forEach(function(p) {
      var pGoals = goals.filter(function(g){ return g.productId === p.id; });
      var pInits = backlog.filter(function(i){ return (i.productId||i.project) === p.id; });
      // No data
      if (!pGoals.length) alerts.push({ type:'red', product:p.name, productId:p.id, msg:'Нет целей — продукт не исполняет поручение' });
      if (!pInits.length) alerts.push({ type:'red', product:p.name, productId:p.id, msg:'Нет инициатив' });
      // Stale
      var lastLog = null;
      for (var li = changelog.length - 1; li >= 0; li--) {
        var l = changelog[li];
        if ((l.entityType==='product' && l.entityId===p.id) || (l.entityType==='initiative' && pInits.some(function(ini){ return ini.id===l.entityId; }))) {
          lastLog = l;
          break;
        }
      }
      var daysSinceUpdate = lastLog ? Math.floor((Date.now() - new Date(lastLog.ts).getTime()) / 86400000) : 999;
      if (daysSinceUpdate > 14) alerts.push({ type:'red', product:p.name, productId:p.id, msg:'Нет обновлений '+daysSinceUpdate+' дней' });
      // Status
      if (p.status === 'at-risk') alerts.push({ type:'red', product:p.name, productId:p.id, msg:'At Risk' + (p.blockers ? ': '+p.blockers : '') });
      if (p.status === 'blocked') alerts.push({ type:'red', product:p.name, productId:p.id, msg:'Заблокирован' + (p.blockers ? ': '+p.blockers : '') });
      // Resources
      if (p.teamSize < p.requiredSize) alerts.push({ type:'yellow', product:p.name, productId:p.id, msg:'Команда '+p.teamSize+'/'+p.requiredSize+' — дефицит' });
      // Deadlines
      if (p.launchDate && new Date(p.launchDate) < new Date() && p.gate < 3) alerts.push({ type:'red', product:p.name, productId:p.id, msg:'Дата запуска просрочена: '+p.launchDate });
      // PMO not verified
      if (!p.pmoVerified || !p.pmoVerified.date) {
        alerts.push({ type:'yellow', product:p.name, productId:p.id, msg:'Не сверено PMO' });
      } else {
        var daysSinceVerify = Math.floor((Date.now() - new Date(p.pmoVerified.date).getTime()) / 86400000);
        if (daysSinceVerify > 7) alerts.push({ type:'yellow', product:p.name, productId:p.id, msg:'Сверка PMO устарела ('+daysSinceVerify+' дней)' });
      }
    });
    // Sort: red first, then yellow
    alerts.sort(function(a,b){
      if(a.type === 'red' && b.type !== 'red') return -1;
      if(a.type !== 'red' && b.type === 'red') return 1;
      return 0;
    });
    return alerts;
  }

  // ── PMO Verify ──────────────────────────────
  window.verifyProduct = function(productId) {
    var u = window.OrbAuth ? OrbAuth.getCurrentUser() : null;
    if (!u || (u.role !== 'admin' && u.role !== 'pmo')) return;
    var prods = PT.load(PT.KEY_PRODUCTS) || [];
    var p = prods.find(function(x){ return x.id === productId; });
    if (p) {
      p.pmoVerified = { date: new Date().toISOString().slice(0,10), by: u.id, status: 'verified' };
      PT.save(PT.KEY_PRODUCTS, prods);
      products = prods;
      renderDashboard();
    }
  };

  // ── Computed ────────────────────────────────
  var userName = user ? user.name : 'CEO';
  var today = new Date();
  var dateStr = today.toLocaleDateString('ru-RU',{day:'numeric',month:'long',year:'numeric'});

  // ── Main Render ─────────────────────────────
  function renderDashboard(){
    // Recalculate metrics
    var totalProducts = products.length;
    var onTrack = 0, atRisk = 0, blocked = 0;
    products.forEach(function(p){
      if(p.status === 'on-track') onTrack++;
      else if(p.status === 'at-risk') atRisk++;
      else if(p.status === 'blocked') blocked++;
    });

    // Average compliance
    var totalCompliance = 0;
    var complianceScores = {};
    products.forEach(function(p){
      var sc = calcCompliance(p);
      complianceScores[p.id] = sc;
      totalCompliance += sc;
    });
    var avgCompliance = totalProducts > 0 ? Math.round(totalCompliance / totalProducts) : 0;

    // Nearest gate date
    var nearestGate = null;
    var nearestGateDate = null;
    products.forEach(function(p){
      if(p.nextGateDate){
        var d = new Date(p.nextGateDate);
        if(!nearestGateDate || d < nearestGateDate){
          nearestGateDate = d;
          nearestGate = p;
        }
      }
    });
    var nearestGateStr = nearestGateDate ? formatDate(nearestGate.nextGateDate) : '--';

    var alerts = getAlerts();

    var html = '';

    // ── Header ──────────────────────────────
    html += '<div class="dash-header">'
      + '<div class="dash-title"><span>ОРБИТА</span> · Статус портфеля</div>'
      + '<div class="dash-meta">' + escHtml(userName) + ' · ' + dateStr + '</div>'
      + '</div>';

    // ── Секция 1: KPI Strip ─────────────────
    html += '<div class="kpi-strip">';
    html += '<div class="kpi-card kpi-violet"><div class="kpi-value">' + totalProducts + '</div><div class="kpi-label">Продуктов в портфеле</div></div>';
    html += '<div class="kpi-card kpi-green"><div class="kpi-value">' + onTrack + '</div><div class="kpi-label">On Track</div></div>';
    html += '<div class="kpi-card kpi-amber"><div class="kpi-value">' + atRisk + '</div><div class="kpi-label">At Risk</div></div>';
    html += '<div class="kpi-card kpi-red"><div class="kpi-value">' + blocked + '</div><div class="kpi-label">Blocked</div></div>';
    var avgCls = complianceClass(avgCompliance);
    html += '<div class="kpi-card"><div class="kpi-value ' + avgCls.replace('cmp-','kpi-') + '" style="color:var(--' + (avgCompliance>=80?'green':avgCompliance>=50?'amber':'red') + ')">' + avgCompliance + '%</div><div class="kpi-label">Ср. Compliance</div>'
      + '<div class="kpi-sub">Gate: ' + nearestGateStr + '</div></div>';
    html += '</div>';

    // ── Секция 2: Сроки и запуски ───────────
    html += '<div class="section">'
      + '<div class="section-head">' + EIS('calendar',14) + ' Сроки и запуски</div>';

    html += '<table class="ptable"><thead><tr>'
      + '<th>Продукт</th><th>Орбита</th><th>Статус</th><th>Запуск</th><th>Отклонение</th><th>Команда</th><th>Gate Review</th><th>Compliance</th>'
      + '</tr></thead><tbody>';

    // Sort: at-risk/blocked first, then by gate desc
    var statusOrder = {'blocked':0,'at-risk':1,'on-track':2,'paused':3,'done':4,'draft':5};
    var sorted = products.slice().sort(function(a,b){
      var sd = (statusOrder[a.status]||9) - (statusOrder[b.status]||9);
      if(sd !== 0) return sd;
      return (b.gate||0) - (a.gate||0);
    });

    sorted.forEach(function(p){
      var rowCls = 'row-product';
      // Launch date
      var launchDays = daysDiff(p.launchDate);
      var launchCls = '';
      var launchText = p.launchDate ? formatDate(p.launchDate) : '--';
      if(p.launchDate && launchDays !== null && launchDays < 0) launchCls = 'date-overdue';
      else launchCls = 'date-ok';

      // Deviation
      var deviationText = '--';
      if(p.launchDate && launchDays !== null){
        if(launchDays < 0) deviationText = '<span class="date-overdue">' + Math.abs(launchDays) + ' дн. просрочка</span>';
        else if(launchDays <= 30) deviationText = '<span style="color:var(--amber)">' + launchDays + ' дн.</span>';
        else deviationText = '<span style="color:var(--green)">' + launchDays + ' дн.</span>';
      }

      // Team
      var teamText = p.teamSize + '/' + p.requiredSize;
      var teamCls = (p.requiredSize > 0 && p.teamSize < p.requiredSize) ? 'team-deficit' : 'team-ok';

      // Gate review
      var gateText = p.nextGateDate ? formatDate(p.nextGateDate) : '--';
      var gateDays = daysDiff(p.nextGateDate);
      var gateCls = '';
      if(gateDays !== null && gateDays < 0) gateCls = 'date-overdue';

      // Compliance
      var cScore = complianceScores[p.id] || 0;
      var cCls = complianceClass(cScore);

      html += '<tr class="' + rowCls + '">'
        + '<td><strong>' + escHtml(p.name||p.id) + '</strong></td>'
        + '<td><span class="orbit-badge">О·' + (p.gate||0) + '</span></td>'
        + '<td>' + statusPill(p.status) + '</td>'
        + '<td class="' + launchCls + '">' + launchText + '</td>'
        + '<td>' + deviationText + '</td>'
        + '<td class="' + teamCls + '">' + teamText + '</td>'
        + '<td class="' + gateCls + '">' + gateText + '</td>'
        + '<td><div class="compliance-wrap">'
          + '<div class="compliance-bar"><div class="compliance-fill ' + cCls + '" style="width:' + cScore + '%"></div></div>'
          + '<span class="compliance-pct ' + cCls + '">' + cScore + '%</span>'
        + '</div></td>'
        + '</tr>';
    });

    html += '</tbody></table></div>';

    // ── Секция 3: Сигналы риска ─────────────
    html += '<div class="section">'
      + '<div class="section-head">' + EIS('alert-triangle',14) + ' Сигналы риска</div>';

    if(alerts.length === 0){
      html += '<div class="alert-empty">Нет активных сигналов</div>';
    } else {
      html += '<div class="alert-list">';
      alerts.forEach(function(a){
        var dotCls = a.type === 'red' ? 'dot-red' : 'dot-yellow';
        var cardCls = a.type === 'red' ? 'alert-red' : 'alert-yellow';
        html += '<div class="alert-card ' + cardCls + '" onclick="window.location.href=\'Проектный офис/tracker.html#product=' + a.productId + '\'">'
          + '<span class="alert-dot ' + dotCls + '"></span>'
          + '<span class="alert-product">' + escHtml(a.product) + '</span>'
          + '<span class="alert-msg">' + escHtml(a.msg) + '</span>'
          + '</div>';
      });
      html += '</div>';
    }
    html += '</div>';

    // ── Секция 4: Сверка PMO ────────────────
    html += '<div class="section">'
      + '<div class="section-head">' + EIS('check-circle',14) + ' Сверка PMO</div>';

    html += '<table class="pmo-table"><thead><tr>'
      + '<th>Продукт</th><th>Последняя сверка</th><th>Статус</th><th>Действие</th>'
      + '</tr></thead><tbody>';

    sorted.forEach(function(p){
      var pv = p.pmoVerified || {};
      var statusText = '';
      var statusCls = '';
      if(pv.status === 'verified'){
        statusText = 'Сверено';
        statusCls = 'pmo-verified';
      } else if(pv.status === 'issues'){
        statusText = 'Есть замечания';
        statusCls = 'pmo-issues';
      } else {
        statusText = 'Не сверено';
        statusCls = 'pmo-pending';
      }

      var dateText = pv.date ? formatDate(pv.date) : '--';
      var daysSince = pv.date ? Math.floor((Date.now() - new Date(pv.date).getTime()) / 86400000) : null;
      if(daysSince !== null && daysSince > 7) {
        dateText += ' <span style="color:var(--amber);font-size:10px">(' + daysSince + ' дн. назад)</span>';
      }

      var canVerify = user && (user.role === 'admin' || user.role === 'pmo');
      var actionHtml = canVerify
        ? '<button class="btn-verify" onclick="verifyProduct(\'' + p.id + '\')">' + EIS('check',12) + ' Подтвердить</button>'
        : '<span style="color:var(--muted);font-size:10px">--</span>';

      html += '<tr>'
        + '<td><strong>' + escHtml(p.name||p.id) + '</strong></td>'
        + '<td>' + dateText + '</td>'
        + '<td><span class="' + statusCls + '">' + statusText + '</span></td>'
        + '<td>' + actionHtml + '</td>'
        + '</tr>';
    });

    html += '</tbody></table></div>';

    // ── Секция 5: Compliance Score ──────────
    html += '<div class="section">'
      + '<div class="section-head">' + EIS('shield',14) + ' Compliance Score по продуктам</div>';

    html += '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:14px">';

    sorted.forEach(function(p){
      var cScore = complianceScores[p.id] || 0;
      var cCls = complianceClass(cScore);
      var pGoals = goals.filter(function(g){ return g.productId === p.id; });
      var pInits = backlog.filter(function(i){ return (i.productId||i.project) === p.id; });
      var allRICE = pInits.length > 0 && pInits.every(function(i){ return i.r && i.i && i.c && i.e; });
      var gc = gateChecklist[p.id] || {};
      var gateChecks = gc['gate'+p.gate] || [];
      var gateOk = gateChecks.length > 0 && gateChecks.filter(Boolean).length === gateChecks.length;

      function checkRow(ok, label){
        var icon = ok ? '<span style="color:var(--green)">&#10003;</span>' : '<span style="color:var(--red)">&#10007;</span>';
        return '<div style="display:flex;align-items:center;gap:6px;font-size:11px;padding:2px 0">' + icon + ' ' + label + '</div>';
      }

      html += '<div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px 20px">';
      html += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">';
      html += '<div style="font-weight:600;font-size:13px">' + escHtml(p.name||p.id) + ' <span class="orbit-badge" style="margin-left:6px">О·' + (p.gate||0) + '</span></div>';
      html += '<span class="compliance-pct ' + cCls + '" style="font-size:16px">' + cScore + '%</span>';
      html += '</div>';

      // Full-width progress bar
      html += '<div style="height:8px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden;margin-bottom:12px">'
        + '<div class="compliance-fill ' + cCls + '" style="width:' + cScore + '%"></div>'
        + '</div>';

      // Checklist
      html += checkRow(!!p.desc, 'Описание продукта');
      html += checkRow(pGoals.length > 0, 'Есть цель');
      html += checkRow(pInits.length > 0, 'Есть инициатива');
      html += checkRow(allRICE, 'RICE-оценки');
      html += checkRow(!!p.launchDate, 'Дата запуска');
      html += checkRow(p.teamSize > 0, 'Команда назначена');
      html += checkRow(p.pmoVerified && p.pmoVerified.status === 'verified', 'PMO сверка');
      html += checkRow(gateOk, 'Gate-чеклист 100%');

      html += '</div>';
    });

    html += '</div></div>';

    page.innerHTML = html;
  }

  // ── Initial render ──────────────────────────
  renderDashboard();

  // ── Cross-tab sync (auto-refresh) ───────────
  window.addEventListener('storage', function(e){
    if(e.key === PT.KEY_PRODUCTS || e.key === PT.KEY_GOALS || e.key === PT.KEY_BACKLOG || e.key === 'ECOTECH_CHANGELOG' || e.key === 'ECOTECH_GATE_CHECKLIST'){
      products  = PT.load(PT.KEY_PRODUCTS) || [];
      goals     = PT.load(PT.KEY_GOALS) || [];
      backlog   = PT.load(PT.KEY_BACKLOG) || [];
      changelog = PT.load('ECOTECH_CHANGELOG') || [];
      try { gateChecklist = PT.load('ECOTECH_GATE_CHECKLIST') || {}; } catch(ex) {}

      backlog.forEach(function(item){
        if(item.project && !item.productId) item.productId = item.project;
      });
      products.forEach(function(p){
        if(!p.teamSize) p.teamSize = 0;
        if(!p.requiredSize) p.requiredSize = 0;
        if(!p.launchDate) p.launchDate = '';
        if(!p.nextGateDate) p.nextGateDate = '';
        if(!p.blockers) p.blockers = '';
        if(!p.pmoVerified) p.pmoVerified = { date:'', by:'', status:'pending' };
      });

      renderDashboard();
    }
  });

})();
</script>
</body>
</html>
