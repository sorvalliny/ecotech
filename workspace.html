<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"><meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Карточка продукта — ОРБИТА</title>
<link rel="stylesheet" href="./design-system.css">
<style>
/* ── BASE ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;min-height:100vh;font-size:14px;line-height:1.6}

/* ── LAYOUT ── */
.ws-wrap{max-width:1100px;margin:0 auto;padding:32px 24px 120px}

/* ── BREADCRUMB ── */
.ws-breadcrumb{font-size:12px;color:var(--muted);margin-bottom:20px;display:flex;align-items:center;gap:6px}
.ws-breadcrumb a{color:var(--violet);text-decoration:none;font-weight:600}
.ws-breadcrumb a:hover{text-decoration:underline}

/* ── HEADER ── */
.ws-header{display:flex;align-items:flex-start;gap:16px;flex-wrap:wrap;margin-bottom:24px}
.ws-header-left{flex:1;min-width:0;display:flex;align-items:flex-start;gap:14px}
.ws-gate-badge{font-family:'SF Mono','Consolas',monospace;font-size:13px;font-weight:700;padding:6px 14px;border-radius:8px;white-space:nowrap;flex-shrink:0;margin-top:2px}
.ws-title{font-size:26px;font-weight:800;line-height:1.2;margin-bottom:4px}
.ws-meta{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.ws-header-right{display:flex;gap:8px;align-items:center;flex-shrink:0}
.ws-share-btn{font-size:12px;font-weight:600;padding:6px 14px;border-radius:8px;border:1px solid var(--border-hi);background:transparent;color:var(--text);cursor:pointer;font-family:inherit}
.ws-share-btn:hover{background:var(--surface2)}
.ws-type-badge{font-size:10px;font-weight:700;padding:3px 10px;border-radius:6px;white-space:nowrap}
.ws-status-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:6px;white-space:nowrap}
.ws-status-badge::before{content:'';display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:5px;vertical-align:middle}
.sb-active,.sb-on-track{color:var(--teal);background:var(--teal-dim);border:1px solid var(--teal-border)}
.sb-active::before,.sb-on-track::before{background:var(--teal)}
.sb-at-risk,.sb-pending{color:var(--amber);background:var(--amber-dim);border:1px solid var(--amber-border)}
.sb-at-risk::before,.sb-pending::before{background:var(--amber)}
.sb-blocked{color:var(--red);background:var(--red-dim);border:1px solid var(--red)}
.sb-blocked::before{background:var(--red)}
.sb-paused,.sb-archived,.sb-done{color:var(--muted);background:var(--surface2);border:1px solid var(--border)}
.sb-paused::before,.sb-archived::before,.sb-done::before{background:var(--muted)}

/* ── TABS ── */
.ws-tabs{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:24px;overflow-x:auto}
.ws-tab{font-family:inherit;font-size:13px;font-weight:600;padding:10px 16px;border:none;background:transparent;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:color .15s,border-color .15s}
.ws-tab:hover{color:var(--text)}
.ws-tab.active{color:var(--violet);border-bottom-color:var(--violet)}
.ws-tab-count{font-size:10px;font-weight:700;background:var(--surface2);color:var(--muted);padding:1px 6px;border-radius:10px;margin-left:6px}

/* ── PANELS ── */
.ws-panel{display:none}
.ws-panel.active{display:block}

/* ── SECTIONS ── */
.ws-section{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:16px}
.ws-section h3{font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:14px}

/* ── EDITABLE FIELDS ── */
.ws-field{margin-bottom:14px}
.ws-field:last-child{margin-bottom:0}
.ws-field label{display:block;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
.ws-editable{font-size:13px;color:var(--text);line-height:1.5;padding:6px 8px;border-radius:6px;border:1px solid transparent;min-height:28px;outline:none;transition:border-color .15s}
.ws-editable[contenteditable="true"]:hover{border-color:var(--border-hi)}
.ws-editable[contenteditable="true"]:focus{border-color:var(--violet);background:var(--surface2)}

/* ── GATE TIMELINE ── */
.ws-gate-timeline{display:flex;align-items:center;gap:0;padding:8px 0}
.ws-gate-dot{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;border:2px solid var(--border);color:var(--muted);background:var(--surface);position:relative;z-index:1;flex-shrink:0;cursor:default}
.ws-gate-dot.completed{border-color:var(--teal);color:var(--teal);background:var(--teal-dim)}
.ws-gate-dot.current{border-color:var(--violet);color:#fff;background:var(--violet);box-shadow:0 0 0 3px var(--violet-dim)}
.ws-gate-line{flex:1;height:2px;background:var(--border);margin:0 -1px}
.ws-gate-line.completed{background:var(--teal)}
.ws-gate-label{font-size:9px;color:var(--muted);text-align:center;margin-top:4px;white-space:nowrap}

/* ── TEAM ── */
.ws-team-member{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.ws-team-member:last-child{border-bottom:none}
.ws-team-ava{width:28px;height:28px;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--violet);flex-shrink:0}
.ws-team-info{flex:1;min-width:0}
.ws-team-name{font-size:13px;font-weight:600;color:var(--text)}
.ws-team-role{font-size:11px;color:var(--muted)}
.ws-add-member-btn{font-family:inherit;font-size:12px;font-weight:600;color:var(--violet);background:transparent;border:1px dashed var(--violet-border);padding:8px 14px;border-radius:8px;cursor:pointer;margin-top:10px}
.ws-add-member-btn:hover{background:var(--violet-dim)}

/* ── KPI ── */
.ws-kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
.ws-kpi-card{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center}
.ws-kpi-val{font-size:20px;font-weight:800;color:var(--teal)}
.ws-kpi-lbl{font-size:11px;color:var(--muted);margin-top:2px}

/* ── LINKS ── */
.ws-links a{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:var(--violet);text-decoration:none;padding:4px 10px;border-radius:6px;border:1px solid var(--violet-border);margin:0 6px 6px 0;font-weight:600}
.ws-links a:hover{background:var(--violet-dim)}

/* ── INITIATIVES ── */
.ws-init-toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:12px;flex-wrap:wrap}
.ws-create-init-btn{font-family:inherit;font-size:12px;font-weight:700;padding:8px 16px;border-radius:8px;border:none;background:var(--violet);color:#fff;cursor:pointer}
.ws-create-init-btn:hover{opacity:.9}
.ws-init-views{display:flex;gap:2px}
.ws-view-btn{font-family:inherit;font-size:11px;font-weight:600;padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer}
.ws-view-btn.active{background:var(--violet-dim);color:var(--violet);border-color:var(--violet-border)}
.ws-init-filters{display:inline-flex;align-items:center;gap:8px;flex-wrap:wrap}
.ws-init-filters select{font-family:inherit;font-size:11px;font-weight:600;padding:5px 10px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;outline:none}
.ws-init-filters select:focus{border-color:var(--violet)}
.ws-gate-schedule{display:flex;align-items:center;gap:4px;flex-wrap:wrap;padding:6px 0;font-size:11px;font-weight:600;color:var(--muted)}
.ws-gate-schedule .gs-item{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;background:var(--surface);border:1px solid var(--border);border-radius:5px;white-space:nowrap}
.ws-gate-schedule .gs-item.gs-done{color:var(--teal);border-color:rgba(75,206,151,.3)}
.ws-gate-schedule .gs-item.gs-current{color:var(--violet);border-color:var(--violet-border);background:var(--violet-dim)}
.ws-gate-schedule .gs-item.gs-future{color:var(--muted)}
.ws-gate-schedule .gs-sep{color:var(--border)}
.ws-init-group-title{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;padding:10px 0 6px;border-bottom:1px solid var(--border);margin-bottom:8px;cursor:pointer;user-select:none}
.ws-init-group-title:hover{color:var(--text)}
.ws-init-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:8px;border-left:3px solid var(--muted);overflow:hidden}
.ws-init-header{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;user-select:none}
.ws-init-header:hover{background:var(--surface2)}
.ws-init-name{flex:1;font-size:13px;font-weight:600;color:var(--text);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ws-init-rice{font-size:11px;font-weight:700;color:var(--violet);background:var(--violet-dim);padding:2px 8px;border-radius:4px;flex-shrink:0}
.ws-init-status{font-size:11px;font-weight:600;color:var(--muted);flex-shrink:0}
.ws-init-body{padding:14px;border-top:1px solid var(--border);font-size:13px;color:var(--gray)}
.ws-init-body .ws-field{margin-bottom:10px}

/* ── INIT FORM ── */
.ws-init-form{background:var(--surface);border:1px solid var(--violet-border);border-radius:10px;padding:20px;margin-bottom:16px}
.ws-init-form h4{font-size:14px;font-weight:700;margin-bottom:14px;color:var(--text)}
.ws-form-row{display:flex;gap:12px;margin-bottom:10px;flex-wrap:wrap}
.ws-form-row label{font-size:11px;font-weight:600;color:var(--muted);display:block;margin-bottom:3px}
.ws-form-row input,.ws-form-row select,.ws-form-row textarea{font-family:inherit;font-size:13px;padding:7px 10px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text);width:100%;outline:none}
.ws-form-row input:focus,.ws-form-row select:focus,.ws-form-row textarea:focus{border-color:var(--violet)}
.ws-form-row textarea{resize:vertical;min-height:60px}
.ws-form-actions{display:flex;gap:8px;margin-top:14px}
.ws-btn-primary{font-family:inherit;font-size:12px;font-weight:700;padding:8px 18px;border-radius:8px;border:none;background:var(--violet);color:#fff;cursor:pointer}
.ws-btn-secondary{font-family:inherit;font-size:12px;font-weight:700;padding:8px 18px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer}

/* ── GOALS ── */
.ws-goal-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:10px}
.ws-goal-name{font-size:14px;font-weight:700;color:var(--text);margin-bottom:6px}
.ws-goal-type{font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;margin-left:8px}
.ws-goal-type.gt-product{color:var(--teal);background:var(--teal-dim)}
.ws-goal-type.gt-strategic{color:var(--violet);background:var(--violet-dim)}
.ws-goal-type.gt-growth{color:var(--amber);background:var(--amber-dim)}
.ws-kr-bar{height:6px;background:var(--surface2);border-radius:3px;margin-top:6px;overflow:hidden}
.ws-kr-fill{height:100%;border-radius:3px;background:var(--teal);transition:width .3s}
.ws-kr-label{font-size:11px;color:var(--muted);margin-top:3px;display:flex;justify-content:space-between}
.ws-create-goal-btn{font-family:inherit;font-size:12px;font-weight:600;color:var(--violet);background:transparent;border:1px dashed var(--violet-border);padding:8px 14px;border-radius:8px;cursor:pointer;margin-top:10px}
.ws-approval-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;margin-left:8px}
.ab-approved{color:var(--teal);background:var(--teal-dim)}
.ab-pending{color:var(--amber);background:var(--amber-dim)}
.ab-rejected{color:var(--red);background:var(--red-dim)}

/* ── Q-PLAN ── */
.ws-qplan-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.ws-qplan-col{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px;min-height:100px}
.ws-qplan-col h4{font-size:12px;font-weight:700;color:var(--muted);margin-bottom:8px;text-align:center}
.ws-qplan-item{font-size:12px;color:var(--text);padding:6px 8px;background:var(--surface2);border-radius:6px;margin-bottom:6px}

/* ── PLANNING STEPS ── */
.ws-planning-steps ol{padding-left:20px;font-size:13px;color:var(--gray)}
.ws-planning-steps ol li{margin-bottom:6px}

/* ── DOCS ── */
.ws-docs-grid{display:grid;gap:8px}
.ws-doc-row{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:8px}
.ws-doc-status{font-size:14px;flex-shrink:0;width:24px;text-align:center}
.ws-doc-name{flex:1;font-size:13px;font-weight:600;color:var(--text)}
.ws-doc-gate{font-size:10px;font-weight:700;color:var(--muted);flex-shrink:0}
.ws-doc-link{font-size:11px;color:var(--violet);text-decoration:none;font-weight:600;flex-shrink:0}

/* ── LOG ── */
.ws-log-entry{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px}
.ws-log-entry:last-child{border-bottom:none}
.ws-log-date{color:var(--muted);font-size:11px;flex-shrink:0;min-width:80px}
.ws-log-action{font-weight:600;color:var(--text)}
.ws-log-details{color:var(--gray)}
.ws-log-user{font-size:11px;color:var(--muted)}

/* ── NOT FOUND ── */
.ws-not-found{text-align:center;padding:80px 20px}
.ws-not-found h2{font-size:22px;color:var(--text);margin-bottom:10px}
.ws-not-found p{color:var(--muted);margin-bottom:20px}

/* ── TOAST ── */
.ws-toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface2);color:var(--text);padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;z-index:100;border:1px solid var(--border)}
.ws-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── ASSIGN MEMBER MODAL ── */
.ws-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:90;display:none;align-items:center;justify-content:center}
.ws-modal-overlay.show{display:flex}
.ws-modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;max-width:400px;width:90%}
.ws-modal h4{font-size:15px;font-weight:700;margin-bottom:14px}

/* ── STATUS CARD (светофор) ── */
.ws-status-card { display:flex; align-items:flex-start; gap:16px; padding:16px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-sm); }
/* ws-light removed — status is now auto-calculated */
.ws-status-text { flex:1; }
.ws-status-date { font-size:11px; color:var(--muted); margin-top:4px; }

/* ── TEAMS GRID ── */
.ws-teams-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:8px; margin-bottom:8px; }
.ws-team-card { padding:12px 14px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-sm); }
.ws-tc-name { font-size:13px; font-weight:700; color:var(--text); margin-bottom:4px; }
.ws-tc-meta { font-size:11px; color:var(--muted); }
.ws-teams-link { font-size:12px; color:var(--violet); text-decoration:none; font-weight:600; }
.ws-teams-link:hover { text-decoration:underline; }

/* ── RESPONSIVE ── */
@media(max-width:768px){
  .ws-wrap{padding:16px 12px 80px}
  .ws-header{flex-direction:column}
  .ws-qplan-grid{grid-template-columns:1fr 1fr}
  .ws-kpi-grid{grid-template-columns:1fr 1fr}
  .ws-init-name{white-space:normal}
}

/* ── PRINT ── */
@media print{
  body{background:#fff;color:#000}
  .ws-tabs,.ws-header-right,.ws-toast,.ws-modal-overlay,.ws-umodal-overlay,.ws-add-member-btn,.ws-create-init-btn,.ws-create-goal-btn,.ws-init-form{display:none!important}
  .ws-panel{display:block!important}
  .ws-section{break-inside:avoid}
}
/* ── Defense panel (формат Этина: 10 мин на проект) ── */
.defense-wrap{display:flex;flex-direction:column;gap:14px}
.def-section{display:flex;flex-direction:column;gap:8px}
.def-section-hdr{display:flex;align-items:baseline;gap:10px;padding:10px 14px;border-radius:8px 8px 0 0;background:linear-gradient(90deg,rgba(123,92,184,0.08),rgba(123,92,184,0));border-left:3px solid var(--violet)}
.def-section-num{font-family:'SF Mono','Consolas',monospace;font-size:10px;font-weight:800;color:var(--violet);letter-spacing:.05em}
.def-section-title{font-family:var(--font-head);font-size:14px;font-weight:800;color:var(--text)}
.def-hdr{display:flex;justify-content:space-between;align-items:flex-start;gap:18px;padding:18px 22px;border-radius:12px;background:linear-gradient(135deg,rgba(123,92,184,0.08),rgba(0,212,180,0.05));border:1px solid var(--border)}
.def-hdr-eyebrow{font-family:var(--font-head);font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--violet);margin-bottom:4px}
.def-hdr-title{font-family:var(--font-head);font-size:20px;font-weight:900;color:var(--text)}
.def-hdr-stage{display:flex;flex-direction:column;align-items:flex-end;gap:2px;flex-shrink:0}
.def-stage-num{font-family:'SF Mono','Consolas',monospace;font-size:22px;font-weight:900;color:var(--violet)}
.def-stage-name{font-size:11px;color:var(--muted);font-weight:600}
.def-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.def-block{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;display:flex;flex-direction:column;gap:6px}
.def-block.full{grid-column:1/-1}
.def-label{font-family:var(--font-head);font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.def-value{font-size:13px;color:var(--text);line-height:1.5;font-weight:500}
.def-empty{color:var(--muted);font-style:italic;font-weight:400}
.def-hint{font-size:10px;color:var(--muted);font-style:italic;line-height:1.4;margin-top:2px}
.def-list{margin:0;padding:0;list-style:none;display:flex;flex-direction:column;gap:4px}
.def-list li{font-size:12px;line-height:1.45;padding-left:14px;position:relative}
.def-list li::before{content:"›";position:absolute;left:0;color:var(--violet);font-weight:700}
.def-pl{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:3px 9px;border-radius:5px}
.def-pl.yes{background:rgba(0,212,180,.12);color:#00B89C;border:1px solid rgba(0,212,180,.3)}
.def-pl.no{background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
.def-footer{padding:12px 16px;border-radius:8px;background:var(--surface);border:1px dashed var(--border);font-size:12px;color:var(--muted);text-align:center}
.def-footer.def-ok{color:#00B89C;border-color:rgba(0,212,180,.4);background:rgba(0,212,180,.06);font-weight:600}
.def-footer code{font-family:'SF Mono','Consolas',monospace;background:var(--surface2);padding:1px 5px;border-radius:3px;font-size:11px;color:var(--text)}
@media(max-width:720px){
  .def-grid{grid-template-columns:1fr}
  .def-hdr{flex-direction:column;align-items:flex-start}
  .def-hdr-stage{flex-direction:row;gap:8px;align-items:baseline}
}

/* ── STAGE METRICS ── */
.ws-stage-metrics{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:16px}
.ws-stage-metrics h3{font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:14px}
.ws-stage-metrics-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.ws-stage-metrics-title .ws-sm-badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:5px;background:var(--violet-dim);color:var(--violet);border:1px solid var(--violet-border)}
.ws-sm-table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:14px}
.ws-sm-table th{text-align:left;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;padding:6px 10px;border-bottom:1px solid var(--border)}
.ws-sm-table td{padding:8px 10px;border-bottom:1px solid var(--border);color:var(--text)}
.ws-sm-table tr:last-child td{border-bottom:none}
.ws-sm-status{font-size:14px;text-align:center;cursor:pointer;user-select:none}
.ws-sm-phase{margin-top:14px;padding:12px;background:var(--surface2);border-radius:8px;border:1px solid var(--border)}
.ws-sm-phase-title{font-size:12px;font-weight:700;color:var(--violet);margin-bottom:6px}
.ws-sm-phase ul{margin:0;padding-left:18px;font-size:12px;color:var(--text);line-height:1.7}
/* Universal Modal component (showModal) */
.ws-umodal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:1000; display:flex; align-items:center; justify-content:center; }
.ws-umodal { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:24px; max-width:480px; width:90%; max-height:80vh; overflow-y:auto; }
.ws-umodal h3 { font-size:16px; font-weight:700; color:var(--text); margin-bottom:16px; }
.ws-umodal label { display:block; font-size:11px; font-weight:600; color:var(--muted); margin-bottom:4px; text-transform:uppercase; letter-spacing:.04em; }
.ws-umodal input, .ws-umodal select, .ws-umodal textarea { width:100%; padding:10px; background:var(--bg); border:1px solid var(--border); border-radius:6px; color:var(--text); font-family:inherit; font-size:13px; margin-bottom:12px; box-sizing:border-box; }
.ws-umodal textarea { min-height:80px; resize:vertical; }
.ws-umodal-actions { display:flex; gap:8px; justify-content:flex-end; margin-top:8px; }
.ws-umodal-btn { padding:10px 20px; border-radius:6px; font-family:inherit; font-size:12px; font-weight:700; cursor:pointer; border:none; }
.ws-umodal-btn-primary { background:var(--violet); color:#fff; }
.ws-umodal-btn-cancel { background:transparent; border:1px solid var(--border); color:var(--muted); }
.ws-umodal .ws-checklist-item { display:flex; align-items:center; gap:8px; font-size:13px; color:var(--text); margin-bottom:6px; }
.ws-umodal .ws-checklist-icon { font-size:16px; }
/* ── PLANNING WIZARD ── */
.pl-selector { display:flex; align-items:center; gap:8px; margin-bottom:20px; flex-wrap:wrap; }
.pl-selector select { padding:6px 12px; background:var(--surface); border:1px solid var(--border); border-radius:6px; color:var(--text); font-family:inherit; font-size:12px; }
.pl-q-btn { padding:6px 16px; border:1px solid var(--border); border-radius:6px; background:var(--surface); color:var(--muted); font-family:inherit; font-size:12px; font-weight:600; cursor:pointer; transition:all .15s; }
.pl-q-btn.active { background:var(--violet); color:#fff; border-color:var(--violet); }
.pl-q-btn:hover:not(.active) { color:var(--text); background:var(--surface2); }
.pl-step { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:16px; margin-bottom:12px; }
.pl-step-head { display:flex; align-items:center; gap:10px; margin-bottom:12px; }
.pl-step-num { width:28px; height:28px; border-radius:50%; background:var(--violet-dim); color:var(--violet); display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; flex-shrink:0; }
.pl-step-title { font-size:14px; font-weight:700; color:var(--text); }
.pl-goal-card { padding:12px; background:var(--surface); border:1px solid var(--border); border-radius:8px; margin-bottom:8px; }
.pl-goal-title { font-size:13px; font-weight:700; color:var(--text); margin-bottom:6px; }
.pl-kr-row { display:flex; align-items:center; gap:8px; font-size:12px; color:var(--text); padding:3px 0; }
.pl-kr-bar { flex:1; height:5px; background:var(--surface2); border-radius:3px; overflow:hidden; max-width:120px; }
.pl-kr-fill { height:100%; border-radius:3px; background:var(--teal); }
.pl-kr-pct { font-family:var(--mono); font-size:11px; color:var(--teal); min-width:36px; }
.pl-init-cols { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.pl-init-col h4 { font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; margin-bottom:8px; }
.pl-init-item { display:flex; align-items:center; gap:8px; padding:6px 8px; background:var(--surface); border:1px solid var(--border); border-radius:6px; margin-bottom:4px; font-size:12px; }
.pl-init-name { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:var(--text); }
.pl-init-rice { font-family:var(--mono); font-size:11px; font-weight:700; color:var(--violet); }
.pl-check-row { display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid var(--border); font-size:13px; }
.pl-check-row:last-child { border-bottom:none; }
.pl-check-icon { font-size:16px; flex-shrink:0; }
.pl-check-done .pl-check-icon { color:var(--teal); }
.pl-check-pending .pl-check-icon { color:var(--muted); }
.pl-progress-summary { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px; }
.pl-progress-chip { font-size:11px; padding:4px 10px; border-radius:4px; background:var(--surface); border:1px solid var(--border); }
.pl-retro-area { width:100%; background:var(--surface); border:1px solid var(--border); border-radius:6px; padding:8px; color:var(--text); font-family:inherit; font-size:12px; resize:vertical; min-height:60px; }
.pl-retro-readonly { padding:8px 12px; background:var(--surface); border:1px solid var(--border); border-radius:6px; font-size:12px; color:var(--text); line-height:1.5; white-space:pre-wrap; min-height:40px; }
.pl-prio-table { width:100%; border-collapse:collapse; font-size:12px; }
.pl-prio-wrap { overflow-x:auto; -webkit-overflow-scrolling:touch; }
.pl-prio-table th { text-align:left; font-size:11px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; padding:6px 8px; border-bottom:1px solid var(--border); }
.pl-prio-table td { padding:8px; border-bottom:1px solid var(--border); color:var(--text); }
.pl-prio-table tr:last-child td { border-bottom:none; }
.pl-prio-table tr:hover td { background:var(--surface2); }
.pl-unfinished-item { display:flex; align-items:center; gap:8px; padding:6px 0; border-bottom:1px solid var(--border); font-size:12px; }
.pl-unfinished-item:last-child { border-bottom:none; }
@media(max-width:640px) { .pl-init-cols { grid-template-columns:1fr; } }
</style>

<body>
<div class="ws-wrap" id="ws-app">
  <!-- JS renders everything -->
</div>
<div class="ws-toast" id="ws-toast"></div>

<!-- Assign member modal -->
<div class="ws-modal-overlay" id="assign-modal">
  <div class="ws-modal">
    <h4>Назначить участника</h4>
    <div class="ws-form-row"><div style="flex:1">
      <label>Пользователь</label>
      <select id="assign-user"><option value="">Выберите...</option></select>
    </div></div>
    <div class="ws-form-row"><div style="flex:1">
      <label>Роль</label>
      <select id="assign-role">
        <option value="member">Участник</option>
        <option value="owner">Владелец</option>
      </select>
    </div></div>
    <div class="ws-form-actions">
      <button class="ws-btn-primary" id="btn-confirm-member">Назначить</button>
      <button class="ws-btn-secondary" id="btn-cancel-member">Отмена</button>
    </div>
  </div>
</div>

<script src="./platform.js"></script>
<script src="./js/auth.js"></script>
<script>
(function() {
  'use strict';

  // ── Constants ──
  var GATE_NAMES = ['O\xB70 Заявка','O\xB71 Проектирование','O\xB72 Запуск MVP','O\xB73 Рост метрик','O\xB74 Интеграция','O\xB75 Масштаб'];
  var TECH_GATE_NAMES = ['T\xB70 Заявка','T\xB71 Проектирование','T\xB72 Реализация','T\xB73 Приёмка'];
  var STATUS_LABELS = {'on-track':'Активен','at-risk':'Риск','blocked':'Заблокирован','screening':'Заявка (O\xB70)','pending':'Заявка (O\xB70)','done':'Завершён','paused':'Приостановлен','active':'Активен','archived':'Архив','draft':'Черновик','wip':'В работе','planned':'Запланировано','backlog':'Бэклог'};
  var STATUS_CLS = {'on-track':'sb-on-track','at-risk':'sb-at-risk','blocked':'sb-blocked','paused':'sb-paused','done':'sb-done','active':'sb-active','pending':'sb-pending','archived':'sb-archived','draft':'sb-paused','screening':'sb-pending'};
  var GOAL_TYPE_LABELS = {'product':'Продуктовая','strategic':'Стратегическая','growth':'Рост'};
  var GOAL_TYPE_CLS = {'product':'gt-product','strategic':'gt-strategic','growth':'gt-growth'};
  var APPROVAL_LABELS = {'approved':'Согласовано','pending':'На согласовании','rejected':'Отклонено'};
  var APPROVAL_CLS = {'approved':'ab-approved','pending':'ab-pending','rejected':'ab-rejected'};
  var DOC_STATUS_ICONS = {'done':'\u2705','wip':'\u23F3','none':'\u274C'};

  // ── Modal component ──
  function showModal(title, fields, onConfirm, opts) {
    opts = opts || {};
    var overlay = document.createElement('div');
    overlay.className = 'ws-umodal-overlay';
    var modal = document.createElement('div');
    modal.className = 'ws-umodal';
    var h3 = document.createElement('h3');
    h3.textContent = title;
    modal.appendChild(h3);

    // Optional HTML block (for checklists etc.)
    if (opts.htmlBefore) {
      var div = document.createElement('div');
      div.innerHTML = opts.htmlBefore;
      modal.appendChild(div);
    }

    fields.forEach(function(f) {
      var lbl = document.createElement('label');
      lbl.textContent = f.label;
      lbl.setAttribute('for', 'ws-modal-' + f.id);
      modal.appendChild(lbl);
      var el;
      if (f.type === 'select') {
        el = document.createElement('select');
        (f.options || []).forEach(function(o) {
          var opt = document.createElement('option');
          if (typeof o === 'object') { opt.value = o.value; opt.textContent = o.label; }
          else { opt.value = o; opt.textContent = o; }
          el.appendChild(opt);
        });
        if (f.value) el.value = f.value;
      } else if (f.type === 'textarea') {
        el = document.createElement('textarea');
        el.placeholder = f.placeholder || '';
        if (f.value !== undefined) el.value = f.value;
      } else {
        el = document.createElement('input');
        el.type = f.type || 'text';
        el.placeholder = f.placeholder || '';
        if (f.value !== undefined) el.value = f.value;
      }
      el.id = 'ws-modal-' + f.id;
      modal.appendChild(el);
    });

    var actions = document.createElement('div');
    actions.className = 'ws-umodal-actions';
    var btnCancel = document.createElement('button');
    btnCancel.className = 'ws-umodal-btn ws-umodal-btn-cancel';
    btnCancel.textContent = opts.cancelLabel || 'Отмена';
    var btnOk = document.createElement('button');
    btnOk.className = 'ws-umodal-btn ws-umodal-btn-primary';
    btnOk.textContent = opts.confirmLabel || 'Подтвердить';
    if (opts.disableConfirm) {
      btnOk.disabled = true;
      btnOk.style.opacity = '0.4';
      btnOk.style.cursor = 'not-allowed';
    }
    actions.appendChild(btnCancel);
    actions.appendChild(btnOk);
    modal.appendChild(actions);
    overlay.appendChild(modal);
    document.body.appendChild(overlay);

    function close() { if (overlay.parentNode) overlay.parentNode.removeChild(overlay); }
    function submit() {
      var values = {};
      fields.forEach(function(f) {
        var el = document.getElementById('ws-modal-' + f.id);
        values[f.id] = el ? el.value : '';
      });
      close();
      onConfirm(values);
    }

    btnCancel.addEventListener('click', function() { close(); if (opts.onCancel) opts.onCancel(); });
    overlay.addEventListener('click', function(e) { if (e.target === overlay) { close(); if (opts.onCancel) opts.onCancel(); } });
    document.addEventListener('keydown', function handler(e) {
      if (e.key === 'Escape') { close(); if (opts.onCancel) opts.onCancel(); document.removeEventListener('keydown', handler); }
    });
    btnOk.addEventListener('click', submit);

    // Focus first field
    var firstEl = fields.length ? document.getElementById('ws-modal-' + fields[0].id) : null;
    if (firstEl) setTimeout(function() { firstEl.focus(); }, 50);
  }

  // ── Stage Metrics (фокусные метрики по Gate) ──
  var STAGE_METRICS = {
    0: {
      name: 'Заявка', phase: 'Discovery',
      metrics: [
        { label: 'RICE Score', threshold: '\u2265 15' },
        { label: 'Бриф заполнен', threshold: '100%' }
      ],
      actions: [
        'Заполнить бриф продукта и указать целевую аудиторию',
        'Рассчитать RICE-приоритет',
        'Подготовить материалы для скрининга Gate 0'
      ]
    },
    1: {
      name: 'Разведка', phase: 'Discovery',
      metrics: [
        { label: 'CustDev-интервью', threshold: '\u2265 7' },
        { label: 'PSF подтверждён', threshold: 'Да' }
      ],
      actions: [
        'Провести минимум 7 CustDev-интервью с целевой аудиторией',
        'Зафиксировать Problem-Solution Fit',
        'Подготовить отчёт Discovery для Gate 1'
      ]
    },
    2: {
      name: 'Прототип', phase: 'Delivery',
      metrics: [
        { label: 'Activation Rate', threshold: '\u2265 30%' },
        { label: 'Unit Economics', threshold: '\u2265 0' }
      ],
      actions: [
        'Запустить MVP и собрать первых пользователей',
        'Замерить Activation Rate на реальном трафике',
        'Рассчитать unit-экономику и убедиться в сходимости'
      ]
    },
    3: {
      name: 'Разгон', phase: 'Delivery',
      metrics: [
        { label: 'Revenue', threshold: '> план' },
        { label: 'NPS', threshold: '\u2265 40' }
      ],
      actions: [
        'Реализовать GTM-план и масштабировать каналы привлечения',
        'Настроить SLA поддержки и мониторинг метрик',
        'Достичь целевого NPS и выручки по плану'
      ]
    },
    4: {
      name: 'Экосистема', phase: 'Growth',
      metrics: [
        { label: 'Adoption (\u2265 2 продуктов)', threshold: '\u2265 2' },
        { label: 'GMV', threshold: 'Растёт' }
      ],
      actions: [
        'Интегрироваться минимум с 2 продуктами экосистемы',
        'Масштабировать GMV через кросс-продуктовые сценарии',
        'Снижать Churn и повышать Retention'
      ]
    },
    5: {
      name: 'Зрелость', phase: 'Growth',
      metrics: [
        { label: 'Market Share', threshold: 'Растёт' },
        { label: 'EBITDA', threshold: '\u2265 целевой' }
      ],
      actions: [
        'Оптимизировать маржинальность и операционные расходы',
        'Удерживать и наращивать долю рынка',
        'Оценить потенциал нового Discovery-цикла или архивации'
      ]
    }
  };

  var DEFAULT_ARTIFACTS = [
    {gate:0, name:'Product Brief', url:'', status:'none'},
    {gate:1, name:'CustDev Report', url:'', status:'none'},
    {gate:1, name:'PSF (Problem-Solution Fit)', url:'', status:'none'},
    {gate:2, name:'MVP Spec', url:'', status:'none'},
    {gate:2, name:'Unit Economics v1', url:'', status:'none'},
    {gate:3, name:'Growth Plan', url:'', status:'none'},
    {gate:3, name:'P&L Model', url:'', status:'none'},
    {gate:4, name:'Ecosystem Integration Plan', url:'', status:'none'},
    {gate:5, name:'Maturity Assessment', url:'', status:'none'}
  ];

  // ── State ──
  // Состояния жизненного цикла целей
  var GOAL_STATUS = {
    draft: { label: 'Черновик', color: 'var(--muted)' },
    pending: { label: 'На согласовании', color: 'var(--amber)' },
    approved: { label: 'Утверждена', color: 'var(--teal)' },
    in_progress: { label: 'В работе', color: 'var(--violet)' },
    closed: { label: 'Закрыта', color: 'var(--muted)' }
  };

  var DEFAULT_GOALS = [
    { id:'G-001', title:'Сделать Wibes местом, где залипают', type:'product', period:'H1 2026', productId:'ECO-01', owner:'PM Wibes', status:'approved', approvalStatus:'approved', keyResults:[{id:'KR-001',text:'Увеличить time spend на N%',current:0,target:100},{id:'KR-002',text:'Увеличить среднее кол-во просмотров на пользователя на N%',current:0,target:100},{id:'KR-003',text:'Техническое качество контента',current:0,target:100}] },
    { id:'G-002', title:'Увеличить GMV за счёт роста воронки', type:'product', period:'H1 2026', productId:'ECO-01', owner:'PM Wibes', status:'approved', approvalStatus:'approved', keyResults:[{id:'KR-004',text:'Увеличить GMV на просмотр на N%',current:0,target:100},{id:'KR-005',text:'Увеличить CTR добавления в корзину до N%',current:0,target:100},{id:'KR-006',text:'Увеличить CTR добавления в выкупы до N%',current:0,target:100}] },
    { id:'G-003', title:'Увеличить GMV за счёт роста аудитории', type:'product', period:'H1 2026', productId:'ECO-01', owner:'PM Wibes', status:'approved', approvalStatus:'approved', keyResults:[{id:'KR-007',text:'Увеличить DAU, сохранив долю платящих на N%',current:0,target:100},{id:'KR-008',text:'Увеличить sticky RR MoM на N%',current:0,target:100}] },
    { id:'G-010', title:'Запуск MVP WB Книги', type:'product', period:'H1 2026', productId:'ECO-04', owner:'PM WB Книги', status:'approved', approvalStatus:'approved', keyResults:[{id:'KR-010',text:'MAU 10K к июню',current:0,target:10000},{id:'KR-011',text:'Retention D7 30%',current:0,target:30}] }
  ];

  var GOALS_VERSION = 3; // Bump to reseed from okr.json
  function seedGoalsIfEmpty() {
    var goals = PT.load(PT.KEY_GOALS) || [];
    var gv = parseInt(localStorage.getItem('ECOTECH_GOALS_VERSION') || '0', 10);
    if (!goals.length || gv < GOALS_VERSION) {
      // Load from okr.json, fallback to DEFAULT_GOALS
      try {
        var xhr = new XMLHttpRequest();
        xhr.open('GET', 'data/okr.json', false);
        xhr.send();
        if (xhr.status === 200) goals = JSON.parse(xhr.responseText);
        else goals = DEFAULT_GOALS.map(function(g) { return JSON.parse(JSON.stringify(g)); });
      } catch(e) {
        goals = DEFAULT_GOALS.map(function(g) { return JSON.parse(JSON.stringify(g)); });
      }
      PT.save(PT.KEY_GOALS, goals);
      localStorage.setItem('ECOTECH_GOALS_VERSION', String(GOALS_VERSION));
    }
    return goals;
  }

  var _product = null, _allProducts = [], _backlog = [], _goals = [];
  var _expandedInit = null, _initView = 'type';
  var _filterStatus = 'all', _filterQuarter = 'all';
  var _plYear = new Date().getFullYear();
  var _plQ = Math.ceil((new Date().getMonth() + 1) / 3);
  var productId = getParam('id');
  var activeTab = getParam('tab') || 'passport';
  var app = document.getElementById('ws-app');

  // ── Helpers ──
  function esc(t) { return String(t || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  function getParam(name) {
    var r = new RegExp('[?&]' + name + '=([^&#]*)');
    var m = r.exec(window.location.search);
    return m ? decodeURIComponent(m[1]) : null;
  }

  function isTechSolution() { return _product && _product.type === 'tech_solution'; }
  function getActiveGateNames() { return isTechSolution() ? TECH_GATE_NAMES : GATE_NAMES; }

  function getRole() {
    if (!window.OrbAuth) return 'guest';
    var u = OrbAuth.getCurrentUser();
    return u ? u.role : 'guest';
  }
  function isGuest() { return getRole() === 'guest'; }
  function canEdit() { return window.OrbAuth ? OrbAuth.canEditProduct(productId) : false; }
  function isOwner() { return window.OrbAuth ? OrbAuth.isProductOwner(productId) : false; }
  function canReview() { var r = getRole(); return r === 'admin' || r === 'pmo_lead' || r === 'pmo' || r === 'lead'; }
  function isReadOnlyViewer() { var r = getRole(); return r === 'lead' || r === 'stakeholder'; }
  function canEditContent() { return !isReadOnlyViewer() && (isOwner() || getRole() === 'pmo'); }

  function displayName(p) { return isGuest() ? p.id : (p.name || p.id); }

  function riceScore(item) {
    if (!item.e || item.e === 0) return 0;
    return Math.round((item.r * item.i * item.c) / item.e);
  }

  function orbitColor(gate) {
    var c = ['var(--muted)','var(--blue)','var(--amber)','var(--teal)','var(--green)','var(--violet)'];
    return c[gate] || c[0];
  }

  function genId(prefix) { return prefix + '-' + Date.now().toString(36) + Math.random().toString(36).substr(2, 4); }

  function showToast(msg) {
    var t = document.getElementById('ws-toast');
    if (!t) return;
    t.textContent = msg || 'Готово';
    t.classList.add('show');
    setTimeout(function() { t.classList.remove('show'); }, 2200);
  }

  function formatDate(d) { if (!d) return '--'; return d.split('T')[0]; }

  function saveProducts() { PT.save(PT.KEY_PRODUCTS, _allProducts); }
  function saveBacklog() { PT.save(PT.KEY_BACKLOG, _backlog); }
  function saveGoals() { PT.save(PT.KEY_GOALS, _goals); }
  function addLog(action, details, entityType, entityId) { PT.addLog(productId, action, details, entityType, entityId); }

  // Единая ревью-система: Go / Revise / No-Go
  window.reviewInitiative = function(initId, decision) {
    var init = _backlog.find(function(i) { return i.id === initId; });
    if (!init) return;
    var labels = { go: 'Go', nogo: 'No-Go', revise: 'Revise' };

    // Go — confirm immediately (optional comment)
    // Revise — require conditions textarea
    // No-Go — require reason textarea
    var modalTitle = decision === 'go' ? 'Go: подтверждение'
      : decision === 'revise' ? 'Revise: условия доработки'
      : 'No-Go: причина отклонения';

    var fields = [];
    if (decision === 'go') {
      fields.push({ label: '\u041A\u043E\u043C\u043C\u0435\u043D\u0442\u0430\u0440\u0438\u0439 (\u043D\u0435\u043E\u0431\u044F\u0437\u0430\u0442\u0435\u043B\u044C\u043D\u043E)', type: 'textarea', id: 'comment', placeholder: '\u041A\u043E\u043C\u043C\u0435\u043D\u0442\u0430\u0440\u0438\u0439...' });
    } else if (decision === 'revise') {
      fields.push({ label: '\u0423\u0441\u043B\u043E\u0432\u0438\u044F \u0434\u043E\u0440\u0430\u0431\u043E\u0442\u043A\u0438', type: 'textarea', id: 'comment', placeholder: '\u041E\u043F\u0438\u0448\u0438\u0442\u0435, \u0447\u0442\u043E \u043D\u0443\u0436\u043D\u043E \u0434\u043E\u0440\u0430\u0431\u043E\u0442\u0430\u0442\u044C...' });
    } else {
      fields.push({ label: '\u041F\u0440\u0438\u0447\u0438\u043D\u0430 \u043E\u0442\u043A\u043B\u043E\u043D\u0435\u043D\u0438\u044F', type: 'textarea', id: 'comment', placeholder: '\u0423\u043A\u0430\u0436\u0438\u0442\u0435 \u043F\u0440\u0438\u0447\u0438\u043D\u0443...' });
    }

    showModal(modalTitle, fields, function(vals) {
      var d = decision;
      var comment = vals.comment || '';
      // Go → wip + approved; Revise → keep status, pending; No-Go → backlog + rejected
      if (d === 'go') {
        init.status = 'wip';
        init.approval = 'approved';
      } else if (d === 'revise') {
        init.approval = 'pending';
      } else {
        init.status = 'backlog';
        init.approval = 'rejected';
      }
      if (!init.reviews) init.reviews = [];
      var user = window.OrbAuth ? OrbAuth.getCurrentUser() : null;
      init.reviews.push({
        action: d,
        comment: comment,
        userName: user ? user.name : 'Unknown',
        date: new Date().toISOString().split('T')[0]
      });
      init.updatedAt = new Date().toISOString().split('T')[0];
      saveBacklog();
      addLog('review_' + d, init.name + ': ' + labels[d] + (comment ? ' \u2014 ' + comment : ''), 'initiative', initId);
      if (window.PT && PT.notify) {
        PT.notify({ type:'review_submitted', level:'high', recipientRole:'pm_owner', productId:productId, title:productId + ' \u2014 \u0440\u0435\u0432\u044C\u044E: ' + labels[d], text:init.name + (comment ? ': ' + comment : ''), action:{label:'\u041E\u0442\u043A\u0440\u044B\u0442\u044C',url:'workspace.html?id='+productId+'&tab=initiatives'} });
      }
      showToast(labels[d] + ' \u0437\u0430\u043F\u0438\u0441\u0430\u043D');
      render();
    });
  };

  function getProductInitiatives() {
    var r = [];
    for (var i = 0; i < _backlog.length; i++) {
      if (_backlog[i].productId === productId || _backlog[i].project === productId) r.push(_backlog[i]);
    }
    // Stakeholder scope filter: only show assigned initiatives
    if (getRole() === 'stakeholder') {
      var user = window.OrbAuth ? OrbAuth.getCurrentUser() : null;
      if (user && user.assignments) {
        var scopeIds = [];
        user.assignments.forEach(function(a) {
          if (a.productId === productId && Array.isArray(a.scope)) {
            scopeIds = scopeIds.concat(a.scope);
          }
        });
        if (scopeIds.length) {
          r = r.filter(function(init) { return scopeIds.indexOf(init.id) >= 0; });
        }
      }
    }
    return r;
  }
  function getProductGoals() {
    var r = [];
    for (var i = 0; i < _goals.length; i++) {
      if (_goals[i].productId === productId) r.push(_goals[i]);
    }
    return r;
  }
  function getProductLogs() {
    var all = PT.load(PT.KEY_CHANGELOG) || [];
    var r = [];
    for (var i = 0; i < all.length; i++) {
      if (all[i].productId === productId) r.push(all[i]);
    }
    return r;
  }
  function copyDefaults() {
    var r = [];
    for (var i = 0; i < DEFAULT_ARTIFACTS.length; i++) {
      var a = DEFAULT_ARTIFACTS[i];
      r.push({gate: a.gate, name: a.name, url: '', status: 'none'});
    }
    return r;
  }

  // ── Bootstrap ──
  if (!productId) { app.innerHTML = renderNotFound(); return; }

  PT.ensureProducts(function(products) {
    _allProducts = products;
    _product = null;
    for (var i = 0; i < products.length; i++) {
      if (products[i].id === productId) { _product = products[i]; break; }
    }
    if (!_product) { app.innerHTML = renderNotFound(); return; }
    document.title = displayName(_product) + ' \u2014 \u041E\u0420\u0411\u0418\u0422\u0410';
    _backlog = PT.load(PT.KEY_BACKLOG) || [];
    if (!_backlog.length) {
      // Seed backlog from JSON if localStorage empty
      var xhr2 = new XMLHttpRequest();
      xhr2.open('GET', 'data/backlog.json', false); // sync for simplicity
      try { xhr2.send(); if (xhr2.status === 200) { _backlog = JSON.parse(xhr2.responseText); PT.save(PT.KEY_BACKLOG, _backlog); } } catch(e) {}
    }
    _goals = seedGoalsIfEmpty();
    if (!_product.events) _product.events = [];
    if (!_product.artifacts) _product.artifacts = copyDefaults();
    render();
  });

  // ═══════════════════════════════════════════════════════════════
  //  RENDER
  // ═══════════════════════════════════════════════════════════════

  function render() {
    var html = '';
    var gateNum = _product.gate || 0;
    var gateColor = orbitColor(gateNum);
    var gateNames = getActiveGateNames();
    var gatePrefix = isTechSolution() ? 'T\xB7' : 'O\xB7';
    var statusCls = STATUS_CLS[_product.status] || 'sb-paused';
    var statusLabel = STATUS_LABELS[_product.status] || _product.status || '--';
    var initiatives = getProductInitiatives();
    var goals = getProductGoals();
    var editable = canEdit();

    // ── BREADCRUMB ──
    html += '<div class="ws-breadcrumb">';
    html += '<a href="catalog.html">\u041E\u0420\u0411\u0418\u0422\u0410</a> <span>\u203A</span> ';
    html += '<a href="catalog.html">\u041A\u0430\u0442\u0430\u043B\u043E\u0433</a> <span>\u203A</span> ';
    html += '<span id="ws-bc-name">' + esc(_product.id) + '</span>';
    html += '</div>';

    // ── HEADER ──
    html += '<div class="ws-header">';
    html += '<div class="ws-header-left">';
    html += '<span class="ws-gate-badge" style="color:' + gateColor + ';background:var(--surface2);border:2px solid ' + gateColor + '">' + gatePrefix + gateNum + '</span>';
    html += '<div>';
    html += '<h1 class="ws-title">' + esc(displayName(_product)) + '</h1>';
    html += '<div class="ws-meta">';
    html += '<span>' + esc(gateNames[gateNum] || gatePrefix + gateNum) + '</span>';
    html += '<span class="ws-status-badge ' + statusCls + '">' + esc(statusLabel) + '</span>';
    html += '<span>' + esc(_product.pmo || _product.owner || '--') + '</span>';
    if (_product.department) html += '<span>' + esc(_product.department) + '</span>';
    if (_product.updated) html += '<span style="color:var(--muted);">Обновлён ' + esc(_product.updated) + '</span>';
    html += '</div>';
    html += '</div>';
    html += '</div>';
    html += '<div class="ws-header-right">';
    if (canReview() && gateNum < gateNames.length - 1) {
      html += '<button onclick="advanceGate()" style="padding:8px 16px;background:var(--violet);color:#fff;border:none;border-radius:6px;font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;">Gate ' + (gateNum+1) + ' →</button>';
    }
    html += '<button class="ws-share-btn" id="ws-share" title="Скопировать ссылку">Поделиться</button>';
    var typeLabel = isTechSolution() ? '\u0422\u0435\u0445.\u0440\u0435\u0448\u0435\u043D\u0438\u0435' : '\u041F\u0440\u043E\u0434\u0443\u043A\u0442';
    var typeColor = isTechSolution() ? 'var(--amber)' : 'var(--violet)';
    var typeDim = isTechSolution() ? 'var(--amber-dim)' : 'var(--violet-dim)';
    html += '<span class="ws-type-badge" style="color:' + typeColor + ';background:' + typeDim + ';border:1px solid ' + typeColor + '">' + typeLabel + '</span>';
    html += '</div>';
    html += '</div>';

    // ── TABS ──
    html += '<div class="ws-tabs" id="ws-tabs">';
    html += tabBtn('passport', '\u041F\u0430\u0441\u043F\u043E\u0440\u0442');
    html += tabBtn('defense', '\u041A\u0430\u0440\u0442\u043E\u0447\u043A\u0430 \u043F\u0440\u043E\u0435\u043A\u0442\u0430');
    html += tabBtn('initiatives', '\u0418\u043D\u0438\u0446\u0438\u0430\u0442\u0438\u0432\u044B', initiatives.length);
    html += tabBtn('goals', '\u041F\u043B\u0430\u043D\u0438\u0440\u043E\u0432\u0430\u043D\u0438\u0435', goals.length);
    if (!isGuest()) {
      html += tabBtn('docs', '\u0414\u043E\u043A\u0443\u043C\u0435\u043D\u0442\u044B');
      html += tabBtn('log', '\u041B\u043E\u0433');
    }
    html += '</div>';

    // ── PANELS ──
    html += '<div class="ws-panel' + (activeTab === 'passport' ? ' active' : '') + '" id="panel-passport">' + renderPassport(editable, initiatives, goals) + '</div>';
    html += '<div class="ws-panel' + (activeTab === 'defense' ? ' active' : '') + '" id="panel-defense">' + renderDefense(initiatives) + '</div>';
    html += '<div class="ws-panel' + (activeTab === 'initiatives' ? ' active' : '') + '" id="panel-initiatives">' + renderInitiatives(initiatives, editable) + '</div>';
    html += '<div class="ws-panel' + (activeTab === 'goals' ? ' active' : '') + '" id="panel-goals">' + renderPlanning(goals, initiatives, editable) + '</div>';
    if (!isGuest()) {
      html += '<div class="ws-panel' + (activeTab === 'docs' ? ' active' : '') + '" id="panel-docs">' + renderDocs(editable) + '</div>';
      html += '<div class="ws-panel' + (activeTab === 'log' ? ' active' : '') + '" id="panel-log">' + renderLog() + '</div>';
    }

    app.innerHTML = html;
    initTabs();
    initShareButton();
    initEditableFields(editable);
    initInitiatives(initiatives, editable);
    initPlanning(goals, initiatives, editable);
    initAssignMember();
    renderTeams();
  }

  function tabBtn(id, label, count) {
    var cls = activeTab === id ? ' active' : '';
    var c = typeof count === 'number' ? '<span class="ws-tab-count">' + count + '</span>' : '';
    return '<button class="ws-tab' + cls + '" data-tab="' + id + '">' + esc(label) + c + '</button>';
  }

  // ── Status Card handler ──
  // Статус продукта вычисляется автоматически из метрик/инициатив/KR

  window.advanceGate = function() {
    if (!_product) return;
    var role = getRole();
    if (role !== 'admin' && role !== 'pmo_lead' && role !== 'pmo') {
      showToast('Только PMO Lead / PMO / Admin может переводить продукт на следующую стадию');
      return;
    }
    var currentGate = _product.gate || 0;
    var gateNames = isTechSolution() ? TECH_GATE_NAMES : GATE_NAMES;
    if (currentGate >= gateNames.length - 1) {
      showToast('Продукт уже на финальной стадии');
      return;
    }
    var nextGate = currentGate + 1;
    var nextName = gateNames[nextGate];

    // Build artifact status summary for current gate
    var artifacts = _product.artifacts || [];
    var gateArtifacts = artifacts.filter(function(a) { return a.gate === currentGate; });
    var artStatus = '';
    if (gateArtifacts.length) {
      artStatus = '\n\nАртефакты Gate ' + currentGate + ':';
      gateArtifacts.forEach(function(a) {
        var icon = a.status === 'done' ? '✅' : a.status === 'wip' ? '⏳' : '❌';
        artStatus += '\n  ' + icon + ' ' + a.name + ' — ' + (a.status === 'done' ? 'готов' : a.status === 'wip' ? 'в работе' : 'не начат');
      });
    }

    var user = window.OrbAuth ? OrbAuth.getCurrentUser() : null;
    var userName = user ? user.name : 'Unknown';

    // Build checklist HTML for artifacts
    var checklistHtml = '';
    if (gateArtifacts.length) {
      checklistHtml = '<div style="margin-bottom:12px">';
      gateArtifacts.forEach(function(a) {
        var icon = a.status === 'done' ? '✅' : a.status === 'wip' ? '⏳' : '❌';
        var label = a.status === 'done' ? 'готов' : a.status === 'wip' ? 'в работе' : 'не начат';
        checklistHtml += '<div class="ws-checklist-item"><span class="ws-checklist-icon">' + icon + '</span> ' + a.name + ' — ' + label + '</div>';
      });
      checklistHtml += '</div>';
    }

    // Проверка метрик стадии перед переходом
    var metricsDef = STAGE_METRICS[currentGate];
    var metricStatuses = (_product.stageMetricStatus && _product.stageMetricStatus['g' + currentGate]) || {};
    var failCount = 0;
    var totalMetrics = 0;
    var metricWarningHtml = '';
    if (metricsDef && metricsDef.metrics && metricsDef.metrics.length) {
      totalMetrics = metricsDef.metrics.length;
      metricsDef.metrics.forEach(function(m, idx) {
        var st = metricStatuses[idx];
        if (st === '\u2717') failCount++;
      });
      if (failCount > 0 && failCount < totalMetrics) {
        metricWarningHtml = '<div style="background:var(--amber-dim);border:1px solid var(--amber-border);color:var(--amber);padding:10px 12px;border-radius:8px;margin-bottom:12px;font-size:12px;font-weight:600">' +
          '\u26A0\uFE0F Внимание: ' + failCount + ' из ' + totalMetrics + ' метрик не пройдены. PMO может выполнить override.' +
          '</div>';
      } else if (failCount === totalMetrics) {
        metricWarningHtml = '<div style="background:var(--red-dim);border:1px solid var(--red);color:var(--red);padding:10px 12px;border-radius:8px;margin-bottom:12px;font-size:12px;font-weight:700">' +
          '\u274C Все метрики не пройдены. Переход заблокирован.' +
          '</div>';
      }
    }
    var allFail = totalMetrics > 0 && failCount === totalMetrics;

    showModal('Перевод на ' + nextName, [
      { label: 'Комментарий (необязательно)', type: 'textarea', id: 'comment', placeholder: '' }
    ], function(vals) {
      var oldGate = currentGate;
      _product.gate = nextGate;
      if (_product.status === 'screening' || _product.status === 'pending') _product.status = 'on-track';
      _product.updatedAt = new Date().toISOString().split('T')[0];

      // Gate approval record
      if (!_product.gateHistory) _product.gateHistory = [];
      _product.gateHistory.push({
        fromGate: currentGate,
        toGate: nextGate,
        approvedBy: userName,
        role: role,
        date: new Date().toISOString().split('T')[0],
        comment: vals.comment || ''
      });

      saveProducts();
      addLog('gate_transition', 'Переход: ' + gateNames[currentGate] + ' → ' + nextName + ' (утвердил: ' + userName + ')', 'product', productId);
      if (window.PT && PT.notify) {
        PT.notify({
          type: 'gate_transition',
          level: 'high',
          recipientRole: 'pm_owner',
          productId: productId,
          title: productId + ' переведён на ' + nextName,
          text: 'Gate ' + currentGate + ' пройден. Утвердил: ' + userName,
          action: { label: 'Открыть', url: 'workspace.html?id=' + productId }
        });
      }
      showToast('Переведено на ' + nextName);
      render();

      // Показ ретро-модала после перехода Gate
      showRetroModal(oldGate, gateNames);
    }, { confirmLabel: allFail ? 'Все метрики не пройдены' : 'Перевести', htmlBefore: '<p style="font-size:13px;color:var(--text);margin-bottom:8px">Текущий Gate: <b>' + gateNames[currentGate] + '</b> → <b>' + nextName + '</b><br>Утверждает: ' + userName + '</p>' + metricWarningHtml + checklistHtml, disableConfirm: allFail });
  };

  // Ретро-модал после перехода Gate
  function showRetroModal(oldGate, gateNames) {
    var gateName = gateNames[oldGate] || ('Gate ' + oldGate);
    showModal('Ретроспектива Gate ' + gateName, [
      { label: 'Что начать делать?', type: 'textarea', id: 'retro_start', placeholder: 'Start: новые практики, подходы...' },
      { label: 'Что прекратить?', type: 'textarea', id: 'retro_stop', placeholder: 'Stop: что мешало, не работало...' },
      { label: 'Что продолжать?', type: 'textarea', id: 'retro_continue', placeholder: 'Continue: что работало хорошо...' }
    ], function(vals) {
      if (!_product) return;
      _product.retrospectives = _product.retrospectives || [];
      _product.retrospectives.push({
        gate: oldGate,
        date: new Date().toISOString().split('T')[0],
        start: vals.retro_start || '',
        stop: vals.retro_stop || '',
        continue: vals.retro_continue || ''
      });
      saveProducts();
      addLog('retro', 'Ретроспектива Gate ' + gateName, 'product', productId);
      showToast('Ретроспектива сохранена');
    }, {
      confirmLabel: 'Сохранить',
      cancelLabel: 'Пропустить',
      onCancel: function() {
        addLog('retro_skipped', 'Ретроспектива Gate ' + gateName + ' пропущена', 'product', productId);
      }
    });
  }

  // ── Stage Metric Status cycling (✓ / ✗ / —) ──
  window.cycleStageMetricStatus = function(td) {
    if (!_product || !canEditContent()) return;
    var gate = td.getAttribute('data-gate');
    var idx = td.getAttribute('data-idx');
    var cycle = ['\u2014', '\u2713', '\u2717'];
    var cur = td.textContent.trim();
    var next = cycle[(cycle.indexOf(cur) + 1) % cycle.length];
    td.textContent = next;
    if (!_product.stageMetricStatus) _product.stageMetricStatus = {};
    if (!_product.stageMetricStatus['g' + gate]) _product.stageMetricStatus['g' + gate] = {};
    _product.stageMetricStatus['g' + gate][idx] = next;
    saveProducts();
  };

  // ── Teams rendering ──
  function renderTeams() {
    var container = document.getElementById('ws-teams');
    if (!container) return;

    var teams = JSON.parse(localStorage.getItem('ECOTECH_TEAMS') || '[]');
    var productTeams = teams.filter(function(t) { return t.productId === productId && t.status === 'active'; });
    var users = window.OrbAuth ? OrbAuth.getUsers() : [];

    if (!productTeams.length) {
      container.innerHTML = '<div style="color:var(--muted);font-size:13px;">\u041A\u043E\u043C\u0430\u043D\u0434\u044B \u043D\u0435 \u043D\u0430\u0437\u043D\u0430\u0447\u0435\u043D\u044B</div>';
      return;
    }

    var html = '';
    productTeams.forEach(function(team) {
      var lead = users.find(function(u) { return u.id === team.lead; });
      var memberCount = team.members ? team.members.length : 0;
      var scopeCount = team.initiativeScope ? team.initiativeScope.length : 0;

      html += '<div class="ws-team-card">' +
        '<div class="ws-tc-name">' + esc(team.name) + '</div>' +
        '<div class="ws-tc-meta">' +
          'Lead: ' + (lead ? esc(lead.name) : '\u2014') +
          ' \u00B7 ' + memberCount + ' \u0443\u0447\u0430\u0441\u0442\u043D\u0438\u043A' + (memberCount > 1 ? '\u043E\u0432' : '') +
          ' \u00B7 ' + scopeCount + ' \u0438\u043D\u0438\u0446\u0438\u0430\u0442\u0438\u0432' +
        '</div>' +
      '</div>';
    });

    container.innerHTML = html;

    // Show teams management link for admin/pmo
    var role = getRole();
    if (role === 'admin' || role === 'pmo_lead' || role === 'pmo' || isOwner()) {
      var link = document.getElementById('teams-link');
      if (link) link.style.display = '';
    }
  }

  // ═══════════════════════════════════════════════════════════════
  //  TAB 1: PASSPORT
  // ═══════════════════════════════════════════════════════════════

  function renderDefense(initiatives) {
    var p = _product || {};
    var g = (typeof p.gate === 'number') ? p.gate : 0;
    var stageName = (GATE_NAMES[g] || ('О·' + g));

    function val(v, fallback){
      if (v == null || v === '' || (Array.isArray(v) && !v.length)) {
        return '<span class="def-empty">' + esc(fallback || '—') + '</span>';
      }
      if (Array.isArray(v)) {
        return '<ul class="def-list">' + v.map(function(x){ return '<li>' + esc(x) + '</li>'; }).join('') + '</ul>';
      }
      return esc(v);
    }

    function pnlHtml(pl){
      if (pl && typeof pl === 'object') {
        var has = !!pl.exists;
        var nums = pl.numbers || pl.metrics || '';
        var html = '<span class="def-pl ' + (has ? 'yes' : 'no') + '">' + (has ? '✓ Есть' : '— Нет') + '</span>';
        if (has && nums) html += '<div style="margin-top:6px;font-size:12px;color:var(--text);font-weight:500">' + esc(nums) + '</div>';
        return html;
      }
      if (pl) return '<span class="def-pl yes">' + esc(pl) + '</span>';
      return '<span class="def-empty">—</span>';
    }

    function block(label, html, hint, full) {
      return '<div class="def-block' + (full ? ' full' : '') + '">'
        + '<div class="def-label">' + esc(label) + '</div>'
        + '<div class="def-value">' + html + '</div>'
        + (hint ? '<div class="def-hint">' + esc(hint) + '</div>' : '')
        + '</div>';
    }

    // Чекпоинты — берём из p.checkpoints или агрегируем done-инициативы
    var cp = p.checkpoints;
    if (!cp || !cp.length) {
      var done = (initiatives || []).filter(function(i){ return i.status === 'done'; });
      if (done.length) cp = done.map(function(i){ return (i.stage ? i.stage + ' · ' : '') + i.name + ' — done'; });
    }

    // Команда — из p.team или owner/pm
    var team = p.team;
    if ((!team || !team.length) && (p.owner || p.pm)) team = [p.owner || p.pm];

    // Источник P&L: новое поле p.pnl, fallback на старое p.pipeline
    var pnlSource = p.pnl != null ? p.pnl : p.pipeline;

    function blockSection(num, title, gridHtml) {
      return '<div class="def-section">'
        + '<div class="def-section-hdr"><span class="def-section-num">Блок ' + num + '</span><span class="def-section-title">' + esc(title) + '</span></div>'
        + '<div class="def-grid">' + gridHtml + '</div>'
        + '</div>';
    }

    var html = '<div class="defense-wrap">';

    // Header
