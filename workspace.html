<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Карточка продукта — ОРБИТА</title>
<link rel="stylesheet" href="./design-system.css">
<style>
/* ── BASE ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;min-height:100vh;font-size:14px;line-height:1.6}

/* ── LAYOUT ── */
.ws-wrap{max-width:1100px;margin:0 auto;padding:32px 24px 120px}

/* ── BREADCRUMB ── */
.ws-breadcrumb{font-size:12px;color:var(--muted);margin-bottom:20px;display:flex;align-items:center;gap:6px}
.ws-breadcrumb a{color:var(--violet);text-decoration:none;font-weight:600}
.ws-breadcrumb a:hover{text-decoration:underline}

/* ── HEADER ── */
.ws-header{display:flex;align-items:flex-start;gap:16px;flex-wrap:wrap;margin-bottom:24px}
.ws-header-left{flex:1;min-width:0;display:flex;align-items:flex-start;gap:14px}
.ws-gate-badge{font-family:'SF Mono','Consolas',monospace;font-size:13px;font-weight:700;padding:6px 14px;border-radius:8px;white-space:nowrap;flex-shrink:0;margin-top:2px}
.ws-title{font-size:26px;font-weight:800;line-height:1.2;margin-bottom:4px}
.ws-meta{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.ws-header-right{display:flex;gap:8px;align-items:center;flex-shrink:0}
.ws-share-btn{font-size:12px;font-weight:600;padding:6px 14px;border-radius:8px;border:1px solid var(--border-hi);background:transparent;color:var(--text);cursor:pointer;font-family:inherit}
.ws-share-btn:hover{background:var(--surface2)}
.ws-type-badge{font-size:10px;font-weight:700;padding:3px 10px;border-radius:6px;white-space:nowrap}
.ws-status-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:6px;white-space:nowrap}
.ws-status-badge::before{content:'';display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:5px;vertical-align:middle}
.sb-active,.sb-on-track{color:var(--teal);background:var(--teal-dim);border:1px solid var(--teal-border)}
.sb-active::before,.sb-on-track::before{background:var(--teal)}
.sb-at-risk,.sb-pending{color:var(--amber);background:var(--amber-dim);border:1px solid var(--amber-border)}
.sb-at-risk::before,.sb-pending::before{background:var(--amber)}
.sb-blocked{color:var(--red);background:var(--red-dim);border:1px solid var(--red)}
.sb-blocked::before{background:var(--red)}
.sb-paused,.sb-archived,.sb-done{color:var(--muted);background:var(--surface2);border:1px solid var(--border)}
.sb-paused::before,.sb-archived::before,.sb-done::before{background:var(--muted)}

/* ── TABS ── */
.ws-tabs{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:24px;overflow-x:auto}
.ws-tab{font-family:inherit;font-size:13px;font-weight:600;padding:10px 16px;border:none;background:transparent;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:color .15s,border-color .15s}
.ws-tab:hover{color:var(--text)}
.ws-tab.active{color:var(--violet);border-bottom-color:var(--violet)}
.ws-tab-count{font-size:10px;font-weight:700;background:var(--surface2);color:var(--muted);padding:1px 6px;border-radius:10px;margin-left:6px}

/* ── PANELS ── */
.ws-panel{display:none}
.ws-panel.active{display:block}

/* ── SECTIONS ── */
.ws-section{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:16px}
.ws-section h3{font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:14px}

/* ── EDITABLE FIELDS ── */
.ws-field{margin-bottom:14px}
.ws-field:last-child{margin-bottom:0}
.ws-field label{display:block;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
.ws-editable{font-size:13px;color:var(--text);line-height:1.5;padding:6px 8px;border-radius:6px;border:1px solid transparent;min-height:28px;outline:none;transition:border-color .15s}
.ws-editable[contenteditable="true"]:hover{border-color:var(--border-hi)}
.ws-editable[contenteditable="true"]:focus{border-color:var(--violet);background:var(--surface2)}

/* ── GATE TIMELINE ── */
.ws-gate-timeline{display:flex;align-items:center;gap:0;padding:8px 0}
.ws-gate-dot{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;border:2px solid var(--border);color:var(--muted);background:var(--surface);position:relative;z-index:1;flex-shrink:0;cursor:default}
.ws-gate-dot.completed{border-color:var(--teal);color:var(--teal);background:var(--teal-dim)}
.ws-gate-dot.current{border-color:var(--violet);color:#fff;background:var(--violet);box-shadow:0 0 0 3px var(--violet-dim)}
.ws-gate-line{flex:1;height:2px;background:var(--border);margin:0 -1px}
.ws-gate-line.completed{background:var(--teal)}
.ws-gate-label{font-size:9px;color:var(--muted);text-align:center;margin-top:4px;white-space:nowrap}

/* ── TEAM ── */
.ws-team-member{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.ws-team-member:last-child{border-bottom:none}
.ws-team-ava{width:28px;height:28px;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--violet);flex-shrink:0}
.ws-team-info{flex:1;min-width:0}
.ws-team-name{font-size:13px;font-weight:600;color:var(--text)}
.ws-team-role{font-size:11px;color:var(--muted)}
.ws-add-member-btn{font-family:inherit;font-size:12px;font-weight:600;color:var(--violet);background:transparent;border:1px dashed var(--violet-border);padding:8px 14px;border-radius:8px;cursor:pointer;margin-top:10px}
.ws-add-member-btn:hover{background:var(--violet-dim)}

/* ── KPI ── */
.ws-kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
.ws-kpi-card{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center}
.ws-kpi-val{font-size:20px;font-weight:800;color:var(--teal)}
.ws-kpi-lbl{font-size:11px;color:var(--muted);margin-top:2px}

/* ── LINKS ── */
.ws-links a{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:var(--violet);text-decoration:none;padding:4px 10px;border-radius:6px;border:1px solid var(--violet-border);margin:0 6px 6px 0;font-weight:600}
.ws-links a:hover{background:var(--violet-dim)}

/* ── INITIATIVES ── */
.ws-init-toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:12px;flex-wrap:wrap}
.ws-create-init-btn{font-family:inherit;font-size:12px;font-weight:700;padding:8px 16px;border-radius:8px;border:none;background:var(--violet);color:#fff;cursor:pointer}
.ws-create-init-btn:hover{opacity:.9}
.ws-init-views{display:flex;gap:2px}
.ws-view-btn{font-family:inherit;font-size:11px;font-weight:600;padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer}
.ws-view-btn.active{background:var(--violet-dim);color:var(--violet);border-color:var(--violet-border)}
.ws-init-group-title{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;padding:10px 0 6px;border-bottom:1px solid var(--border);margin-bottom:8px;cursor:pointer;user-select:none}
.ws-init-group-title:hover{color:var(--text)}
.ws-init-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:8px;border-left:3px solid var(--muted);overflow:hidden}
.ws-init-header{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;user-select:none}
.ws-init-header:hover{background:var(--surface2)}
.ws-init-name{flex:1;font-size:13px;font-weight:600;color:var(--text);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ws-init-rice{font-size:11px;font-weight:700;color:var(--amber);background:var(--amber-dim);padding:2px 8px;border-radius:4px;flex-shrink:0}
.ws-init-status{font-size:11px;font-weight:600;color:var(--muted);flex-shrink:0}
.ws-init-body{padding:14px;border-top:1px solid var(--border);font-size:13px;color:var(--gray)}
.ws-init-body .ws-field{margin-bottom:10px}

/* ── INIT FORM ── */
.ws-init-form{background:var(--surface);border:1px solid var(--violet-border);border-radius:10px;padding:20px;margin-bottom:16px}
.ws-init-form h4{font-size:14px;font-weight:700;margin-bottom:14px;color:var(--text)}
.ws-form-row{display:flex;gap:12px;margin-bottom:10px;flex-wrap:wrap}
.ws-form-row label{font-size:11px;font-weight:600;color:var(--muted);display:block;margin-bottom:3px}
.ws-form-row input,.ws-form-row select,.ws-form-row textarea{font-family:inherit;font-size:13px;padding:7px 10px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text);width:100%;outline:none}
.ws-form-row input:focus,.ws-form-row select:focus,.ws-form-row textarea:focus{border-color:var(--violet)}
.ws-form-row textarea{resize:vertical;min-height:60px}
.ws-form-actions{display:flex;gap:8px;margin-top:14px}
.ws-btn-primary{font-family:inherit;font-size:12px;font-weight:700;padding:8px 18px;border-radius:8px;border:none;background:var(--violet);color:#fff;cursor:pointer}
.ws-btn-secondary{font-family:inherit;font-size:12px;font-weight:700;padding:8px 18px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer}

/* ── GOALS ── */
.ws-goal-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:10px}
.ws-goal-name{font-size:14px;font-weight:700;color:var(--text);margin-bottom:6px}
.ws-goal-type{font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;margin-left:8px}
.ws-goal-type.gt-product{color:var(--teal);background:var(--teal-dim)}
.ws-goal-type.gt-strategic{color:var(--violet);background:var(--violet-dim)}
.ws-goal-type.gt-growth{color:var(--amber);background:var(--amber-dim)}
.ws-kr-bar{height:6px;background:var(--surface2);border-radius:3px;margin-top:6px;overflow:hidden}
.ws-kr-fill{height:100%;border-radius:3px;background:var(--teal);transition:width .3s}
.ws-kr-label{font-size:11px;color:var(--muted);margin-top:3px;display:flex;justify-content:space-between}
.ws-create-goal-btn{font-family:inherit;font-size:12px;font-weight:600;color:var(--violet);background:transparent;border:1px dashed var(--violet-border);padding:8px 14px;border-radius:8px;cursor:pointer;margin-top:10px}
.ws-approval-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;margin-left:8px}
.ab-approved{color:var(--teal);background:var(--teal-dim)}
.ab-pending{color:var(--amber);background:var(--amber-dim)}
.ab-rejected{color:var(--red);background:var(--red-dim)}

/* ── Q-PLAN ── */
.ws-qplan-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.ws-qplan-col{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px;min-height:100px}
.ws-qplan-col h4{font-size:12px;font-weight:700;color:var(--muted);margin-bottom:8px;text-align:center}
.ws-qplan-item{font-size:12px;color:var(--text);padding:6px 8px;background:var(--surface2);border-radius:6px;margin-bottom:6px}

/* ── PLANNING STEPS ── */
.ws-planning-steps ol{padding-left:20px;font-size:13px;color:var(--gray)}
.ws-planning-steps ol li{margin-bottom:6px}

/* ── DOCS ── */
.ws-docs-grid{display:grid;gap:8px}
.ws-doc-row{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:8px}
.ws-doc-status{font-size:14px;flex-shrink:0;width:24px;text-align:center}
.ws-doc-name{flex:1;font-size:13px;font-weight:600;color:var(--text)}
.ws-doc-gate{font-size:10px;font-weight:700;color:var(--muted);flex-shrink:0}
.ws-doc-link{font-size:11px;color:var(--violet);text-decoration:none;font-weight:600;flex-shrink:0}

/* ── LOG ── */
.ws-log-entry{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px}
.ws-log-entry:last-child{border-bottom:none}
.ws-log-date{color:var(--muted);font-size:11px;flex-shrink:0;min-width:80px}
.ws-log-action{font-weight:600;color:var(--text)}
.ws-log-details{color:var(--gray)}
.ws-log-user{font-size:11px;color:var(--muted)}

/* ── NOT FOUND ── */
.ws-not-found{text-align:center;padding:80px 20px}
.ws-not-found h2{font-size:22px;color:var(--text);margin-bottom:10px}
.ws-not-found p{color:var(--muted);margin-bottom:20px}

/* ── TOAST ── */
.ws-toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface2);color:var(--text);padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;z-index:100;border:1px solid var(--border)}
.ws-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── ASSIGN MEMBER MODAL ── */
.ws-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:90;display:none;align-items:center;justify-content:center}
.ws-modal-overlay.show{display:flex}
.ws-modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;max-width:400px;width:90%}
.ws-modal h4{font-size:15px;font-weight:700;margin-bottom:14px}

/* ── STATUS CARD (светофор) ── */
.ws-status-card { display:flex; align-items:flex-start; gap:16px; padding:16px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-sm); }
.ws-status-lights { display:flex; flex-direction:column; gap:6px; }
.ws-light { width:24px; height:24px; border-radius:50%; border:2px solid var(--border); cursor:pointer; transition:all .15s; }
.ws-light[data-status="green"] { background:var(--teal-dim); border-color:var(--teal-border); }
.ws-light[data-status="amber"] { background:var(--amber-dim); border-color:var(--amber-border); }
.ws-light[data-status="red"] { background:var(--red-dim); border-color:rgba(248,113,113,.3); }
.ws-light.active[data-status="green"] { background:var(--teal); box-shadow:0 0 8px var(--teal-dim); }
.ws-light.active[data-status="amber"] { background:var(--amber); box-shadow:0 0 8px var(--amber-dim); }
.ws-light.active[data-status="red"] { background:var(--red); box-shadow:0 0 8px var(--red-dim); }
.ws-status-text { flex:1; }
.ws-status-date { font-size:11px; color:var(--muted); margin-top:4px; }

/* ── TEAMS GRID ── */
.ws-teams-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:8px; margin-bottom:8px; }
.ws-team-card { padding:12px 14px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-sm); }
.ws-tc-name { font-size:13px; font-weight:700; color:var(--text); margin-bottom:4px; }
.ws-tc-meta { font-size:11px; color:var(--muted); }
.ws-teams-link { font-size:12px; color:var(--violet); text-decoration:none; font-weight:600; }
.ws-teams-link:hover { text-decoration:underline; }

/* ── RESPONSIVE ── */
@media(max-width:768px){
  .ws-wrap{padding:16px 12px 80px}
  .ws-header{flex-direction:column}
  .ws-qplan-grid{grid-template-columns:1fr 1fr}
  .ws-kpi-grid{grid-template-columns:1fr 1fr}
  .ws-init-name{white-space:normal}
}

/* ── PRINT ── */
@media print{
  body{background:#fff;color:#000}
  .ws-tabs,.ws-header-right,.ws-toast,.ws-modal-overlay,.ws-add-member-btn,.ws-create-init-btn,.ws-create-goal-btn,.ws-init-form{display:none!important}
  .ws-panel{display:block!important}
  .ws-section{break-inside:avoid}
}
</style>
</head>
<body>
<div class="ws-wrap" id="ws-app">
  <!-- JS renders everything -->
</div>
<div class="ws-toast" id="ws-toast"></div>

<!-- Assign member modal -->
<div class="ws-modal-overlay" id="assign-modal">
  <div class="ws-modal">
    <h4>Назначить участника</h4>
    <div class="ws-form-row"><div style="flex:1">
      <label>Пользователь</label>
      <select id="assign-user"><option value="">Выберите...</option></select>
    </div></div>
    <div class="ws-form-row"><div style="flex:1">
      <label>Роль</label>
      <select id="assign-role">
        <option value="member">Участник</option>
        <option value="owner">Владелец</option>
      </select>
    </div></div>
    <div class="ws-form-actions">
      <button class="ws-btn-primary" id="btn-confirm-member">Назначить</button>
      <button class="ws-btn-secondary" id="btn-cancel-member">Отмена</button>
    </div>
  </div>
</div>

<script src="./platform.js"></script>
<script src="./js/auth.js"></script>
<script>
(function() {
  'use strict';

  // ── Constants ──
  var GATE_NAMES = ['O\xB70 Заявка','O\xB71 Разведка','O\xB72 Прототип','O\xB73 Разгон','O\xB74 Экосистема','O\xB75 Плато'];
  var TECH_GATE_NAMES = ['T\xB70 Заявка','T\xB71 Проектирование','T\xB72 Реализация','T\xB73 Приёмка'];
  var STATUS_LABELS = {'on-track':'Активен','at-risk':'Риск','blocked':'Заблокирован','paused':'Paused','done':'Done','active':'Активен','pending':'Ожидает','archived':'Archived','draft':'Draft','wip':'В работе','planned':'Запланировано','backlog':'Бэклог','screening':'На скрининге'};
  var STATUS_CLS = {'on-track':'sb-on-track','at-risk':'sb-at-risk','blocked':'sb-blocked','paused':'sb-paused','done':'sb-done','active':'sb-active','pending':'sb-pending','archived':'sb-archived','draft':'sb-paused','screening':'sb-pending'};
  var GOAL_TYPE_LABELS = {'product':'Продуктовая','strategic':'Стратегическая','growth':'Рост'};
  var GOAL_TYPE_CLS = {'product':'gt-product','strategic':'gt-strategic','growth':'gt-growth'};
  var APPROVAL_LABELS = {'approved':'Согласовано','pending':'На согласовании','rejected':'Отклонено'};
  var APPROVAL_CLS = {'approved':'ab-approved','pending':'ab-pending','rejected':'ab-rejected'};
  var DOC_STATUS_ICONS = {'done':'\u2705','wip':'\u23F3','none':'\u274C'};

  var DEFAULT_ARTIFACTS = [
    {gate:0, name:'Product Brief', url:'', status:'none'},
    {gate:1, name:'CustDev Report', url:'', status:'none'},
    {gate:1, name:'PSF (Problem-Solution Fit)', url:'', status:'none'},
    {gate:2, name:'MVP Spec', url:'', status:'none'},
    {gate:2, name:'Unit Economics v1', url:'', status:'none'},
    {gate:3, name:'Growth Plan', url:'', status:'none'},
    {gate:3, name:'P&L Model', url:'', status:'none'},
    {gate:4, name:'Ecosystem Integration Plan', url:'', status:'none'},
    {gate:5, name:'Maturity Assessment', url:'', status:'none'}
  ];

  // ── State ──
  var DEFAULT_GOALS = [
    { id:'G-001', title:'Рост GMV Wibes на 30%', type:'product', period:'H1 2026', productId:'ECO-01', owner:'PM Wibes', status:'active', approvalStatus:'approved', keyResults:[{id:'KR-001',text:'GMV +30% к июню',current:15,target:30},{id:'KR-002',text:'Конверсия checkout +5pp',current:2,target:5}] },
    { id:'G-002', title:'Запуск MVP WB Книги', type:'product', period:'H1 2026', productId:'ECO-04', owner:'PM WB Книги', status:'active', approvalStatus:'approved', keyResults:[{id:'KR-003',text:'MAU 10K к июню',current:0,target:10000},{id:'KR-004',text:'Retention D7 30%',current:0,target:30}] },
    { id:'G-003', title:'SDK Messenger v1 released', type:'product', period:'H1 2026', productId:'ECO-07', owner:'PM WB Messenger', status:'active', approvalStatus:'pending', keyResults:[{id:'KR-005',text:'3 команды интегрированы',current:0,target:3}] }
  ];

  function seedGoalsIfEmpty() {
    var goals = PT.load(PT.KEY_GOALS) || [];
    if (!goals.length) {
      goals = DEFAULT_GOALS.map(function(g) { return JSON.parse(JSON.stringify(g)); });
      PT.save(PT.KEY_GOALS, goals);
    }
    return goals;
  }

  var _product = null, _allProducts = [], _backlog = [], _goals = [];
  var _expandedInit = null, _initView = 'type';
  var productId = getParam('id');
  var activeTab = getParam('tab') || 'passport';
  var app = document.getElementById('ws-app');

  // ── Helpers ──
  function esc(t) { return String(t || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  function getParam(name) {
    var r = new RegExp('[?&]' + name + '=([^&#]*)');
    var m = r.exec(window.location.search);
    return m ? decodeURIComponent(m[1]) : null;
  }

  function isTechSolution() { return _product && _product.type === 'tech_solution'; }
  function getActiveGateNames() { return isTechSolution() ? TECH_GATE_NAMES : GATE_NAMES; }

  function getRole() {
    if (!window.OrbAuth) return 'guest';
    var u = OrbAuth.getCurrentUser();
    return u ? u.role : 'guest';
  }
  function isGuest() { return getRole() === 'guest'; }
  function canEdit() { return window.OrbAuth ? OrbAuth.canEditProduct(productId) : false; }
  function isOwner() { return window.OrbAuth ? OrbAuth.isProductOwner(productId) : false; }
  function canReview() { var r = getRole(); return r === 'admin' || r === 'pmo_lead' || r === 'pmo' || r === 'lead'; }
  function isReadOnlyViewer() { var r = getRole(); return r === 'lead' || r === 'stakeholder'; }
  function canEditContent() { return !isReadOnlyViewer() && (isOwner() || getRole() === 'pmo'); }

  function displayName(p) { return isGuest() ? p.id : (p.name || p.id); }

  function riceScore(item) {
    if (!item.e || item.e === 0) return 0;
    return Math.round((item.r * item.i * item.c) / item.e);
  }

  function orbitColor(gate) {
    var c = ['var(--muted)','var(--blue)','var(--amber)','var(--teal)','var(--green)','var(--violet)'];
    return c[gate] || c[0];
  }

  function genId(prefix) { return prefix + '-' + Date.now().toString(36) + Math.random().toString(36).substr(2, 4); }

  function showToast(msg) {
    var t = document.getElementById('ws-toast');
    if (!t) return;
    t.textContent = msg || 'Готово';
    t.classList.add('show');
    setTimeout(function() { t.classList.remove('show'); }, 2200);
  }

  function formatDate(d) { if (!d) return '--'; return d.split('T')[0]; }

  function saveProducts() { PT.save(PT.KEY_PRODUCTS, _allProducts); }
  function saveBacklog() { PT.save(PT.KEY_BACKLOG, _backlog); }
  function saveGoals() { PT.save(PT.KEY_GOALS, _goals); }
  function addLog(action, details, entityType, entityId) { PT.addLog(productId, action, details, entityType, entityId); }

  // Go / No-Go / Revise review
  window.reviewInitiative = function(initId, decision) {
    var init = _backlog.find(function(i) { return i.id === initId; });
    if (!init) return;
    var labels = { go: 'Go', nogo: 'No-Go', revise: 'Revise' };
    var comment = prompt(labels[decision] + ' \u2014 \u043A\u043E\u043C\u043C\u0435\u043D\u0442\u0430\u0440\u0438\u0439 (\u043D\u0435\u043E\u0431\u044F\u0437\u0430\u0442\u0435\u043B\u044C\u043D\u043E):');
    if (comment === null) return; // cancelled

    init.approval = decision === 'go' ? 'approved' : decision === 'nogo' ? 'rejected' : 'pending';
    if (!init.reviews) init.reviews = [];
    var user = window.OrbAuth ? OrbAuth.getCurrentUser() : null;
    init.reviews.push({
      action: decision,
      comment: comment || '',
      userName: user ? user.name : 'Unknown',
      date: new Date().toISOString().split('T')[0]
    });
    init.updatedAt = new Date().toISOString().split('T')[0];
    saveBacklog();
    addLog('review_' + decision, init.name + ': ' + labels[decision] + (comment ? ' \u2014 ' + comment : ''), 'initiative', initId);

    if (window.PT && PT.notify) {
      PT.notify({ type:'review_submitted', level:'high', recipientRole:'pm_owner', productId:productId, title:productId + ' \u2014 \u0440\u0435\u0432\u044C\u044E: ' + labels[decision], text:init.name + (comment ? ': ' + comment : ''), action:{label:'\u041E\u0442\u043A\u0440\u044B\u0442\u044C',url:'workspace.html?id='+productId+'&tab=initiatives'} });
    }

    showToast(labels[decision] + ' \u0437\u0430\u043F\u0438\u0441\u0430\u043D');
    render();
  };

  function getProductInitiatives() {
    var r = [];
    for (var i = 0; i < _backlog.length; i++) {
      if (_backlog[i].productId === productId || _backlog[i].project === productId) r.push(_backlog[i]);
    }
    // Stakeholder scope filter: only show assigned initiatives
    if (getRole() === 'stakeholder') {
      var user = window.OrbAuth ? OrbAuth.getCurrentUser() : null;
      if (user && user.assignments) {
        var scopeIds = [];
        user.assignments.forEach(function(a) {
          if (a.productId === productId && Array.isArray(a.scope)) {
            scopeIds = scopeIds.concat(a.scope);
          }
        });
        if (scopeIds.length) {
          r = r.filter(function(init) { return scopeIds.indexOf(init.id) >= 0; });
        }
      }
    }
    return r;
  }
  function getProductGoals() {
    var r = [];
    for (var i = 0; i < _goals.length; i++) {
      if (_goals[i].productId === productId) r.push(_goals[i]);
    }
    return r;
  }
  function getProductLogs() {
    var all = PT.load(PT.KEY_CHANGELOG) || [];
    var r = [];
    for (var i = 0; i < all.length; i++) {
      if (all[i].productId === productId) r.push(all[i]);
    }
    return r;
  }
  function copyDefaults() {
    var r = [];
    for (var i = 0; i < DEFAULT_ARTIFACTS.length; i++) {
      var a = DEFAULT_ARTIFACTS[i];
      r.push({gate: a.gate, name: a.name, url: '', status: 'none'});
    }
    return r;
  }

  // ── Bootstrap ──
  if (!productId) { app.innerHTML = renderNotFound(); return; }

  PT.ensureProducts(function(products) {
    _allProducts = products;
    _product = null;
    for (var i = 0; i < products.length; i++) {
      if (products[i].id === productId) { _product = products[i]; break; }
    }
    if (!_product) { app.innerHTML = renderNotFound(); return; }
    document.title = displayName(_product) + ' \u2014 \u041E\u0420\u0411\u0418\u0422\u0410';
    _backlog = PT.load(PT.KEY_BACKLOG) || [];
    if (!_backlog.length) {
      // Seed backlog from JSON if localStorage empty
      var xhr2 = new XMLHttpRequest();
      xhr2.open('GET', 'data/backlog.json', false); // sync for simplicity
      try { xhr2.send(); if (xhr2.status === 200) { _backlog = JSON.parse(xhr2.responseText); PT.save(PT.KEY_BACKLOG, _backlog); } } catch(e) {}
    }
    _goals = seedGoalsIfEmpty();
    if (!_product.events) _product.events = [];
    if (!_product.artifacts) _product.artifacts = copyDefaults();
    render();
  });

  // ═══════════════════════════════════════════════════════════════
  //  RENDER
  // ═══════════════════════════════════════════════════════════════

  function render() {
    var html = '';
    var gateNum = _product.gate || 0;
    var gateColor = orbitColor(gateNum);
    var gateNames = getActiveGateNames();
    var gatePrefix = isTechSolution() ? 'T\xB7' : 'O\xB7';
    var statusCls = STATUS_CLS[_product.status] || 'sb-paused';
    var statusLabel = STATUS_LABELS[_product.status] || _product.status || '--';
    var initiatives = getProductInitiatives();
    var goals = getProductGoals();
    var editable = canEdit();

    // ── BREADCRUMB ──
    html += '<div class="ws-breadcrumb">';
    html += '<a href="catalog.html">\u041E\u0420\u0411\u0418\u0422\u0410</a> <span>\u203A</span> ';
    html += '<a href="catalog.html">\u041A\u0430\u0442\u0430\u043B\u043E\u0433</a> <span>\u203A</span> ';
    html += '<span id="ws-bc-name">' + esc(_product.id) + '</span>';
    html += '</div>';

    // ── HEADER ──
    html += '<div class="ws-header">';
    html += '<div class="ws-header-left">';
    html += '<span class="ws-gate-badge" style="color:' + gateColor + ';background:var(--surface2);border:2px solid ' + gateColor + '">' + gatePrefix + gateNum + '</span>';
    html += '<div>';
    html += '<h1 class="ws-title">' + esc(displayName(_product)) + '</h1>';
    html += '<div class="ws-meta">';
    html += '<span>' + esc(gateNames[gateNum] || gatePrefix + gateNum) + '</span>';
    html += '<span class="ws-status-badge ' + statusCls + '">' + esc(statusLabel) + '</span>';
    html += '<span>' + esc(_product.pmo || _product.owner || '--') + '</span>';
    if (_product.department) html += '<span>' + esc(_product.department) + '</span>';
    html += '</div>';
    html += '</div>';
    html += '</div>';
    html += '<div class="ws-header-right">';
    html += '<button class="ws-share-btn" id="ws-share" title="\u0421\u043A\u043E\u043F\u0438\u0440\u043E\u0432\u0430\u0442\u044C \u0441\u0441\u044B\u043B\u043A\u0443">\u041F\u043E\u0434\u0435\u043B\u0438\u0442\u044C\u0441\u044F</button>';
    var typeLabel = isTechSolution() ? '\u0422\u0435\u0445.\u0440\u0435\u0448\u0435\u043D\u0438\u0435' : '\u041F\u0440\u043E\u0434\u0443\u043A\u0442';
    var typeColor = isTechSolution() ? 'var(--amber)' : 'var(--violet)';
    var typeDim = isTechSolution() ? 'var(--amber-dim)' : 'var(--violet-dim)';
    html += '<span class="ws-type-badge" style="color:' + typeColor + ';background:' + typeDim + ';border:1px solid ' + typeColor + '">' + typeLabel + '</span>';
    html += '</div>';
    html += '</div>';

    // ── TABS ──
    html += '<div class="ws-tabs" id="ws-tabs">';
    html += tabBtn('passport', '\u041F\u0430\u0441\u043F\u043E\u0440\u0442');
    html += tabBtn('initiatives', '\u0418\u043D\u0438\u0446\u0438\u0430\u0442\u0438\u0432\u044B', initiatives.length);
    html += tabBtn('goals', '\u0426\u0435\u043B\u0438 \u0438 \u043F\u043B\u0430\u043D\u0438\u0440\u043E\u0432\u0430\u043D\u0438\u0435', goals.length);
    if (!isGuest()) {
      html += tabBtn('docs', '\u0414\u043E\u043A\u0443\u043C\u0435\u043D\u0442\u044B');
      html += tabBtn('log', '\u041B\u043E\u0433');
    }
    html += '</div>';

    // ── PANELS ──
    html += '<div class="ws-panel' + (activeTab === 'passport' ? ' active' : '') + '" id="panel-passport">' + renderPassport(editable, initiatives, goals) + '</div>';
    html += '<div class="ws-panel' + (activeTab === 'initiatives' ? ' active' : '') + '" id="panel-initiatives">' + renderInitiatives(initiatives, editable) + '</div>';
    html += '<div class="ws-panel' + (activeTab === 'goals' ? ' active' : '') + '" id="panel-goals">' + renderGoals(goals, initiatives, editable) + '</div>';
    if (!isGuest()) {
      html += '<div class="ws-panel' + (activeTab === 'docs' ? ' active' : '') + '" id="panel-docs">' + renderDocs(editable) + '</div>';
      html += '<div class="ws-panel' + (activeTab === 'log' ? ' active' : '') + '" id="panel-log">' + renderLog() + '</div>';
    }

    app.innerHTML = html;
    initTabs();
    initShareButton();
    initEditableFields(editable);
    initInitiatives(initiatives, editable);
    initGoals(goals, editable);
    initAssignMember();
    renderTeams();
  }

  function tabBtn(id, label, count) {
    var cls = activeTab === id ? ' active' : '';
    var c = typeof count === 'number' ? '<span class="ws-tab-count">' + count + '</span>' : '';
    return '<button class="ws-tab' + cls + '" data-tab="' + id + '">' + esc(label) + c + '</button>';
  }

  // ── Status Card handler ──
  window.setProductStatus = function(status, btn) {
    if (!canEdit()) return;
    document.querySelectorAll('.ws-light').forEach(function(l) { l.classList.remove('active'); });
    btn.classList.add('active');
    _product.statusLight = status;
    _product.statusDate = new Date().toISOString().split('T')[0];
    saveProducts();
    addLog('status_light', status);
    if (window.PT && PT.notify) {
      PT.notify({
        type: 'status_updated',
        level: 'low',
        recipientRole: 'pmo',
        productId: productId,
        title: productId + ' — статус обновлён',
        text: 'Новый статус: ' + status,
        action: { label: 'Открыть', url: 'workspace.html?id=' + productId }
      });
    }
    var dateEl = document.getElementById('status-date');
    if (dateEl) dateEl.textContent = _product.statusDate;
  };

  window.advanceGate = function() {
    if (!_product) return;
    var role = getRole();
    if (role !== 'admin' && role !== 'pmo_lead' && !isOwner()) {
      showToast('Только PMO Lead может переводить продукт на следующую стадию');
      return;
    }
    var currentGate = _product.gate || 0;
    var gateNames = isTechSolution() ? TECH_GATE_NAMES : GATE_NAMES;
    if (currentGate >= gateNames.length - 1) {
      showToast('Продукт уже на финальной стадии');
      return;
    }
    var nextGate = currentGate + 1;
    var nextName = gateNames[nextGate];
    if (!confirm('Перевести ' + _product.name + ' на стадию ' + nextName + '?\n\nУбедитесь что все артефакты Gate ' + currentGate + ' заполнены.')) return;
    _product.gate = nextGate;
    if (_product.status === 'screening') _product.status = 'on-track';
    _product.updatedAt = new Date().toISOString().split('T')[0];
    saveProducts();
    addLog('gate_transition', 'Переход: ' + gateNames[currentGate] + ' → ' + nextName, 'product', productId);
    if (window.PT && PT.notify) {
      PT.notify({
        type: 'gate_transition',
        level: 'high',
        recipientRole: 'pmo',
        productId: productId,
        title: productId + ' переведён на ' + nextName,
        text: 'Gate ' + currentGate + ' пройден.',
        action: { label: 'Открыть', url: 'workspace.html?id=' + productId }
      });
    }
    showToast('Переведено на ' + nextName);
    render();
  };

  // ── Teams rendering ──
  function renderTeams() {
    var container = document.getElementById('ws-teams');
    if (!container) return;

    var teams = JSON.parse(localStorage.getItem('ECOTECH_TEAMS') || '[]');
    var productTeams = teams.filter(function(t) { return t.productId === productId && t.status === 'active'; });
    var users = window.OrbAuth ? OrbAuth.getUsers() : [];

    if (!productTeams.length) {
      container.innerHTML = '<div style="color:var(--muted);font-size:13px;">\u041A\u043E\u043C\u0430\u043D\u0434\u044B \u043D\u0435 \u043D\u0430\u0437\u043D\u0430\u0447\u0435\u043D\u044B</div>';
      return;
    }

    var html = '';
    productTeams.forEach(function(team) {
      var lead = users.find(function(u) { return u.id === team.lead; });
      var memberCount = team.members ? team.members.length : 0;
      var scopeCount = team.initiativeScope ? team.initiativeScope.length : 0;

      html += '<div class="ws-team-card">' +
        '<div class="ws-tc-name">' + esc(team.name) + '</div>' +
        '<div class="ws-tc-meta">' +
          'Lead: ' + (lead ? esc(lead.name) : '\u2014') +
          ' \u00B7 ' + memberCount + ' \u0443\u0447\u0430\u0441\u0442\u043D\u0438\u043A' + (memberCount > 1 ? '\u043E\u0432' : '') +
          ' \u00B7 ' + scopeCount + ' \u0438\u043D\u0438\u0446\u0438\u0430\u0442\u0438\u0432' +
        '</div>' +
      '</div>';
    });

    container.innerHTML = html;

    // Show teams management link for admin/pmo
    var role = getRole();
    if (role === 'admin' || role === 'pmo_lead' || role === 'pmo' || isOwner()) {
      var link = document.getElementById('teams-link');
      if (link) link.style.display = '';
    }
  }

  // ═══════════════════════════════════════════════════════════════
  //  TAB 1: PASSPORT
  // ═══════════════════════════════════════════════════════════════

    html += '<button class="ws-light' + (_product.statusLight === 'amber' ? ' active' : '') + '" data-status="amber" onclick="setProductStatus(\'amber\',this)" title="\u0415\u0441\u0442\u044C \u0440\u0438\u0441\u043A\u0438"></button>';

    html += '<div class="ws-status-date" id="status-date">' + (_product.statusDate ? esc(_product.statusDate) : '') + '</div>';

    html += editableField('desc', '\u041E\u043F\u0438\u0441\u0430\u043D\u0438\u0435', _product.desc || '\u041E\u043F\u0438\u0441\u0430\u043D\u0438\u0435 \u043D\u0435 \u0443\u043A\u0430\u0437\u0430\u043D\u043E', isEdit);

    html += editableField('businessModel', '\u0411\u0438\u0437\u043D\u0435\u0441-\u043C\u043E\u0434\u0435\u043B\u044C', _product.businessModel || '--', isEdit);

    html += '<div class="ws-section" id="sec-teams">';

    html += '<a class="ws-teams-link" href="teams.html" id="teams-link" style="display:none">\u0423\u043F\u0440\u0430\u0432\u043B\u0435\u043D\u0438\u0435 \u043A\u043E\u043C\u0430\u043D\u0434\u0430\u043C\u0438 \u2192</a>';

    if (_product.repoUrl) html += '<a href="' + esc(_product.repoUrl) + '" target="_blank">Repo</a>';
    if (!_product.trackerUrl && !_product.wikiUrl && !_product.figmaUrl && !_product.repoUrl) {
      html += '<span style="font-size:12px;color:var(--muted)">\u0421\u0441\u044B\u043B\u043A\u0438 \u043D\u0435 \u0434\u043E\u0431\u0430\u0432\u043B\u0435\u043D\u044B</span>';
    }
    html += '</div></div>';

    return html;
  }

  function editableField(field, label, value, isEdit) {
    var html = '<div class="ws-field" data-field="' + field + '">';
    html += '<label>' + esc(label) + '</label>';
    html += '<div class="ws-editable" contenteditable="' + (isEdit ? 'true' : 'false') + '" id="f-' + field + '" data-field="' + field + '">' + esc(value) + '</div>';
    html += '</div>';
    return html;
  }

  function renderGateTimeline(current) {
    var names = getActiveGateNames();
    var html = '<div class="ws-gate-timeline">';
    for (var i = 0; i < names.length; i++) {
      if (i > 0) html += '<div class="ws-gate-line' + (i <= current ? ' completed' : '') + '"></div>';
      var cls = i < current ? 'completed' : (i === current ? 'current' : '');
      html += '<div style="display:flex;flex-direction:column;align-items:center">';
      html += '<div class="ws-gate-dot ' + cls + '">' + i + '</div>';
      html += '<div class="ws-gate-label">' + esc(names[i].split(' ').slice(1).join(' ')) + '</div>';
      html += '</div>';
    }
    html += '</div>';
    return html;
  }

  function renderTeam(isEdit) {
    var html = '';
    // PMO
    html += teamMember(_product.pmo || _product.owner || '--', 'PMO-\u043C\u0435\u043D\u0435\u0434\u0436\u0435\u0440');
    // Owner
    var owner = window.OrbAuth ? OrbAuth.getProductOwner(productId) : null;
    if (owner) html += teamMember(owner.name, '\u0412\u043B\u0430\u0434\u0435\u043B\u0435\u0446 (Owner)');
    // PMs
    var pms = window.OrbAuth ? OrbAuth.getProductPMs(productId) : [];
    for (var i = 0; i < pms.length; i++) {
      var pmName = OrbAuth.getDisplayName({name: pms[i].name, id: pms[i].email}, 'user');
      html += teamMember(pmName, 'Product Manager', OrbAuth.formatScope(pms[i].scope));
    }
    if (!pms.length && !owner) html += teamMember('\u043D\u0435 \u043D\u0430\u0437\u043D\u0430\u0447\u0435\u043D', 'Product Manager');
    // Members
    var members = window.OrbAuth ? OrbAuth.getProductMembers(productId) : [];
    for (var m = 0; m < members.length; m++) {
      html += teamMember(members[m].name, '\u0423\u0447\u0430\u0441\u0442\u043D\u0438\u043A', OrbAuth.formatScope(members[m].scope));
    }
    // Stakeholders
    if (_product.stakeholders) html += teamMember(_product.stakeholders, '\u0421\u0442\u0435\u0439\u043A\u0445\u043E\u043B\u0434\u0435\u0440\u044B');
    return html;
  }

  function teamMember(name, role, scope) {
    var initials = String(name || '?').split(' ').map(function(w) { return w.charAt(0); }).join('').substr(0, 2).toUpperCase();
    var html = '<div class="ws-team-member">';
    html += '<div class="ws-team-ava">' + esc(initials) + '</div>';
    html += '<div class="ws-team-info">';
    html += '<div class="ws-team-name">' + esc(name) + '</div>';
    html += '<div class="ws-team-role">' + esc(role) + (scope ? ' \u2014 ' + esc(scope) : '') + '</div>';
    html += '</div></div>';
    return html;
  }

  // ═══════════════════════════════════════════════════════════════
  //  TAB 2: INITIATIVES
  // ═══════════════════════════════════════════════════════════════

  function renderInitiatives(items, editable) {
    var html = '<div class="ws-init-toolbar">';
    if (editable) html += '<button class="ws-create-init-btn" id="btn-create-init">+ \u041D\u043E\u0432\u0430\u044F \u0438\u043D\u0438\u0446\u0438\u0430\u0442\u0438\u0432\u0430</button>';
    else html += '<div></div>';
    html += '<div class="ws-init-views">';
    html += '<button class="ws-view-btn' + (_initView === 'type' ? ' active' : '') + '" data-view="type">\u041F\u043E \u0442\u0438\u043F\u0443</button>';
    html += '<button class="ws-view-btn' + (_initView === 'rice' ? ' active' : '') + '" data-view="rice">\u041F\u043E RICE</button>';
    html += '</div></div>';

    // Create form
    html += '<div class="ws-init-form" id="init-form" style="display:none">';
    html += '<h4>\u041D\u043E\u0432\u0430\u044F \u0438\u043D\u0438\u0446\u0438\u0430\u0442\u0438\u0432\u0430</h4>';
    html += '<div class="ws-form-row"><div style="flex:2"><label>\u041D\u0430\u0437\u0432\u0430\u043D\u0438\u0435</label><input type="text" id="init-name" placeholder="\u041D\u0430\u0437\u0432\u0430\u043D\u0438\u0435 \u0438\u043D\u0438\u0446\u0438\u0430\u0442\u0438\u0432\u044B"></div>';
    html += '<div style="flex:1"><label>\u0422\u0438\u043F</label><select id="init-type"><option value="product">\u041F\u0440\u043E\u0434\u0443\u043A\u0442\u043E\u0432\u044B\u0435</option><option value="business">\u0411\u0438\u0437\u043D\u0435\u0441</option><option value="technical">\u0422\u0435\u0445\u043D\u0438\u0447\u0435\u0441\u043A\u0438\u0435</option></select></div></div>';
    html += '<div class="ws-form-row"><div style="flex:1"><label>\u041E\u043F\u0438\u0441\u0430\u043D\u0438\u0435</label><textarea id="init-desc" placeholder="\u041E\u043F\u0438\u0441\u0430\u043D\u0438\u0435..."></textarea></div></div>';
    html += '<div class="ws-form-row">';
    html += '<div style="flex:1"><label>Reach (1-10)</label><input type="number" id="init-r" min="1" max="10" value="5"></div>';
    html += '<div style="flex:1"><label>Impact (1-10)</label><input type="number" id="init-i" min="1" max="10" value="5"></div>';
    html += '<div style="flex:1"><label>Confidence (1-10)</label><input type="number" id="init-c" min="1" max="10" value="5"></div>';
    html += '<div style="flex:1"><label>Effort (1-10)</label><input type="number" id="init-e" min="1" max="10" value="5"></div>';
    html += '</div>';
    html += '<div class="ws-form-row"><div style="flex:1"><label>\u041A\u0432\u0430\u0440\u0442\u0430\u043B</label><select id="init-quarter"><option value="Q1">Q1</option><option value="Q2">Q2</option><option value="Q3">Q3</option><option value="Q4">Q4</option></select></div>';
    html += '<div style="flex:2"><label>\u0421\u0441\u044B\u043B\u043A\u0430 \u043D\u0430 \u0442\u0440\u0435\u043A\u0435\u0440</label><input type="url" id="init-tracker" placeholder="https://..."></div></div>';
    html += '<div class="ws-form-actions"><button class="ws-btn-primary" id="init-save">\u0421\u043E\u0445\u0440\u0430\u043D\u0438\u0442\u044C</button><button class="ws-btn-secondary" id="init-cancel">\u041E\u0442\u043C\u0435\u043D\u0430</button></div>';
    html += '</div>';

    // List
    html += '<div id="init-list">';
    if (!items.length) {
      html += '<div style="text-align:center;padding:40px;color:var(--muted);font-size:13px">\u0418\u043D\u0438\u0446\u0438\u0430\u0442\u0438\u0432 \u043F\u043E\u043A\u0430 \u043D\u0435\u0442</div>';
    } else if (_initView === 'rice') {
      var sorted = items.slice().sort(function(a, b) { return riceScore(b) - riceScore(a); });
      for (var i = 0; i < sorted.length; i++) html += renderInitCard(sorted[i], editable);
    } else {
      var groups = {};
      for (var j = 0; j < items.length; j++) {
        var t = PT.getInitType(items[j]);
        if (!groups[t]) groups[t] = [];
        groups[t].push(items[j]);
      }
      var order = ['product', 'business', 'technical'];
      for (var g = 0; g < order.length; g++) {
        var key = order[g];
        if (!groups[key] || !groups[key].length) continue;
        var meta = PT.INITIATIVE_TYPES[key];
        html += '<div class="ws-init-group-title" style="color:' + meta.color + '">' + esc(meta.label) + ' (' + groups[key].length + ')</div>';
        for (var gi = 0; gi < groups[key].length; gi++) html += renderInitCard(groups[key][gi], editable);
      }
    }
    html += '</div>';
    return html;
  }

  function renderInitCard(item, editable) {
    var rice = riceScore(item);
    var t = PT.getInitType(item);
    var meta = PT.INITIATIVE_TYPES[t] || PT.INITIATIVE_TYPES.product;
    var statusLabel = STATUS_LABELS[item.status] || item.status || 'backlog';
    var expanded = _expandedInit === item.id;

    var html = '<div class="ws-init-card" style="border-left-color:' + meta.color + '">';
    html += '<div class="ws-init-header" data-init-id="' + esc(item.id) + '">';
    html += '<span class="ws-init-name">' + esc(item.name || item.title || item.id) + '</span>';
    if (rice > 0) html += '<span class="ws-init-rice">RICE ' + rice + '</span>';
    html += '<span class="ws-init-status">' + esc(statusLabel) + '</span>';
    html += '</div>';

    html += '<div class="ws-init-body" id="init-body-' + esc(item.id) + '" style="display:' + (expanded ? 'block' : 'none') + '">';
    if (item.desc || item.description) html += '<div style="margin-bottom:10px">' + esc(item.desc || item.description) + '</div>';
    html += '<div style="display:flex;gap:12px;flex-wrap:wrap;font-size:12px;color:var(--muted);margin-bottom:8px">';
    if (item.quarter) html += '<span style="background:var(--surface);padding:2px 8px;border-radius:4px;">' + esc(item.quarter) + '</span>';
    var tp = PT.INITIATIVE_TYPES[t] || PT.INITIATIVE_TYPES.product;
    html += '<span style="color:' + tp.color + '">' + tp.label + '</span>';
    if (item.trackerUrl) html += '<span style="color:var(--violet)">Трекер</span>';
    if (item.goalId) { var goal = _goals.find(function(g){return g.id===item.goalId}); if(goal) html += '<span>Цель: ' + esc(goal.title || goal.name || goal.id) + '</span>'; }
    html += '</div>';
    if (item.trackerUrl) html += '<a href="' + esc(item.trackerUrl) + '" target="_blank" style="font-size:12px;color:var(--violet);text-decoration:none;font-weight:600">\u041E\u0442\u043A\u0440\u044B\u0442\u044C \u0432 \u0442\u0440\u0435\u043A\u0435\u0440\u0435</a>';
    if (editable && canReview()) {
      html += '<div style="margin-top:10px;display:flex;gap:8px">';
      html += '<button class="ws-btn-primary" data-approve="' + esc(item.id) + '" style="font-size:11px;padding:5px 12px">\u0421\u043E\u0433\u043B\u0430\u0441\u043E\u0432\u0430\u0442\u044C</button>';
      html += '<button class="ws-btn-secondary" data-reject="' + esc(item.id) + '" style="font-size:11px;padding:5px 12px">\u041E\u0442\u043A\u043B\u043E\u043D\u0438\u0442\u044C</button>';
      html += '</div>';
    }
    // Go/No-Go/Revise review buttons for lead/pmo_lead/admin
    if (getRole() === 'lead' || getRole() === 'pmo_lead' || getRole() === 'admin') {
      html += '<div style="display:flex;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);">';
      html += '<button onclick="reviewInitiative(\'' + esc(item.id) + '\',\'go\')" style="padding:6px 14px;border-radius:6px;border:1px solid rgba(75,206,151,.3);background:var(--teal-dim);color:var(--teal);font-size:11px;font-weight:700;cursor:pointer;">Go</button>';
      html += '<button onclick="reviewInitiative(\'' + esc(item.id) + '\',\'nogo\')" style="padding:6px 14px;border-radius:6px;border:1px solid rgba(248,113,113,.3);background:var(--red-dim);color:var(--red);font-size:11px;font-weight:700;cursor:pointer;">No-Go</button>';
      html += '<button onclick="reviewInitiative(\'' + esc(item.id) + '\',\'revise\')" style="padding:6px 14px;border-radius:6px;border:1px solid rgba(245,205,71,.3);background:var(--amber-dim);color:var(--amber);font-size:11px;font-weight:700;cursor:pointer;">Revise</button>';
      html += '</div>';
    }
    html += '</div>';
    html += '</div>';
    return html;
  }

  // ═══════════════════════════════════════════════════════════════
  //  TAB 3: GOALS
  // ═══════════════════════════════════════════════════════════════

  function renderGoals(goals, initiatives, editable) {
    var html = '';

    // Goals list
    html += '<div class="ws-section"><h3>\u0426\u0435\u043B\u0438 \u043D\u0430 \u043F\u043E\u043B\u0443\u0433\u043E\u0434\u0438\u0435</h3>';
    html += '<div id="goals-list">';
    if (!goals.length) {
      html += '<div style="color:var(--muted);font-size:13px;padding:10px 0">\u0426\u0435\u043B\u0438 \u043D\u0435 \u0434\u043E\u0431\u0430\u0432\u043B\u0435\u043D\u044B</div>';
    }
    for (var i = 0; i < goals.length; i++) {
      var g = goals[i];
      var gtCls = GOAL_TYPE_CLS[g.type] || 'gt-product';
      var gtLabel = GOAL_TYPE_LABELS[g.type] || g.type || '\u041F\u0440\u043E\u0434\u0443\u043A\u0442\u043E\u0432\u0430\u044F';
      var abCls = APPROVAL_CLS[g.approvalStatus] || 'ab-pending';
      var abLabel = APPROVAL_LABELS[g.approvalStatus] || '\u041D\u0430 \u0441\u043E\u0433\u043B\u0430\u0441\u043E\u0432\u0430\u043D\u0438\u0438';

      html += '<div class="ws-goal-card">';
      html += '<div style="display:flex;align-items:center;flex-wrap:wrap">';
      html += '<span class="ws-goal-name">' + esc(g.name || g.title || 'Goal') + '</span>';
      html += '<span class="ws-goal-type ' + gtCls + '">' + esc(gtLabel) + '</span>';
      html += '<span class="ws-approval-badge ' + abCls + '">' + esc(abLabel) + '</span>';
      html += '</div>';
      if (g.description) html += '<div style="font-size:12px;color:var(--gray);margin-top:6px">' + esc(g.description) + '</div>';
      // Key Results
      if (g.keyResults && g.keyResults.length) {
        for (var kr = 0; kr < g.keyResults.length; kr++) {
          var r = g.keyResults[kr];
          var pct = r.progress || 0;
          html += '<div style="margin-top:8px">';
          html += '<div class="ws-kr-label"><span>' + esc(r.name || r.title || 'KR') + '</span><span>' + pct + '%</span></div>';
          html += '<div class="ws-kr-bar"><div class="ws-kr-fill" style="width:' + pct + '%"></div></div>';
          html += '</div>';
        }
      }
      if (editable && canReview()) {
        html += '<div style="margin-top:10px;display:flex;gap:8px">';
        html += '<button class="ws-btn-primary" data-goal-approve="' + esc(g.id) + '" style="font-size:11px;padding:5px 12px">\u0423\u0442\u0432\u0435\u0440\u0434\u0438\u0442\u044C</button>';
        html += '<button class="ws-btn-secondary" data-goal-reject="' + esc(g.id) + '" style="font-size:11px;padding:5px 12px">\u041E\u0442\u043A\u043B\u043E\u043D\u0438\u0442\u044C</button>';
        html += '</div>';
      }
      html += '</div>';
    }
    html += '</div>';
    if (editable) html += '<button class="ws-create-goal-btn" id="btn-create-goal">+ \u041D\u043E\u0432\u0430\u044F \u0446\u0435\u043B\u044C</button>';
    html += '</div>';

    // Q-plan
    html += '<div class="ws-section"><h3>Q-\u043F\u043B\u0430\u043D</h3>';
    html += '<div class="ws-qplan-grid" id="qplan-grid">';
    var quarters = ['Q1', 'Q2', 'Q3', 'Q4'];
    for (var q = 0; q < quarters.length; q++) {
      html += '<div class="ws-qplan-col"><h4>' + quarters[q] + '</h4>';
      for (var qi = 0; qi < initiatives.length; qi++) {
        if (initiatives[qi].quarter === quarters[q]) {
          html += '<div class="ws-qplan-item">' + esc(initiatives[qi].name || initiatives[qi].title || initiatives[qi].id) + '</div>';
        }
      }
      html += '</div>';
    }
    html += '</div></div>';

    // Planning steps
    html += '<div class="ws-section ws-planning-steps"><h3>\u041F\u0440\u043E\u0446\u0435\u0441\u0441 \u043F\u043B\u0430\u043D\u0438\u0440\u043E\u0432\u0430\u043D\u0438\u044F</h3><ol>';
    html += '<li>\u041E\u043F\u0440\u0435\u0434\u0435\u043B\u0438\u0442\u044C \u0446\u0435\u043B\u0438 \u043D\u0430 \u043F\u043E\u043B\u0443\u0433\u043E\u0434\u0438\u0435 (H1/H2)</li>';
    html += '<li>\u0414\u0435\u043A\u043E\u043C\u043F\u043E\u0437\u0438\u0440\u043E\u0432\u0430\u0442\u044C \u0432 \u0438\u043D\u0438\u0446\u0438\u0430\u0442\u0438\u0432\u044B \u043D\u0430 \u043A\u0432\u0430\u0440\u0442\u0430\u043B</li>';
    html += '<li>\u041E\u0446\u0435\u043D\u0438\u0442\u044C RICE</li>';
    html += '<li>\u0421\u043E\u0433\u043B\u0430\u0441\u043E\u0432\u0430\u0442\u044C \u0441 PMO</li>';
    html += '<li>\u041A\u0430\u0441\u043A\u0430\u0434\u0438\u0440\u043E\u0432\u0430\u0442\u044C \u0432 \u0442\u0440\u0435\u043A\u0435\u0440 \u0437\u0430\u0434\u0430\u0447</li>';
    html += '</ol></div>';

    return html;
  }

  // ═══════════════════════════════════════════════════════════════
  //  TAB 4: DOCS
  // ═══════════════════════════════════════════════════════════════

  function renderDocs(editable) {
    var html = '';
    var gateNum = _product.gate || 0;
    var artifacts = _product.artifacts || [];

    html += '<div class="ws-section"><h3>\u0410\u0440\u0442\u0435\u0444\u0430\u043A\u0442\u044B \u043F\u043E \u0441\u0442\u0430\u0434\u0438\u044F\u043C</h3>';
    html += '<div class="ws-docs-grid" id="docs-grid">';
    for (var i = 0; i < artifacts.length; i++) {
      var a = artifacts[i];
      var icon = DOC_STATUS_ICONS[a.status] || DOC_STATUS_ICONS.none;
      var gateLabel = (isTechSolution() ? 'T' : 'O') + '\xB7' + a.gate;
      html += '<div class="ws-doc-row">';
      html += '<span class="ws-doc-status">' + icon + '</span>';
      html += '<span class="ws-doc-name">' + esc(a.name) + '</span>';
      html += '<span class="ws-doc-gate">' + gateLabel + '</span>';
      if (a.url) html += '<a class="ws-doc-link" href="' + esc(a.url) + '" target="_blank">\u041E\u0442\u043A\u0440\u044B\u0442\u044C</a>';
      else if (editable) html += '<span style="font-size:11px;color:var(--muted)">\u041D\u0435\u0442 \u0441\u0441\u044B\u043B\u043A\u0438</span>';
      html += '</div>';
    }
    html += '</div></div>';

    // Document links
    html += '<div class="ws-section"><h3>\u0421\u0441\u044B\u043B\u043A\u0438 \u043D\u0430 \u0434\u043E\u043A\u0443\u043C\u0435\u043D\u0442\u044B</h3>';
    html += '<div id="doc-links" class="ws-links">';
    if (_product.trackerUrl) html += '<a href="' + esc(_product.trackerUrl) + '" target="_blank">\u0422\u0440\u0435\u043A\u0435\u0440</a>';
    if (_product.wikiUrl) html += '<a href="' + esc(_product.wikiUrl) + '" target="_blank">Wiki</a>';
    if (!_product.trackerUrl && !_product.wikiUrl) html += '<span style="font-size:12px;color:var(--muted)">\u0421\u0441\u044B\u043B\u043A\u0438 \u043D\u0435 \u0434\u043E\u0431\u0430\u0432\u043B\u0435\u043D\u044B</span>';
    html += '</div></div>';

    return html;
  }

  // ═══════════════════════════════════════════════════════════════
  //  TAB 5: LOG
  // ═══════════════════════════════════════════════════════════════

  function renderLog() {
    var logs = getProductLogs();
    var html = '<div class="ws-section"><h3>\u0418\u0441\u0442\u043E\u0440\u0438\u044F \u0438\u0437\u043C\u0435\u043D\u0435\u043D\u0438\u0439</h3>';
    html += '<div class="ws-log-list" id="log-list">';
    if (!logs.length) {
      html += '<div style="color:var(--muted);font-size:13px;padding:10px 0">\u0417\u0430\u043F\u0438\u0441\u0435\u0439 \u043D\u0435\u0442</div>';
    }
    // Show newest first
    for (var i = logs.length - 1; i >= 0; i--) {
      var log = logs[i];
      html += '<div class="ws-log-entry">';
      html += '<span class="ws-log-date">' + formatDate(log.date || log.createdAt) + '</span>';
      html += '<div>';
      html += '<div class="ws-log-action">' + esc(log.action) + '</div>';
      if (log.details) html += '<div class="ws-log-details">' + esc(log.details) + '</div>';
      if (log.userName) html += '<div class="ws-log-user">' + esc(log.userName) + '</div>';
      html += '</div></div>';
    }
    html += '</div></div>';
    return html;
  }

  // ── NOT FOUND ──
  function renderNotFound() {
    return '<div class="ws-not-found"><h2>\u041F\u0440\u043E\u0434\u0443\u043A\u0442 \u043D\u0435 \u043D\u0430\u0439\u0434\u0435\u043D</h2>'
      + '<p>\u041F\u0440\u043E\u0434\u0443\u043A\u0442 \u0441 ID "' + esc(productId || '') + '" \u043D\u0435 \u043D\u0430\u0439\u0434\u0435\u043D.</p>'
      + '<a href="catalog.html" style="color:var(--violet);font-weight:600;text-decoration:none">\u2190 \u041D\u0430\u0437\u0430\u0434 \u0432 \u043A\u0430\u0442\u0430\u043B\u043E\u0433</a></div>';
  }

  // ═══════════════════════════════════════════════════════════════
  //  INTERACTION HANDLERS
  // ═══════════════════════════════════════════════════════════════

  function initTabs() {
    var tabs = document.querySelectorAll('.ws-tab');
    for (var i = 0; i < tabs.length; i++) {
      tabs[i].addEventListener('click', function() {
        switchTab(this.getAttribute('data-tab'));
      });
    }
  }

  function switchTab(tab) {
    activeTab = tab;
    history.replaceState(null, '', 'workspace.html?id=' + productId + (tab !== 'passport' ? '&tab=' + tab : ''));
    // Toggle active class on tabs
    var tabs = document.querySelectorAll('.ws-tab');
    for (var i = 0; i < tabs.length; i++) {
      tabs[i].classList.toggle('active', tabs[i].getAttribute('data-tab') === tab);
    }
    // Toggle panels
    var panels = document.querySelectorAll('.ws-panel');
    for (var j = 0; j < panels.length; j++) {
      panels[j].classList.toggle('active', panels[j].id === 'panel-' + tab);
    }
  }

  function initShareButton() {
    var btn = document.getElementById('ws-share');
    if (btn) {
      btn.addEventListener('click', function() {
        var url = window.location.href;
        if (navigator.clipboard) {
          navigator.clipboard.writeText(url).then(function() { showToast('\u0421\u0441\u044B\u043B\u043A\u0430 \u0441\u043A\u043E\u043F\u0438\u0440\u043E\u0432\u0430\u043D\u0430'); });
        } else {
          showToast('\u041D\u0435 \u0443\u0434\u0430\u043B\u043E\u0441\u044C \u0441\u043A\u043E\u043F\u0438\u0440\u043E\u0432\u0430\u0442\u044C');
        }
      });
    }
  }

  function initEditableFields(editable) {
    if (!canEditContent()) return;
    var fields = document.querySelectorAll('.ws-editable[contenteditable="true"]');
    for (var i = 0; i < fields.length; i++) {
      fields[i].addEventListener('blur', function() {
        var field = this.getAttribute('data-field');
        var val = this.textContent.trim();
        if (field && _product[field] !== val) {
          _product[field] = val;
          saveProducts();
          addLog('\u0418\u0437\u043C\u0435\u043D\u0435\u043D\u043E \u043F\u043E\u043B\u0435', field + ': ' + val, 'product', productId);
          showToast('\u0421\u043E\u0445\u0440\u0430\u043D\u0435\u043D\u043E');
        }
      });
    }
  }

  function initInitiatives(items, editable) {
    // Toggle expand
    var headers = document.querySelectorAll('.ws-init-header');
    for (var h = 0; h < headers.length; h++) {
      headers[h].addEventListener('click', function() {
        var id = this.getAttribute('data-init-id');
        _expandedInit = _expandedInit === id ? null : id;
        var bodies = document.querySelectorAll('.ws-init-body');
        for (var b = 0; b < bodies.length; b++) {
          bodies[b].style.display = bodies[b].id === 'init-body-' + id && _expandedInit === id ? 'block' : 'none';
        }
      });
    }

    // View toggle
    var viewBtns = document.querySelectorAll('.ws-view-btn');
    for (var v = 0; v < viewBtns.length; v++) {
      viewBtns[v].addEventListener('click', function() {
        _initView = this.getAttribute('data-view');
        render();
      });
    }

    // Create form
    var createBtn = document.getElementById('btn-create-init');
    var form = document.getElementById('init-form');
    if (createBtn && form) {
      createBtn.addEventListener('click', function() {
        form.style.display = form.style.display === 'none' ? 'block' : 'none';
      });
    }
    var cancelBtn = document.getElementById('init-cancel');
    if (cancelBtn && form) {
      cancelBtn.addEventListener('click', function() { form.style.display = 'none'; });
    }
    var saveBtn = document.getElementById('init-save');
    if (saveBtn) {
      saveBtn.addEventListener('click', function() {
        var name = document.getElementById('init-name').value.trim();
        if (!name) { showToast('\u0423\u043A\u0430\u0436\u0438\u0442\u0435 \u043D\u0430\u0437\u0432\u0430\u043D\u0438\u0435'); return; }
        var item = {
          id: genId('I'),
          name: name,
          desc: document.getElementById('init-desc').value.trim(),
          type: document.getElementById('init-type').value,
          productId: productId,
          project: productId,
          status: 'backlog',
          r: parseInt(document.getElementById('init-r').value) || 5,
          i: parseInt(document.getElementById('init-i').value) || 5,
          c: parseInt(document.getElementById('init-c').value) || 5,
          e: parseInt(document.getElementById('init-e').value) || 5,
          quarter: document.getElementById('init-quarter').value,
          trackerUrl: document.getElementById('init-tracker').value.trim(),
          createdAt: new Date().toISOString()
        };
        _backlog.push(item);
        saveBacklog();
        addLog('\u0421\u043E\u0437\u0434\u0430\u043D\u0430 \u0438\u043D\u0438\u0446\u0438\u0430\u0442\u0438\u0432\u0430', name, 'initiative', item.id);
        showToast('\u0418\u043D\u0438\u0446\u0438\u0430\u0442\u0438\u0432\u0430 \u0441\u043E\u0437\u0434\u0430\u043D\u0430');
        render();
      });
    }

    // Approve / Reject
    var approveBtns = document.querySelectorAll('[data-approve]');
    for (var a = 0; a < approveBtns.length; a++) {
      approveBtns[a].addEventListener('click', function(e) {
        e.stopPropagation();
        var id = this.getAttribute('data-approve');
        for (var bi = 0; bi < _backlog.length; bi++) {
          if (_backlog[bi].id === id) { _backlog[bi].status = 'planned'; break; }
        }
        saveBacklog();
        addLog('\u0418\u043D\u0438\u0446\u0438\u0430\u0442\u0438\u0432\u0430 \u0441\u043E\u0433\u043B\u0430\u0441\u043E\u0432\u0430\u043D\u0430', id, 'initiative', id);
        if (window.PT && PT.notify) {
          PT.notify({
            type: 'review_submitted',
            level: 'high',
            recipientRole: 'pm_owner',
            productId: productId,
            title: productId + ' — ревью: GO',
            text: 'Инициатива ' + id + ' согласована',
            action: { label: 'Открыть', url: 'workspace.html?id=' + productId + '&tab=initiatives' }
          });
        }
        showToast('\u0421\u043E\u0433\u043B\u0430\u0441\u043E\u0432\u0430\u043D\u043E');
        render();
      });
    }
    var rejectBtns = document.querySelectorAll('[data-reject]');
    for (var rj = 0; rj < rejectBtns.length; rj++) {
      rejectBtns[rj].addEventListener('click', function(e) {
        e.stopPropagation();
        var id = this.getAttribute('data-reject');
        for (var bi = 0; bi < _backlog.length; bi++) {
          if (_backlog[bi].id === id) { _backlog[bi].status = 'backlog'; break; }
        }
        saveBacklog();
        addLog('\u0418\u043D\u0438\u0446\u0438\u0430\u0442\u0438\u0432\u0430 \u043E\u0442\u043A\u043B\u043E\u043D\u0435\u043D\u0430', id, 'initiative', id);
        if (window.PT && PT.notify) {
          PT.notify({
            type: 'review_submitted',
            level: 'high',
            recipientRole: 'pm_owner',
            productId: productId,
            title: productId + ' — ревью: NO-GO',
            text: 'Инициатива ' + id + ' отклонена',
            action: { label: 'Открыть', url: 'workspace.html?id=' + productId + '&tab=initiatives' }
          });
        }
        showToast('\u041E\u0442\u043A\u043B\u043E\u043D\u0435\u043D\u043E');
        render();
      });
    }
  }

  function initGoals(goals, editable) {
    var createBtn = document.getElementById('btn-create-goal');
    if (createBtn) {
      createBtn.addEventListener('click', function() {
        var name = prompt('\u041D\u0430\u0437\u0432\u0430\u043D\u0438\u0435 \u0446\u0435\u043B\u0438:');
        if (!name) return;
        var goal = {
          id: genId('G'),
          name: name,
          productId: productId,
          type: 'product',
          approvalStatus: 'pending',
          keyResults: [],
          createdAt: new Date().toISOString()
        };
        _goals.push(goal);
        saveGoals();
        addLog('\u0421\u043E\u0437\u0434\u0430\u043D\u0430 \u0446\u0435\u043B\u044C', name, 'goal', goal.id);
        showToast('\u0426\u0435\u043B\u044C \u0441\u043E\u0437\u0434\u0430\u043D\u0430');
        render();
      });
    }

    // Goal approve/reject
    var gAppBtns = document.querySelectorAll('[data-goal-approve]');
    for (var ga = 0; ga < gAppBtns.length; ga++) {
      gAppBtns[ga].addEventListener('click', function() {
        var id = this.getAttribute('data-goal-approve');
        for (var gi = 0; gi < _goals.length; gi++) {
          if (_goals[gi].id === id) { _goals[gi].approvalStatus = 'approved'; break; }
        }
        saveGoals();
        addLog('\u0426\u0435\u043B\u044C \u0443\u0442\u0432\u0435\u0440\u0436\u0434\u0435\u043D\u0430', id, 'goal', id);
        showToast('\u0423\u0442\u0432\u0435\u0440\u0436\u0434\u0435\u043D\u043E');
        render();
      });
    }
    var gRejBtns = document.querySelectorAll('[data-goal-reject]');
    for (var gr = 0; gr < gRejBtns.length; gr++) {
      gRejBtns[gr].addEventListener('click', function() {
        var id = this.getAttribute('data-goal-reject');
        for (var gi = 0; gi < _goals.length; gi++) {
          if (_goals[gi].id === id) { _goals[gi].approvalStatus = 'rejected'; break; }
        }
        saveGoals();
        addLog('\u0426\u0435\u043B\u044C \u043E\u0442\u043A\u043B\u043E\u043D\u0435\u043D\u0430', id, 'goal', id);
        showToast('\u041E\u0442\u043A\u043B\u043E\u043D\u0435\u043D\u043E');
        render();
      });
    }
  }

  function initAssignMember() {
    var btn = document.getElementById('btn-add-member');
    var modal = document.getElementById('assign-modal');
    if (!btn || !modal) return;

    btn.addEventListener('click', function() {
      // Populate user select
      var sel = document.getElementById('assign-user');
      sel.innerHTML = '<option value="">\u0412\u044B\u0431\u0435\u0440\u0438\u0442\u0435...</option>';
      var users = PT.load(PT.KEY_USERS) || [];
      for (var i = 0; i < users.length; i++) {
        if (users[i].active) {
          sel.innerHTML += '<option value="' + esc(users[i].id) + '">' + esc(users[i].name) + ' (' + esc(users[i].role) + ')</option>';
        }
      }
      modal.classList.add('show');
    });

    document.getElementById('btn-cancel-member').addEventListener('click', function() {
      modal.classList.remove('show');
    });

    document.getElementById('btn-confirm-member').addEventListener('click', function() {
      var userId = document.getElementById('assign-user').value;
      var role = document.getElementById('assign-role').value;
      if (!userId) { showToast('\u0412\u044B\u0431\u0435\u0440\u0438\u0442\u0435 \u043F\u043E\u043B\u044C\u0437\u043E\u0432\u0430\u0442\u0435\u043B\u044F'); return; }

      var users = PT.load(PT.KEY_USERS) || [];
      for (var i = 0; i < users.length; i++) {
        if (users[i].id === userId) {
          if (!users[i].assignments) users[i].assignments = [];
          users[i].assignments.push({ productId: productId, scope: 'all', role: role });
          if (!users[i].productIds) users[i].productIds = [];
          if (users[i].productIds.indexOf(productId) === -1) users[i].productIds.push(productId);
          break;
        }
      }
      PT.save(PT.KEY_USERS, users);
      addLog('\u041D\u0430\u0437\u043D\u0430\u0447\u0435\u043D \u0443\u0447\u0430\u0441\u0442\u043D\u0438\u043A', userId + ' \u2192 ' + role, 'team', userId);
      modal.classList.remove('show');
      showToast('\u0423\u0447\u0430\u0441\u0442\u043D\u0438\u043A \u043D\u0430\u0437\u043D\u0430\u0447\u0435\u043D');
      render();
    });
  }

})();
</script>
