<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Карточка продукта — ОРБИТА</title>
<link rel="stylesheet" href="./design-system.css">
<style>
/* ── BASE ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;min-height:100vh;font-size:14px;line-height:1.6}

/* ── LAYOUT ── */
.ws-wrap{max-width:1100px;margin:0 auto;padding:32px 24px 120px}

/* ── BREADCRUMB ── */
.ws-breadcrumb{font-size:12px;color:var(--muted);margin-bottom:20px;display:flex;align-items:center;gap:6px}
.ws-breadcrumb a{color:var(--violet);text-decoration:none;font-weight:600}
.ws-breadcrumb a:hover{text-decoration:underline}

/* ── HEADER ── */
.ws-header{display:flex;align-items:flex-start;gap:16px;flex-wrap:wrap;margin-bottom:24px}
.ws-header-left{flex:1;min-width:0;display:flex;align-items:flex-start;gap:14px}
.ws-gate-badge{font-family:'SF Mono','Consolas',monospace;font-size:13px;font-weight:700;padding:6px 14px;border-radius:8px;white-space:nowrap;flex-shrink:0;margin-top:2px}
.ws-title{font-size:26px;font-weight:800;line-height:1.2;margin-bottom:4px}
.ws-meta{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.ws-header-right{display:flex;gap:8px;align-items:center;flex-shrink:0}
.ws-share-btn{font-size:12px;font-weight:600;padding:6px 14px;border-radius:8px;border:1px solid var(--border-hi);background:transparent;color:var(--text);cursor:pointer;font-family:inherit}
.ws-share-btn:hover{background:var(--surface2)}
.ws-type-badge{font-size:10px;font-weight:700;padding:3px 10px;border-radius:6px;white-space:nowrap}
.ws-status-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:6px;white-space:nowrap}
.ws-status-badge::before{content:'';display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:5px;vertical-align:middle}
.sb-active,.sb-on-track{color:var(--teal);background:var(--teal-dim);border:1px solid var(--teal-border)}
.sb-active::before,.sb-on-track::before{background:var(--teal)}
.sb-at-risk,.sb-pending{color:var(--amber);background:var(--amber-dim);border:1px solid var(--amber-border)}
.sb-at-risk::before,.sb-pending::before{background:var(--amber)}
.sb-blocked{color:var(--red);background:var(--red-dim);border:1px solid var(--red)}
.sb-blocked::before{background:var(--red)}
.sb-paused,.sb-archived,.sb-done{color:var(--muted);background:var(--surface2);border:1px solid var(--border)}
.sb-paused::before,.sb-archived::before,.sb-done::before{background:var(--muted)}

/* ── TABS ── */
.ws-tabs{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:24px;overflow-x:auto}
.ws-tab{font-family:inherit;font-size:13px;font-weight:600;padding:10px 16px;border:none;background:transparent;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:color .15s,border-color .15s}
.ws-tab:hover{color:var(--text)}
.ws-tab.active{color:var(--violet);border-bottom-color:var(--violet)}
.ws-tab-count{font-size:10px;font-weight:700;background:var(--surface2);color:var(--muted);padding:1px 6px;border-radius:10px;margin-left:6px}

/* ── PANELS ── */
.ws-panel{display:none}
.ws-panel.active{display:block}

/* ── SECTIONS ── */
.ws-section{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:16px}
.ws-section h3{font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:14px}

/* ── EDITABLE FIELDS ── */
.ws-field{margin-bottom:14px}
.ws-field:last-child{margin-bottom:0}
.ws-field label{display:block;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
.ws-editable{font-size:13px;color:var(--text);line-height:1.5;padding:6px 8px;border-radius:6px;border:1px solid transparent;min-height:28px;outline:none;transition:border-color .15s}
.ws-editable[contenteditable="true"]:hover{border-color:var(--border-hi)}
.ws-editable[contenteditable="true"]:focus{border-color:var(--violet);background:var(--surface2)}

/* ── GATE TIMELINE ── */
.ws-gate-timeline{display:flex;align-items:center;gap:0;padding:8px 0}
.ws-gate-dot{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;border:2px solid var(--border);color:var(--muted);background:var(--surface);position:relative;z-index:1;flex-shrink:0;cursor:default}
.ws-gate-dot.completed{border-color:var(--teal);color:var(--teal);background:var(--teal-dim)}
.ws-gate-dot.current{border-color:var(--violet);color:#fff;background:var(--violet);box-shadow:0 0 0 3px var(--violet-dim)}
.ws-gate-line{flex:1;height:2px;background:var(--border);margin:0 -1px}
.ws-gate-line.completed{background:var(--teal)}
.ws-gate-label{font-size:9px;color:var(--muted);text-align:center;margin-top:4px;white-space:nowrap}

/* ── TEAM ── */
.ws-team-member{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.ws-team-member:last-child{border-bottom:none}
.ws-team-ava{width:28px;height:28px;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--violet);flex-shrink:0}
.ws-team-info{flex:1;min-width:0}
.ws-team-name{font-size:13px;font-weight:600;color:var(--text)}
.ws-team-role{font-size:11px;color:var(--muted)}
.ws-add-member-btn{font-family:inherit;font-size:12px;font-weight:600;color:var(--violet);background:transparent;border:1px dashed var(--violet-border);padding:8px 14px;border-radius:8px;cursor:pointer;margin-top:10px}
.ws-add-member-btn:hover{background:var(--violet-dim)}

/* ── KPI ── */
.ws-kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
.ws-kpi-card{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center}
.ws-kpi-val{font-size:20px;font-weight:800;color:var(--teal)}
.ws-kpi-lbl{font-size:11px;color:var(--muted);margin-top:2px}

/* ── LINKS ── */
.ws-links a{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:var(--violet);text-decoration:none;padding:4px 10px;border-radius:6px;border:1px solid var(--violet-border);margin:0 6px 6px 0;font-weight:600}
.ws-links a:hover{background:var(--violet-dim)}

/* ── INITIATIVES ── */
.ws-init-toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:12px;flex-wrap:wrap}
.ws-create-init-btn{font-family:inherit;font-size:12px;font-weight:700;padding:8px 16px;border-radius:8px;border:none;background:var(--violet);color:#fff;cursor:pointer}
.ws-create-init-btn:hover{opacity:.9}
.ws-init-views{display:flex;gap:2px}
.ws-view-btn{font-family:inherit;font-size:11px;font-weight:600;padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer}
.ws-view-btn.active{background:var(--violet-dim);color:var(--violet);border-color:var(--violet-border)}
.ws-init-group-title{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;padding:10px 0 6px;border-bottom:1px solid var(--border);margin-bottom:8px;cursor:pointer;user-select:none}
.ws-init-group-title:hover{color:var(--text)}
.ws-init-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:8px;border-left:3px solid var(--muted);overflow:hidden}
.ws-init-header{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;user-select:none}
.ws-init-header:hover{background:var(--surface2)}
.ws-init-name{flex:1;font-size:13px;font-weight:600;color:var(--text);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ws-init-rice{font-size:11px;font-weight:700;color:var(--violet);background:var(--violet-dim);padding:2px 8px;border-radius:4px;flex-shrink:0}
.ws-init-status{font-size:11px;font-weight:600;color:var(--muted);flex-shrink:0}
.ws-init-body{padding:14px;border-top:1px solid var(--border);font-size:13px;color:var(--gray)}
.ws-init-body .ws-field{margin-bottom:10px}

/* ── INIT FORM ── */
.ws-init-form{background:var(--surface);border:1px solid var(--violet-border);border-radius:10px;padding:20px;margin-bottom:16px}
.ws-init-form h4{font-size:14px;font-weight:700;margin-bottom:14px;color:var(--text)}
.ws-form-row{display:flex;gap:12px;margin-bottom:10px;flex-wrap:wrap}
.ws-form-row label{font-size:11px;font-weight:600;color:var(--muted);display:block;margin-bottom:3px}
.ws-form-row input,.ws-form-row select,.ws-form-row textarea{font-family:inherit;font-size:13px;padding:7px 10px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text);width:100%;outline:none}
.ws-form-row input:focus,.ws-form-row select:focus,.ws-form-row textarea:focus{border-color:var(--violet)}
.ws-form-row textarea{resize:vertical;min-height:60px}
.ws-form-actions{display:flex;gap:8px;margin-top:14px}
.ws-btn-primary{font-family:inherit;font-size:12px;font-weight:700;padding:8px 18px;border-radius:8px;border:none;background:var(--violet);color:#fff;cursor:pointer}
.ws-btn-secondary{font-family:inherit;font-size:12px;font-weight:700;padding:8px 18px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer}

/* ── GOALS ── */
.ws-goal-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:10px}
.ws-goal-name{font-size:14px;font-weight:700;color:var(--text);margin-bottom:6px}
.ws-goal-type{font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;margin-left:8px}
.ws-goal-type.gt-product{color:var(--teal);background:var(--teal-dim)}
.ws-goal-type.gt-strategic{color:var(--violet);background:var(--violet-dim)}
.ws-goal-type.gt-growth{color:var(--amber);background:var(--amber-dim)}
.ws-kr-bar{height:6px;background:var(--surface2);border-radius:3px;margin-top:6px;overflow:hidden}
.ws-kr-fill{height:100%;border-radius:3px;background:var(--teal);transition:width .3s}
.ws-kr-label{font-size:11px;color:var(--muted);margin-top:3px;display:flex;justify-content:space-between}
.ws-create-goal-btn{font-family:inherit;font-size:12px;font-weight:600;color:var(--violet);background:transparent;border:1px dashed var(--violet-border);padding:8px 14px;border-radius:8px;cursor:pointer;margin-top:10px}
.ws-approval-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;margin-left:8px}
.ab-approved{color:var(--teal);background:var(--teal-dim)}
.ab-pending{color:var(--amber);background:var(--amber-dim)}
.ab-rejected{color:var(--red);background:var(--red-dim)}

/* ── Q-PLAN ── */
.ws-qplan-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.ws-qplan-col{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px;min-height:100px}
.ws-qplan-col h4{font-size:12px;font-weight:700;color:var(--muted);margin-bottom:8px;text-align:center}
.ws-qplan-item{font-size:12px;color:var(--text);padding:6px 8px;background:var(--surface2);border-radius:6px;margin-bottom:6px}

/* ── PLANNING STEPS ── */
.ws-planning-steps ol{padding-left:20px;font-size:13px;color:var(--gray)}
.ws-planning-steps ol li{margin-bottom:6px}

/* ── DOCS ── */
.ws-docs-grid{display:grid;gap:8px}
.ws-doc-row{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:8px}
.ws-doc-status{font-size:14px;flex-shrink:0;width:24px;text-align:center}
.ws-doc-name{flex:1;font-size:13px;font-weight:600;color:var(--text)}
.ws-doc-gate{font-size:10px;font-weight:700;color:var(--muted);flex-shrink:0}
.ws-doc-link{font-size:11px;color:var(--violet);text-decoration:none;font-weight:600;flex-shrink:0}

/* ── LOG ── */
.ws-log-entry{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px}
.ws-log-entry:last-child{border-bottom:none}
.ws-log-date{color:var(--muted);font-size:11px;flex-shrink:0;min-width:80px}
.ws-log-action{font-weight:600;color:var(--text)}
.ws-log-details{color:var(--gray)}
.ws-log-user{font-size:11px;color:var(--muted)}

/* ── NOT FOUND ── */
.ws-not-found{text-align:center;padding:80px 20px}
.ws-not-found h2{font-size:22px;color:var(--text);margin-bottom:10px}
.ws-not-found p{color:var(--muted);margin-bottom:20px}

/* ── TOAST ── */
.ws-toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface2);color:var(--text);padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;z-index:100;border:1px solid var(--border)}
.ws-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── ASSIGN MEMBER MODAL ── */
.ws-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:90;display:none;align-items:center;justify-content:center}
.ws-modal-overlay.show{display:flex}
.ws-modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;max-width:400px;width:90%}
.ws-modal h4{font-size:15px;font-weight:700;margin-bottom:14px}

/* ── STATUS CARD (светофор) ── */
.ws-status-card { display:flex; align-items:flex-start; gap:16px; padding:16px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-sm); }
/* ws-light removed — status is now auto-calculated */
.ws-status-text { flex:1; }
.ws-status-date { font-size:11px; color:var(--muted); margin-top:4px; }

/* ── TEAMS GRID ── */
.ws-teams-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:8px; margin-bottom:8px; }
.ws-team-card { padding:12px 14px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-sm); }
.ws-tc-name { font-size:13px; font-weight:700; color:var(--text); margin-bottom:4px; }
.ws-tc-meta { font-size:11px; color:var(--muted); }
.ws-teams-link { font-size:12px; color:var(--violet); text-decoration:none; font-weight:600; }
.ws-teams-link:hover { text-decoration:underline; }

/* ── RESPONSIVE ── */
@media(max-width:768px){
  .ws-wrap{padding:16px 12px 80px}
  .ws-header{flex-direction:column}
  .ws-qplan-grid{grid-template-columns:1fr 1fr}
  .ws-kpi-grid{grid-template-columns:1fr 1fr}
  .ws-init-name{white-space:normal}
}

/* ── PRINT ── */
@media print{
  body{background:#fff;color:#000}
  .ws-tabs,.ws-header-right,.ws-toast,.ws-modal-overlay,.ws-umodal-overlay,.ws-add-member-btn,.ws-create-init-btn,.ws-create-goal-btn,.ws-init-form{display:none!important}
  .ws-panel{display:block!important}
  .ws-section{break-inside:avoid}
}

/* ── STAGE METRICS ── */
.ws-stage-metrics{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:16px}
.ws-stage-metrics h3{font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:14px}
.ws-stage-metrics-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.ws-stage-metrics-title .ws-sm-badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:5px;background:var(--violet-dim);color:var(--violet);border:1px solid var(--violet-border)}
.ws-sm-table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:14px}
.ws-sm-table th{text-align:left;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;padding:6px 10px;border-bottom:1px solid var(--border)}
.ws-sm-table td{padding:8px 10px;border-bottom:1px solid var(--border);color:var(--text)}
.ws-sm-table tr:last-child td{border-bottom:none}
.ws-sm-status{font-size:14px;text-align:center;cursor:pointer;user-select:none}
.ws-sm-phase{margin-top:14px;padding:12px;background:var(--surface2);border-radius:8px;border:1px solid var(--border)}
.ws-sm-phase-title{font-size:12px;font-weight:700;color:var(--violet);margin-bottom:6px}
.ws-sm-phase ul{margin:0;padding-left:18px;font-size:12px;color:var(--text);line-height:1.7}
/* Universal Modal component (showModal) */
.ws-umodal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:1000; display:flex; align-items:center; justify-content:center; }
.ws-umodal { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:24px; max-width:480px; width:90%; max-height:80vh; overflow-y:auto; }
.ws-umodal h3 { font-size:16px; font-weight:700; color:var(--text); margin-bottom:16px; }
.ws-umodal label { display:block; font-size:11px; font-weight:600; color:var(--muted); margin-bottom:4px; text-transform:uppercase; letter-spacing:.04em; }
.ws-umodal input, .ws-umodal select, .ws-umodal textarea { width:100%; padding:10px; background:var(--bg); border:1px solid var(--border); border-radius:6px; color:var(--text); font-family:inherit; font-size:13px; margin-bottom:12px; box-sizing:border-box; }
.ws-umodal textarea { min-height:80px; resize:vertical; }
.ws-umodal-actions { display:flex; gap:8px; justify-content:flex-end; margin-top:8px; }
.ws-umodal-btn { padding:10px 20px; border-radius:6px; font-family:inherit; font-size:12px; font-weight:700; cursor:pointer; border:none; }
.ws-umodal-btn-primary { background:var(--violet); color:#fff; }
.ws-umodal-btn-cancel { background:transparent; border:1px solid var(--border); color:var(--muted); }
.ws-umodal .ws-checklist-item { display:flex; align-items:center; gap:8px; font-size:13px; color:var(--text); margin-bottom:6px; }
.ws-umodal .ws-checklist-icon { font-size:16px; }
</style>
</head>
<body>
<div class="ws-wrap" id="ws-app">
  <!-- JS renders everything -->
</div>
<div class="ws-toast" id="ws-toast"></div>

<!-- Assign member modal -->
<div class="ws-modal-overlay" id="assign-modal">
  <div class="ws-modal">
    <h4>Назначить участника</h4>
    <div class="ws-form-row"><div style="flex:1">
      <label>Пользователь</label>
      <select id="assign-user"><option value="">Выберите...</option></select>
    </div></div>
    <div class="ws-form-row"><div style="flex:1">
      <label>Роль</label>
      <select id="assign-role">
        <option value="member">Участник</option>
        <option value="owner">Владелец</option>
      </select>
    </div></div>
    <div class="ws-form-actions">
      <button class="ws-btn-primary" id="btn-confirm-member">Назначить</button>
      <button class="ws-btn-secondary" id="btn-cancel-member">Отмена</button>
    </div>
  </div>
</div>

<script src="./platform.js"></script>
<script src="./js/auth.js"></script>
<script>
(function() {
  'use strict';

  // ── Constants ──
  var GATE_NAMES = ['O\xB70 Заявка','O\xB71 Разведка','O\xB72 Прототип','O\xB73 Разгон','O\xB74 Экосистема','O\xB75 Плато'];
  var TECH_GATE_NAMES = ['T\xB70 Заявка','T\xB71 Проектирование','T\xB72 Реализация','T\xB73 Приёмка'];
  var STATUS_LABELS = {'on-track':'Активен','at-risk':'Риск','blocked':'Заблокирован','screening':'Заявка (O\xB70)','pending':'Заявка (O\xB70)','done':'Завершён','paused':'Приостановлен','active':'Активен','archived':'Архив','draft':'Черновик','wip':'В работе','planned':'Запланировано','backlog':'Бэклог'};
  var STATUS_CLS = {'on-track':'sb-on-track','at-risk':'sb-at-risk','blocked':'sb-blocked','paused':'sb-paused','done':'sb-done','active':'sb-active','pending':'sb-pending','archived':'sb-archived','draft':'sb-paused','screening':'sb-pending'};
  var GOAL_TYPE_LABELS = {'product':'Продуктовая','strategic':'Стратегическая','growth':'Рост'};
  var GOAL_TYPE_CLS = {'product':'gt-product','strategic':'gt-strategic','growth':'gt-growth'};
  var APPROVAL_LABELS = {'approved':'Согласовано','pending':'На согласовании','rejected':'Отклонено'};
  var APPROVAL_CLS = {'approved':'ab-approved','pending':'ab-pending','rejected':'ab-rejected'};

  // ── Modal component ──
  function showModal(title, fields, onConfirm, opts) {
    opts = opts || {};
    var overlay = document.createElement('div');
    overlay.className = 'ws-umodal-overlay';
    var modal = document.createElement('div');
    modal.className = 'ws-umodal';
    var h3 = document.createElement('h3');
    h3.textContent = title;
    modal.appendChild(h3);

    // Optional HTML block (for checklists etc.)
    if (opts.htmlBefore) {
      var div = document.createElement('div');
      div.innerHTML = opts.htmlBefore;
      modal.appendChild(div);
    }

    fields.forEach(function(f) {
      var lbl = document.createElement('label');
      lbl.textContent = f.label;
      lbl.setAttribute('for', 'ws-modal-' + f.id);
      modal.appendChild(lbl);
      var el;
      if (f.type === 'select') {
        el = document.createElement('select');
        (f.options || []).forEach(function(o) {
          var opt = document.createElement('option');
          if (typeof o === 'object') { opt.value = o.value; opt.textContent = o.label; }
          else { opt.value = o; opt.textContent = o; }
          el.appendChild(opt);
        });
        if (f.value) el.value = f.value;
      } else if (f.type === 'textarea') {
        el = document.createElement('textarea');
        el.placeholder = f.placeholder || '';
        if (f.value !== undefined) el.value = f.value;
      } else {
        el = document.createElement('input');
        el.type = f.type || 'text';
        el.placeholder = f.placeholder || '';
        if (f.value !== undefined) el.value = f.value;
      }
      el.id = 'ws-modal-' + f.id;
      modal.appendChild(el);
    });

    var actions = document.createElement('div');
    actions.className = 'ws-umodal-actions';
    var btnCancel = document.createElement('button');
    btnCancel.className = 'ws-umodal-btn ws-umodal-btn-cancel';
    btnCancel.textContent = 'Отмена';
    var btnOk = document.createElement('button');
    btnOk.className = 'ws-umodal-btn ws-umodal-btn-primary';
    btnOk.textContent = opts.confirmLabel || 'Подтвердить';
    actions.appendChild(btnCancel);
    actions.appendChild(btnOk);
    modal.appendChild(actions);
    overlay.appendChild(modal);
    document.body.appendChild(overlay);

    function close() { if (overlay.parentNode) overlay.parentNode.removeChild(overlay); }
    function submit() {
      var values = {};
      fields.forEach(function(f) {
        var el = document.getElementById('ws-modal-' + f.id);
        values[f.id] = el ? el.value : '';
      });
      close();
      onConfirm(values);
    }

    btnCancel.addEventListener('click', close);
    overlay.addEventListener('click', function(e) { if (e.target === overlay) close(); });
    document.addEventListener('keydown', function handler(e) {
      if (e.key === 'Escape') { close(); document.removeEventListener('keydown', handler); }
    });
    btnOk.addEventListener('click', submit);

    // Focus first field
    var firstEl = fields.length ? document.getElementById('ws-modal-' + fields[0].id) : null;
    if (firstEl) setTimeout(function() { firstEl.focus(); }, 50);
  }

      saveBacklog();

    var gateNames = isTechSolution() ? TECH_GATE_NAMES : GATE_NAMES;
    if (currentGate >= gateNames.length - 1) {
      showToast('Продукт уже на финальной стадии');
      return;
    }
    var nextGate = currentGate + 1;
    var nextName = gateNames[nextGate];

    // Build artifact status summary for current gate
    var artifacts = _product.artifacts || [];
    var gateArtifacts = artifacts.filter(function(a) { return a.gate === currentGate; });
    var artStatus = '';
    if (gateArtifacts.length) {
      artStatus = '\n\nАртефакты Gate ' + currentGate + ':';
      gateArtifacts.forEach(function(a) {
        var icon = a.status === 'done' ? '✅' : a.status === 'wip' ? '⏳' : '❌';
        artStatus += '\n  ' + icon + ' ' + a.name + ' — ' + (a.status === 'done' ? 'готов' : a.status === 'wip' ? 'в работе' : 'не начат');
      });
    }

    var user = window.OrbAuth ? OrbAuth.getCurrentUser() : null;
    var userName = user ? user.name : 'Unknown';

    // Build checklist HTML for artifacts
    var checklistHtml = '';
    if (gateArtifacts.length) {
      checklistHtml = '<div style="margin-bottom:12px">';
      gateArtifacts.forEach(function(a) {
        var icon = a.status === 'done' ? '✅' : a.status === 'wip' ? '⏳' : '❌';
        var label = a.status === 'done' ? 'готов' : a.status === 'wip' ? 'в работе' : 'не начат';
        checklistHtml += '<div class="ws-checklist-item"><span class="ws-checklist-icon">' + icon + '</span> ' + a.name + ' — ' + label + '</div>';
      });
      checklistHtml += '</div>';
    }

    showModal('Перевод на ' + nextName, [
      { label: 'Комментарий (необязательно)', type: 'textarea', id: 'comment', placeholder: '' }
    ], function(vals) {
      _product.gate = nextGate;
      if (_product.status === 'screening' || _product.status === 'pending') _product.status = 'on-track';
      _product.updatedAt = new Date().toISOString().split('T')[0];

      // Gate approval record
      if (!_product.gateHistory) _product.gateHistory = [];
      _product.gateHistory.push({
        fromGate: currentGate,
        toGate: nextGate,
        approvedBy: userName,
        role: role,
        date: new Date().toISOString().split('T')[0],
        comment: vals.comment || ''
      });

      saveProducts();
      addLog('gate_transition', 'Переход: ' + gateNames[currentGate] + ' → ' + nextName + ' (утвердил: ' + userName + ')', 'product', productId);
      if (window.PT && PT.notify) {
        PT.notify({
          type: 'gate_transition',
          level: 'high',
          recipientRole: 'pm_owner',
          productId: productId,
          title: productId + ' переведён на ' + nextName,
          text: 'Gate ' + currentGate + ' пройден. Утвердил: ' + userName,
          action: { label: 'Открыть', url: 'workspace.html?id=' + productId }
        });
      }
      showToast('Переведено на ' + nextName);
      render();
    }, { confirmLabel: 'Перевести', htmlBefore: '<p style="font-size:13px;color:var(--text);margin-bottom:8px">Текущий Gate: <b>' + gateNames[currentGate] + '</b> → <b>' + nextName + '</b><br>Утверждает: ' + userName + '</p>' + checklistHtml });
  };

  // ── Stage Metric Status cycling (✓ / ✗ / —) ──
  window.cycleStageMetricStatus = function(td) {
    if (!_product || !canEditContent()) return;
    var gate = td.getAttribute('data-gate');
    var idx = td.getAttribute('data-idx');
    var cycle = ['\u2014', '\u2713', '\u2717'];
    var cur = td.textContent.trim();
    var next = cycle[(cycle.indexOf(cur) + 1) % cycle.length];
    td.textContent = next;
    if (!_product.stageMetricStatus) _product.stageMetricStatus = {};
    if (!_product.stageMetricStatus['g' + gate]) _product.stageMetricStatus['g' + gate] = {};
    _product.stageMetricStatus['g' + gate][idx] = next;
    saveProducts();
  };

  // ── Teams rendering ──
  function renderTeams() {
    var container = document.getElementById('ws-teams');
    if (!container) return;

    var teams = JSON.parse(localStorage.getItem('ECOTECH_TEAMS') || '[]');
    var productTeams = teams.filter(function(t) { return t.productId === productId && t.status === 'active'; });
    var users = window.OrbAuth ? OrbAuth.getUsers() : [];

    if (!productTeams.length) {
      container.innerHTML = '<div style="color:var(--muted);font-size:13px;">\u041A\u043E\u043C\u0430\u043D\u0434\u044B \u043D\u0435 \u043D\u0430\u0437\u043D\u0430\u0447\u0435\u043D\u044B</div>';
      return;
    }

    var html = '';
    productTeams.forEach(function(team) {
      var lead = users.find(function(u) { return u.id === team.lead; });
      var memberCount = team.members ? team.members.length : 0;
      var scopeCount = team.initiativeScope ? team.initiativeScope.length : 0;

      html += '<div class="ws-team-card">' +
        '<div class="ws-tc-name">' + esc(team.name) + '</div>' +
        '<div class="ws-tc-meta">' +
          'Lead: ' + (lead ? esc(lead.name) : '\u2014') +
          ' \u00B7 ' + memberCount + ' \u0443\u0447\u0430\u0441\u0442\u043D\u0438\u043A' + (memberCount > 1 ? '\u043E\u0432' : '') +
          ' \u00B7 ' + scopeCount + ' \u0438\u043D\u0438\u0446\u0438\u0430\u0442\u0438\u0432' +
        '</div>' +
      '</div>';
    });

    container.innerHTML = html;

    // Show teams management link for admin/pmo
    var role = getRole();
    if (role === 'admin' || role === 'pmo_lead' || role === 'pmo' || isOwner()) {
      var link = document.getElementById('teams-link');
      if (link) link.style.display = '';
    }
  }

  // ═══════════════════════════════════════════════════════════════
  //  TAB 1: PASSPORT
  // ═══════════════════════════════════════════════════════════════

  function renderPassport(editable, initiatives, goals) {
    var html = '';
    var gateNum = _product.gate || 0;
    var gateNames = isTechSolution() ? TECH_GATE_NAMES : GATE_NAMES;
    var isEdit = canEditContent();

    // ── Health Card (CEO summary) ──
    (function() {
      var gateNames = isTechSolution() ? TECH_GATE_NAMES : GATE_NAMES;
      var curGate = _product.gate || 0;
      var totalGates = gateNames.length;
      var stageName = gateNames[curGate] || ('Gate ' + curGate);

      // Progress bar: filled vs empty blocks
      var progFilled = '';
      var progEmpty = '';
      for (var pi = 0; pi < totalGates; pi++) {
        if (pi <= curGate) progFilled += '\u2593'; else progEmpty += '\u2591';
      }

      // Status → border color
      var hcStatus = _product.statusLight || 'green';
      var hcBorderColor = hcStatus === 'red' ? 'var(--red)' : hcStatus === 'amber' ? 'var(--amber)' : 'var(--teal)';

      // Key KPI (first element)
      var hcKpi = (_product.kpi && _product.kpi.length) ? _product.kpi[0] : null;

      // Initiatives count
      var hcWip = 0;
      var hcTotal = initiatives ? initiatives.length : 0;
      if (initiatives) {
        for (var ii = 0; ii < initiatives.length; ii++) {
          if (initiatives[ii].status === 'wip') hcWip++;
        }
      }

      // Next gate info
      var nextGateNum = curGate + 1;
      var nextGateName = nextGateNum < gateNames.length ? gateNames[nextGateNum] : null;
      var nextSm = STAGE_METRICS[nextGateNum];

      html += '<div class="ws-health-card" style="display:flex;gap:16px;align-items:stretch;padding:14px 18px;margin-bottom:16px;background:var(--card);border:1px solid var(--border);border-left:4px solid ' + hcBorderColor + ';border-radius:10px;min-height:60px;flex-wrap:wrap;">';

      // Block 1: Stage + progress
      html += '<div style="flex:1;min-width:120px;">';
      html += '<div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;">Стадия</div>';
      html += '<div style="font-size:15px;font-weight:700;">' + esc(stageName) + '</div>';
      html += '<div style="font-family:monospace;font-size:13px;margin-top:2px;letter-spacing:1px;color:var(--teal);">' + progFilled + '<span style="color:var(--muted);">' + progEmpty + '</span></div>';
      html += '</div>';

      // Block 2: Key metric
      html += '<div style="flex:1;min-width:110px;">';
      html += '<div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;">Ключевая метрика</div>';
      if (hcKpi) {
        html += '<div style="font-size:18px;font-weight:800;color:var(--teal);">' + esc(hcKpi.value) + '</div>';
        html += '<div style="font-size:11px;color:var(--muted);">' + esc(hcKpi.label) + '</div>';
      } else {
        html += '<div style="font-size:14px;color:var(--muted);">\u2014</div>';
      }
      html += '</div>';

      // Block 3: Initiatives
      html += '<div style="flex:1;min-width:110px;">';
      html += '<div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;">Инициативы</div>';
      html += '<div style="font-size:18px;font-weight:800;">' + hcWip + ' <span style="font-size:13px;font-weight:400;color:var(--muted);">в работе / ' + hcTotal + ' всего</span></div>';
      html += '</div>';

      // Block 4: Next gate
      html += '<div style="flex:1;min-width:130px;">';
      html += '<div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;">Следующий Gate</div>';
      if (nextGateName) {
        html += '<div style="font-size:14px;font-weight:700;">' + esc(nextGateName) + '</div>';
        if (nextSm) {
          html += '<div style="font-size:11px;color:var(--muted);">' + esc(nextSm.phase) + '</div>';
        }
      } else {
        html += '<div style="font-size:14px;color:var(--muted);">Финальная стадия</div>';
      }
      html += '</div>';

      html += '</div>';

      // Alert: statusText
      if (_product.statusText && _product.statusText.trim()) {
        html += '<div style="padding:10px 14px;margin-bottom:16px;background:' + (hcStatus === 'red' ? 'var(--red-dim)' : hcStatus === 'amber' ? 'var(--amber-dim)' : 'var(--teal-dim)') + ';border:1px solid ' + hcBorderColor + ';border-radius:8px;font-size:13px;color:var(--fg);">';
        html += '<strong style="margin-right:6px;">\u26A0</strong>' + esc(_product.statusText);
        html += '</div>';
      }
    })();

    // ── What's happening now (auto-status) ──
    html += '<div class="ws-section" id="sec-status">';
    html += '<h3>Что сейчас происходит</h3>';
    html += '<div style="padding:14px;background:var(--surface);border:1px solid var(--border);border-radius:8px;">';

    // Auto-compute signals
    var initsWip = initiatives.filter(function(i){return i.status==='wip';}).length;
    var initsBlocked = initiatives.filter(function(i){return i.status==='blocked';}).length;
    var initsDone = initiatives.filter(function(i){return i.status==='done';}).length;
    var initsTotal = initiatives.length;
    var pGoals = goals.filter(function(g){return g.productId===productId;});
    var krBehind = 0; var krTotal = 0;
    pGoals.forEach(function(g){
      var krs = g.keyResults || [];
      krs.forEach(function(kr){ krTotal++; if(kr.target>0 && (kr.current/kr.target)<0.3) krBehind++; });
    });
    var daysSinceUpd = _product.updated ? Math.floor((Date.now()-new Date(_product.updated).getTime())/86400000) : null;
    var smData = typeof STAGE_METRICS !== 'undefined' ? STAGE_METRICS[gateNum] : null;
    var nextGateName = gateNames[gateNum+1] || 'Финал';

    // Auto status color
    var autoStatus = 'green';
    if (initsBlocked > 0 || (daysSinceUpd !== null && daysSinceUpd > 21)) autoStatus = 'red';
    else if (krBehind > 0 || (daysSinceUpd !== null && daysSinceUpd > 14)) autoStatus = 'amber';
    var autoClr = autoStatus==='red'?'var(--red)':autoStatus==='amber'?'var(--amber)':'var(--teal)';
    var autoDim = autoStatus==='red'?'var(--red-dim)':autoStatus==='amber'?'var(--amber-dim)':'var(--teal-dim)';

    // Save auto-status back to product
    if (_product.statusLight !== autoStatus) {
      _product.statusLight = autoStatus;
      _product.status = autoStatus==='red'?'blocked':autoStatus==='amber'?'at-risk':'on-track';
      _product.statusDate = new Date().toISOString().slice(0,10);
      var allP = PT.load(PT.KEY_PRODUCTS)||[];
      for(var pi=0;pi<allP.length;pi++){if(allP[pi].id===productId){allP[pi].statusLight=autoStatus;allP[pi].status=_product.status;allP[pi].statusDate=_product.statusDate;break;}}
      PT.save(PT.KEY_PRODUCTS, allP);
    }

    // Render signals
    html += '<div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:10px;">';
    // Initiatives
    html += '<div style="font-size:12px;color:var(--text);"><strong style="color:var(--violet);">'+initsWip+'</strong> в работе';
    if(initsBlocked) html += ' · <strong style="color:var(--red);">'+initsBlocked+'</strong> заблокировано';
    html += ' · <span style="color:var(--muted);">'+initsDone+'/'+initsTotal+' готово</span></div>';
    html += '</div>';

    // KR status
    if(krTotal) {
      html += '<div style="font-size:12px;color:var(--text);margin-bottom:8px;">';
      if(krBehind) html += '<strong style="color:var(--amber);">'+krBehind+' из '+krTotal+' KR</strong> отстают (<30% прогресса)';
      else html += '<span style="color:var(--teal);">Все '+krTotal+' KR в норме</span>';
      html += '</div>';
    }

    // Next gate
    html += '<div style="font-size:12px;color:var(--muted);margin-bottom:8px;">Следующий Gate: <strong style="color:var(--text);">'+esc(nextGateName)+'</strong>';
    if(smData) html += ' · фаза: '+esc(smData.phase);
    html += '</div>';

    // Freshness
    if(daysSinceUpd !== null) {
      var freshClr = daysSinceUpd > 14 ? 'var(--amber)' : 'var(--muted)';
      html += '<div style="font-size:11px;color:'+freshClr+';">Обновлён '+daysSinceUpd+' дн. назад'+(daysSinceUpd>14?' — требуется обновление':'')+'</div>';
    }

    // PM comment (editable)
    html += '<div style="margin-top:10px;border-top:1px solid var(--border);padding-top:10px;">';
    html += '<div style="font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px;">Комментарий PM</div>';
    html += '<div class="ws-editable" contenteditable="'+(isEdit?'true':'false')+'" id="f-status-text" data-field="statusText" data-placeholder="Что происходит? Блокеры, решения, контекст..." style="font-size:12px;min-height:32px;">'+esc(_product.statusText||'')+'</div>';
    html += '</div>';

    html += '</div></div>';

    // ── About ──
    html += '<div class="ws-section"><h3>\u041E \u043F\u0440\u043E\u0434\u0443\u043A\u0442\u0435</h3>';
    html += editableField('desc', '\u041E\u043F\u0438\u0441\u0430\u043D\u0438\u0435', _product.desc || '\u041E\u043F\u0438\u0441\u0430\u043D\u0438\u0435 \u043D\u0435 \u0443\u043A\u0430\u0437\u0430\u043D\u043E', isEdit);
    html += editableField('utp', '\u0423\u0422\u041F', _product.utp || '--', isEdit);
    html += editableField('audience', '\u0426\u0435\u043B\u0435\u0432\u0430\u044F \u0430\u0443\u0434\u0438\u0442\u043E\u0440\u0438\u044F', _product.audience || '--', isEdit);
    html += editableField('businessModel', '\u0411\u0438\u0437\u043D\u0435\u0441-\u043C\u043E\u0434\u0435\u043B\u044C', _product.businessModel || '--', isEdit);
    html += '</div>';

    // ── Gate Timeline ──
    html += '<div class="ws-section"><h3>\u0421\u0442\u0430\u0434\u0438\u044F \u0437\u0440\u0435\u043B\u043E\u0441\u0442\u0438</h3>';
    html += renderGateTimeline(gateNum);
    // Advance gate button
    var gateRole = getRole();
    if (gateRole === 'admin' || gateRole === 'pmo_lead' || gateRole === 'pmo') {
      var currentGate = _product.gate || 0;
      var gateNames = isTechSolution() ? TECH_GATE_NAMES : GATE_NAMES;
      if (currentGate < gateNames.length - 1) {
        var nextName = gateNames[currentGate + 1];
        html += '<button class="ws-gate-advance-btn" onclick="advanceGate()" style="margin-top:12px;padding:10px 20px;background:var(--violet);color:#fff;border:none;border-radius:6px;font-family:var(--font-body);font-size:12px;font-weight:700;cursor:pointer;">';
        html += '\u041F\u0435\u0440\u0435\u0432\u0435\u0441\u0442\u0438 \u043D\u0430 \u0441\u043B\u0435\u0434\u0443\u044E\u0449\u0443\u044E \u0441\u0442\u0430\u0434\u0438\u044E (' + esc(nextName) + ') \u2192';
        html += '</button>';
      }
    }
    html += '</div>';

    // ── Team & Teams (unified) ──
    html += '<div class="ws-section"><h3>Команда</h3>';
    html += renderTeam(isEdit);
    if (isOwner()) {
      html += '<button class="ws-add-member-btn" id="btn-add-member">+ Назначить участника</button>';
    }
    html += '<div class="ws-teams-grid" id="ws-teams" style="margin-top:12px;"></div>';
    html += '<a class="ws-teams-link" href="teams.html" id="teams-link" style="display:none;margin-top:8px;">Управление командами →</a>';
    html += '</div>';

    // ── Metrics ──
    html += '<div class="ws-section"><h3>\u041C\u0435\u0442\u0440\u0438\u043A\u0438</h3>';
    html += editableField('northStar', 'North Star Metric', _product.northStar || '\u2014', isEdit);
    if (_product.kpi && _product.kpi.length) {
      html += '<div class="ws-kpi-grid">';
      for (var k = 0; k < _product.kpi.length; k++) {
        html += '<div class="ws-kpi-card"><div class="ws-kpi-val">' + esc(_product.kpi[k].value) + '</div><div class="ws-kpi-lbl">' + esc(_product.kpi[k].label) + '</div></div>';
      }
      html += '</div>';
    }
    html += '</div>';

    // ── Stage Metrics (Метрики стадии) ──
    var _sm = STAGE_METRICS[gateNum];
    if (_sm) {
      var phaseColors = { 'Discovery': 'var(--amber)', 'Delivery': 'var(--violet)', 'Growth': 'var(--teal)' };
      var phaseDims = { 'Discovery': 'var(--amber-dim)', 'Delivery': 'var(--violet-dim)', 'Growth': 'var(--teal-dim)' };
      var phaseBorders = { 'Discovery': 'var(--amber-border)', 'Delivery': 'var(--violet-border)', 'Growth': 'var(--teal-border)' };
      html += '<div class="ws-stage-metrics">';
      html += '<h3>Метрики стадии</h3>';
      html += '<div class="ws-stage-metrics-title">';
      html += 'Фокус стадии: Gate ' + gateNum + ' \u2014 ' + esc(_sm.name);
      html += ' <span class="ws-sm-badge" style="color:' + (phaseColors[_sm.phase] || 'var(--violet)') + ';background:' + (phaseDims[_sm.phase] || 'var(--violet-dim)') + ';border-color:' + (phaseBorders[_sm.phase] || 'var(--violet-border)') + '">' + esc(_sm.phase) + '</span>';
      html += '</div>';
      html += '<table class="ws-sm-table"><thead><tr><th>Метрика</th><th>Порог Go</th><th style="width:70px;text-align:center">Статус</th></tr></thead><tbody>';
      var savedStatuses = (_product.stageMetricStatus && _product.stageMetricStatus['g' + gateNum]) || {};
      for (var mi = 0; mi < _sm.metrics.length; mi++) {
        var curSt = savedStatuses[mi] || '\u2014';
        html += '<tr>';
        html += '<td>' + esc(_sm.metrics[mi].label) + '</td>';
        html += '<td style="font-weight:600">' + esc(_sm.metrics[mi].threshold) + '</td>';
        html += '<td class="ws-sm-status" data-gate="' + gateNum + '" data-idx="' + mi + '" onclick="cycleStageMetricStatus(this)" title="Клик для смены статуса">' + curSt + '</td>';
        html += '</tr>';
      }
      html += '</tbody></table>';
      html += '<div class="ws-sm-phase">';
      html += '<div class="ws-sm-phase-title">Что делать на этой стадии (' + esc(_sm.phase) + '):</div>';
      html += '<ul>';
      for (var ai = 0; ai < _sm.actions.length; ai++) {
        html += '<li>' + esc(_sm.actions[ai]) + '</li>';
      }
      html += '</ul>';
      html += '</div>';
      html += '</div>';
    }

    // ── Links ──
    html += '<div class="ws-section"><h3>\u0421\u0441\u044B\u043B\u043A\u0438</h3>';
    html += '<div class="ws-links" id="ws-links">';
    if (_product.trackerUrl) html += '<a href="' + esc(_product.trackerUrl) + '" target="_blank">\u0422\u0440\u0435\u043A\u0435\u0440</a>';
    if (_product.wikiUrl) html += '<a href="' + esc(_product.wikiUrl) + '" target="_blank">Wiki</a>';
    if (_product.figmaUrl) html += '<a href="' + esc(_product.figmaUrl) + '" target="_blank">Figma</a>';
    if (_product.repoUrl) html += '<a href="' + esc(_product.repoUrl) + '" target="_blank">Repo</a>';
    if (!_product.trackerUrl && !_product.wikiUrl && !_product.figmaUrl && !_product.repoUrl) {
      html += '<span style="font-size:12px;color:var(--muted)">\u0421\u0441\u044B\u043B\u043A\u0438 \u043D\u0435 \u0434\u043E\u0431\u0430\u0432\u043B\u0435\u043D\u044B</span>';
    }
    html += '</div></div>';

    return html;
  }

  function editableField(field, label, value, isEdit) {
    var html = '<div class="ws-field" data-field="' + field + '">';
    html += '<label>' + esc(label) + '</label>';
    html += '<div class="ws-editable" contenteditable="' + (isEdit ? 'true' : 'false') + '" id="f-' + field + '" data-field="' + field + '">' + esc(value) + '</div>';
    html += '</div>';
    return html;
  }

  function renderGateTimeline(current) {
    var names = getActiveGateNames();
    var html = '<div class="ws-gate-timeline">';
    for (var i = 0; i < names.length; i++) {
      if (i > 0) html += '<div class="ws-gate-line' + (i <= current ? ' completed' : '') + '"></div>';
      var cls = i < current ? 'completed' : (i === current ? 'current' : '');
      html += '<div style="display:flex;flex-direction:column;align-items:center">';
      html += '<div class="ws-gate-dot ' + cls + '">' + i + '</div>';
      html += '<div class="ws-gate-label">' + esc(names[i].split(' ').slice(1).join(' ')) + '</div>';
      html += '</div>';
    }
    html += '</div>';
    return html;
  }

  function renderTeam(isEdit) {
    var html = '';
    // PMO
    html += teamMember(_product.pmo || _product.owner || '--', 'PMO-\u043C\u0435\u043D\u0435\u0434\u0436\u0435\u0440');
    // Owner
    var owner = window.OrbAuth ? OrbAuth.getProductOwner(productId) : null;
    if (owner) html += teamMember(owner.name, '\u0412\u043B\u0430\u0434\u0435\u043B\u0435\u0446 (Owner)');
    // PMs
    var pms = window.OrbAuth ? OrbAuth.getProductPMs(productId) : [];
    for (var i = 0; i < pms.length; i++) {
      var pmName = OrbAuth.getDisplayName({name: pms[i].name, id: pms[i].email}, 'user');
      html += teamMember(pmName, 'Product Manager', OrbAuth.formatScope(pms[i].scope));
    }
    if (!pms.length && !owner) html += teamMember('\u043D\u0435 \u043D\u0430\u0437\u043D\u0430\u0447\u0435\u043D', 'Product Manager');
    // Members
    var members = window.OrbAuth ? OrbAuth.getProductMembers(productId) : [];
    for (var m = 0; m < members.length; m++) {
      html += teamMember(members[m].name, '\u0423\u0447\u0430\u0441\u0442\u043D\u0438\u043A', OrbAuth.formatScope(members[m].scope));
    }
    // Stakeholders
    if (_product.stakeholders) html += teamMember(_product.stakeholders, '\u0421\u0442\u0435\u0439\u043A\u0445\u043E\u043B\u0434\u0435\u0440\u044B');
    return html;
  }

  function teamMember(name, role, scope) {
    var initials = String(name || '?').split(' ').map(function(w) { return w.charAt(0); }).join('').substr(0, 2).toUpperCase();
    var html = '<div class="ws-team-member">';
    html += '<div class="ws-team-ava">' + esc(initials) + '</div>';
    html += '<div class="ws-team-info">';
    html += '<div class="ws-team-name">' + esc(name) + '</div>';
    html += '<div class="ws-team-role">' + esc(role) + (scope ? ' \u2014 ' + esc(scope) : '') + '</div>';
    html += '</div></div>';
    return html;
  }

  // ═══════════════════════════════════════════════════════════════
  //  TAB 2: INITIATIVES
  // ═══════════════════════════════════════════════════════════════

  function renderInitiatives(items, editable) {
    var html = '<div class="ws-init-toolbar">';
    if (editable) html += '<button class="ws-create-init-btn" id="btn-create-init">+ \u041D\u043E\u0432\u0430\u044F \u0438\u043D\u0438\u0446\u0438\u0430\u0442\u0438\u0432\u0430</button>';
    else html += '<div></div>';
    html += '<div class="ws-init-views">';
    html += '<button class="ws-view-btn' + (_initView === 'type' ? ' active' : '') + '" data-view="type">\u041F\u043E \u0442\u0438\u043F\u0443</button>';
    html += '<button class="ws-view-btn' + (_initView === 'rice' ? ' active' : '') + '" data-view="rice">\u041F\u043E RICE</button>';
    html += '</div></div>';

    // Create form
    html += '<div class="ws-init-form" id="init-form" style="display:none">';
    html += '<h4>\u041D\u043E\u0432\u0430\u044F \u0438\u043D\u0438\u0446\u0438\u0430\u0442\u0438\u0432\u0430</h4>';
    html += '<div class="ws-form-row"><div style="flex:2"><label>\u041D\u0430\u0437\u0432\u0430\u043D\u0438\u0435</label><input type="text" id="init-name" placeholder="\u041D\u0430\u0437\u0432\u0430\u043D\u0438\u0435 \u0438\u043D\u0438\u0446\u0438\u0430\u0442\u0438\u0432\u044B"></div>';
    html += '<div style="flex:1"><label>\u0422\u0438\u043F</label><select id="init-type"><option value="product">\u041F\u0440\u043E\u0434\u0443\u043A\u0442\u043E\u0432\u044B\u0435</option><option value="business">\u0411\u0438\u0437\u043D\u0435\u0441</option><option value="technical">\u0422\u0435\u0445\u043D\u0438\u0447\u0435\u0441\u043A\u0438\u0435</option></select></div></div>';
    html += '<div class="ws-form-row"><div style="flex:1"><label>\u041E\u043F\u0438\u0441\u0430\u043D\u0438\u0435</label><textarea id="init-desc" placeholder="\u041E\u043F\u0438\u0441\u0430\u043D\u0438\u0435..."></textarea></div></div>';
    html += '<div class="ws-form-row">';
    html += '<div style="flex:1"><label>Reach (1-10)</label><input type="number" id="init-r" min="1" max="10" value="5"></div>';
    html += '<div style="flex:1"><label>Impact (1-10)</label><input type="number" id="init-i" min="1" max="10" value="5"></div>';
    html += '<div style="flex:1"><label>Confidence (1-10)</label><input type="number" id="init-c" min="1" max="10" value="5"></div>';
    html += '<div style="flex:1"><label>Effort (1-10)</label><input type="number" id="init-e" min="1" max="10" value="5"></div>';
    html += '</div>';
    html += '<div class="ws-form-row"><div style="flex:1"><label>\u041A\u0432\u0430\u0440\u0442\u0430\u043B</label><select id="init-quarter"><option value="Q1">Q1</option><option value="Q2">Q2</option><option value="Q3">Q3</option><option value="Q4">Q4</option></select></div>';
    html += '<div style="flex:2"><label>\u0421\u0441\u044B\u043B\u043A\u0430 \u043D\u0430 \u0442\u0440\u0435\u043A\u0435\u0440</label><input type="url" id="init-tracker" placeholder="https://..."></div></div>';
    html += '<div class="ws-form-actions"><button class="ws-btn-primary" id="init-save">\u0421\u043E\u0445\u0440\u0430\u043D\u0438\u0442\u044C</button><button class="ws-btn-secondary" id="init-cancel">\u041E\u0442\u043C\u0435\u043D\u0430</button></div>';
    html += '</div>';

    // List
    html += '<div id="init-list">';
    if (!items.length) {
      html += '<div style="text-align:center;padding:40px;color:var(--muted);font-size:13px">\u0418\u043D\u0438\u0446\u0438\u0430\u0442\u0438\u0432 \u043F\u043E\u043A\u0430 \u043D\u0435\u0442</div>';
    } else if (_initView === 'rice') {
      var sorted = items.slice().sort(function(a, b) { return riceScore(b) - riceScore(a); });
      for (var i = 0; i < sorted.length; i++) html += renderInitCard(sorted[i], editable);
    } else {
      var groups = {};
      for (var j = 0; j < items.length; j++) {
        var t = PT.getInitType(items[j]);
        if (!groups[t]) groups[t] = [];
        groups[t].push(items[j]);
      }
      var order = ['product', 'business', 'technical'];
      for (var g = 0; g < order.length; g++) {
        var key = order[g];
        if (!groups[key] || !groups[key].length) continue;
        var meta = PT.INITIATIVE_TYPES[key];
        html += '<div class="ws-init-group-title" style="color:' + meta.color + '">' + esc(meta.label) + ' (' + groups[key].length + ')</div>';
        for (var gi = 0; gi < groups[key].length; gi++) html += renderInitCard(groups[key][gi], editable);
      }
    }
    html += '</div>';
    return html;
  }

  function renderInitCard(item, editable) {
    var rice = riceScore(item);
    var t = PT.getInitType(item);
    var meta = PT.INITIATIVE_TYPES[t] || PT.INITIATIVE_TYPES.product;
    var statusLabel = STATUS_LABELS[item.status] || item.status || 'backlog';
    var expanded = _expandedInit === item.id;

    var html = '<div class="ws-init-card" style="border-left-color:' + meta.color + '">';
    html += '<div class="ws-init-header" data-init-id="' + esc(item.id) + '">';
    html += '<span class="ws-init-name">' + esc(item.name || item.title || item.id) + '</span>';
    if (rice > 0) html += '<span class="ws-init-rice">RICE ' + rice + '</span>';
    html += '<span class="ws-init-status">' + esc(statusLabel) + '</span>';
    html += '</div>';

    html += '<div class="ws-init-body" id="init-body-' + esc(item.id) + '" style="display:' + (expanded ? 'block' : 'none') + '">';

    // Description
    if (item.desc) html += '<div style="font-size:13px;color:var(--text);margin-bottom:12px;line-height:1.6;">' + esc(item.desc) + '</div>';

    // Spec grid: PM, Team, Quarter, Type, Goal
    html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;">';

    // PM
    html += '<div style="font-size:12px;"><span style="color:var(--muted);">PM:</span> <strong style="color:var(--text);">' + esc(item.pm || '\u2014') + '</strong></div>';

    // Team
    var teamName = '\u2014';
    if (item.teamId) {
      var teams = JSON.parse(localStorage.getItem('ECOTECH_TEAMS') || '[]');
      var team = teams.find(function(t) { return t.id === item.teamId; });
      if (team) teamName = team.name;
    }
    html += '<div style="font-size:12px;"><span style="color:var(--muted);">Команда:</span> <strong style="color:var(--text);">' + esc(teamName) + '</strong></div>';

    // Quarter
    html += '<div style="font-size:12px;"><span style="color:var(--muted);">Квартал:</span> <strong style="color:var(--text);">' + esc(item.quarter || '\u2014') + '</strong></div>';

    // Type
    var tp = PT.INITIATIVE_TYPES[t] || PT.INITIATIVE_TYPES.product;
    html += '<div style="font-size:12px;"><span style="color:var(--muted);">Тип:</span> <span style="color:' + tp.color + ';font-weight:600;">' + tp.label + '</span></div>';

    // Goal link
    if (item.goalId) {
      var goal = _goals.find(function(g) { return g.id === item.goalId; });
      if (goal) html += '<div style="font-size:12px;grid-column:1/-1;"><span style="color:var(--muted);">Цель:</span> <strong style="color:var(--teal);">' + esc(goal.title || goal.name) + '</strong></div>';
    }

    html += '</div>';

    // RICE breakdown (compact, for PM view)
    html += '<div style="display:flex;gap:12px;margin-bottom:12px;padding:8px 12px;background:var(--surface);border-radius:6px;font-size:11px;">';
    html += '<span style="color:var(--muted);">RICE:</span>';
    html += '<span>R:' + (item.r||0) + '</span><span>I:' + (item.i||0) + '</span><span>C:' + (item.c||0) + '</span><span>E:' + (item.e||0) + '</span>';
    html += '<span style="font-weight:700;color:var(--violet);margin-left:auto;">' + rice + '</span>';
    html += '</div>';

    // Tracker link
    if (item.trackerUrl) {
      html += '<a href="' + esc(item.trackerUrl) + '" target="_blank" style="display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--violet);text-decoration:none;font-weight:600;padding:6px 12px;background:var(--violet-dim);border-radius:6px;border:1px solid var(--violet-border);margin-bottom:10px;">Открыть в трекере</a>';
    } else {
      html += '<div style="font-size:11px;color:var(--muted);margin-bottom:10px;">Трекер не привязан</div>';
    }

    // Methodology link
    html += '<a href="framework.html" style="font-size:11px;color:var(--muted);text-decoration:none;" onmouseover="this.style.color=\'var(--violet)\'" onmouseout="this.style.color=\'var(--muted)\'">Методология: стадия ' + (isTechSolution() ? 'T' : 'O') + '\u00b7' + (_product.gate||0) + '</a>';
    if (editable && canReview()) {
      html += '<div style="margin-top:10px;display:flex;gap:8px">';
      html += '<button class="ws-btn-primary" data-approve="' + esc(item.id) + '" style="font-size:11px;padding:5px 12px">\u0421\u043E\u0433\u043B\u0430\u0441\u043E\u0432\u0430\u0442\u044C</button>';
      html += '<button class="ws-btn-secondary" data-reject="' + esc(item.id) + '" style="font-size:11px;padding:5px 12px">\u041E\u0442\u043A\u043B\u043E\u043D\u0438\u0442\u044C</button>';
      html += '</div>';
    }
    // Go/No-Go/Revise review buttons for lead/pmo_lead/admin
    if (getRole() === 'lead' || getRole() === 'pmo_lead' || getRole() === 'admin') {
      html += '<div style="display:flex;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);">';
      html += '<button onclick="reviewInitiative(\'' + esc(item.id) + '\',\'go\')" style="padding:6px 14px;border-radius:6px;border:1px solid rgba(75,206,151,.3);background:var(--teal-dim);color:var(--teal);font-size:11px;font-weight:700;cursor:pointer;">Go</button>';
      html += '<button onclick="reviewInitiative(\'' + esc(item.id) + '\',\'nogo\')" style="padding:6px 14px;border-radius:6px;border:1px solid rgba(248,113,113,.3);background:var(--red-dim);color:var(--red);font-size:11px;font-weight:700;cursor:pointer;">No-Go</button>';
      html += '<button onclick="reviewInitiative(\'' + esc(item.id) + '\',\'revise\')" style="padding:6px 14px;border-radius:6px;border:1px solid rgba(245,205,71,.3);background:var(--amber-dim);color:var(--amber);font-size:11px;font-weight:700;cursor:pointer;">Revise</button>';
      html += '</div>';
    }
    html += '</div>';
    html += '</div>';
    return html;
  }

  // ═══════════════════════════════════════════════════════════════
  //  TAB 3: GOALS
  // ═══════════════════════════════════════════════════════════════

  function renderGoals(goals, initiatives, editable) {
    var html = '';

    // PL-007: Auto-notifications for planning phases
    if (window.PT && PT.notify) {
      goals.forEach(function(g) {
        if (g.status === 'draft' && g.createdAt && PT.daysSince(g.createdAt) > 7) {
          PT.notify({ type:'goal_pending', level:'medium', recipientRole:'pmo', productId:productId, title: productId + ': цель ждёт согласования', text: g.title || g.name, action:{label:'Согласовать',url:'workspace.html?id='+productId+'&tab=goals'} });
        }
      });
    }

    // ═══ PLANNING CHECKLIST ═══
    html += '<div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:20px;">';
    html += '<h3 style="font-size:13px;font-weight:700;color:var(--violet);margin-bottom:10px;">Чеклист планирования</h3>';

    var hasGoals = goals.length > 0;
    var goalsWithKR = goals.filter(function(g) { return g.keyResults && g.keyResults.length; }).length;
    var krWithInits = 0;
    goals.forEach(function(g) {
      if (g.keyResults) g.keyResults.forEach(function(kr) {
        var linked = initiatives.filter(function(i) { return i.goalId === g.id; });
        if (linked.length) krWithInits++;
      });
    });
    var allRiced = initiatives.length > 0 && initiatives.filter(function(i) { return i.r && i.i && i.c && i.e; }).length === initiatives.length;

    var checks = [
      { text: 'Определить цели на полугодие (H1/H2)', done: hasGoals },
      { text: 'Добавить Key Results к каждой цели', done: goalsWithKR === goals.length && goals.length > 0 },
      { text: 'Декомпозировать KR в инициативы', done: krWithInits > 0 },
      { text: 'Оценить RICE каждой инициативы', done: allRiced },
      { text: 'Согласовать с PMO', done: false }
    ];

    checks.forEach(function(ch) {
      var icon = ch.done ? '<span style="color:var(--teal);">&#10003;</span>' : '<span style="color:var(--muted);">&#9744;</span>';
      html += '<div style="font-size:13px;color:var(--text);padding:4px 0;">' + icon + ' ' + ch.text + '</div>';
    });

    // Calendar link
    html += '<div style="margin-top:10px;font-size:12px;color:var(--muted);">';
    html += '<a href="calendar.html" style="color:var(--violet);text-decoration:none;font-weight:600;">Календарь событий</a> — ближайшее событие планирования';
    html += '</div>';
    html += '</div>';

    // ═══ GOALS WITH KR → INITIATIVES TREE ═══
    html += '<div style="margin-bottom:20px;">';

    if (!goals.length) {
      html += '<div style="color:var(--muted);font-size:13px;padding:16px;text-align:center;">Цели не добавлены. Начните с чеклиста выше.</div>';
    }

    goals.forEach(function(g) {
      var gtLabel = GOAL_TYPE_LABELS[g.type] || 'Продуктовая';
      // PL-001: lifecycle status badge
      var gs = GOAL_STATUS[g.status] || GOAL_STATUS.draft;

      html += '<div style="background:var(--card);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:12px;border-left:3px solid var(--teal);">';

      // Goal header
      html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap;">';
      html += '<span style="font-size:15px;font-weight:700;color:var(--text);">' + esc(g.title || g.name) + '</span>';
      html += '<span style="font-size:10px;padding:2px 8px;border-radius:4px;background:var(--surface);color:var(--muted);">' + esc(g.period || 'H1 2026') + '</span>';
      html += '<span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;background:var(--surface2);color:' + gs.color + ';border:1px solid ' + gs.color + ';">' + esc(gs.label) + '</span>';
      html += '</div>';

      // PL-002: PMO approve/reject buttons for draft goals
      if ((getRole() === 'pmo' || getRole() === 'pmo_lead' || getRole() === 'admin') && g.status === 'draft') {
        html += '<div style="margin-bottom:10px;display:flex;gap:6px;">';
        html += '<button onclick="approveGoal(\'' + esc(g.id) + '\')" style="padding:5px 12px;border-radius:5px;border:1px solid rgba(75,206,151,.3);background:var(--teal-dim);color:var(--teal);font-size:11px;font-weight:700;cursor:pointer;">Утвердить</button>';
        html += '<button onclick="rejectGoal(\'' + esc(g.id) + '\')" style="padding:5px 12px;border-radius:5px;border:1px solid rgba(248,113,113,.3);background:var(--red-dim);color:var(--red);font-size:11px;font-weight:700;cursor:pointer;">На доработку</button>';
        html += '</div>';
      }

      // Key Results with linked initiatives
      if (g.keyResults && g.keyResults.length) {
        g.keyResults.forEach(function(kr) {
          var pct = kr.target ? Math.round((kr.current || 0) / kr.target * 100) : 0;
          var barColor = pct >= 80 ? 'var(--teal)' : pct >= 40 ? 'var(--amber)' : 'var(--red)';

          html += '<div style="margin-left:16px;margin-bottom:12px;">';
          // KR header + progress
          html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">';
          html += '<span style="font-size:12px;font-weight:600;color:var(--text);flex:1;">' + esc(kr.text || kr.title || kr.name) + '</span>';
          html += '<span style="font-size:11px;color:var(--muted);">' + (kr.current || 0) + '/' + (kr.target || '?') + '</span>';
          // PL-003: inline KR update button
          if (editable) {
            html += '<button onclick="updateKR(\'' + esc(g.id) + '\',\'' + esc(kr.id) + '\')" style="font-size:10px;color:var(--violet);background:none;border:none;cursor:pointer;margin-left:4px;" title="Обновить прогресс">обновить</button>';
          }
          html += '</div>';
          // Progress bar
          html += '<div style="height:4px;background:var(--surface);border-radius:2px;margin-bottom:8px;">';
          html += '<div style="height:100%;width:' + Math.min(pct, 100) + '%;background:' + barColor + ';border-radius:2px;"></div>';
          html += '</div>';

          // B-040: OKR → KPI → Initiatives cascade
          var krInits = initiatives.filter(function(i) { return i.goalId === g.id; });
          if (krInits.length) {
            krInits.forEach(function(ini) {
              var iRice = riceScore(ini);
              var iStatus = STATUS_LABELS[ini.status] || ini.status;
              html += '<div style="margin-left:20px;padding:2px 0;display:flex;align-items:center;gap:6px;font-size:11px;line-height:1.4;cursor:pointer;" onclick="switchTab(\'initiatives\');expandInit(\'' + esc(ini.id) + '\')" title="Перейти к инициативе">';
              html += '<span style="color:var(--muted);flex-shrink:0;font-family:monospace;font-size:12px;">\u2514</span>';
              html += '<span style="color:var(--violet);font-weight:600;flex-shrink:0;">' + esc(ini.id) + '</span>';
              html += '<span style="color:var(--text);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + esc(ini.name) + '</span>';
              html += '<span style="color:var(--muted);flex-shrink:0;">(RICE ' + iRice + ')</span>';
              html += '<span style="color:var(--muted);flex-shrink:0;">\u2014 ' + esc(iStatus) + '</span>';
              html += '</div>';
            });
          } else {
            html += '<div style="margin-left:20px;font-size:11px;color:var(--muted);padding:2px 0;">';
            html += '<span style="font-family:monospace;font-size:12px;">\u2514</span> <span style="font-style:italic;">Нет инициатив</span> \u2192 ';
            html += '<a href="#" onclick="event.preventDefault();switchTab(\'initiatives\');" style="color:var(--violet);text-decoration:none;font-weight:600;">Реестр</a>';
            html += '</div>';
          }

          // Add initiative to this KR (only for editable)
          if (editable) {
            html += '<button onclick="createInitForGoal(\'' + esc(g.id) + '\')" style="margin-left:16px;margin-top:4px;font-size:11px;color:var(--violet);background:none;border:1px dashed var(--violet-border,var(--violet));border-radius:4px;padding:4px 10px;cursor:pointer;">+ Инициатива к этому KR</button>';
          }

          html += '</div>'; // /kr
        });
      } else {
        html += '<div style="margin-left:16px;font-size:12px;color:var(--muted);font-style:italic;">Нет Key Results — добавьте</div>';
      }

      // Add KR button
      if (editable) {
        html += '<button onclick="addKRToGoal(\'' + esc(g.id) + '\')" style="margin-top:8px;font-size:11px;color:var(--teal);background:none;border:1px dashed var(--teal-border,var(--teal));border-radius:4px;padding:4px 10px;cursor:pointer;">+ Key Result</button>';
      }

      html += '</div>'; // /goal card
    });

    html += '</div>'; // /goals section

    // PL-008: Q-plan timeline visualization
    var qInits = initiatives.filter(function(i) { return i.quarter === PT.currentQuarter().replace(/ /g, ' '); });
    if (qInits.length) {
      html += '<div style="margin-bottom:16px;padding:12px;background:var(--surface);border:1px solid var(--border);border-radius:8px;">';
      html += '<h4 style="font-size:12px;font-weight:700;color:var(--violet);margin-bottom:8px;">Q-план: ' + esc(PT.currentQuarter()) + '</h4>';
      var done = qInits.filter(function(i){return i.status==='done'}).length;
      var wip = qInits.filter(function(i){return i.status==='wip'}).length;
      var planned = qInits.filter(function(i){return i.status==='planned'}).length;
      var backlog = qInits.filter(function(i){return i.status==='backlog'}).length;
      var total = qInits.length;
      var pctDone = total ? Math.round(done/total*100) : 0;

      // Progress bar
      html += '<div style="display:flex;height:8px;border-radius:4px;overflow:hidden;margin-bottom:8px;">';
      if (done) html += '<div style="width:' + (done/total*100) + '%;background:var(--teal);"></div>';
      if (wip) html += '<div style="width:' + (wip/total*100) + '%;background:var(--violet);"></div>';
      if (planned) html += '<div style="width:' + (planned/total*100) + '%;background:var(--amber);"></div>';
      if (backlog) html += '<div style="width:' + (backlog/total*100) + '%;background:var(--muted);"></div>';
      html += '</div>';

      html += '<div style="display:flex;gap:12px;font-size:11px;color:var(--muted);">';
      html += '<span style="color:var(--teal);">' + done + ' готово</span>';
      html += '<span style="color:var(--violet);">' + wip + ' в работе</span>';
      html += '<span style="color:var(--amber);">' + planned + ' план</span>';
      html += '<span>' + backlog + ' бэклог</span>';
      html += '<span style="margin-left:auto;font-weight:600;">' + pctDone + '% завершено</span>';
      html += '</div>';
      html += '</div>';
    }

    // ═══ TECH DEBT (initiatives without goals) ═══
    var techDebt = initiatives.filter(function(i) { return !i.goalId; });
    if (techDebt.length) {
      html += '<div style="margin-bottom:20px;">';
      html += '<h3 style="font-size:12px;font-weight:700;color:var(--amber);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;">Техдолг (инициативы без целей)</h3>';
      techDebt.forEach(function(i) {
        var iRice = riceScore(i);
        var iStatus = STATUS_LABELS[i.status] || i.status;
        html += '<div style="padding:8px 12px;background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--amber);border-radius:6px;margin-bottom:4px;display:flex;align-items:center;gap:8px;font-size:12px;">';
        html += '<span style="color:var(--text);flex:1;">' + esc(i.name) + '</span>';
        html += '<span style="color:var(--violet);font-weight:700;font-size:11px;">RICE ' + iRice + '</span>';
        html += '<span style="color:var(--muted);font-size:11px;">' + esc(iStatus) + '</span>';
        if (editable) html += '<button onclick="linkInitToGoal(\'' + esc(i.id) + '\')" style="font-size:10px;color:var(--violet);background:none;border:1px solid var(--violet-border,var(--violet));border-radius:4px;padding:2px 8px;cursor:pointer;">Привязать</button>';
        html += '</div>';
      });
      html += '</div>';
    }

    // PL-004: Transfer overdue initiatives to Q+1
    var overdueInits = initiatives.filter(function(i) { return i.status !== 'done' && i.quarter && i.quarter < PT.currentQuarter().replace(/ /g, ' '); });
    if (overdueInits.length && editable) {
      html += '<div style="margin-bottom:16px;padding:12px;background:var(--amber-dim);border:1px solid var(--amber-border);border-radius:8px;">';
      html += '<div style="font-size:12px;font-weight:700;color:var(--amber);margin-bottom:6px;">Незакрытые инициативы из прошлых кварталов: ' + overdueInits.length + '</div>';
      html += '<button onclick="transferToNextQ()" style="font-size:11px;padding:5px 12px;border-radius:5px;border:1px solid var(--amber-border);background:var(--amber-dim);color:var(--amber);font-weight:600;cursor:pointer;">Перенести все в ' + esc(nextQ()) + '</button>';
      html += '</div>';
    }

    // Create goal button
    if (editable) {
      html += '<button id="btn-create-goal" style="width:100%;padding:12px;background:var(--teal-dim,rgba(0,200,150,0.08));border:1px dashed var(--teal-border,var(--teal));border-radius:8px;color:var(--teal);font-size:13px;font-weight:600;cursor:pointer;text-align:center;">+ Создать цель</button>';
    }

    // PL-005: Retrospective form
    if (editable) {
      html += '<details style="margin-top:16px;"><summary style="font-size:13px;font-weight:600;color:var(--text);cursor:pointer;padding:10px;background:var(--card);border:1px solid var(--border);border-radius:8px;">Ретроспектива квартала</summary>';
      html += '<div style="padding:16px;border:1px solid var(--border);border-top:none;border-radius:0 0 8px 8px;background:var(--card);">';
      html += '<div style="margin-bottom:12px;"><label style="font-size:12px;font-weight:600;color:var(--muted);display:block;margin-bottom:4px;">Что сделали</label><textarea id="retro-done" rows="2" style="width:100%;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:8px;color:var(--text);font-size:12px;resize:vertical;">' + esc(_product.retroDone || '') + '</textarea></div>';
      html += '<div style="margin-bottom:12px;"><label style="font-size:12px;font-weight:600;color:var(--muted);display:block;margin-bottom:4px;">Что не успели</label><textarea id="retro-missed" rows="2" style="width:100%;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:8px;color:var(--text);font-size:12px;resize:vertical;">' + esc(_product.retroMissed || '') + '</textarea></div>';
      html += '<div style="margin-bottom:12px;"><label style="font-size:12px;font-weight:600;color:var(--muted);display:block;margin-bottom:4px;">Lessons learned</label><textarea id="retro-lessons" rows="2" style="width:100%;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:8px;color:var(--text);font-size:12px;resize:vertical;">' + esc(_product.retroLessons || '') + '</textarea></div>';
      html += '<button onclick="saveRetro()" style="padding:6px 16px;background:var(--violet);color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;">Сохранить ретро</button>';
      html += '</div></details>';
    }

    return html;
  }

  // ── Goal-planning helper functions ──

  function createInitForGoal(goalId) {
    switchTab('initiatives');
    var createBtn = document.querySelector('[data-create-init]') || document.getElementById('btn-create-init');
    if (createBtn) createBtn.click();
    setTimeout(function() {
      var goalSelect = document.getElementById('new-init-goal');
      if (goalSelect) goalSelect.value = goalId;
    }, 100);
  }

  function addKRToGoal(goalId) {
    var goal = _goals.find(function(g) { return g.id === goalId; });
    if (!goal) return;
    showModal('Добавить Key Result', [
      { label: 'Key Result (текст)', type: 'text', id: 'krtext', placeholder: 'Опишите KR...' },
      { label: 'Целевое значение', type: 'number', id: 'krtarget', placeholder: '100' }
    ], function(vals) {
      if (!vals.krtext) return;
      if (!goal.keyResults) goal.keyResults = [];
      goal.keyResults.push({
        id: 'KR-' + Date.now(),
        text: vals.krtext,
        current: 0,
        target: parseInt(vals.krtarget) || 100
      });
      saveGoals();
      showToast('KR добавлен');
      render();
    });
  }

  function linkInitToGoal(initId) {
    if (!_goals.length) { showToast('Сначала создайте цель'); return; }
    var goalOptions = _goals.map(function(g) { return { value: g.id, label: g.id + ': ' + (g.title || g.name) }; });
    showModal('Привязать к цели', [
      { label: 'Цель', type: 'select', id: 'goalId', options: goalOptions }
    ], function(vals) {
      if (!vals.goalId) return;
      var init = _backlog.find(function(i) { return i.id === initId; });
      if (init) {
        init.goalId = vals.goalId;
        init.updatedAt = new Date().toISOString().split('T')[0];
        saveBacklog();
        showToast('Привязано к цели');
        render();
      }
    });
  }

  // PL-002: approveGoal / rejectGoal
  window.approveGoal = function(goalId) {
    var g = _goals.find(function(g) { return g.id === goalId; });
    if (!g) return;
    g.status = 'approved';
    g.approvalStatus = 'approved';
    saveGoals();
    addLog('goal_approved', g.title || g.name, 'goal', goalId);
    if (window.PT && PT.notify) {
      PT.notify({ type:'goal_approved', level:'medium', recipientRole:'pm_owner', productId:productId, title:'Цель утверждена: ' + (g.title||g.name), action:{label:'Открыть',url:'workspace.html?id='+productId+'&tab=goals'} });
    }
    showToast('Цель утверждена');
    render();
  };

  window.rejectGoal = function(goalId) {
    var g = _goals.find(function(g) { return g.id === goalId; });
    if (!g) return;
    showModal('Отклонить цель', [
      { label: 'Комментарий для доработки', type: 'textarea', id: 'comment', placeholder: 'Укажите причину...' }
    ], function(vals) {
      var comment = vals.comment || '';
      g.status = 'draft';
      g.approvalStatus = 'rejected';
      saveGoals();
      addLog('goal_rejected', (g.title||g.name) + ': ' + comment, 'goal', goalId);
      if (window.PT && PT.notify) {
        PT.notify({ type:'goal_rejected', level:'high', recipientRole:'pm_owner', productId:productId, title:'Цель на доработку: ' + (g.title||g.name), text:comment, action:{label:'Открыть',url:'workspace.html?id='+productId+'&tab=goals'} });
      }
      showToast('Отправлено на доработку');
      render();
    });
  };

  // PL-003: updateKR inline
  window.updateKR = function(goalId, krId) {
    var g = _goals.find(function(g) { return g.id === goalId; });
    if (!g || !g.keyResults) return;
    var kr = g.keyResults.find(function(k) { return k.id === krId; });
    if (!kr) return;
    showModal('Обновить KR: ' + kr.text, [
      { label: 'Текущее значение (цель: ' + kr.target + ')', type: 'number', id: 'krval', value: kr.current || 0 }
    ], function(vals) {
      kr.current = parseFloat(vals.krval) || 0;
      saveGoals();
      addLog('kr_updated', kr.text + ': ' + kr.current + '/' + kr.target, 'goal', goalId);
      showToast('KR обновлён');
      render();
    });
  };

  // PL-004: Transfer to next quarter
  function nextQ() {
    var cq = PT.currentQuarter();
    var m = cq.match(/Q(\d)/);
    if (!m) return 'Q2 2026';
    var n = parseInt(m[1]);
    return 'Q' + (n < 4 ? n + 1 : 1) + ' 2026';
  }
  window.nextQ = nextQ;

  window.transferToNextQ = function() {
    var nq = nextQ();
    var count = 0;
    _backlog.forEach(function(i) {
      if ((i.productId === productId) && i.status !== 'done' && i.quarter && i.quarter !== nq) {
        i.quarter = nq;
        i.updatedAt = new Date().toISOString().split('T')[0];
        count++;
      }
    });
    saveBacklog();
    addLog('transfer_q', count + ' инициатив перенесено в ' + nq, 'product', productId);
    showToast(count + ' перенесено в ' + nq);
    render();
  };

  // PL-005: Save retrospective
  window.saveRetro = function() {
    _product.retroDone = document.getElementById('retro-done').value;
    _product.retroMissed = document.getElementById('retro-missed').value;
    _product.retroLessons = document.getElementById('retro-lessons').value;
    saveProducts();
    addLog('retro_saved', 'Ретроспектива обновлена', 'product', productId);
    showToast('Ретроспектива сохранена');
  };

  function expandInit(initId) {
    _expandedInit = initId;
    render();
    setTimeout(function() {
      var el = document.getElementById('init-body-' + initId);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 100);
  }

      html += '<span class="ws-doc-name">' + esc(a.name) + '</span>';

      else if (editable) html += '<span style="font-size:11px;color:var(--muted)">\u041D\u0435\u0442 \u0441\u0441\u044B\u043B\u043A\u0438</span>';
      html += '</div>';
    }
    html += '</div></div>';

    // Document links
    html += '<div class="ws-section"><h3>\u0421\u0441\u044B\u043B\u043A\u0438 \u043D\u0430 \u0434\u043E\u043A\u0443\u043C\u0435\u043D\u0442\u044B</h3>';
    html += '<div id="doc-links" class="ws-links">';
    if (_product.trackerUrl) html += '<a href="' + esc(_product.trackerUrl) + '" target="_blank">\u0422\u0440\u0435\u043A\u0435\u0440</a>';
    if (_product.wikiUrl) html += '<a href="' + esc(_product.wikiUrl) + '" target="_blank">Wiki</a>';
    if (!_product.trackerUrl && !_product.wikiUrl) html += '<span style="font-size:12px;color:var(--muted)">\u0421\u0441\u044B\u043B\u043A\u0438 \u043D\u0435 \u0434\u043E\u0431\u0430\u0432\u043B\u0435\u043D\u044B</span>';
    html += '</div></div>';

    return html;

  // ═══════════════════════════════════════════════════════════════
  //  TAB 5: LOG
  // ═══════════════════════════════════════════════════════════════

  function renderLog() {
    var logs = getProductLogs();
    var html = '<div class="ws-section"><h3>\u0418\u0441\u0442\u043E\u0440\u0438\u044F \u0438\u0437\u043C\u0435\u043D\u0435\u043D\u0438\u0439</h3>';
    html += '<div class="ws-log-list" id="log-list">';
    if (!logs.length) {
      html += '<div style="color:var(--muted);font-size:13px;padding:10px 0">\u0417\u0430\u043F\u0438\u0441\u0435\u0439 \u043D\u0435\u0442</div>';
    }
    // Show newest first
    for (var i = logs.length - 1; i >= 0; i--) {
      var log = logs[i];
      html += '<div class="ws-log-entry">';
      html += '<span class="ws-log-date">' + formatDate(log.date || log.createdAt) + '</span>';
      html += '<div>';
      html += '<div class="ws-log-action">' + esc(log.action) + '</div>';
      if (log.details) html += '<div class="ws-log-details">' + esc(log.details) + '</div>';
      if (log.userName) html += '<div class="ws-log-user">' + esc(log.userName) + '</div>';
      html += '</div></div>';
    }
    html += '</div></div>';
    return html;
  }

  // ── NOT FOUND ──
