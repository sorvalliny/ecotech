  function renderGateTimeline(current) {
    var names = getActiveGateNames();
    var html = '<div class="ws-gate-timeline">';
    for (var i = 0; i < names.length; i++) {
      if (i > 0) html += '<div class="ws-gate-line' + (i <= current ? ' completed' : '') + '"></div>';
      var cls = i < current ? 'completed' : (i === current ? 'current' : '');
      html += '<div style="display:flex;flex-direction:column;align-items:center">';
      html += '<div class="ws-gate-dot ' + cls + '">' + i + '</div>';
      html += '<div class="ws-gate-label">' + esc(names[i].split(' ').slice(1).join(' ')) + '</div>';
      html += '</div>';
    }
    html += '</div>';

    // Плановые даты Gate
    var history = (_product && _product.gateHistory) ? _product.gateHistory : [];
    var schedule = (_product && _product.gateSchedule) ? _product.gateSchedule : {};
    // Build map: gate number → completion date from history
    var gateDates = {};
    for (var h = 0; h < history.length; h++) {
      var entry = history[h];
      // toGate means that gate was reached on that date; fromGate was completed
      gateDates[entry.fromGate] = entry.date;
    }
    html += '<div class="ws-gate-schedule">';
    for (var g = 0; g < names.length; g++) {
      if (g > 0) html += '<span class="gs-sep">|</span>';
      var gLabel = 'Gate ' + g;
      if (g < current) {
        // Completed gate
        var doneDate = gateDates[g] || '';
        var fmtDate = doneDate ? formatShortDate(doneDate) : '';
        html += '<span class="gs-item gs-done">' + gLabel + ' \u2713' + (fmtDate ? ' ' + fmtDate : '') + '</span>';
      } else if (g === current) {
        // Current gate
        var planDate = schedule[g] || schedule['g' + g] || '';
        var planStr = planDate ? '\u043F\u043B\u0430\u043D: ' + formatShortDate(planDate) : '\u0442\u0435\u043A\u0443\u0449\u0438\u0439';
        html += '<span class="gs-item gs-current">' + gLabel + ' \u2192 ' + planStr + '</span>';
      } else {
        // Future gate
        var futureDate = schedule[g] || schedule['g' + g] || '';
        var futureStr = futureDate ? '\u043F\u043B\u0430\u043D: ' + formatShortDate(futureDate) : '\u2014';
        html += '<span class="gs-item gs-future">' + gLabel + ' ' + futureStr + '</span>';
      }
    }
    html += '</div>';
    return html;
  }

  function formatShortDate(dateStr) {
    if (!dateStr) return '';
    var parts = String(dateStr).split('-');
    if (parts.length === 3) return parts[2] + '.' + parts[1];
    return dateStr;
  }

  function renderTeam(isEdit) {
    var html = '';
    // PMO
    html += teamMember(_product.pmo || _product.owner || '--', 'PMO-\u043C\u0435\u043D\u0435\u0434\u0436\u0435\u0440');
    // Owner
    var owner = window.OrbAuth ? OrbAuth.getProductOwner(productId) : null;
    if (owner) html += teamMember(owner.name, '\u0412\u043B\u0430\u0434\u0435\u043B\u0435\u0446 (Owner)');
    // PMs
    var pms = window.OrbAuth ? OrbAuth.getProductPMs(productId) : [];
    for (var i = 0; i < pms.length; i++) {
      var pmName = OrbAuth.getDisplayName({name: pms[i].name, id: pms[i].email}, 'user');
      html += teamMember(pmName, 'Product Manager', OrbAuth.formatScope(pms[i].scope));
    }
    if (!pms.length && !owner) html += teamMember('\u043D\u0435 \u043D\u0430\u0437\u043D\u0430\u0447\u0435\u043D', 'Product Manager');
    // Members
    var members = window.OrbAuth ? OrbAuth.getProductMembers(productId) : [];
    for (var m = 0; m < members.length; m++) {
      html += teamMember(members[m].name, '\u0423\u0447\u0430\u0441\u0442\u043D\u0438\u043A', OrbAuth.formatScope(members[m].scope));
    }
    // Stakeholders
    if (_product.stakeholders) html += teamMember(_product.stakeholders, '\u0421\u0442\u0435\u0439\u043A\u0445\u043E\u043B\u0434\u0435\u0440\u044B');
    return html;
  }

  function teamMember(name, role, scope) {
    var initials = String(name || '?').split(' ').map(function(w) { return w.charAt(0); }).join('').substr(0, 2).toUpperCase();
    var html = '<div class="ws-team-member">';
    html += '<div class="ws-team-ava">' + esc(initials) + '</div>';
    html += '<div class="ws-team-info">';
    html += '<div class="ws-team-name">' + esc(name) + '</div>';
    html += '<div class="ws-team-role">' + esc(role) + (scope ? ' \u2014 ' + esc(scope) : '') + '</div>';
    html += '</div></div>';
    return html;
  }

  // ═══════════════════════════════════════════════════════════════
  //  TAB 2: INITIATIVES
  // ═══════════════════════════════════════════════════════════════

  function renderInitiatives(items, editable) {
    // Применение фильтров перед рендером
    var filtered = items;
    if (_filterStatus !== 'all') {
      filtered = filtered.filter(function(it) { return it.status === _filterStatus; });
    }
    if (_filterQuarter !== 'all') {
      filtered = filtered.filter(function(it) { return it.quarter === _filterQuarter; });
    }

    var html = '<div class="ws-init-toolbar">';
    if (editable) html += '<button class="ws-create-init-btn" id="btn-create-init">+ \u041D\u043E\u0432\u0430\u044F \u0438\u043D\u0438\u0446\u0438\u0430\u0442\u0438\u0432\u0430</button>';
    else html += '<div></div>';
    html += '<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">';
    // Фильтры
    html += '<div class="ws-init-filters">';
    html += '<select id="filter-status">';
    html += '<option value="all"' + (_filterStatus === 'all' ? ' selected' : '') + '>\u0421\u0442\u0430\u0442\u0443\u0441: \u0412\u0441\u0435</option>';
    html += '<option value="backlog"' + (_filterStatus === 'backlog' ? ' selected' : '') + '>\u0411\u044D\u043A\u043B\u043E\u0433</option>';
    html += '<option value="planned"' + (_filterStatus === 'planned' ? ' selected' : '') + '>\u0417\u0430\u043F\u043B\u0430\u043D\u0438\u0440\u043E\u0432\u0430\u043D\u043E</option>';
    html += '<option value="wip"' + (_filterStatus === 'wip' ? ' selected' : '') + '>\u0412 \u0440\u0430\u0431\u043E\u0442\u0435</option>';
    html += '<option value="done"' + (_filterStatus === 'done' ? ' selected' : '') + '>\u0413\u043E\u0442\u043E\u0432\u043E</option>';
    html += '</select>';
    html += '<select id="filter-quarter">';
    html += '<option value="all"' + (_filterQuarter === 'all' ? ' selected' : '') + '>\u041A\u0432\u0430\u0440\u0442\u0430\u043B: \u0412\u0441\u0435</option>';
    html += '<option value="Q1"' + (_filterQuarter === 'Q1' ? ' selected' : '') + '>Q1 2026</option>';
    html += '<option value="Q2"' + (_filterQuarter === 'Q2' ? ' selected' : '') + '>Q2 2026</option>';
    html += '<option value="Q3"' + (_filterQuarter === 'Q3' ? ' selected' : '') + '>Q3 2026</option>';
    html += '<option value="Q4"' + (_filterQuarter === 'Q4' ? ' selected' : '') + '>Q4 2026</option>';
    html += '</select>';
    html += '</div>';
    // View toggles
    html += '<div class="ws-init-views">';
    html += '<button class="ws-view-btn' + (_initView === 'type' ? ' active' : '') + '" data-view="type">\u041F\u043E \u0442\u0438\u043F\u0443</button>';
    html += '<button class="ws-view-btn' + (_initView === 'rice' ? ' active' : '') + '" data-view="rice">\u041F\u043E RICE</button>';
    html += '</div>';
    html += '</div></div>';

    // Create form
    html += '<div class="ws-init-form" id="init-form" style="display:none">';
    html += '<h4>\u041D\u043E\u0432\u0430\u044F \u0438\u043D\u0438\u0446\u0438\u0430\u0442\u0438\u0432\u0430</h4>';
    html += '<div class="ws-form-row"><div style="flex:2"><label>\u041D\u0430\u0437\u0432\u0430\u043D\u0438\u0435</label><input type="text" id="init-name" placeholder="\u041D\u0430\u0437\u0432\u0430\u043D\u0438\u0435 \u0438\u043D\u0438\u0446\u0438\u0430\u0442\u0438\u0432\u044B"></div>';
    html += '<div style="flex:1"><label>\u0422\u0438\u043F</label><select id="init-type"><option value="product">\u041F\u0440\u043E\u0434\u0443\u043A\u0442\u043E\u0432\u044B\u0435</option><option value="business">\u0411\u0438\u0437\u043D\u0435\u0441</option><option value="technical">\u0422\u0435\u0445\u043D\u0438\u0447\u0435\u0441\u043A\u0438\u0435</option></select></div></div>';
    html += '<div class="ws-form-row"><div style="flex:1"><label>\u041E\u043F\u0438\u0441\u0430\u043D\u0438\u0435</label><textarea id="init-desc" placeholder="\u041E\u043F\u0438\u0441\u0430\u043D\u0438\u0435..."></textarea></div></div>';
    html += '<div class="ws-form-row">';
    html += '<div style="flex:1"><label>Reach (1-10)</label><input type="number" id="init-r" min="1" max="10" value="5"></div>';
    html += '<div style="flex:1"><label>Impact (1-10)</label><input type="number" id="init-i" min="1" max="10" value="5"></div>';
    html += '<div style="flex:1"><label>Confidence (1-10)</label><input type="number" id="init-c" min="1" max="10" value="5"></div>';
    html += '<div style="flex:1"><label>Effort (1-10)</label><input type="number" id="init-e" min="1" max="10" value="5"></div>';
    html += '</div>';
    html += '<div class="ws-form-row"><div style="flex:1"><label>\u041A\u0432\u0430\u0440\u0442\u0430\u043B</label><select id="init-quarter"><option value="Q1">Q1</option><option value="Q2">Q2</option><option value="Q3">Q3</option><option value="Q4">Q4</option></select></div>';
    html += '<div style="flex:2"><label>\u0421\u0441\u044B\u043B\u043A\u0430 \u043D\u0430 \u0442\u0440\u0435\u043A\u0435\u0440</label><input type="url" id="init-tracker" placeholder="https://..."></div></div>';
    html += '<div class="ws-form-actions"><button class="ws-btn-primary" id="init-save">\u0421\u043E\u0445\u0440\u0430\u043D\u0438\u0442\u044C</button><button class="ws-btn-secondary" id="init-cancel">\u041E\u0442\u043C\u0435\u043D\u0430</button></div>';
    html += '</div>';

    // Список отфильтрованных инициатив
    html += '<div id="init-list">';
    if (!filtered.length) {
      html += '<div style="text-align:center;padding:40px;color:var(--muted);font-size:13px">' + (items.length ? '\u041D\u0435\u0442 \u0438\u043D\u0438\u0446\u0438\u0430\u0442\u0438\u0432 \u043F\u043E \u0444\u0438\u043B\u044C\u0442\u0440\u0443' : '\u0418\u043D\u0438\u0446\u0438\u0430\u0442\u0438\u0432 \u043F\u043E\u043A\u0430 \u043D\u0435\u0442') + '</div>';
    } else if (_initView === 'rice') {
      var sorted = filtered.slice().sort(function(a, b) { return riceScore(b) - riceScore(a); });
      for (var i = 0; i < sorted.length; i++) html += renderInitCard(sorted[i], editable);
    } else {
      var groups = {};
      for (var j = 0; j < filtered.length; j++) {
        var t = PT.getInitType(filtered[j]);
        if (!groups[t]) groups[t] = [];
        groups[t].push(filtered[j]);
      }
      var order = ['product', 'business', 'technical'];
      for (var g = 0; g < order.length; g++) {
        var key = order[g];
        if (!groups[key] || !groups[key].length) continue;
        var meta = PT.INITIATIVE_TYPES[key];
        html += '<div class="ws-init-group-title" style="color:' + meta.color + '">' + esc(meta.label) + ' (' + groups[key].length + ')</div>';
        for (var gi = 0; gi < groups[key].length; gi++) html += renderInitCard(groups[key][gi], editable);
      }
    }
    html += '</div>';
    return html;
  }

  function renderInitCard(item, editable) {
    var rice = riceScore(item);
    var t = PT.getInitType(item);
    var meta = PT.INITIATIVE_TYPES[t] || PT.INITIATIVE_TYPES.product;
    var statusLabel = STATUS_LABELS[item.status] || item.status || 'backlog';
    var expanded = _expandedInit === item.id;

    var html = '<div class="ws-init-card" style="border-left-color:' + meta.color + '">';
    html += '<div class="ws-init-header" data-init-id="' + esc(item.id) + '">';
    html += '<span class="ws-init-name">' + esc(item.name || item.title || item.id) + '</span>';
    if (rice > 0) html += '<span class="ws-init-rice">RICE ' + rice + '</span>';
    html += '<span class="ws-init-status">' + esc(statusLabel) + '</span>';
    html += '</div>';

    html += '<div class="ws-init-body" id="init-body-' + esc(item.id) + '" style="display:' + (expanded ? 'block' : 'none') + '">';

    // Description
    if (item.desc) html += '<div style="font-size:13px;color:var(--text);margin-bottom:12px;line-height:1.6;">' + esc(item.desc) + '</div>';

    // Spec grid: PM, Team, Quarter, Type, Goal
    html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;">';

    // PM
    html += '<div style="font-size:12px;"><span style="color:var(--muted);">PM:</span> <strong style="color:var(--text);">' + esc(item.pm || '\u2014') + '</strong></div>';

    // Team
    var teamName = '\u2014';
    if (item.teamId) {
      var teams = JSON.parse(localStorage.getItem('ECOTECH_TEAMS') || '[]');
      var team = teams.find(function(t) { return t.id === item.teamId; });
      if (team) teamName = team.name;
    }
    html += '<div style="font-size:12px;"><span style="color:var(--muted);">Команда:</span> <strong style="color:var(--text);">' + esc(teamName) + '</strong></div>';

    // Quarter
    html += '<div style="font-size:12px;"><span style="color:var(--muted);">Квартал:</span> <strong style="color:var(--text);">' + esc(item.quarter || '\u2014') + '</strong></div>';

    // Type
    var tp = PT.INITIATIVE_TYPES[t] || PT.INITIATIVE_TYPES.product;
    html += '<div style="font-size:12px;"><span style="color:var(--muted);">Тип:</span> <span style="color:' + tp.color + ';font-weight:600;">' + tp.label + '</span></div>';

    // Goal link
    if (item.goalId) {
      var goal = _goals.find(function(g) { return g.id === item.goalId; });
      if (goal) html += '<div style="font-size:12px;grid-column:1/-1;"><span style="color:var(--muted);">Цель:</span> <strong style="color:var(--teal);">' + esc(goal.title || goal.name) + '</strong></div>';
    }

    html += '</div>';

    // RICE breakdown (compact, for PM view)
    html += '<div style="display:flex;gap:12px;margin-bottom:12px;padding:8px 12px;background:var(--surface);border-radius:6px;font-size:11px;">';
    html += '<span style="color:var(--muted);">RICE:</span>';
    html += '<span>R:' + (item.r||0) + '</span><span>I:' + (item.i||0) + '</span><span>C:' + (item.c||0) + '</span><span>E:' + (item.e||0) + '</span>';
    html += '<span style="font-weight:700;color:var(--violet);margin-left:auto;">' + rice + '</span>';
    html += '</div>';

    // Tracker link
    if (item.trackerUrl) {
      html += '<a href="' + esc(item.trackerUrl) + '" target="_blank" style="display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--violet);text-decoration:none;font-weight:600;padding:6px 12px;background:var(--violet-dim);border-radius:6px;border:1px solid var(--violet-border);margin-bottom:10px;">Открыть в трекере</a>';
    } else {
      html += '<div style="font-size:11px;color:var(--muted);margin-bottom:10px;">Трекер не привязан</div>';
    }

    // Methodology link
    html += '<a href="framework.html" style="font-size:11px;color:var(--muted);text-decoration:none;" onmouseover="this.style.color=\'var(--violet)\'" onmouseout="this.style.color=\'var(--muted)\'">Методология: стадия ' + (isTechSolution() ? 'T' : 'O') + '\u00b7' + (_product.gate||0) + '</a>';
    // Кнопки ревью: Go / Revise / No-Go
    if (canReview()) {
      html += '<div style="display:flex;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);">';
      html += '<button onclick="reviewInitiative(\'' + esc(item.id) + '\',\'go\')" style="padding:6px 14px;border-radius:6px;border:1px solid rgba(75,206,151,.3);background:var(--teal-dim);color:var(--teal);font-size:11px;font-weight:700;cursor:pointer;">Go</button>';
      html += '<button onclick="reviewInitiative(\'' + esc(item.id) + '\',\'revise\')" style="padding:6px 14px;border-radius:6px;border:1px solid rgba(245,205,71,.3);background:var(--amber-dim);color:var(--amber);font-size:11px;font-weight:700;cursor:pointer;">Revise</button>';
      html += '<button onclick="reviewInitiative(\'' + esc(item.id) + '\',\'nogo\')" style="padding:6px 14px;border-radius:6px;border:1px solid rgba(248,113,113,.3);background:var(--red-dim);color:var(--red);font-size:11px;font-weight:700;cursor:pointer;">No-Go</button>';
      html += '</div>';
    }
    html += '</div>';
    html += '</div>';
    return html;
  }

  // ═══════════════════════════════════════════════════════════════
  //  TAB 3: PLANNING (Quarterly Planning Wizard)
  // ═══════════════════════════════════════════════════════════════

  function renderPlanning(goals, initiatives, editable) {
    var html = '';
    var now = new Date();
    var curQ = Math.ceil((now.getMonth() + 1) / 3);
    var curYear = now.getFullYear();
    var selYear = _plYear;
    var selQ = _plQ;
    var isPast = (selYear < curYear) || (selYear === curYear && selQ < curQ);
    var isCurrent = (selYear === curYear && selQ === curQ);
    var isFuture = (selYear > curYear) || (selYear === curYear && selQ > curQ);
    var isReviewMode = isPast;
    var qLabel = 'Q' + selQ + ' ' + selYear;

    // Filter goals for this product
    var pGoals = goals.filter(function(g) { return g.productId === productId; });

    // Filter initiatives for selected quarter
    var qKey = 'Q' + selQ;
    var qFull = 'Q' + selQ + ' ' + selYear;
    var qInits = initiatives.filter(function(i) {
      var iq = i.quarter || '';
      return iq === qKey || iq === qFull;
    });

    // ═══ QUARTER SELECTOR ═══
    html += '<div class="pl-selector">';
    html += '<select id="pl-year">';
    for (var y = 2025; y <= 2027; y++) {
      html += '<option value="' + y + '"' + (y === selYear ? ' selected' : '') + '>' + y + '</option>';
    }
    html += '</select>';
    for (var q = 1; q <= 4; q++) {
      var qIsPast = (selYear < curYear) || (selYear === curYear && q < curQ);
      var qIsCur = (selYear === curYear && q === curQ);
      var btnLabel = 'Q' + q;
      if (qIsPast) btnLabel += ' \u0438\u0442\u043E\u0433\u0438';
      else if (qIsCur) btnLabel += ' \u043F\u043B\u0430\u043D';
      html += '<button class="pl-q-btn' + (q === selQ ? ' active' : '') + '" data-q="' + q + '">' + btnLabel + '</button>';
    }
    html += '</div>';

    // Авто-уведомления для фаз планирования
    if (window.PT && PT.notify) {
      pGoals.forEach(function(g) {
        if (g.status === 'draft' && g.createdAt && PT.daysSince(g.createdAt) > 7) {
          PT.notify({ type:'goal_pending', level:'medium', recipientRole:'pmo', productId:productId, title: productId + ': \u0446\u0435\u043B\u044C \u0436\u0434\u0451\u0442 \u0441\u043E\u0433\u043B\u0430\u0441\u043E\u0432\u0430\u043D\u0438\u044F', text: g.title || g.name, action:{label:'\u0421\u043E\u0433\u043B\u0430\u0441\u043E\u0432\u0430\u0442\u044C',url:'workspace.html?id='+productId+'&tab=goals'} });
        }
      });
    }

    // Метка режима
    if (isReviewMode) {
      html += '<div style="font-size:16px;font-weight:800;color:var(--amber);margin-bottom:16px;">Итоги ' + qLabel + '</div>';
      html += renderReviewMode(pGoals, qInits, qLabel, selYear, selQ, editable);
      // Переход к следующему кварталу
      var nextQ = selQ < 4 ? selQ + 1 : 1;
      var nextY = selQ < 4 ? selYear : selYear + 1;
      html += '<div style="text-align:center;padding:16px;margin-top:8px;"><button class="pl-q-btn" style="padding:10px 24px;font-size:13px;background:var(--violet);color:#fff;border-color:var(--violet);" onclick="_plQ='+nextQ+';_plYear='+nextY+';render();">Перейти к планированию Q'+nextQ+' '+nextY+' →</button></div>';
    } else {
      html += '<div style="font-size:16px;font-weight:800;color:var(--violet);margin-bottom:16px;">Планирование ' + qLabel + '</div>';
      html += renderPlanMode(pGoals, qInits, initiatives, qLabel, selYear, selQ, editable);
    }

    return html;
  }

  // ── Review Mode (past quarter) ──
  function renderReviewMode(pGoals, qInits, qLabel, selYear, selQ, editable) {
    var html = '';

    // ═══ STEP 1: Results ═══
    html += '<div class="pl-step">';
    html += '<div class="pl-step-head"><div class="pl-step-num">1</div><div class="pl-step-title">\u0420\u0435\u0437\u0443\u043B\u044C\u0442\u0430\u0442\u044B ' + esc(qLabel) + '</div></div>';

    // Goals + KR progress
    if (pGoals.length) {
      pGoals.forEach(function(g) {
        html += '<div class="pl-goal-card">';
        html += '<div class="pl-goal-title">' + esc(g.title || g.name) + '</div>';
        if (g.keyResults && g.keyResults.length) {
          g.keyResults.forEach(function(kr) {
            var pct = kr.target ? Math.round((kr.current || 0) / kr.target * 100) : 0;
            html += '<div class="pl-kr-row">';
            html += '<span style="flex:2;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + esc(kr.text || kr.title || kr.name) + '</span>';
            html += '<div class="pl-kr-bar"><div class="pl-kr-fill" style="width:' + Math.min(pct, 100) + '%;' + (pct < 40 ? 'background:var(--red)' : pct < 80 ? 'background:var(--amber)' : '') + '"></div></div>';
            html += '<span class="pl-kr-pct">' + pct + '%</span>';
            html += '</div>';
          });
        } else {
          html += '<div style="font-size:12px;color:var(--muted);font-style:italic;">\u041D\u0435\u0442 Key Results</div>';
        }
        html += '</div>';
      });
    } else {
      html += '<div style="font-size:13px;color:var(--muted);padding:12px;text-align:center;">\u0426\u0435\u043B\u0438 \u043D\u0435 \u0434\u043E\u0431\u0430\u0432\u043B\u0435\u043D\u044B</div>';
    }

    // Initiative progress summary
    if (qInits.length) {
      var done = qInits.filter(function(i){return i.status==='done'}).length;
      var wip = qInits.filter(function(i){return i.status==='wip'}).length;
      var planned = qInits.filter(function(i){return i.status==='planned'}).length;
      var backlog = qInits.filter(function(i){return i.status==='backlog'}).length;
      var total = qInits.length;
      var pctDone = total ? Math.round(done/total*100) : 0;

      html += '<div style="margin-top:12px;">';
      html += '<div class="pl-progress-summary">';
      html += '<span class="pl-progress-chip" style="color:var(--teal);border-color:var(--teal);">' + done + ' \u0433\u043E\u0442\u043E\u0432\u043E</span>';
      html += '<span class="pl-progress-chip" style="color:var(--violet);border-color:var(--violet);">' + wip + ' \u0432 \u0440\u0430\u0431\u043E\u0442\u0435</span>';
      html += '<span class="pl-progress-chip" style="color:var(--amber);border-color:var(--amber);">' + planned + ' \u043F\u043B\u0430\u043D</span>';
      html += '<span class="pl-progress-chip">' + backlog + ' \u0431\u044D\u043A\u043B\u043E\u0433</span>';
      html += '</div>';
      html += '<div style="display:flex;height:8px;border-radius:4px;overflow:hidden;">';
      if (done) html += '<div style="width:' + (done/total*100) + '%;background:var(--teal);"></div>';
      if (wip) html += '<div style="width:' + (wip/total*100) + '%;background:var(--violet);"></div>';
      if (planned) html += '<div style="width:' + (planned/total*100) + '%;background:var(--amber);"></div>';
      if (backlog) html += '<div style="width:' + (backlog/total*100) + '%;background:var(--muted);"></div>';
      html += '</div>';
      html += '<div style="text-align:right;font-size:12px;font-weight:600;color:var(--text);margin-top:4px;">' + pctDone + '% \u0437\u0430\u0432\u0435\u0440\u0448\u0435\u043D\u043E</div>';
      html += '</div>';
    }
    html += '</div>'; // /step 1

    // ═══ STEP 2: Retrospective ═══
    html += '<div class="pl-step">';
    html += '<div class="pl-step-head"><div class="pl-step-num">2</div><div class="pl-step-title">\u0420\u0435\u0442\u0440\u043E\u0441\u043F\u0435\u043A\u0442\u0438\u0432\u0430</div></div>';

    var retroKey = selYear + 'Q' + selQ;
    var retros = _product.quarterRetros || {};
    var retro = retros[retroKey] || null;
    var retroSaved = retro && retro.date;

    if (retroSaved && !editable) {
      // readonly
      html += '<div style="margin-bottom:10px;"><strong style="font-size:12px;color:var(--teal);">Start:</strong><div class="pl-retro-readonly">' + esc(retro.start || '\u2014') + '</div></div>';
      html += '<div style="margin-bottom:10px;"><strong style="font-size:12px;color:var(--red);">Stop:</strong><div class="pl-retro-readonly">' + esc(retro.stop || '\u2014') + '</div></div>';
      html += '<div style="margin-bottom:10px;"><strong style="font-size:12px;color:var(--amber);">Continue:</strong><div class="pl-retro-readonly">' + esc(retro.continue || '\u2014') + '</div></div>';
      html += '<div style="font-size:11px;color:var(--muted);">\u0421\u043E\u0445\u0440\u0430\u043D\u0435\u043D\u043E: ' + esc(retro.date) + '</div>';
    } else if (editable) {
      var isEdit = retroSaved;
      if (retroSaved && !window._plRetroEdit) {
        html += '<div style="margin-bottom:10px;"><strong style="font-size:12px;color:var(--teal);">Start:</strong><div class="pl-retro-readonly">' + esc(retro.start || '\u2014') + '</div></div>';
        html += '<div style="margin-bottom:10px;"><strong style="font-size:12px;color:var(--red);">Stop:</strong><div class="pl-retro-readonly">' + esc(retro.stop || '\u2014') + '</div></div>';
        html += '<div style="margin-bottom:10px;"><strong style="font-size:12px;color:var(--amber);">Continue:</strong><div class="pl-retro-readonly">' + esc(retro.continue || '\u2014') + '</div></div>';
        html += '<div style="font-size:11px;color:var(--muted);margin-bottom:8px;">\u0421\u043E\u0445\u0440\u0430\u043D\u0435\u043D\u043E: ' + esc(retro.date) + '</div>';
        html += '<button class="pl-q-btn" id="pl-retro-edit-btn">\u0420\u0435\u0434\u0430\u043A\u0442\u0438\u0440\u043E\u0432\u0430\u0442\u044C</button>';
      } else {
        html += '<div style="margin-bottom:10px;"><label style="font-size:12px;font-weight:600;color:var(--teal);display:block;margin-bottom:4px;">Start (\u0447\u0442\u043E \u043D\u0430\u0447\u0430\u0442\u044C)</label>';
        html += '<textarea class="pl-retro-area" id="pl-retro-start" rows="2">' + esc(retro ? retro.start || '' : '') + '</textarea></div>';
        html += '<div style="margin-bottom:10px;"><label style="font-size:12px;font-weight:600;color:var(--red);display:block;margin-bottom:4px;">Stop (\u0447\u0442\u043E \u043F\u0440\u0435\u043A\u0440\u0430\u0442\u0438\u0442\u044C)</label>';
        html += '<textarea class="pl-retro-area" id="pl-retro-stop" rows="2">' + esc(retro ? retro.stop || '' : '') + '</textarea></div>';
        html += '<div style="margin-bottom:10px;"><label style="font-size:12px;font-weight:600;color:var(--amber);display:block;margin-bottom:4px;">Continue (\u0447\u0442\u043E \u043F\u0440\u043E\u0434\u043E\u043B\u0436\u0438\u0442\u044C)</label>';
        html += '<textarea class="pl-retro-area" id="pl-retro-continue" rows="2">' + esc(retro ? retro.continue || '' : '') + '</textarea></div>';
        html += '<button class="ws-btn-primary" id="pl-retro-save" style="padding:6px 16px;background:var(--violet);color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;">\u0421\u043E\u0445\u0440\u0430\u043D\u0438\u0442\u044C \u0440\u0435\u0442\u0440\u043E</button>';
      }
    } else {
      html += '<div style="font-size:13px;color:var(--muted);padding:8px;">\u0420\u0435\u0442\u0440\u043E\u0441\u043F\u0435\u043A\u0442\u0438\u0432\u0430 \u043D\u0435 \u0437\u0430\u043F\u043E\u043B\u043D\u0435\u043D\u0430</div>';
    }
    html += '</div>'; // /step 2

    // ═══ STEP 3: Unfinished ═══
    html += '<div class="pl-step">';
    html += '<div class="pl-step-head"><div class="pl-step-num">3</div><div class="pl-step-title">\u041D\u0435\u0437\u0430\u0432\u0435\u0440\u0448\u0451\u043D\u043D\u043E\u0435</div></div>';

    var unfinished = qInits.filter(function(i) { return i.status !== 'done'; });
    if (unfinished.length) {
      unfinished.forEach(function(item, idx) {
        var iStatus = STATUS_LABELS[item.status] || item.status || 'backlog';
        html += '<div class="pl-unfinished-item">';
        html += '<input type="checkbox" class="pl-transfer-cb" data-init-id="' + esc(item.id) + '" data-action="transfer" checked>';
        html += '<span style="color:var(--text);flex:1;">' + esc(item.name || item.title || item.id) + '</span>';
        html += '<span style="font-size:11px;color:var(--muted);">' + esc(iStatus) + '</span>';
        html += '<select class="pl-transfer-action" data-init-id="' + esc(item.id) + '" style="font-size:11px;padding:2px 6px;border-radius:4px;border:1px solid var(--border);background:var(--surface);color:var(--text);">';
        html += '<option value="transfer">\u041F\u0435\u0440\u0435\u043D\u0435\u0441\u0442\u0438</option>';
        html += '<option value="cancel">\u041E\u0442\u043C\u0435\u043D\u0438\u0442\u044C</option>';
        html += '</select>';
        html += '</div>';
      });

      var nextQNum = selQ < 4 ? selQ + 1 : 1;
      var nextQYear = selQ < 4 ? selYear : selYear + 1;
      var nextQLabel = 'Q' + nextQNum + ' ' + nextQYear;

      if (editable) {
        html += '<button id="pl-transfer-btn" style="margin-top:10px;padding:8px 16px;background:var(--violet);color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;">\u041F\u0435\u0440\u0435\u043D\u0435\u0441\u0442\u0438 \u0432\u044B\u0431\u0440\u0430\u043D\u043D\u044B\u0435 \u0432 ' + esc(nextQLabel) + '</button>';
      }
    } else {
      html += '<div style="font-size:13px;color:var(--teal);padding:8px;text-align:center;">\u0412\u0441\u0435 \u0438\u043D\u0438\u0446\u0438\u0430\u0442\u0438\u0432\u044B \u0437\u0430\u0432\u0435\u0440\u0448\u0435\u043D\u044B!</div>';
    }
    html += '</div>'; // /step 3

    return html;
  }

  // ── Plan Mode (current/future quarter) ──
  function renderPlanMode(pGoals, qInits, allInits, qLabel, selYear, selQ, editable) {
    var html = '';

    // ═══ STEP 1: Goals ═══
    html += '<div class="pl-step">';
    html += '<div class="pl-step-head"><div class="pl-step-num">1</div><div class="pl-step-title">\u0426\u0435\u043B\u0438</div></div>';

    if (pGoals.length) {
      pGoals.forEach(function(g) {
        var gs = GOAL_STATUS[g.status] || GOAL_STATUS.draft;
        html += '<div class="pl-goal-card" style="border-left:3px solid var(--teal);">';

        // Goal header
        html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap;">';
        html += '<div class="pl-goal-title" style="flex:1;margin-bottom:0;">' + esc(g.title || g.name) + '</div>';
        html += '<span style="font-size:10px;padding:2px 8px;border-radius:4px;background:var(--surface2);color:' + gs.color + ';border:1px solid ' + gs.color + ';font-weight:700;">' + esc(gs.label) + '</span>';
        html += '<span style="font-size:10px;padding:2px 8px;border-radius:4px;background:var(--surface);color:var(--muted);">' + esc(g.period || 'H1 2026') + '</span>';
        html += '</div>';

        // PMO approve/reject
        if ((getRole() === 'pmo' || getRole() === 'pmo_lead' || getRole() === 'admin') && g.status === 'draft') {
          html += '<div style="margin-bottom:8px;display:flex;gap:6px;">';
          html += '<button onclick="approveGoal(\'' + esc(g.id) + '\')" style="padding:5px 12px;border-radius:5px;border:1px solid rgba(75,206,151,.3);background:var(--teal-dim);color:var(--teal);font-size:11px;font-weight:700;cursor:pointer;">\u0423\u0442\u0432\u0435\u0440\u0434\u0438\u0442\u044C</button>';
          html += '<button onclick="rejectGoal(\'' + esc(g.id) + '\')" style="padding:5px 12px;border-radius:5px;border:1px solid rgba(248,113,113,.3);background:var(--red-dim);color:var(--red);font-size:11px;font-weight:700;cursor:pointer;">\u041D\u0430 \u0434\u043E\u0440\u0430\u0431\u043E\u0442\u043A\u0443</button>';
          html += '</div>';
        }

        // Key Results
        if (g.keyResults && g.keyResults.length) {
          g.keyResults.forEach(function(kr) {
            var pct = kr.target ? Math.round((kr.current || 0) / kr.target * 100) : 0;
            html += '<div class="pl-kr-row">';
            html += '<span style="flex:2;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + esc(kr.text || kr.title || kr.name) + '</span>';
            html += '<span style="font-size:11px;color:var(--muted);">' + (kr.current || 0) + '/' + (kr.target || '?') + '</span>';
            html += '<div class="pl-kr-bar"><div class="pl-kr-fill" style="width:' + Math.min(pct, 100) + '%;' + (pct < 40 ? 'background:var(--red)' : pct < 80 ? 'background:var(--amber)' : '') + '"></div></div>';
            html += '<span class="pl-kr-pct">' + pct + '%</span>';
            if (editable) {
              html += '<button onclick="updateKR(\'' + esc(g.id) + '\',\'' + esc(kr.id) + '\')" style="font-size:10px;color:var(--violet);background:none;border:none;cursor:pointer;" title="\u041E\u0431\u043D\u043E\u0432\u0438\u0442\u044C">\u043E\u0431\u043D\u043E\u0432\u0438\u0442\u044C</button>';
            }
            html += '</div>';
          });
        } else {
          html += '<div style="font-size:12px;color:var(--muted);font-style:italic;">\u041D\u0435\u0442 Key Results</div>';
        }

        // Add KR button
        if (editable) {
          html += '<button onclick="addKRToGoal(\'' + esc(g.id) + '\')" style="margin-top:6px;font-size:11px;color:var(--teal);background:none;border:1px dashed var(--teal-border,var(--teal));border-radius:4px;padding:4px 10px;cursor:pointer;">+ Key Result</button>';
        }
        html += '</div>';
      });
    } else {
      html += '<div style="font-size:13px;color:var(--muted);padding:16px;text-align:center;">\u0426\u0435\u043B\u0438 \u043D\u0435 \u0434\u043E\u0431\u0430\u0432\u043B\u0435\u043D\u044B</div>';
    }

    if (editable) {
      html += '<button id="btn-create-goal" style="width:100%;padding:10px;margin-top:8px;background:var(--teal-dim,rgba(0,200,150,0.08));border:1px dashed var(--teal-border,var(--teal));border-radius:8px;color:var(--teal);font-size:12px;font-weight:600;cursor:pointer;text-align:center;">+ \u0421\u043E\u0437\u0434\u0430\u0442\u044C \u0446\u0435\u043B\u044C</button>';
    }
    html += '</div>'; // /step 1

    // ═══ STEP 2: Initiatives of the quarter ═══
    html += '<div class="pl-step">';
    html += '<div class="pl-step-head"><div class="pl-step-num">2</div><div class="pl-step-title">\u0418\u043D\u0438\u0446\u0438\u0430\u0442\u0438\u0432\u044B \u043A\u0432\u0430\u0440\u0442\u0430\u043B\u0430</div></div>';

    var linked = qInits.filter(function(i) { return !!i.goalId; });
    var orphaned = qInits.filter(function(i) { return !i.goalId; });

    html += '<div class="pl-init-cols">';

    // Column: linked to goals
    html += '<div class="pl-init-col"><h4>\u041F\u0440\u0438\u0432\u044F\u0437\u0430\u043D\u044B \u043A \u0446\u0435\u043B\u044F\u043C (' + linked.length + ')</h4>';
    if (linked.length) {
      linked.forEach(function(item) {
        var goal = pGoals.find(function(g) { return g.id === item.goalId; });
        var rice = riceScore(item);
        html += '<div class="pl-init-item" style="cursor:pointer;" onclick="switchTab(\'initiatives\');expandInit(\'' + esc(item.id) + '\')">';
        html += '<span class="pl-init-name">' + esc(item.name || item.title || item.id) + '</span>';
        if (rice > 0) html += '<span class="pl-init-rice">' + rice + '</span>';
        html += '</div>';
        if (goal) html += '<div style="font-size:10px;color:var(--teal);padding:0 8px 4px;margin-top:-4px;">\u2192 ' + esc(goal.title || goal.name) + '</div>';
      });
    } else {
      html += '<div style="font-size:12px;color:var(--muted);font-style:italic;">\u041D\u0435\u0442 \u043F\u0440\u0438\u0432\u044F\u0437\u0430\u043D\u043D\u044B\u0445</div>';
    }
    html += '</div>';

    // Column: orphaned (not linked to goals)
    html += '<div class="pl-init-col"><h4>\u041D\u0435 \u043F\u0440\u0438\u0432\u044F\u0437\u0430\u043D\u044B (' + orphaned.length + ')</h4>';
    if (orphaned.length) {
      orphaned.forEach(function(item) {
        var rice = riceScore(item);
        html += '<div class="pl-init-item">';
        html += '<span class="pl-init-name">' + esc(item.name || item.title || item.id) + '</span>';
        if (rice > 0) html += '<span class="pl-init-rice">' + rice + '</span>';
        if (editable) html += '<button onclick="event.stopPropagation();linkInitToGoal(\'' + esc(item.id) + '\')" style="font-size:10px;color:var(--violet);background:none;border:1px solid var(--violet-border,var(--violet));border-radius:4px;padding:2px 6px;cursor:pointer;flex-shrink:0;">\u041F\u0440\u0438\u0432\u044F\u0437\u0430\u0442\u044C</button>';
        html += '</div>';
      });
    } else {
      html += '<div style="font-size:12px;color:var(--muted);font-style:italic;">\u0412\u0441\u0435 \u043F\u0440\u0438\u0432\u044F\u0437\u0430\u043D\u044B</div>';
    }
    html += '</div>';

    html += '</div>'; // /pl-init-cols

    if (editable) {
      html += '<button class="ws-create-init-btn" id="pl-create-init" style="margin-top:10px;">+ \u0421\u043E\u0437\u0434\u0430\u0442\u044C \u0438\u043D\u0438\u0446\u0438\u0430\u0442\u0438\u0432\u0443</button>';
    }
    html += '</div>'; // /step 2

    // ═══ STEP 3: Prioritization ═══
    html += '<div class="pl-step">';
    html += '<div class="pl-step-head"><div class="pl-step-num">3</div><div class="pl-step-title">\u041F\u0440\u0438\u043E\u0440\u0438\u0442\u0438\u0437\u0430\u0446\u0438\u044F</div></div>';

    if (qInits.length) {
      var sorted = qInits.slice().sort(function(a, b) { return riceScore(b) - riceScore(a); });
      html += '<div class="pl-prio-wrap"><table class="pl-prio-table">';
      html += '<thead><tr><th>#</th><th>RICE</th><th>Название</th><th>KR / Цель</th><th>Статус</th></tr></thead>';
      html += '<tbody>';
      sorted.forEach(function(item, idx) {
        var rice = riceScore(item);
        var goal = item.goalId ? pGoals.find(function(g) { return g.id === item.goalId; }) : null;
        var goalLabel = goal ? (goal.title || goal.name) : '\u2014';
        var iStatus = STATUS_LABELS[item.status] || item.status || 'backlog';
        html += '<tr style="cursor:pointer;" onclick="switchTab(\'initiatives\');expandInit(\'' + esc(item.id) + '\')">';
        html += '<td style="font-weight:700;color:var(--muted);">' + (idx + 1) + '</td>';
        html += '<td><span class="pl-init-rice">' + rice + '</span></td>';
        html += '<td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + esc(item.name || item.title || item.id) + '</td>';
        html += '<td style="font-size:11px;color:var(--teal);max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + esc(goalLabel) + '</td>';
        html += '<td style="font-size:11px;color:var(--muted);">' + esc(iStatus) + '</td>';
        html += '</tr>';
      });
      html += '</tbody></table></div>';
    } else {
      html += '<div style="font-size:13px;color:var(--muted);padding:12px;text-align:center;">Нет инициатив на этот квартал</div>';
    }
    html += '</div>'; // /step 3

    // ═══ STEP 4: Approval checklist ═══
    html += '<div class="pl-step">';
    html += '<div class="pl-step-head"><div class="pl-step-num">4</div><div class="pl-step-title">\u0421\u043E\u0433\u043B\u0430\u0441\u043E\u0432\u0430\u043D\u0438\u0435</div></div>';

    var hasGoals = pGoals.length > 0;
    var krUpdated = true;
    var hasAnyKR = false;
    pGoals.forEach(function(g) {
      if (g.keyResults && g.keyResults.length) {
        hasAnyKR = true;
        g.keyResults.forEach(function(kr) {
          if (!kr.current || kr.current <= 0) krUpdated = false;
        });
      }
    });
    if (!hasAnyKR) krUpdated = false;
    var orphanPct = qInits.length ? (orphaned.length / qInits.length) : 0;
    var initLinked = orphanPct < 0.3;
    var allRiced = qInits.length > 0 && qInits.filter(function(i) { return (i.r||0) * (i.i||0) * (i.c||0) / (i.e||1) > 0; }).length === qInits.length;
    var allApproved = pGoals.length > 0 && pGoals.filter(function(g) { return g.status === 'approved'; }).length === pGoals.length;

    var checks = [
      { text: '\u0426\u0435\u043B\u0438 \u043E\u043F\u0440\u0435\u0434\u0435\u043B\u0435\u043D\u044B', done: hasGoals },
      { text: 'KR \u0430\u043A\u0442\u0443\u0430\u043B\u0438\u0437\u0438\u0440\u043E\u0432\u0430\u043D\u044B', done: krUpdated && hasGoals },
      { text: '\u0418\u043D\u0438\u0446\u0438\u0430\u0442\u0438\u0432\u044B \u043F\u0440\u0438\u0432\u044F\u0437\u0430\u043D\u044B \u043A \u0446\u0435\u043B\u044F\u043C' + (orphaned.length ? ' (' + orphaned.length + ' \u0431\u0435\u0437 \u0446\u0435\u043B\u0438)' : ''), done: initLinked },
      { text: 'RICE \u043E\u0446\u0435\u043D\u0451\u043D', done: allRiced },
      { text: 'PMO \u0441\u043E\u0433\u043B\u0430\u0441\u043E\u0432\u0430\u043B', done: allApproved }
    ];

    checks.forEach(function(ch) {
      var cls = ch.done ? 'pl-check-done' : 'pl-check-pending';
      var icon = ch.done ? '&#10003;' : '&#9744;';
      html += '<div class="pl-check-row ' + cls + '">';
      html += '<span class="pl-check-icon">' + icon + '</span>';
      html += '<span>' + ch.text + '</span>';
      html += '</div>';
    });

    if (editable && !allApproved) {
      var canSend = hasGoals && krUpdated && allRiced;
      html += '<button id="pl-send-approval" style="margin-top:12px;padding:8px 16px;background:' + (canSend ? 'var(--violet)' : 'var(--surface2)') + ';color:' + (canSend ? '#fff' : 'var(--muted)') + ';border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:' + (canSend ? 'pointer' : 'default') + ';"' + (canSend ? '' : ' disabled') + '>\u041E\u0442\u043F\u0440\u0430\u0432\u0438\u0442\u044C \u043D\u0430 \u0441\u043E\u0433\u043B\u0430\u0441\u043E\u0432\u0430\u043D\u0438\u0435 PMO</button>';
    }

    if (allApproved && pGoals.length) {
      html += '<div style="margin-top:12px;padding:10px;background:var(--teal-dim);border:1px solid var(--teal);border-radius:6px;font-size:12px;color:var(--teal);font-weight:600;text-align:center;">&#10003; \u0412\u0441\u0435 \u0446\u0435\u043B\u0438 \u0441\u043E\u0433\u043B\u0430\u0441\u043E\u0432\u0430\u043D\u044B PMO</div>';
    }

    html += '</div>'; // /step 4

  }

  // ── Goal-planning helper functions ──

  function createInitForGoal(goalId) {
    switchTab('initiatives');
    var createBtn = document.querySelector('[data-create-init]') || document.getElementById('btn-create-init');
    if (createBtn) createBtn.click();
    setTimeout(function() {
      var goalSelect = document.getElementById('new-init-goal');
      if (goalSelect) goalSelect.value = goalId;
    }, 100);
  }

  function addKRToGoal(goalId) {
    var goal = _goals.find(function(g) { return g.id === goalId; });
    if (!goal) return;
    showModal('Добавить Key Result', [
      { label: 'Key Result (текст)', type: 'text', id: 'krtext', placeholder: 'Опишите KR...' },
      { label: 'Целевое значение', type: 'number', id: 'krtarget', placeholder: '100' }
    ], function(vals) {
      if (!vals.krtext) return;
      if (!goal.keyResults) goal.keyResults = [];
      goal.keyResults.push({
        id: 'KR-' + Date.now(),
        text: vals.krtext,
        current: 0,
        target: parseInt(vals.krtarget) || 100
      });
      saveGoals();
      showToast('KR добавлен');
      render();
    });
  }

  function linkInitToGoal(initId) {
    if (!_goals.length) { showToast('Сначала создайте цель'); return; }
    var goalOptions = _goals.map(function(g) { return { value: g.id, label: g.id + ': ' + (g.title || g.name) }; });
    showModal('Привязать к цели', [
      { label: 'Цель', type: 'select', id: 'goalId', options: goalOptions }
    ], function(vals) {
      if (!vals.goalId) return;
      var init = _backlog.find(function(i) { return i.id === initId; });
      if (init) {
        init.goalId = vals.goalId;
        init.updatedAt = new Date().toISOString().split('T')[0];
        saveBacklog();
        showToast('Привязано к цели');
        render();
      }
    });
  }

  // Согласование / отклонение цели
  window.approveGoal = function(goalId) {
    var g = _goals.find(function(g) { return g.id === goalId; });
    if (!g) return;
    g.status = 'approved';
    g.approvalStatus = 'approved';
    saveGoals();
    addLog('goal_approved', g.title || g.name, 'goal', goalId);
    if (window.PT && PT.notify) {
      PT.notify({ type:'goal_approved', level:'medium', recipientRole:'pm_owner', productId:productId, title:'Цель утверждена: ' + (g.title||g.name), action:{label:'Открыть',url:'workspace.html?id='+productId+'&tab=goals'} });
    }
    showToast('Цель утверждена');
    render();
  };

  window.rejectGoal = function(goalId) {
    var g = _goals.find(function(g) { return g.id === goalId; });
    if (!g) return;
    showModal('Отклонить цель', [
      { label: 'Комментарий для доработки', type: 'textarea', id: 'comment', placeholder: 'Укажите причину...' }
    ], function(vals) {
      var comment = vals.comment || '';
      g.status = 'draft';
      g.approvalStatus = 'rejected';
      saveGoals();
      addLog('goal_rejected', (g.title||g.name) + ': ' + comment, 'goal', goalId);
      if (window.PT && PT.notify) {
        PT.notify({ type:'goal_rejected', level:'high', recipientRole:'pm_owner', productId:productId, title:'Цель на доработку: ' + (g.title||g.name), text:comment, action:{label:'Открыть',url:'workspace.html?id='+productId+'&tab=goals'} });
      }
      showToast('Отправлено на доработку');
      render();
    });
  };

  // Обновление KR (inline-редактирование)
  window.updateKR = function(goalId, krId) {
    var g = _goals.find(function(g) { return g.id === goalId; });
    if (!g || !g.keyResults) return;
    var kr = g.keyResults.find(function(k) { return k.id === krId; });
    if (!kr) return;
    showModal('Обновить KR: ' + kr.text, [
      { label: 'Текущее значение (цель: ' + kr.target + ')', type: 'number', id: 'krval', value: kr.current || 0 }
    ], function(vals) {
      kr.current = parseFloat(vals.krval) || 0;
      saveGoals();
      addLog('kr_updated', kr.text + ': ' + kr.current + '/' + kr.target, 'goal', goalId);
      showToast('KR обновлён');
      render();
    });
  };

  // Перенос в следующий квартал
  function nextQ() {
    var nq = _plQ < 4 ? _plQ + 1 : 1;
    var ny = _plQ < 4 ? _plYear : _plYear + 1;
    return 'Q' + nq + ' ' + ny;
  }
  window.nextQ = nextQ;

  window.transferToNextQ = function() {
    var nq = nextQ();
    var count = 0;
    _backlog.forEach(function(i) {
      if ((i.productId === productId) && i.status !== 'done' && i.quarter && i.quarter !== nq) {
        i.quarter = nq;
        i.updatedAt = new Date().toISOString().split('T')[0];
        count++;
      }
    });
    saveBacklog();
    addLog('transfer_q', count + ' \u0438\u043D\u0438\u0446\u0438\u0430\u0442\u0438\u0432 \u043F\u0435\u0440\u0435\u043D\u0435\u0441\u0435\u043D\u043E \u0432 ' + nq, 'product', productId);
    showToast(count + ' \u043F\u0435\u0440\u0435\u043D\u0435\u0441\u0435\u043D\u043E \u0432 ' + nq);
    render();
  };

  // Сохранение ретроспективы (поквартально)
  window.saveRetro = function() {
    _product.retroDone = document.getElementById('retro-done') ? document.getElementById('retro-done').value : (_product.retroDone || '');
    _product.retroMissed = document.getElementById('retro-missed') ? document.getElementById('retro-missed').value : (_product.retroMissed || '');
    _product.retroLessons = document.getElementById('retro-lessons') ? document.getElementById('retro-lessons').value : (_product.retroLessons || '');
    saveProducts();
    addLog('retro_saved', '\u0420\u0435\u0442\u0440\u043E\u0441\u043F\u0435\u043A\u0442\u0438\u0432\u0430 \u043E\u0431\u043D\u043E\u0432\u043B\u0435\u043D\u0430', 'product', productId);
    showToast('\u0420\u0435\u0442\u0440\u043E\u0441\u043F\u0435\u043A\u0442\u0438\u0432\u0430 \u0441\u043E\u0445\u0440\u0430\u043D\u0435\u043D\u0430');
  };

  // Ретро квартала (Start/Stop/Continue)
  window.saveQuarterRetro = function(year, q) {
    if (!_product) return;
    if (!_product.quarterRetros) _product.quarterRetros = {};
    var key = year + 'Q' + q;
    var startEl = document.getElementById('pl-retro-start');
    var stopEl = document.getElementById('pl-retro-stop');
    var contEl = document.getElementById('pl-retro-continue');
    _product.quarterRetros[key] = {
      start: startEl ? startEl.value : '',
      stop: stopEl ? stopEl.value : '',
      continue: contEl ? contEl.value : '',
      date: new Date().toISOString().split('T')[0]
    };
    saveProducts();
    addLog('retro_saved', '\u0420\u0435\u0442\u0440\u043E ' + key + ' \u0441\u043E\u0445\u0440\u0430\u043D\u0435\u043D\u0430', 'product', productId);
    showToast('\u0420\u0435\u0442\u0440\u043E\u0441\u043F\u0435\u043A\u0442\u0438\u0432\u0430 \u0441\u043E\u0445\u0440\u0430\u043D\u0435\u043D\u0430');
    window._plRetroEdit = false;
    render();

  function renderLog() {
    var logs = getProductLogs();
    var html = '<div class="ws-section"><h3>\u0418\u0441\u0442\u043E\u0440\u0438\u044F \u0438\u0437\u043C\u0435\u043D\u0435\u043D\u0438\u0439</h3>';
    html += '<div class="ws-log-list" id="log-list">';
    if (!logs.length) {
      html += '<div style="color:var(--muted);font-size:13px;padding:10px 0">\u0417\u0430\u043F\u0438\u0441\u0435\u0439 \u043D\u0435\u0442</div>';
    }
    // Show newest first
    for (var i = logs.length - 1; i >= 0; i--) {
      var log = logs[i];
      html += '<div class="ws-log-entry">';
      html += '<span class="ws-log-date">' + formatDate(log.date || log.createdAt) + '</span>';
      html += '<div>';
      html += '<div class="ws-log-action">' + esc(log.action) + '</div>';
      if (log.details) html += '<div class="ws-log-details">' + esc(log.details) + '</div>';
      if (log.userName) html += '<div class="ws-log-user">' + esc(log.userName) + '</div>';
      html += '</div></div>';
    }
    html += '</div></div>';
    return html;
  }

  function initTabs() {
    var tabs = document.querySelectorAll('.ws-tab');
    for (var i = 0; i < tabs.length; i++) {
      tabs[i].addEventListener('click', function() {
        switchTab(this.getAttribute('data-tab'));
      });
    }
  }

  function switchTab(tab) {
    activeTab = tab;
    history.replaceState(null, '', 'workspace.html?id=' + productId + (tab !== 'passport' ? '&tab=' + tab : ''));
    window.scrollTo({ top: 0, behavior: 'smooth' });
    // Toggle active class on tabs
    var tabs = document.querySelectorAll('.ws-tab');
    for (var i = 0; i < tabs.length; i++) {
      tabs[i].classList.toggle('active', tabs[i].getAttribute('data-tab') === tab);
    }
    // Toggle panels
    var panels = document.querySelectorAll('.ws-panel');
    for (var j = 0; j < panels.length; j++) {
      panels[j].classList.toggle('active', panels[j].id === 'panel-' + tab);
    }
  }

  function initShareButton() {
    var btn = document.getElementById('ws-share');
    if (btn) {
      btn.addEventListener('click', function() {
        var url = window.location.href;
        if (navigator.clipboard) {
          navigator.clipboard.writeText(url).then(function() { showToast('\u0421\u0441\u044B\u043B\u043A\u0430 \u0441\u043A\u043E\u043F\u0438\u0440\u043E\u0432\u0430\u043D\u0430'); });
        } else {
          showToast('\u041D\u0435 \u0443\u0434\u0430\u043B\u043E\u0441\u044C \u0441\u043A\u043E\u043F\u0438\u0440\u043E\u0432\u0430\u0442\u044C');
        }
      });
    }
  }

  function initEditableFields(editable) {
    if (!canEditContent()) return;
    var fields = document.querySelectorAll('.ws-editable[contenteditable="true"]');
    for (var i = 0; i < fields.length; i++) {
      fields[i].addEventListener('blur', function() {
        var field = this.getAttribute('data-field');
        var val = this.textContent.trim();
        if (field && _product[field] !== val) {
          _product[field] = val;
          saveProducts();
          addLog('\u0418\u0437\u043C\u0435\u043D\u0435\u043D\u043E \u043F\u043E\u043B\u0435', field + ': ' + val, 'product', productId);
          showToast('\u0421\u043E\u0445\u0440\u0430\u043D\u0435\u043D\u043E');
        }
      });
    }
  }

    var transferBtn = document.getElementById('pl-transfer-btn');
    if (transferBtn) {
      transferBtn.addEventListener('click', function() {
        var nextQNum = _plQ < 4 ? _plQ + 1 : 1;
        var nextQYear = _plQ < 4 ? _plYear : _plYear + 1;
        var nqLabel = 'Q' + nextQNum + ' ' + nextQYear;
        var count = 0;
        var cbList = document.querySelectorAll('.pl-transfer-cb');
        for (var cb = 0; cb < cbList.length; cb++) {
          if (cbList[cb].checked) {
            var initId = cbList[cb].getAttribute('data-init-id');
            var actionSel = document.querySelector('.pl-transfer-action[data-init-id="' + initId + '"]');
            var action = actionSel ? actionSel.value : 'transfer';
            var init = _backlog.find(function(i) { return i.id === initId; });
            if (init) {
              if (action === 'transfer') {
                init.quarter = nqLabel;
                init.updatedAt = new Date().toISOString().split('T')[0];
                count++;
              } else if (action === 'cancel') {
                init.status = 'archived';
                init.updatedAt = new Date().toISOString().split('T')[0];
              }
            }
          }
        }
        saveBacklog();
        addLog('transfer_q', count + ' \u0438\u043D\u0438\u0446\u0438\u0430\u0442\u0438\u0432 \u043F\u0435\u0440\u0435\u043D\u0435\u0441\u0435\u043D\u043E \u0432 ' + nqLabel, 'product', productId);
        showToast(count + ' \u043F\u0435\u0440\u0435\u043D\u0435\u0441\u0435\u043D\u043E \u0432 ' + nqLabel);
        render();
      });
    }

    // Send for approval button
    var sendApproval = document.getElementById('pl-send-approval');
    if (sendApproval) {
      sendApproval.addEventListener('click', function() {
        var pGoals = _goals.filter(function(g) { return !g.productId || g.productId === productId; });
        pGoals.forEach(function(g) {
          if (g.status !== 'approved') {
            g.status = 'pending';
            g.approvalStatus = 'pending';
          }
        });
        saveGoals();
        if (window.PT && PT.notify) {
          PT.notify({ type:'goal_pending', level:'medium', recipientRole:'pmo', productId:productId, title: productId + ': \u0446\u0435\u043B\u0438 \u043E\u0442\u043F\u0440\u0430\u0432\u043B\u0435\u043D\u044B \u043D\u0430 \u0441\u043E\u0433\u043B\u0430\u0441\u043E\u0432\u0430\u043D\u0438\u0435', action:{label:'\u0421\u043E\u0433\u043B\u0430\u0441\u043E\u0432\u0430\u0442\u044C',url:'workspace.html?id='+productId+'&tab=goals'} });
        }
        addLog('goals_sent_approval', '\u0426\u0435\u043B\u0438 \u043E\u0442\u043F\u0440\u0430\u0432\u043B\u0435\u043D\u044B \u043D\u0430 \u0441\u043E\u0433\u043B\u0430\u0441\u043E\u0432\u0430\u043D\u0438\u0435 PMO', 'product', productId);
        showToast('\u041E\u0442\u043F\u0440\u0430\u0432\u043B\u0435\u043D\u043E \u043D\u0430 \u0441\u043E\u0433\u043B\u0430\u0441\u043E\u0432\u0430\u043D\u0438\u0435');
        render();
      });
    }

    // Goal approve/reject (delegated from data attributes)
    var gAppBtns = document.querySelectorAll('[data-goal-approve]');
    for (var ga = 0; ga < gAppBtns.length; ga++) {
      gAppBtns[ga].addEventListener('click', function() {
        var id = this.getAttribute('data-goal-approve');
        for (var gi = 0; gi < _goals.length; gi++) {
          if (_goals[gi].id === id) { _goals[gi].approvalStatus = 'approved'; _goals[gi].status = 'approved'; break; }
        }
        saveGoals();
        addLog('\u0426\u0435\u043B\u044C \u0443\u0442\u0432\u0435\u0440\u0436\u0434\u0435\u043D\u0430', id, 'goal', id);
        showToast('\u0423\u0442\u0432\u0435\u0440\u0436\u0434\u0435\u043D\u043E');
        render();
      });
    }
    var gRejBtns = document.querySelectorAll('[data-goal-reject]');
    for (var gr = 0; gr < gRejBtns.length; gr++) {
      gRejBtns[gr].addEventListener('click', function() {
        var id = this.getAttribute('data-goal-reject');
        for (var gi = 0; gi < _goals.length; gi++) {
          if (_goals[gi].id === id) { _goals[gi].approvalStatus = 'rejected'; _goals[gi].status = 'draft'; break; }
        }
        saveGoals();
        addLog('\u0426\u0435\u043B\u044C \u043E\u0442\u043A\u043B\u043E\u043D\u0435\u043D\u0430', id, 'goal', id);
        showToast('\u041E\u0442\u043A\u043B\u043E\u043D\u0435\u043D\u043E');
        render();
      });
    }
  }

  function initAssignMember() {
    var btn = document.getElementById('btn-add-member');
    var modal = document.getElementById('assign-modal');
    if (!btn || !modal) return;

    btn.addEventListener('click', function() {
      // Populate user select
      var sel = document.getElementById('assign-user');
      sel.innerHTML = '<option value="">\u0412\u044B\u0431\u0435\u0440\u0438\u0442\u0435...</option>';
      var users = PT.load(PT.KEY_USERS) || [];
      for (var i = 0; i < users.length; i++) {
        if (users[i].active) {
          sel.innerHTML += '<option value="' + esc(users[i].id) + '">' + esc(users[i].name) + ' (' + esc(users[i].role) + ')</option>';
        }
      }
      modal.classList.add('show');
    });

    document.getElementById('btn-cancel-member').addEventListener('click', function() {
      modal.classList.remove('show');
    });

    document.getElementById('btn-confirm-member').addEventListener('click', function() {
      var userId = document.getElementById('assign-user').value;
      var role = document.getElementById('assign-role').value;
      if (!userId) { showToast('\u0412\u044B\u0431\u0435\u0440\u0438\u0442\u0435 \u043F\u043E\u043B\u044C\u0437\u043E\u0432\u0430\u0442\u0435\u043B\u044F'); return; }

      var users = PT.load(PT.KEY_USERS) || [];
      for (var i = 0; i < users.length; i++) {
        if (users[i].id === userId) {
          if (!users[i].assignments) users[i].assignments = [];
          users[i].assignments.push({ productId: productId, scope: 'all', role: role });
          if (!users[i].productIds) users[i].productIds = [];
          if (users[i].productIds.indexOf(productId) === -1) users[i].productIds.push(productId);
          break;
        }
      }
      PT.save(PT.KEY_USERS, users);
      addLog('\u041D\u0430\u0437\u043D\u0430\u0447\u0435\u043D \u0443\u0447\u0430\u0441\u0442\u043D\u0438\u043A', userId + ' \u2192 ' + role, 'team', userId);
      modal.classList.remove('show');
      showToast('\u0423\u0447\u0430\u0441\u0442\u043D\u0438\u043A \u043D\u0430\u0437\u043D\u0430\u0447\u0435\u043D');
      render();
    });
  }

  // ── Cross-tab sync via storage events ──
  window.addEventListener('storage', function(e) {
    if (e.key === 'ECOTECH_BACKLOG' || e.key === 'ECOTECH_PRODUCTS' || e.key === 'ECOTECH_GOALS') {
      _backlog = PT.load(PT.KEY_BACKLOG) || [];
      _goals = PT.load(PT.KEY_GOALS) || [];
      PT.ensureProducts(function(p) {
        var prod = p.find(function(pr) { return pr.id === productId; });
        if (prod) { _product = prod; _allProducts = p; render(); }
      });
    }
  });

})();
</script>
